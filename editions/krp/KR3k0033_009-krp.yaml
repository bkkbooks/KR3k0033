騎孝武寧康元年詔除四桁稅在建康後宫八區漢昭陽飛翔增成合驩蘭林披香鳳凰鴛鸞張衡西京賦應劭曰後宫有八區增成第三二十四軍西魏李虎元欣李弼獨孤信趙貴于謹侯莫陳崇宇文泰八柱國元贊元育元廓侯莫陳順宇文遵逹奚武李遠豆盧寧宇文貴賀蘭祥楊忠王雄是為十二大將軍毎大將軍督二開府凡為二十四員分團統領是二十四軍每一團儀同二人北史宇文泰位總百揆都督中外軍事廣陵王欣元氏懿戚從容禁闥此外六人各督二大將軍分掌禁旅四方館宋都亭驛以待遼都亭西驛以待西蕃阿黎于闐新羅渤海懷遠驛以待交趾同文館以待青唐髙麗六參唐文武官職事九品以上及二王後朝朔望文臣五品以上及兩省供奉官監察御史員外郎太常博士日參號常參官武官三品以上三日一朝號九參官五品以上及折衝當畨者五日一朝號六參官百官志四科孝悌力行經史儒術藻思詞鋒廉平彊直顯慶五年詔四科舉人取士有三取士之科大要有三由學館曰生徒凡學六館二由州縣曰鄉貢選舉志得人數路漢孝廉賢良文學漢蔡邕封事漢之得人數路而已賢良方正孝亷秀才中興增敦朴有道賢能直言獨行髙節質直清白敦厚之屬後漢論八科宋九經五經開寶通禮三禮三傳三史學究明法太平興國二年講武殿覆試八科三舍法大學外舍生二千内舍生三百上舍生百總為二千四百員月一私試歳一公試補内舍生間歳又一試補上舍生三等俱優為上一優一平為中長中若一優一否為下元豐二年大學三舍法置八十齋齋容三十人十科行義純固節操方正智勇過人公正聰明經術精通學問該博文章典麗善聽獄訟善治財賦練習法令元祐元年司馬文正公請設十科以舉士八行孝悌睦婣任恤忠和大觀元年詔士有八行貢入太學四書院嵩陽河南府嶽麓潭州睢陽應天府白鹿洞南康軍諸王宅太祖太宗九王後曰睦親秦王後曰廣親英宗二王曰親賢神宗五王曰棣華徽宗諸王曰蕃衍朝野雜記禮神十二玉蒼璧天黄琮地四圭有邸感生帝兩圭有邸神州社稷圭璧日月青圭赤璋白琥𤣥璜黄琮五帝兩科經義詩賦紹興十五年詔分為兩科復二十七年詔兼習兩科三十一年分科取士東京外城十九門南五門南薫廣濟宣化廣利安上東五門上善廣津朝陽含輝善利西五門順天順濟開遠金耀咸豐北四門寧徳景陽永泰安肅裏城十門南三門朱雀保康崇徳東二門麗景宜春西二門宜秋閶闔北三門景龍安遠天波宫城六門南三門宣徳左掖右掖東一門東華西一門西華北一門拱宸束京記
