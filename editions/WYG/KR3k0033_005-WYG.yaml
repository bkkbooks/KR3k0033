body:
  text: 小學紺珠卷五宋王應麟撰厯代類三皇太昊伏羲氏炎帝神農氏黄帝有熊氏孔安國書序皇甫謐帝王世紀伏羲女媧神農鄭康成伏羲神農祝融白虎通燧人伏羲神農宋均遂譙周皇風俗通云皇戯農皇天皇地皇人皇皇王大紀天皇地皇泰皇史記秦紀世索隱炎黄二帝雖相承帝王紀中間隔八帝五百餘年五帝少昊金天氏史記有黄帝無少昊顓頊髙陽氏帝嚳髙辛氏帝堯陶唐氏帝舜有虞氏書序紀帝王世黄帝顓頊帝嚳帝堯帝舜史記家大戴禮語太皥木炎帝火黄帝土少皥金顓頊水月令家語包犧神農黄帝堯舜皇王大紀二帝堯甲辰即帝位舜黄帝炎帝國語三代夏商又殷周漢書注三季三代之末世左傳注二叔夏殷之叔三王夏禹商湯周文王孟子注居注孔子間四代虞夏殷周學記注五代黄帝堯舜禹湯祭法為并顓頊嚳七代唐虞夏殷周魯靈光殿賦八代五帝三王陸機五等論世注三皇五帝崔寔政論八二代夏殷論語周監於二代殷賢聖之君六七作湯太甲太戊祖乙盤庚武丁孟子三宗殷太宗太甲中宗太戊髙宗武丁漢劉歆曰周公為毋逸之戒舉殷三宗以勸成王三后周太王王季文王詩三后在天禹湯文王離騷三后之純粹二后文王武王詩昊天有成命二后受之二后文武也四王六君禹湯文武左傳四王之王也注堯舜禹湯文武陸䞇奏議此六君者天下之盛王也莫不從諫以輔徳詢衆以成功五伯又曰五霸夏伯昆吾商伯大彭豕韋周伯齊桓晉文齊桓晉文宋襄秦穆楚莊左傳五伯之霸也注孟子五霸者三王之罪人也注齊桓晉文秦穆宋襄楚莊漢地理志注同齊桓晉文楚莊呉闔閭越勾踐荀子五伯齊桓宋襄晉文秦穆呉夫差漢諸侯王表注二文晉文侯仇文公重耳左傳復二文之業詩十五國風周南召南風正邶鄘衛王鄭齊魏唐秦陳檜曹豳風變今詩之次第豳齊衞檜陳唐秦鄭魏曹變風之先後周召邶鄘衞王鄭齊豳秦魏唐陳檜曹未刪詩之前季札所聽樂歌次第周召邶鄘衞王檜鄭齊魏唐秦陳曹豳鄭氏詩譜次第出歐陽子詩譜序周召王豳同於周邶鄘并於衛檜魏無世家其可考者陳齊魏晉曹鄭秦封國之先後六王夏啓有鈞臺之享商湯有景亳之命周武有孟津之誓成有岐陽之蒐康有酆宫之朝穆有塗山之㑹左傳椒舉言六王之亊二皇伏羲神農張衡東京賦踵二皇之遐武五王堯取人以狀舜取人以色禹取人以言湯取人以聲文王取人以度大戴禮此四代五王之取人十二氏容成氏大庭氏柏皇氏中央氏栗陸氏驪畜氏軒轅氏赫胥氏尊盧氏祝融氏伏戲氏神農氏莊子注十二氏皆古帝王闢續漢厯志元命包乾鑿度皆以為開至獲麟二百七十六萬歲九主三皇五帝夏禹史記伊尹言素王及九主之事索隱云或曰謂九皇春秋魯十二公隱十一桓十八莊三十二閔二僖三十三文十八宣十八成十八襄三十一昭三十三定十五哀十四二百四十二年封禪七十二君管仲曰古封泰山禪梁父者七十二家夷吾所記者十有二無懷氏虙羲神農氏炎帝神農後黄帝顓頊帝嚳堯舜禹湯周成王史記祀漢郊志君班固典引曰作者七十有四人注自古封禪七十二并漢武帝光武韓詩外傳古封泰山禪梁父者萬餘人仲尼觀焉不能盡識十二諸侯魯齊晉秦楚宋衞陳蔡曹鄭燕史記魏漢書東方朔傳注十二國謂魯衞齊楚宋鄭燕趙中山秦韓史記表十二諸侯首魯訖呉實十三國不數呉之劉向戰國䇿序萬乗之國七千乗國五六國燕召公奭始封楚始熊繹受封魏魏斯分晉趙趙籍分晉韓韓䖍分晉齊田和并齊并秦為七國又曰七雄并宋微子始封衞康叔始封中山鮮虞為九國賈誼過秦論云九國之師七制五宗髙祖太宗文帝世宗武帝中宗宣帝世祖光武顯宗明帝肅宗章帝文中子續書有七制皆漢之賢君太宗世宗中宗顯宗肅宗楊賜傳二祖五宗二祖髙祖世祖漢二祖三祖太祖武帝髙祖文帝烈祖明帝魏三祖三國漢劉備昭烈魏曹丕文帝呉孫權大帝六朝呉東晉司馬宋劉齊蕭梁蕭陳陳建皆都康六代晉宋後魏拓跋北齊髙後周宇文隋楊文中子續詩備六代夏殷周秦漢魏曹元首六代論三宗唐太宗𤣥宗憲宗范祖禹曰貞觀之治幾於三代開元之治幾於貞觀元和之政號為中興五代又曰五季梁唐晉漢周五十六年更八姓十有四君十六國前趙劉淵稱漢曜號趙後趙石勒號魏冉閔前秦苻洪後秦姚萇西秦乞伏國仁前燕慕容皝後燕慕容垂南燕慕容徳北燕馮跋前涼張軌後涼吕光南涼秃髮烏孤西涼李暠北涼沮渠蒙遜夏赫連勃勃蜀李雄漢壽稱十國呉楊行密南唐李昇後稱江南前蜀王建後蜀孟知祥南漢劉隱楚馬殷呉越錢鏐閩王審知殷延政號南平髙季興北漢劉崇邵子曰三皇春也五帝夏也三王秋也五霸冬也七國冬之餘洌也漢王而不足晉霸而有餘三國霸之雄者也十六國霸之叢者也南五代霸之借乗者也北五朝霸之傳舎者也隋晉之子也唐漢之弟也隋季諸郡之霸江漢之餘波也唐季諸鎭之霸日月之餘光也後五代之霸日未出之星也十八王西楚項籍衡山呉芮臨江共敖九江英布常山張耳代趙歇臨淄田都濟北田安膠東田市雍章邯塞司馬欣翟董翳燕臧荼遼東韓廣魏魏豹殷司馬卬韓韓成河南申陽漢表譜十八王十紀九頭五龍攝提合雒連通序命循飛因提禪通疏仡廣雅自開闢至獲麟二百七十六萬歲分為十紀大率一紀二十七萬六千年獲後漢厯志十元命苞乾鑿度皆以開闢至麟二百七六萬歲六紀九頭紀五龍紀攝提紀合洛紀連通紀序命紀六藝論遂皇之後厯六紀九十一代二周西周東周大亊記顯王二年趙與韓分周為二東西周各為列國又見前世本西周桓公揭居河南東周惠公班居洛陽十五王周后稷不窋鞠陶公劉慶節皇僕差弗毀隃音踰公非髙圉亞圉公祖大王王季文王十八王加武王成王康王周語太子晉曰自后稷之始基靖民十五王而文始平之十八王而康克安之衞彪傒曰后稷勤周十有五世而興六君子禹湯文武成王周公禮運二公二伯齊桓有召陵之師晉文有踐土之盟左傳椒舉言二公之事漢志二伯齊桓晉文五龍皇伯皇仲皇叔皇季皇少春秋命厯序五姓同期俱駕龍號曰五龍五世唐虞夏殷周王符潛夫論四聖顓頊帝嚳堯舜史記自序維昔黄帝法天則地四聖遵序各成法度四人迪哲殷王中宗髙宗祖甲周文王無逸五聖堯舜禹湯周文王淮南子秦六世孝公惠文王武王昭襄王孝文王莊襄王賈生過秦論曰始皇奮六世之餘烈四代北朝魏周齊南朝陳文中子除四代之法聖賢類三聖伏羲文王孔子漢藝文志易道深矣人更三聖世厯三古伏羲為上古文王為中古孔子為下古禹周公孔子孟子曰禹抑洪水而天下平周公兼夷狄驅猛獸而百姓寧孔子成春秋而亂臣賊子懼堯舜禹董仲舒曰禹繼舜舜繼堯三聖相授而守一道漢功臣表湯法三聖文王武王周公漢諸侯王表三聖制法三子伯夷聖之清伊尹聖之任栁下惠聖之和孟子三子者不同道其趨一也二老伯夷太公孟子二老者天下之大老也老子老萊子孫綽天台山賦躡二老之𤣥蹤四科十哲徳行顔淵回閔子騫損冉伯牛耕仲弓冉雍言語宰我予子貢端木賜政事冉有求季路仲由文學子游言偃子夏卜商論語顔子配享升曾子為十哲曾子配享升子張為十哲孔子弟子七十二人十哲曾參子輿顓孫師子張澹臺滅明子羽宓不齊子賤原憲子思公冶長子長南宫括子容公晳哀季次曾蒧晢顔無繇路商瞿子木髙柴子羔漆雕開子開公伯寮子周司馬耕子牛樊須子遲有若公西赤子華巫馬施子期梁鱣叔魚顔幸子桞冉孺子魯曹䘏子循伯䖍子析公孫龍子石冉季子産公孫句茲子之秦祖子南漆雕哆子斂顔髙子驕漆雕徒父壤駟赤子徒商澤子季石作蜀子明任不齊選公良孺子正后處子里秦冉開公夏首乘奚容蒧子晳公肩定子中顔祖襄罕父黑子索鄡單音善子家句井疆秦商子丕申黨周顔之僕叔榮旂子祺縣成子祺左人郢行燕伋思鄭國子徒秦非子之施之常子恒顔噲子聲步叔乗子車原亢籍樂欬子聲亷潔庸叔仲㑹子期顔何冉狄黒晳邽巽子斂孔忠子􅌸公西輿如子上公西蒧子上史記列傳孔子曰受業身通者七十七人皆異能之士也於蘇氏古史云秦冉顔何不載於家語琴牢陳亢不録史記二書不可偏廢而琴張陳亢又見論語并録之凡七十九人二儒孟子軻荀卿况韓文公進學解孔子四友顔回胥附端木賜奔輳顓孫師先後仲由禦侮尚書大傳孔叢子孔子曰吾有四友六侍仲尼志意不立子路侍儀服不修公西華侍禮不習子貢侍辭不辯宰我侍忘忽古今顔回侍節小物冉伯牛侍尸子子夫子曰吾以六自厲也作者七人伯夷叔齊虞仲夷逸朱張桞下惠少連論語七人皆逸民之賢者孔王弼注朱張字子弓荀卿以比子長沮桀溺荷蓧丈人晨門荷蕢儀封人楚狂接輿同上舊説伏羲神農黄帝堯舜禹湯同上子曰張二十二賢左邱明卜子夏公羊髙穀梁赤伏勝髙堂生戴聖毛萇孔安國劉向鄭衆賈逵杜子春馬融盧植鄭𤣥服䖍王弼何休王肅杜預范寗唐貞觀二十一年配享孔子廟六先生濓溪周惇頥茂叔明道程顥伯淳伊川程頥正叔康節邵雍堯夫横渠張載子厚涑水司馬光君實朱文公作贊雍胡文定公奏西都有邵程顥頤關中有張載四人道學徳行名於當世請加封號載在祀典四先生謝良佐顯道游酢定夫吕大臨與叔楊時中立二程先生門人漢諸儒言詩於魯則申培公於齊則轅固生於燕則韓太傅言尚書自濟南伏生言禮自魯髙堂生言易自菑川田生言春秋於齊魯自胡母生於趙自董仲舒史記儒林傳先師若漢禮有髙堂生樂有制氏詩有毛公書有伏生文王世子注五賢孟軻荀卿揚雄王通韓愈孔道輔繪五賢於兖州夫子廟配元豐七年孟子享荀揚韓從祀五先生周二程張朱熹元晦淳祐元年列於從祀二聖一賢禹孔墨韓文公爭臣論四子回之信顔淵賜之敏子貢由之勇子路師之莊子張家語三子子路冉有公西華三子言志由也果賜也達求也藝論語宰我子貢有若孟子孔注三子言子子路勇士子貢辯士顔淵聖士韓詩外傳子路士子貢士君子顔淵明君子荀子命世數公孟軻荀况董仲舒司馬遷劉向揚雄漢書贊此數公皆博物洽聞通達古今傳曰聖人不出其間必有命世者豈近是乎八翁築巖翁釣溪翁卜年翁感麟翁伯陽翁漆園翁竺乾翁臥龍翁横渠先生八翁吟名臣類上燧人四佐明由必育成博隕邱論語摘輔象燧人出天四佐出洛伏羲六佐金提鳥明視黙紀通仲起陽侯論語摘輔象敘古蒙求云賢庸六輔黄帝六相蚩尤為當時天云通鑑外紀風后太常為廩者地奢龍為土師東祝融為司徒南大封為司馬西后土為李北管子黄帝得六相七輔風后天老五聖知命窺紀地典力墨或作牧論語摘輔象黄帝三公風后配上台天老配中台五聖配下台帝王世紀謂之三公四史沮誦蒼頡隸首孔甲黄帝四史官少皥氏四敘三正重為句芒木正該為蓐收金正修及熈為元冥水正左傳蔡墨云叙漢張衡云四三正九職又曰九佐舜為司徒契為司馬禹為司空后稷為田疇䕫為樂正倕為工師伯夷為秩宗臯陶為大理益掌敺禽説苑堯知九職之事之戰國䇿堯有九佐淮南子堯佐九人九官伯禹宅百揆棄后稷契作司徒臯陶作士垂共工益作朕虞伯夷作秩宗夔典樂龍納言舜典有咨汝二十有二人注禹垂益伯夷夔龍六人新命職四岳十二牧凡二十有二人薛氏曰四岳十二牧九官也四岳為一人漢劉更生曰舜命九官濟濟相讓二官南正重司天屬神火正黎司地屬民史記顓頊命重黎其後二官咸廢所職堯復還重黎之後不忘舊者使復典之而立羲和之官四岳羲和四子四伯羲仲春羲叔夏和仲秋和叔冬堯典和注重黎之後羲氏氏世掌天地四時之官四四岳即羲和四子分掌四岳之諸侯民周語四伯謂岳也漢食貨志堯命四子以敬授時融朱文公説四岳一人總四岳諸侯之事時馬云羲氏掌天官和氏掌地官四子掌四八愷舜典注八凱髙陽氏有才子八人蒼舒隤敳檮戭大臨尨降庭堅仲容叔達左傳文十八年太史克曰齊聖廣淵明允篤誠天下之民謂之八愷左垂益禹臯陶之倫水經注隤敳益傳臯陶庭堅八元髙辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍同上忠肅共懿宣慈惠和天下之民謂之八元稷契朱虎熊羆之倫十六相八愷八元同上十六族世濟其美舜舉十六相五臣禹稷契臯陶伯益論語舜有臣五人而天下治四士禹為司空契為司徒臯陶為李后稷為田疇管子舜四士石戸之農北人無擇卞隨務光吕氏春秋四士之節八伯伯夷為陽伯羲仲之後為羲伯棄為夏伯羲叔之後為羲伯咎繇為秋伯和仲之後為和伯垂為冬伯闕一人尚書大傳三后伯夷降典禹平水土稷降播種書吕刑堯命三后恤功於民周公君陳畢公畢命三后協心禹契后稷淮南子八師堯舜禹稷卨臯陶伯夷垂益䕫楚辭東方朔七諌注七友舜雄陶一作雒方回續牙伯陽東不訾秦不虚靈甫尸子舜逸士傳禹戰國䇿顔斶曰堯有九佐有七友有五丞湯有三輔三公禹臯陶后稷史記殷紀二十官大撓作甲子黔如作慮首容成作厯羲和作占日尚儀作占月后益作占歲胡曹作衣夷羿作弓祝融作市儀狄作酒髙元作室虞姁作舟伯益作井赤冀作臼乗雅作駕寒哀作御王冰作服牛史皇作圖巫彭作醫巫咸作筮吕氏春秋此二十官者聖人所以治天下也奚仲作車蒼頡作書后稷作稼臯陶作刑昆吾作陶夏鮌作城同上作此六者所當矣倕作弓浮游作矢奚仲作車乗杜作乗馬世本云相土荀子殷六臣伊尹伊陟臣扈巫咸巫賢甘盤書君奭注伊尹至甘盤六臣十一聖人師黄帝學乎太眞顓頊學乎緑圖帝嚳學乎赤松子堯學乎尹壽荀子作君疇舜學乎務成跗荀子作昭禹學乎西王國湯學乎威子伯文王學乎鉸時子斯武王學乎郭叔周公學乎太公仲尼學乎老聃新序子夏曰此十一聖人未遭此師則功業不著乎天下神農學悉老黄帝學太眞顓頊學伯夷父帝嚳學伯招帝堯學州支父帝舜學許由禹學大成執湯學小臣文王武王學太公望周公旦齊桓公學管夷吾隰朋晉文公學舅犯隨㑹秦穆公學百里奚公孫支楚莊王學孫叔敖沈尹竺呉王闔閭學伍子胥文之儀越王句踐學范蠡大夫種同上吕子曰此皆聖人之所學也四俊臯陶稷契史皇蒼頡淮南子湯二相伊尹右仲虺左晉志成湯初置二相以伊尹仲虺為之左傳仲虺為湯左相伊尹為右相一孟子伊尹萊朱注萊朱曰仲虺是也湯七佐慶誧伊尹湟里且東門虚南門蠕西門疵北門側鬻子湯得七大夫佐以治天下殷三仁㣲子去之箕子為之奴比干諫而死論語文王四友又曰四臣四佐四鄰閎夭太公望左傳釋文曰太顚南宫适散宜生尚書大傳後詩疏附先後奔奏禦侮親孔叢子文王胥附奔輳先禦侮謂之四鄰率下上曰疏附相道前後曰先後喻徳宣譽曰奔奏武臣折衝曰禦侮周書維人四佐左傳注文王有四臣周八士伯達伯适仲突仲忽叔夜叔夏季隨季騧論語周有八士鄭國語文王詢於八虞注周八士皆在虞官𤣥以為成王時劉向馬融以為宣王時賢周書注武王臣十亂武王周公旦召公奭太公望畢公榮公太顚閎夭散宜生南公适文母劉原父謂子無臣母之義蓋邑姜也論語泰誓予有亂臣十人或曰亂本作乿古治字四子成王又曰四聖四輔周公在前召公在後畢公在左史佚在右後漢書周公立於前謂之道太公立於後謂之充召公立於右謂之弼史佚立於左謂之承大戴禮二公成王召公為太保周公為太傅太公為太師賈誼傳二公召公太公書金滕召公畢公顧命二注二公為伯五佐武王周公召公太公畢公髙蘇公忿生吕氏春秋武王之佐五人注太公周公召公畢公毛公淮南子注五臣文武虢叔閎夭泰顚散宜生南宫适孔叢子五臣同寮比徳以贊文武後禦侮之任書君奭注五臣佐文王為胥附奔走先書大傳散宜生閎夭南宫括三子學乎太公武王立虢叔先死故曰惟兹四人二伯二相東伯周公代畢公西伯召公書正義於王制八伯各以其屬屬天子之老二人分天下為左右曰二伯史公羊傳自陜以東周公主之自陜以西召公主之記宣王即位二相輔之注召公周公晉五士文公又曰五臣五賢狐偃趙衰顚頡魏武子犫司空季子胥臣臼季左傳叔向曰文公生十七年有士五人耳袁宏云五臣顯而重耳霸劉越石詩重任五賢三材狐偃趙衰賈它晉語三材侍之卿才三人也二國士里克荀息晉語丕鄭曰二國士之所圖無不遂也八卿荀罃將中軍知武子士匄佐宣子范荀偃將上軍子中行獻韓起佐子宣欒黶將下軍桓子士魴佐恭子彘趙武將新軍文子魏絳佐子莊左傳襄八年鄭子展曰晉君方明四軍無闕八卿和睦三卿知莊子荀首范文子士燮韓獻子厥欒武子曰三卿為主可謂衆矣注皆晉之賢人齊五子桓公管夷吾甯戚隰朋賓胥無鮑叔牙齊語甯戚為田官隰朋為大行東郭牙為諫臣弦寧為大理王子成甫為大司馬新序齊三賢管仲鮑叔牙隰朋袁宏曰三賢進而小白興三良秦奄息仲行鍼虎詩車左傳子子氏三鄭叔詹堵叔師叔左傳僖七年管仲曰三良為政未可間也晉王導郗鑒庾亮衞多君子蘧瑗伯玉史狗文子史鰌史魚公子荆公子發文子公子朝左傳襄二十九年呉公子札適衞曰衞多君子未有患也晉多君子趙孟為大夫文子伯瑕為佐士文伯史趙師曠而咨度焉叔向女齊以師保其君左傳襄三十年季武子曰晉未可媮也其朝多君子楚多賢臣令尹子西太宗子敖葉公子髙司馬子反昭奚恤新序秦欲伐楚使使者往觀楚寳器昭奚恤曰楚國所寳者賢臣也秦使者曰楚多賢臣未可謀也八大夫晉祁午張趯籍談女齊梁丙張骼輔躒左狄反苗賁皇扶云反左傳楚薳啓疆曰羊舌肸之下八大夫皆諸侯之選也二守齊國子髙子左傳管仲有天子之二守國髙在天子所命為齊守臣皆上卿也守手友反四賢鄭裨諶世叔游吉行人子羽東里子産論語為命裨諶草創之世叔討論之行人子羽修飾之東里子産潤色之注更此四賢而成故鮮有敗亊秦五子由余百里奚蹇叔丕豹公孫支史記李斯上書曰昔繆公求士西取由余於戎東得百里奚於宛迎蹇叔於宋求丕豹公孫支於晉此五子者不産於秦而繆公用之魯二臣仲孫蔑孟獻子季孫行父文子左傳子叔聲伯曰二人者魯國社稷之臣也孟獻子五友樂正裘牧仲其三人忘之孟子衞三臣仲叔圉治賓客孔文子祝鮀治宗廟王孫賈治軍旅論語越五大夫舌庸苦成大夫種范蠡臯如國語越王句踐召五大夫問戰趙三士烈侯牛畜荀卿徐越公仲進三人魏三士文侯子夏田子方段干木新序白圭曰文侯師子夏友田子方敬段干木三士翊之魏三大夫徒師沼郗辛芒夘說苑魏太子曰此三大夫魏國之大寶齊四臣檀子守南城朌子守髙唐黔夫守徐州徐音舒種首備盜賊史記魏王問曰王亦有寶乎四豪又曰四賢齊孟嘗君田文魏信陵君公子無忌趙平原君趙勝楚春申君黄歇賈誼曰四賢皆明智而忠信寛厚而愛人游俠傳序游談者以四豪為稱首楚三大夫子良昭常景鯉戰國䇿楚五臣令尹子文葉公子髙莫敖大心棼冒勃蘇蒙穀戰國䇿莫敖子華對威王小學紺珠卷五
