朱白蒼雜記藻三采六等注藻薦玉者以朱白蒼畫之再行左傳注藻率以藉玉王五采公侯伯三采子男三采諸侯見王六禮春見曰朝圖事夏見曰宗陳謨秋見曰覲比功冬見曰遇協慮時見曰會發禁殷見曰同施政周禮大宗伯注此六禮諸侯見王大行人朝覲宗遇會同君之禮也存頫省聘問臣之禮也小行人比年一小聘三年一大聘五年一朝王制歲聘以志業間朝以講禮再朝而會以示威再會而盟以顯昭明左傳叔向曰明王之制王侯公卿二千石六百石郎吏匈奴侍子凡九等續漢禮儀志大鴻臚設九賓薛綜注韋昭曰周禮九儀也劉敞之說謂擯者九人外朝中朝內朝詢事之朝通典周制天子有四朝唐至正至御承天門聽政古之外朝朔望坐太極殿視朝古之中朝常日兩儀殿聽朝視事古之內朝六典梁五禮八千十九條吉一千五條凶五千六百九十三條賓五百四十五條軍二百四十條嘉五百三十六條梁書唐五禮之儀一百五十二吉五十五賓六軍二十三嘉五十凶十八六典開元禮二郊鄭玄郊丘為二南郊祀感生帝圜丘祀天皇大帝北郊祭神州地祗方丘祭崑崙之神王肅郊丘為一晉泰始初并圜丘方丘於南北郊祭一天一地用肅義合祭天地漢元始光武魏黃初晉元帝唐武后玄宗宋因之元豐六年不設地祇位元祐合祭親祠北郊後魏太和後周建德隋開皇唐先天宋政和宣和四祭顧成文帝德陽景帝龍淵武帝徘徊昭帝樂遊宣帝長壽元帝陽池成帝銅魚符傳符隨身魚符木契旌節唐六典歲取十千一成之田地方十里為田九萬畝而以其萬畝為公田蓋九一之法詩甫田十千為耦三十里萬夫之地四旁有川內方三十二里有奇萬人為耦而並耕詩噫嘻兩塾門側之堂謂之塾古者二十五家為閭同共一巷巷首有門門邊有塾里中之老有道德者為左右師坐於兩塾民在家之時朝夕出入受教於塾學記古之教者家有塾春將出民里胥平旦坐於右塾鄰長坐於左塾畢出然後歸夕亦如之入者必持薪樵輕重相分班白不提挈漢食貨志大夫七十致仕退老歸其鄉里大夫為父師士為少師新穀已入餘子皆入學距冬至四十五日始出學上老平明坐於右塾庶老坐於左塾餘子畢出然後乃歸夕亦如之書傳一命受爵再命受衣服三命受車馬曲禮為人子者三賜不及車馬注三賜三命也朝朝暮夕日中又朝禮記文王為世子朝於王季日三鞠衣襢衣褖衣玉藻注卿大夫士之妻命服分為三等襢張戰反褖吐亂反玄酒鸞刀槀鞂禮記三者修古鞂江八反大廟宗宮考宮路寢明堂周書作雒篇乃位五宮神號若云皇天上帝鬼號若云皇祖伯某示號若云后土地祗牲號曲禮牛曰一元大武豕曰剛鬣羊曰柔毛雞曰翰音齍號曲禮黍曰香合粱曰香箕稻曰嘉蔬幣號若玉云嘉玉幣曰量幣周禮大祝辨六號示音祗齍音粢朝事薦黍稷祭義報以二禮注周民數周治致太平政稱刑措民口千三百七十一萬四千九百三十三晉地里志司民協孤終司商協民性司徒協旅司寇協姦牧協職工協革場協入廩協出王治農于籍于農隙耨穫亦於籍獮於既烝狩於畢時周語仲山父曰是皆習民數萬年縣令京牧太常卿司徒御史大夫兵部尚書大駕鹵簿左右衛黃驍衛赤武衛白威衛黑領軍衛青唐儀衛志王六軍大國三軍次國二軍小國一軍五人為伍有長五伍為兩二十五人有司馬四兩為卒百人有長五卒為旅五百人有帥五旅為師二千五百人為師五師為軍萬二千五百人將皆命卿周禮大司馬小司徒公劉其軍三單箋無羨卒瞻彼洛矣以作六師注天子六軍棫樸六師及之常武整我六師周禮注伍一比兩一閭卒一族旅一黨師一州軍一鄉家所出一人三軍大國三軍其賦千乘魯以周公故爵雖侯而軍賦皆大國之制費誓曰魯人三郊三遂郊即鄉也天子六鄉具六軍六遂貳之合都邑之師為萬乘魯三郊具三軍三遂貳之合都邑之師為千乘所謂千乘之國成國半天子之軍者也古者積伍五人至卒百人而車法成其七十五人為戰車一乘徒七十二人甲士三人其二十五人別為重車萬二千五百人為軍為戰車百二十五乘徒九千人甲士三百七十五人一軍合為九千三百七十五人三軍合二萬八千一百二十五人魯頌閟宮言公徒三萬者舉三軍之成數也言公車千乘者舉魯國兵車之成數也魯本三軍公羊言二軍穀梁言一軍皆非是四丘為甸出兵百人其七十五人戰車也其二十五人重車也是一兵二十五人一甲而三十三人有奇作丘甲丘皆出甲是一甸而出兵百三十三人有奇則三增其一為三甸而增三乘唐說齋文七萃七萃之士萃聚也猶有七輿大夫周穆王傳天子六軍諸侯三軍莊子勇士一人雄入于九軍注中軍左右虞候各一軍左右廂各二軍通典李琦兵法處山處水土處斥澤處平陸孫子黃帝四軍左右前後晉志中上下新左傳晉中兵外兵騎兵別兵都兵通典魏置五兵尚書晉分中兵外兵各為左右後魏為七兵尚書左中兵右中兵左外兵右外兵都兵北齊五兵尚書左衛熊渠虎賁右衛佽飛虎賁晉二衛中行右行左行左傳晉作三行以禦狄後作五軍更為上下新軍鼓金旗管子兵法篇三官不繆天地風雲虎翼蛇蟠飛龍鳥翔風后握機文洞黨中黃龍騰鳥飛折衝虎翼握機衡諸葛武侯方圓牝牡衝輪浮沮一作罘罝雁行文選注雜兵書孫子金土水火木黃帝地人天太公蔡季通說握機之外別有八陳車箱車軒曲二直衡掛鵝鶴吳子天陣星宿孤虛地陣山川向背人陣偏伍彌縫唐高宗問兵家三陣員半千對以天時地利人和牝春方夏圓季夏牡秋伏冬周書兩前伍後專右角參左角偏前拒左傳晉荀吳五陣方白圓黃曲黑直青銳赤唐志講武五陣李靖問對五行陣府兵彍騎方鎮兵志兵之大勢三變車兵祭器樂宴器蔡邕月令章句審五庫之量衣甲槍弩