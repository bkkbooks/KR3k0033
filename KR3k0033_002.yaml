body:
  text: 地理類少昊都曲阜顓頊都濮陽帝嚳都亳堯都冀舜都蒲夏都安邑湯都亳周都雍洛文中子中國五帝三王所自立也注云泰遠東邠國西邠說文作汃濮鉛南濮山海經作獛祝栗北爾雅四方極遠之國晉地理志八紘之外名為八極八極之廣東西二億三萬一千三百里南北二億三萬一千三百里觚竹北北戶南西王母西日下東爾雅四方昏荒之國八荒八方荒忽極遠之地列子云遠在八荒之外淮南子四海之外有八澤八澤之外曰八埏八埏之外曰八荒嵎夷東表南交南表昧谷西表幽都北表東震西兌南離北坎詩四國四方之國也并中央為五方丹穴南空桐北太平東太蒙西爾雅東南巽東北艮西南坤西北乾并四方為八方又曰八荒八寓八極八區淮南子九州外有八紘八紘外有八極揚雄傳八紘注八方之綱維八區注八方也東京賦威振八寓注八方區宇八鄙四方與四角八靈八方之神挍獵賦八鎮四方四隅一鎮在中天子居之司馬相如傳八方之外六極上下四方荀子宇中六指謂之極注上下四方莊子天有六極注四方上下呂氏春秋神通乎六合注四方上下楚辭遠遊周流六漠注謂六合漢郊祀歌紛云六幕張衡思玄賦六區注六合班固典引光被六幽注六合幽遠之地纂要天地四方曰六令四方上下謂之宇往古來今謂之宙八埏地之八際埏音延司馬相如傳下泝八埏淮南子作八夤四方中國爾雅內則六年教方名注東西南北漢志八歲學五方注辨五方之名中國夷蠻戎狄王制五方之民東南神州曰農土正南次州曰沃土西南戎州曰滔土正西弇州曰并土正中冀州曰中土西北台州曰肥土正北濟州曰成土東北薄州曰隱土正東陽州曰申土淮南子周禮疏曰自神農巳上有大九州柱州迎州神州之等至黃帝德不及遠惟於神州之內分為九州騶衍曰中國名曰赤縣神州赤縣神州內自有九州禹之序九州是也中國外如赤縣神州者九乃所謂九州也有裨海環之一區中為一州如此者九有大瀛海環其外春秋命曆序人皇氏分九州神農始立地形甄度四海祭法共工氏霸九州五屬十連五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯八州八伯五十六正百六十八帥三百三十六長王制漢刑法志州有牧漢表注九伯九州之牧冀堯所都兗濟河青海岱徐海岱及淮揚淮海荊荊及衡陽豫荊河梁華陽黑水雍黑水西河書禹貢禹別九州左傳九牧九州之牧始冀次兗而終於雍言治水之序禹貢有青徐梁而無幽并營爾雅有徐幽營而無青梁并職方有青幽并而無徐梁營三代不同故也朱子曰中古之地但為九州禹治水作貢亦因其舊舜即位分十有二州冀兗青徐荊揚豫梁雍幽并營舜典肇十有二州咨十有二牧吳氏曰在禹治水之後分冀州為幽州并州分青州為營州書正義曰禹登王位還置九州冀兩河間豫河南雍河西荊漢南揚江南兗濟河徐濟東幽燕營齊爾雅注此蓋殷制商書九有之師商頌奄有九有帝命式十九圍注九州之界文王三分天下有其二荊梁雍豫徐揚惟青兗冀屬紂揚東南荊正南豫河南青正東兗河東雍正西幽東北冀河內并正北周禮職方氏辨九州之國職方氏始揚次荊而終於并言遠近之序豫周冀晉兗衛青齊徐魯揚越荊楚雍秦幽燕呂氏春秋後漢贊九縣注九州也甸侯綏要荒書益稷禹貢每服五百里五服二千五百里南北東西相距五千里益稷篇言弼成五服至于五千侯甸男采衛書周官六年五服一朝康誥曰云云國語祭公謀父曰先王之制邦內甸服邦外侯服侯衛賓服蠻夷要服戎翟荒服侯甸男采衛蠻夷鎮藩周禮職方氏辨九服之邦國方千里曰王畿其外方五百里大司馬九畿之籍方千里曰國畿自商以前并畿內為五服周公致太平除畿內更制天下為九服侯甸男采衛并王畿書周官六服群辟罔不承德禹貢五服通畿內周制五服在王畿外岱在兗州衡在荊州華在豫州嶽在雍州恆在并州周禮大司樂注泰山東兗州又曰岱宗岱山華山西華州衡山南衡州爾雅霍山為南嶽即天柱山按霍山在今壽州六安縣天柱山在漢廬江郡灊縣恆山北定州又曰常山漢文帝諱改嵩山中河南府爾雅嵩高大室山東岱南靃西華北恆中泰室說文爾雅河南華河西嶽吳嶽河東岱河北恆江南衡岱東在兗州華西在雍州衡南在荊州恆北在冀州左傳注江出岷山茂州河出崑崙西域淮出桐柏唐州濟沇水出王屋東流為濟河南漢志作泲爾雅四瀆者發源注海者也東海徐揚神勾芒西海西域神蓐收南海交廣神祝融北海青滄神顓頊太公金匱禮記祭義九夷東八狄北七戎西六蠻南爾雅詩蓼蕭箋北至于幽陵南至于交趾西濟于流沙東至于蟠木大戴禮五帝德高陽乘龍而至四海四海萬使大章步東極至西垂二億三萬三千五百里七十一步又使豎亥步南極盡北垂二億三萬三千五百里七十五步四海之內東西二萬八千里南北二萬六千里帝王世紀山海經西不盡流沙南不盡衡山東不盡東海北不盡恆山王制凡四海之內斷長補短方三千里徒駭太史馬頰覆釜胡蘇簡潔曾氏以簡潔為一其一則河之經流也鉤盤鬲津爾雅孟子禹疏九河徒駭是河流本道一分為八枝許商得其三杜佑通典得其六歐陽忞輿地記又得其一或新河而載以舊名或一地而互為兩說鄭氏以為齊桓塞其流以自廣漢王橫言九河之地為海水所漸酈道元謂九河碣石苞淪於海會稽泰山王屋首山太華岐山太行羊腸孟門淮南子呂氏春秋汧壺口砥柱太行西傾熊耳嶓冢內方汶史記正義道九山書說自岍岐至敷淺原國語禹封崇九山注九州之山會稽衡山華山沂山岱山嶽山醫無閭霍山恆山職方氏九州山鎮弱水黑水河漢索隱漾江沇淮渭洛史記正義道九川禹貢正義所導九水自北為始三江江漢滎雒淮泗河泲涇汭河泲漳呼池嘔夷職方氏九州川烏白江蚌江烏江嘉靡江畎江源江廩江提江箘江禹貢釋文尋陽地記三里江五州江嘉靡江烏土江白蚌江白烏江箘江沙提江廩江張須無緣江圖始於鄂陵終于江口會于桑落洲九江劉歆以為湖漢九水入彭蠡澤太康地記漢志在廬江郡之尋陽縣水經在長沙下雋西北胡氏以洞庭為九江曾氏謂過九江至于東陵東陵今之巴陵巴陵之上即洞庭也考之前志沅水漸水潕水辰水敘水酉水醴水湘水資水皆合洞庭中東入于江賈誼書曰禹鑿江而導之九路吳松江錢塘江浦陽江禹貢釋文韋昭云越語吳三江環之注云云三江松江東北行七十里得三江口東北入海為婁江東南入海為東江并松江為三吳地記庾仲初揚都賦注北江中江南江顏師古注漢地里志岷江浙江松江郭景純云一江自義興一江自毗陵一江自吳縣王介甫云岷山之江為中江嶓冢之江為北江豫章之江為南江蘇子瞻云北江中江皆禹所導南江乃其故道故經不之志曾氏云江至尋陽南合為一東行至揚州入彭蠡復分為三道入海周禮職方氏揚州其川三江疏云滆湖洮湖射湖貴湖太湖後漢馮衍傳注虞翻云太湖有五湖故謂之五湖太湖之小支俱連太湖故兼得五湖之名在今湖州東長塘湖太湖射湖貴湖滆湖水經注江南東注于具區謂之五湖口國語越伐吳戰于五湖范蠡返至五湖而辭越虞翻曰是湖有五道韋昭曰今太湖也書謂之震澤爾雅以為具區禹貢疏即震澤游莫貢䔖胥史記正義並太湖東岸五灣吳録五湖太湖別名周五百餘里故曰五湖職方氏揚州其浸五湖河渠書吳通渠三江五湖太史公曰上姑蘇望五湖地理志注五湖在吳說文通釋一名具區其泒有五故曰五湖太湖射貴湖上湖洮湖滆湖史記正義或說具區洮滆彭蠡青草洞庭史記索隱郭璞江賦太湖湖州射陽楚州青草嶽州丹陽潤州宮亭洪州周南召南周國本在岐山之陽岐周今鳳翔府天興縣文王辟國寖廣徙都于豐而分岐周故地為周公旦召公奭之采邑扶風雍縣南有召亭且使周公為政於國中而召公宣布於諸侯於是德化大成于內而南方諸侯之國江沱汝漢之間莫不從化南南方諸侯之國也即今興元府京西湖北諸州周公相成王制作禮樂其得之國中者雜以南國之詩謂之周南言自天子之國而被於諸侯不但國中而巳也其得之南國者直謂之召南言自方伯之國被於南方而不敢以繫于天子也朱子詩傳兩周平王東遷之後西周豐鎬也東周東都也威烈王之後西周河南也王城東周洛陽也成周呂氏大事記解題考王封其弟于河南是為桓公以績周公之官職惠公封其少子於鞏以奉王於是有東西二周大野魯大陸晉楊陓秦淮南子陽紆孟諸宋雲夢楚具區吳越海隅齊昭余祈燕圃田鄭焦護周爾雅具區越雲夢楚陽華秦淮南子陽紆大陸晉圃田梁說文甫田孟諸宋海隅齊巨鹿趙大昭燕淮南子昭余祈呂氏春秋漢書八藪有大野無巨鹿大昭國語禹豐殖九藪九澤既陂禹貢注九州之澤國語陂障九澤具區楊雲夢荊圃田豫孟諸青大野兗弦蒲雍貕養幽揚紆冀昭餘祈并職方氏九州澤藪七澤楚有七澤其一曰雲夢司馬相如子虛賦萬國州十二師州十有二師每一師領百國每州千二百國畿外八州總九千六百國其餘四百國在畿內鄭康成說漢地理志黃帝方制萬里畫野分州得百里之國萬區左傳子服景伯曰禹會諸侯於塗山執玉帛者萬國今存者無數十戰國策顏斶曰大禹之時諸侯萬國及湯之時諸侯三千今乃二十四八家為鄰三鄰為朋三朋為里五里為邑十邑為都十都為師州十有二師晉地理志帝堯叶和萬邦制云云周千八百國八州州二百一十國天子縣內九十三國凡九州千七百七十三國王制周蓋千八百國而太昊黃帝之後唐虞侯伯猶存至春秋時尚有數十國至戰國分而為七漢地理志春秋之初尚有千二百國見經傳者百七十國晉地理志戰國存者十餘列國唯有燕衛秦楚而巳齊及三晉皆篡亂帝王世紀導岍北條岍隴州吳山縣吳嶽山西傾中條山在洮州臨潭縣嶓冢南條山在興元府西縣三泉縣禹貢馬融王肅三條導岍陰列西傾次陰列嶓冢次陽列岷山正陽列在茂州汶山縣鄭康成四列名川三百支川三千莊子名川支川桑欽水經天下之水百三十七江河在焉江河大川其餘百三十五是為中川酈善長注枝流一千二百五十二為小川唐六典注天下水泉三億三萬三千五百五十有九四嶽三塗陽城大室大音泰荊山中南左傳司馬侯對晉侯漢郊祀志自崤以東名山五太室恆山泰山會稽湘山自華以西名山七華山薄山嶽山岐山吳山鴻冢瀆山涇渭洛國語西周三川皆震河洛伊秦置三川郡華池水黑水洛水唐志鄜州三川縣一出貝丘西南一漯川漢溝洫志禹釃二渠以引河山林川澤丘陵墳衍原隰周禮大司徒辨五地之物生孝經因地之利注分別五土視其高下田上中下冀中中兗中下青上下徐上中揚下下荊下中豫中上梁下上雍上上禹貢咸則三壤楚辭天問地方九則注九州之地有九品北亳蒙湯所受命亦曰景亳南亳榖熟湯所都西亳偃師盤庚所遷書立政三亳阪尹皇甫謐云二在梁國一在河洛幽州史記幽陵北裔共工窮奇崇山南裔在今澧州歡兜渾敦三危西裔在燉煌三苗叨餮羽山東裔在今海州朐山縣鯀檮杌舜典左傳東都賦瞰四裔而抗稜大庾始安臨賀桂陽揭陽漢書秦南有五嶺之戍注裴氏廣州記郡縣志大庾桂陽騎田九真都龐臨賀萌渚始安越城南康記遂溝洫澮川周禮司險設國之五溝五涂爾雅水注川曰溪注溪曰谷注谷曰溝注溝曰澮注澮曰瀆徑畛涂道路同上爾雅一達謂之道路二達謂之岐旁三達謂之劇旁四達謂