body:
  text: 人倫類上自高祖下至玄孫堯典以親九族孔氏傳詩序棄其九族鄭氏箋朱文公書說高祖至玄孫之親舉近以該遠五服異姓之親亦在其中親親以三為五巳上親父下親子三也以父親祖以子親孫五也以五為九以祖親高祖以孫親玄孫九也禮記父族四母族三妻族二異義夏侯歐陽說異姓有親屬者白虎通朱文公從孔傳夏氏從夏侯歐陽外祖父外祖母從母子妻父妻母姑之子姊妹之子女子之子巳之同族左傳親其九族杜氏注與孔鄭不同玄孫曾孫仍孫子身父祖父曾祖父高祖父太玄注亦禮九族之序父子孫周禮小宗伯掌三族之別注仲尼燕居注父族母族妻族漢書注如淳云父昆弟己昆弟子昆弟儀禮注昏禮注父子兄弟夫婦老子注後漢馮衍傳注父母兄弟妻子漢賈誼以奉六親注云呂氏春秋謂六戚父子從父昆弟從祖昆弟曾祖昆弟族昆弟漢禮樂志賈誼書云父子兄弟姑姊甥舅昏媾姻亞左傳注大宗一別子為祖繼別為宗百世不遷之宗小宗四繼高祖繼曾祖繼祖繼禰五世則遷之宗禮記大傳白虎通別子為祖如魯桓公生四子莊公既立為君則慶父叔牙季友為別子繼別為宗如公孫敖繼慶父是為大宗繼禰者為小宗如季武子立悼子悼子之兄曰公禰悼子既為大宗則繼公彌者為小宗謂之繼禰者蓋自繼其父為小宗不繼祖故也五宗上至高祖下及孫後漢書注五宗適子為小宗次者為二宗左傳注斬衰齊衰大功小功緦麻漢韋玄成傳天序五行人親五屬注云同族之五服學記師無當於五服注斬衰至緦麻之親父子有親君臣有義夫婦有別長幼有序朋友有信孟子堯舜使契為司徒教以人倫舜典曰契百姓不親五品不遜汝作司徒敬敷五教在寬朱文公注五品父子君臣夫婦長幼朋友五者之名位等級也五教父子有親至朋友有信五典克從注同程子曰五者人倫也言長幼則兄弟尊卑皆備矣言朋友則鄉黨賓客備矣父母兄弟子鄭玄說五品王肅曰五常父義母慈兄友弟恭子孝左傳舜舉八元使布五教舜典五典克從孔氏注同五品不遜敬敷五教在寬孔氏注五品謂五常五教五常之教皋陶謨五典君牙弘敷五典孔氏注五常之教周語五義紀宜注同左傳五教父子兄弟夫婦君臣長幼朋友賓客王制司徒明七教以興民德君義臣行父慈子孝兄愛弟敬左傳石碏曰所謂六順也父慈子孝兄良弟弟夫義婦聽長惠幼順君仁臣忠禮運十者謂之人義君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聽晏子曰禮也荀子立太學設庠序修六禮明十教注十教即十義君臣父子夫婦昆弟朋友中庸天下之達道五君臣父子夫婦君為臣綱父為子綱夫為妻綱白虎通禮緯含文嘉太玄曰三綱得於中極漢谷永曰勤三綱之嚴諸父有善昆弟有親族人有敘諸舅有義師長有尊朋友有舊白虎通禮緯君臣父子管子天無二日土無二王家無二主尊無二上坊記庸勳親親昵近尊賢左傳富辰云尊賢明賢庸勳長老愛親禮新親舊國語富辰云爵齒德孟子友直友諒友多聞論語益者三友三樂父母俱存兄弟無故一樂也仰不愧於天俯不怍於人二樂也得天下英材而教育之三樂也孟子居則致其敬養則致其樂病則致其憂喪則致其哀祭則致其嚴孝經五者備矣然後能事親彭忠肅公龜年集格言為五致録事君忠事親孝交友信處鄉順孔叢子婦德婦言婦容婦功班超女行女有四行為人子孝為人弟弟為人臣忠為人少順冠義將責四者之行於人牧以地得民長以貴得民師以賢得民儒以道得民宗以族得民主以利得民吏以治得民友以任得民藪以富得民周禮太宰以九兩繫邦國之民兩猶耦也媺宮室族墳墓聯兄弟聯師儒聯朋友同衣服大司徒以本俗六安萬民父師君國語蠻共子曰民生於三事之如一父生之師教之君食之事親有隱而無犯事君有犯而無隱事師無犯無隱禮記大孝尊親其次弗辱其下能養小孝用力中孝用榮大孝不匱祭義曾子曰孝有三養順喪哀祭敬時祭統孝子事親有三道始於事親中於事君終於立身孝經養體養目養耳養口養志魯氏春秋曾子曰養有五道冠昏喪祭文中子弟凝正家以四禮四體雞初鳴咸盥漱櫛縱笄總而朝君臣之道也惻隱之恩父子之道也會計有無兄弟之道也閨閫之內朋友之道也白虎通婦事夫有四禮納采問名納吉納徵請期親迎士昏禮文中子婚嫁必具六禮命義莊子天下有大戒二子之愛親命也臣之事君義也婦德貞順婦言辭令婦容婉娩婦功絲麻周禮九嬪掌婦學之法禮記昏義古者婦人教以婦德婦言婦容婦功後漢論九嬪掌教四德班昭女誡曰女有四行婦德婦言婦容婦功干寶晉紀論聞四教於古柔順清潔不妬儉約恭謹勤勞司馬文正公家範曰為人妻者其德有六容悅凡臣社稷股肱天民行道大人正身孟子章指凡此四科優劣之差君臣父子夫婦莊子音義云父子之道君臣之義長幼之節禮記文王世子行一物而三善皆得世子齒於學貴賤明隆殺辨和樂而不流弟長而無遺安燕而不亂鄉飲酒義五行天地者生之本先祖者類之本君師者治之本荀子禮論禮有三本故禮上事天下事地尊先祖而隆君師事君報親敬兄荀子君子有三恕有君不能事有臣而求其使非恕也有親不能報有子而求其孝非恕也有兄不能敬有弟而求其聽令非恕也正君臣親父子和長幼冠義注三行父義母慈兄友弟恭子孝國語五義紀宜注云親親尊尊名出入長幼從服大傳內姓外婚朋友同里周書政有四戚交友故舊邑里門郭呂氏春秋士農工商齊語管子曰四民者勿使雜處漢食貨志學以屈位曰士闢土殖榖曰農作巧成器曰工通財鬻貨曰商五民遊子樂其俗不復歸故有五方之民漢地理志齊地具五民庸人士人君子賢人聖人家語孔子曰人有五儀又荀子秀士選士俊士造士進士王制聖臣良臣忠臣智臣貞臣直臣說苑人臣之行有六正國任貴鄉任正官任長學任師族任宗家任主先任賢大戴禮文王官人篇倫有七屬君臣父子兄弟朋友夫妻呂氏春秋十際王臣公公臣大夫大夫臣士士臣皂皂臣輿輿臣隸隸臣僚僚臣僕僕臣臺國語史伯曰合十數以訓百體注自王以下位有十等左傳人有十等三老五更三老國老也五更庶老也月令章句三公老者為三老鄉大夫老者為五更盧植禮記注老人更知三德五事鄭康成注父事三老兄事五更漢書注陳用之曰古者建國立三卿鄉飲酒立三賓禮曰三公在朝三老在學三公非一人則三老五更亦非一人矣卿為上擯大夫為承擯士為紹擯聘禮三擯天子見公擯者五人見侯伯擯者四人見子男擯者三人覲禮注皆宗為上擯上公七介侯伯五介子男三介聘義諸父兄上大夫盛德之士老臣公羊傳注禮君於臣不名者有五諸父諸兄先王之臣盛德之士說苑伊尹曰君之所不名臣者四父之姓姑之子姊妹之子女之子母之姓從子妻父母史記索隱張晏曰上至曾祖下至曾孫同宗父子祭統注宗廟之次左為昭右為穆子孫亦以為序群昭南向取其向明群穆北向取其深遠中庸章句或問父昭子穆孫復為昭一昭一穆相次而下國語注父南面曰昭明也子北面曰穆順也決疑要注擇術然後學之擇師然後傳之擇交然後親之擇君然後事之劉敬弟子記君子有四擇天子諸侯卿大夫士庶人孝經序雖五孝之用則別而百行之源不殊天子虞舜夏禹殷高宗周文王諸侯周公旦魯孝公河間惠王卿大夫孔子孟莊子潁考叔士高柴樂正子春孔奮黃香庶人江革廉范汝郁殷陶陶淵明孝傳贊居處莊事君忠蒞官敬朋友信戰陳勇祭義曾子言孝張魏公名方耕道堂曰五遂夫婦別父子親君臣嚴禮記哀公問願聞所以行三言之道孟孟仲季仲孟仲季季孟仲季太玄父夫子儀禮婦人有三從之義無專用之道公輔天子卿輔公大夫輔卿士輔大夫京師輔君諸夏輔京師何休春秋例自立容貌備豫近人特立剛毅自立仕憂思寬俗舉賢援能任舉持立獨行規為交友尊讓禮記儒行其爭讓有如此者注云此兼上下五儒蓋聖人之儒行也致反始致鬼神致物用致義致讓祭義合此五者以治天下之禮也上壽中壽下壽左傳杜氏注工老商老農老服氏注三卿詩三壽作朋如岡如陵或曰壽與岡陵等而為三三老張衡東京賦送迎拜於三壽注三老也孝行著於家門仁恕稱於九族義斷行於鄉黨魏夏侯玄議三者之類取於中止隱者三概上焉者身藏而德不晦其次潔治世具弗得伸持峭行不可屈于俗末焉者資槁薄樂山林唐隱逸傳州國氏人名字子何休春秋例胡氏傳王朝公卿書官大夫書字上士中士書名下士書人上上聖人始於宓犧上中仁人上下智人中上中中中下下上下中下下愚人始於蚩尢漢古今人表列九等之序五人曰茂十人曰選百人曰俊千人曰英倍英曰賢萬人曰傑萬傑曰聖白虎通禮別名記德萬人者謂之俊德千人者謂之豪德百人者謂之傑鶡冠子俗人俗儒雅儒大儒荀子九等大儒者天子三公也小儒者諸侯大夫士也衆人者工農商賈也同上天子公卿大夫士大戴禮均五政注公卿大夫周禮疏易通卦驗云輔有三名所見所聞所傳聞公羊傳自祖至孫曲禮三世注五人為伍二伍為什周禮宮正會其什伍注周書大聚篇五戶為伍以首為長十夫為什以年為長親親尊尊長長男女有別禮記大傳注四者人道之常天人神人至人聖人莊子注凡此四名一人耳所自言之異夫婦父子兄弟顏氏家訓一家之親此三者而巳至于九族皆本於三親恩禮節權禮記喪有四制大忠周公之於成王次忠管仲之於桓公下忠子胥之於夫差荀子夫治外婦治內左傳子太叔曰為夫婦外內以經二物注各治其物禮賓親親善善晉語衛寧莊子曰周大功小功緦麻祖免唐百官志宗正寺凡親有五等孝如曾孫孝巳信如尾生高廉如鮑焦史鰌戰國策蘇代謂燕昭王曰兼此三行以事王事親孝事君忠交友信居鄉悌呂氏春秋尹文曰有此四行可謂士乎臣事君子事父妻事夫韓非子三者順則天下治王公士大夫百工商旅農夫婦功考工記國有六職百工與居一焉德業相勸過失相規禮俗相交患難相恤藍田呂氏元善之長春仁亨嘉之會夏禮利義之和秋義貞事之幹冬智易乾文言岡北冬直東春蒙南夏酋西秋冥北太玄四端惻隱之心仁之端羞惡之心義之端辭讓之心禮之端是非之心智之端孟子人有四端仁木春義金秋禮火夏智水冬信土季夏漢書中庸注信水知土白虎通曰五性益稷注仁義禮智信五德之言貌木恭肅言金從又視火明晢聽水聰謀思土睿聖書洪範蘇子由云貌土言金視木聽水思火蔡氏云貌水言火視木聽金思土禮義廉恥管子文行忠信論語子以四教知仁聖義忠和周禮大司徒鄉三物一曰六德孝友睦姻任恤周禮大司徒鄉三物二曰六行正直剛克柔克洪範剛柔正直三德之俊曰三俊至德為道本敏德為行本孝德知逆惡周禮師氏以三德教國子義以生利祥以事神仁以保民國語富辰曰明王不失此三德忠信調和均辨荀子三德者誠乎上孝行親父母友行尊賢良順行事師長周禮師氏教三行知仁勇中庸仁者不憂知者不惑勇者不懼論語君子道者三寬而栗柔而立願而恭亂而敬擾而毅直而溫簡而廉剛而塞彊而義皋陶謨亦行九德上九字人之性質下九字以輔成其德明其德之不偏二德有家六德有邦九德之中有其三有其六也欽明文思堯典欽之一字此書中開卷第一義心能制義曰度德正應和曰莫昭臨四方曰明勤施無私曰類教誨不倦曰長賞慶刑威曰君慈和遍服曰順擇善而從之曰比經緯天地曰文左傳視思明聽思聰色思溫貌思恭言思忠事思敬疑思問忿思難見得思義論語君子有九思少思學老思教有思施荀子云孔子曰君子有三思足容重手容恭目容端口容止聲容靜頭容直氣容肅立容德色容莊禮記玉藻非禮勿視非禮勿聽非禮勿言非禮勿動勿者禁止之辭論語顏淵問仁子曰克已復禮為仁請問其目子曰云云伊川先生作四針毋意毋必毋固毋我子絶四毋史記作無程子曰此毋字非禁止之辭聖人絶此四者何用禁止慈湖楊先生有絶四說譙定為八圖畏天命畏大人畏聖人之言論語君子有三畏和靖尹先生一室名三畏齊恭寬信敏惠論語少戒色壯戒鬭老戒得論語君子有三戒壽富康寧攸好德考終命洪範勤儉恭恕文中子弟疑家以四教重言有法重行有德重貌有威重好有觀楊子法言取四重去四輕則可謂之人慈儉不敢為天下先老子三寶文中子三有喜怒哀懼愛惡欲禮運喜怒哀樂愛惡白虎通六情好惡喜怒哀樂左傳子大叔云六志好北方貪狼申子怒東方陰賊亥卯惡南方廉貞寅午喜西方寬大已酉樂上方姦邪辰未哀下方公正戍丑漢翼奉封事六情孟子言人性善荀子言人性惡楊子言人性善惡混上焉善中焉可上下下言惡韓文公原性五至志之所至詩亦至焉詩之所至禮亦至焉禮之所至樂亦至焉樂之所至哀亦至焉溫良恭儉讓論語注夫子行此五德無始亂無怙富無恃寵無違同無敖禮無驕能無復怒無謀非德無犯非義左傳子太叔語趙簡子九言古者以一句為一言一言蔽之曰思無邪揚之水卒章之曰言秦漢以來衆儒訓詁乃有句稱中和祇庸孝友周禮大司樂以樂德教國子大師教六詩以六德為之本王氏解云中和祇庸孝友六德六行六藝周禮大司徒教萬民而賓興之譎諫戇諫降諫直諫諷諫家語忠臣之諫君有五義諷諫順諫窺諫指諫陷諫大戴禮公羊傳注三曰直諫四曰爭諫五曰戇諫一二同大戴禮戇陟降反有如時雨化之者有成德者有達財者財與材同有答問者有私淑艾者孟子尊嚴而憚耆艾而信誦說而不陵不犯知微而論荀子生而知之學而知之困而知之中庸論語困而學之知命知禮知言論語知遠之近知風之自知微之顯中庸注三知安而行之利而行之勉彊而行之中庸好學近乎知力行近乎仁知恥近乎勇同上柔以仁誠以信富貴無敢以驕人恭以敬寬以靜說苑信德孝悌讓晉王祥訓子孫五者立身之本五守聰明廣智守以愚多聞博辨守以儉武力勇毅守以畏富貴廣大守以狹德施天下守以讓文子此五者先王所以守天下也禁於未發之謂豫當其可之謂時不陵節而施之謂孫相觀而善之謂摩學記大學之法此四者教之所由興也興道諷誦言語周禮大司樂以樂語教國子公生明偏生暗端愨生通詐僞生塞誠信生神夸誕生惑荀子此六生者君子慎之而禹桀所以分也言有教動有法晝有為宵有得息有養瞬有存橫渠先生云和靜尹先生一室名六有齊無益之言勿聽無益之事勿為無益之文勿觀無益之友勿親張魏公浚戒子忠則順天孝則生福勤則業進儉則心逸同上四德銘孝德之始弟德之序信德之厚忠德之正大戴禮孔子曰參乎中夫四德者忍默平直黃魯直志可勉者行可信者言可委者命可記者天康節邵先生四可吟敖不可長欲不可縱志不可滿樂不可極張文定公方平以曲禮四句為四針持容持忍持默持謙崔鶠德符四持銘三善見人之一善而忘其百非見人有善若已有之聞善必躬親行之然後道之說苑曾子曰吾學夫子之三善而未能行簡而易用要而易守炳而易見法而易言揚子君子之道有四易無諾責無財怨無專利無苟說無伐善無棄人無蓄憾文中子仇璋謂薛收明明德新民止於至善大學章句三者大學之綱領格物致知誠意正心修身齊家治國平天下八者大學之條目博學之審問之慎思之明辨之篤行之中庸朱子白鹿洞書院示學者言忠信行篤敬懲忿窒欲遷善改過同上正其誼不謀其利明其道不計其功董子曰同上接物之要己所不欲勿施於人行有不得反求諸己同上六言六蔽好仁不好學其蔽也愚好知不好學其蔽也蕩好信不好學其蔽也賊好直不好學其蔽也絞好勇不好學其蔽也亂好剛不好學其蔽也狂論語樂節禮樂樂道人之善樂多賢友論語立德黃帝堯舜立功禹稷立言史佚周任臧文仲左傳穆叔曰聰明睿知生知之賢寬裕溫柔仁發強剛毅義齊莊中正禮文理密察知中庸章句云五者之德衆人好已從賢人好已正聖人好已師揚子天下有三好謀不忠交不信傳不習論語曾子曰吾日三省吾身強勞忠信恭說苑子路將行仲尼贈以言劉子曰季路抱五慎之誡德仁義禮文子善信美大聖神孟子注人有是六等樂正子二之中四之下敬忠信仁義知勇教孝惠讓國語單襄公曰此十一者晉周皆有焉悼公未之聞患弗得聞既聞之患弗得學既學之患弗能行禮記雜記君子有三患無名天地之始有名萬物之母老子孫綽天台山賦釋二名之同出天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙漢藝文志易一謙而四益安仁利仁強仁表記比年入學每歲中年考挍間歲一年視離經辨志三年視敬業樂群樂五孝反五年視博習親師七年視論學取之謂之小成九年知類通達強立而不反謂之大成學記大成次成小成大戴禮子貢曰夫子之門人蓋三就焉注云知慮不躁身行寬惠威嚴不易重利不變恭於教和於下戰國策趙立周紹為傅周紹曰云云德行寬容而守之以恭者榮土地廣大而守之以儉者安位尊祿重而守之以卑者貴人衆兵強而守之以畏者勝聰明睿智而守之以愚者哲博聞強記而守之以淺者不溢韓詩外傳此六者皆謙德也朝以聽政晝以訪問夕以修令夜以安身左傳子産曰士朝而受業晝而講貫夕而修復夜而計過國語公父文伯母曰春夜臥早起廣步於庭夏夜臥早起無厭於日秋早臥早起與雞俱興冬早臥晚起必待日光素問四氣調神論上壽百二十中壽百年下壽八十文選注養生論行善得善曰受命行善得惡曰遭命行惡得惡曰隨命孝經援神契孟子注正噩思寤列子作覺喜懼周禮占夢列子夢有六候太卜三夢之法致夢觭夢咸陟肺氣熱金言魄藏心氣次之火思神藏肝氣涼木視魂藏脾氣溫土貌志藏腎氣寒水聽精藏周禮疾醫注膽金為雲肺火為氣肝木為風腎水為雨脾土為雷心土為五行之主淮南子心通舌肝通目肺通鼻腎通耳脾通口子華子曰脾腎心肝肺五官之司口舌鼻耳目五官之候正藏五胃旁胱大腸小腸周禮注國語史伯曰建九紀以立純德注九藏也正藏五又有胃旁胱腸膽莊子釋文身別有九藏氣天候頭角之氣人候耳目之氣地候口齒之氣三部各有天地人神藏五形藏四故九五管五藏之腧喉咽量腸之府胃五穀之府大腸轉輸之府小腸受成之府膽積精之府旁胱湊液之府韓詩外傳大腸小腸心府胃脾府旁胱肺府三焦腎府膽肝府白虎通大小腸旁胱三焦莊子釋文陽竅七陰竅二周禮注一六為前為耳水二七為目火三八為鼻木四九為口金五五為後土太玄易咸主心故言拇言股言心言頰舌皆在前者艮主背故言趾言限言躬言輔皆在後者心口耳目文子淮南子四關脾腎肝肺周書心有四佐耳目鼻口形荀子心居中虛以治五官夫是之謂天君聖人清其天君正其天官食視聽淮南子三宮交爭容貌顏色辭氣論語曾子曰君子所貴乎道者三目為心視耳為心聽口為心談鼻為心芳國語史伯曰正七體以役心注七竅也巨指食指將指無名指小指又曰季指春秋正義手五指之名目欲綦色耳欲綦聲口欲綦味鼻欲綦臭氣香亦謂臭心欲綦佚綦極也荀子此五綦者人情所不必免也又曰五鑿為正心從而壞耳目鼻口心管子肝靜仁甲巳心躁禮丙辛脾力信戊癸肺堅義乙庚腎敬知丁壬漢翼奉傳五性注喜怒欲懼憂大戴禮民有五性文選注文子曰人有五情稽首頓首空首振動吉拜凶拜奇拜奇耦之奇褎拜音報肅拜周禮大祝辨九拜以享右祭祀酒色財漢楊秉耳無妄聽目無妄顧口無妄言心無妄慮康節先生四無妄吟言語宮聲和商聲剛角聲清徵聲疾羽聲弱周禮疾醫注三部寸關尺九候浮中沉素問難經由於情欲入自禽門由於禮義入自仁門由於獨智入自聖門楊子天下有三門望之儼然即之也溫聽其言也厲論語子夏曰君子有三變乾為首首會諸陽屬乾坤為腹腹藏衆陰屬坤震為足巽為股足動股隨雷風相與坎為耳離為目耳目通竅水火相逮艮為手兌為口口與鼻通山澤通氣說卦以身之八體擬八卦足主下六經為震手主上六經為艮耳輪陷內為坎目精附外為離巽下開為股兌上開為口覺則用目而視離日主晝也寐則用耳而寤坎月主夜也一身之榮衛還周會於手太陰一日之陰陽曉昏會於艮時故艮時在人其象為手正容體齊顏色順辭令冠義禮義之始注三始既備服未備者未可求以三始也有虞氏貴德而尚齒夏后氏貴爵而尚齒殷人貴富而尚齒周人貴親而尚齒祭義連步栗階亦名三等歷階越階儀禮燕禮疏升階之法有四等漢禮云五武成步步六尺國語注云六尺為步半步為武手足臂脛股肱要腹肩㗇喖音瘕怙謂唐湖面顙太玄湖疑作頡音胡將叛者其辭慚中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭游失其守者其辭屈易繫辭吉一而巳八徵問之以言以觀其辭窮之以辭以觀其變與之間諜以觀其誠明白顯問以觀其德使之以財以觀其廉試之以色以觀其貞告之以難以觀其勇醉之以酒以觀其態六韜八徵皆備則賢不肖別矣故為得喪哀樂生死列子覺有八徵遠使之而觀其忠近使之而觀其敬煩使之而觀其能卒然問焉而觀其知急與之期而觀其信委之以財而觀其仁告之以危而觀其節醉之以酒而觀其則雜之以處而觀其色莊子九徵至不肖人得矣神精筋骨氣色儀容言劉邵人物志九徵皆至純粹之德伯已什已若已廝役徒隸鶡冠子博選篇道凡四稽天地人命人有五至北面事君則伯巳者至先趨而後息先問而後默則什已者至人趨已趨則若已者至憑几據杖指麾而使則廝役者至謳藉𧪠咄則徒隸者至矣故帝者與師處王者與友處亡主者與徒處韓文公讀鶡冠子云四稽五至之說當矣清節法術國體器能臧否伎倆智意文章儒學口辨雄傑劉邵人物志飲食衣服居處言語呂成公曰為學自四事起
