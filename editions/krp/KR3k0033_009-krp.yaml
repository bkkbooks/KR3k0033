body:
  text: 小學紺珠卷九宋王應麟撰制度類五瑞又曰五玉五器公執桓圭九寸侯執信音身圭伯執躬圭各七寸子執穀璧男執蒲璧各五寸舜典韓五瑞注公侯伯子男之瑞圭璧脩五禮五玉三帛五玉即五瑞如五器注謂圭璧五玉禮終復還諸侯以物言曰玉以寶言曰瑞以形言曰器周禮大行人上公執枑圭九寸諸侯執信圭七寸諸伯執躬圭諸子執穀璧五寸諸男執蒲璧大國之孤執皮帛以繼小國之君六瑞王執鎭圭下同五瑞周禮大宗伯以玉作六瑞以等邦國小行人成六瑞三帛諸侯世子執纁公之孤執𤣥附庸之君執黄舜典注髙陽氏之後用赤繒髙辛氏之後用黑繒其餘用白繒鄭氏注二精玉帛楚語注明潔為精幣周禮大祝注幣號玉云嘉玉云量幣六摰孤執皮帛卿執羔大夫執雁二生士執雉一死庻人執鶩音木工商執雞大宗伯以禽作六摰以等諸臣曲禮凡摰天子鬯諸侯圭卿羔大夫雁士雉庻人之摰匹婦人之摯椇榛脯脩棗栗六器蒼璧天黄琮地青圭東赤璋南白琥西𤣥璜北大宗伯以玉作六器以禮天地四方六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼小行人合六幣九鼎禹収九牧之金鑄九鼎象九州漢郊祀志武王克商遷九鼎於雒邑左傳二球小球尺二寸之鎭圭大球三尺之珽商頌守正義天子所服所唯此二玉五服十二章天子九章公侯自山而下七章伯自華蟲而下五章子男自藻而下三章卿大夫自粉米而下書臯陶謨鄭康成注十二章日一月二星辰三山四龍五華蟲六雉繪六者之於衣宗彞七蜼虎藻八革水火九粉米十黺說文作黼十一黑白與黻十二青黑與六者繡之於裳書益稷鄭康成誽衣之六章其序自上而下而裳之六章其序自下上九文山一龍二華三蟲四藻五火六粉米七黼八黻九左傳杜預注以華蟲為二九章龍一山二華蟲三火四宗彞五登衣畫以為繢龍於山登火於宗彝藻六粉米七黼八黻九為裳絺以繡周禮司服注周制以日月星辰畫於旂而衮冕九章以龍為首鷩冕七章華蟲為首毳冕五章虎蜼為首希冕三章𤣥冕一章九服冕服六大裘至𤣥冕弁服三韋弁冠皮弁弁周禮屨人注王吉服有九舄有三等六冕五冕大裘衮鷩毳希又作絺𤣥司服大弁師言五冕裘之冕無旒不聯數六服同冕者首餙尊也公自衮而下侯伯自鷩而下子男自毳而下孤自希而下卿大夫自𤣥而下王后六服三翟褘衣元揄狄青揺音闕狄赤鞠衣黄展衣白反張彦縁衣黑亂反吐内司服狄當為翟雉名而三翟褘衣畫翬揄翟畫揺闕翟刻不畫三者皆祭服三服皮弁素積𤣥衣素裳緇衣𤣥端三禮義宗吉服并六冕有九三舄赤舄為上冕服之舄白舄韋弁皮弁黑舄冠弁后𤣥舄為上褘衣之舄青舄赤舄鞠衣以下皆屨屨人注舄祾下曰禪下曰屨冠禮三加始加緇布冠次加皮弁次加爵弁士冠禮冠義三加彌尊諭其志也四大戴禮記公符篇云公冠加𤣥冕南齊志六采六色青東白西赤南黑北𤣥天黄地左傳鄭子大叔曰為九文六采五章以奉五色色考工記畫繢之事六色績以為衣雜用天地四方之青與白赤與黑𤣥與黄皆相次謂之六色五章青與赤文赤與白章白與黑黼黑與青黻五色備繡左傳事考工記畫繢之繡以為裳深衣五法袂圜以應規曲袷如矩以應方負繩及踝以應直下齊如權衡以應平禮記深衣五法已施故聖人服之三弁韋弁兵事皮弁眂朝冠弁田獵周禮司服四代服虞韍夏山殷火周龍章明堂位魯三代冠夏毋音牟追多雷反殷章甫周委貌夏収殷冔周弁郊特牲虞皇夏収殷冔周冕王制齊三服春獻冠幘縰為首服紈素為冬服輕綃為夏服漢元帝罷齊三服官羣臣二十一服衮冕鷩冕毳冕絺冕𤣥冕平冕爵弁武弁弁服進賢冠逺遊冠法冠髙山冠委貌冠却非冠平巾幘黑介幘介幘平紗緑幘具服從省服唐志五玉春服蒼玉夏服赤玉季夏服黄玉秋服白玉冬服𤣥玉月令佩謂冠餙及所之衡璜宏璧琬琰大玉夷玉天球書顧命玉五重五路玉建大常金建大旂象建大赤革建大白木建大麾周禮巾車王之五路革書大輅玉輅也綴輅金輅也先輅木輅也次輅象輅輅也以月令春乘鸞路夏乘朱路季夏乘大路秋乘戎路冬乘𤣥路法五時輅王后五路重翟厭翟於渉反安車翟車輦車巾卓重翟厭翟翟車安車四望金根唐皇后之車六四代路虞鸞車夏鉤車殷大路周乘路明堂位四代禮樂行夏之時乘殷之路服周之冕樂則韶舞論語四載禹水乘舟陸乘車泥乘輴史記作毳昌芮反漢書作橇音蕝尸子作蕝說文澤行乘輈山乘樏力追反史記作橋一作檋漢書作梮說文作欙書注五戎周戎路廣車闕車苹車輕車周禮車僕車六等軫戈人殳㦸酋矛考工記車有六等之數兵車也六建五兵與人也廬人六建旣備千乘車一乘甲士歩卒合七十五人馬氏之說八百家出車一乘包氏之說八十家出車一乘論語或問疑馬氏為可據千乘大國之賦成方十里出革車一乘甲士三人左持弓右持矛中人御歩卒七十二人將重車者二十五人詩集傳千乗之地三百十六里有奇車千乘法當用十萬人為歩卒者七萬二千人大國三軍為車三百七十五乘三萬七千五百人其為步卒不過二萬七千人坊記制國不過千乘都城不過百雉家富不過百乘注古者方十里其中六十四井出兵車一乘三代戎車夏鉤車先正殷寅車先疾周元戎先良司馬法乘詩元戎十注三駕大駕法駕小駕後漢志三駕鹵簿槊隋志梁三駕法天二仗法地仗隊仗五時車青赤黄白黑立安車合十乘漢制坐乘者安車倚乘者立車十二屬車指南記里鼓白鷺鸞旗辟惡宋改崇徳皮軒耕根安車四望宋改明逺羊車黄鉞豹尾唐六節虎山國用人土國用龍澤國用之以金為旌道路用符門關用管都鄙用之以竹為周禮小行人達六節九旗日月為常王交龍為旂諸侯青龍通帛為旜孤卿雜帛為物大夫士熊虎為旗師都鳥隼為旟州里朱雀龜蛇為旐縣鄙𤣥武全羽為旞道車析羽為旌斿車司常掌九旗五旗東曰旗西曰典南曰䉭北曰旂中央曰常黄帝五旗河圖四代旌旗魯虞旂夏綏當為緌殷大白周大赤明堂位注虞緌夏旂九章日畫行月夜行龍行水虎行林鳥行陂蛇行澤鵲行陸狼行山韠韜也載食而駕管子兵法九章著明五鐘青鐘大音赤鐘重心黄鐘洒光景鐘昧其明黒鐘隱其常管子黄帝作五鐘六舞雲門大卷大咸大㲈大夏大濩大武周禮大司樂以樂舞敎國子以六舞大合樂舞明堂位朱干玉戚冕而舞大武周舞皮弁素積禓而大夏夏舞大胥以六樂之㑹正舞位帗舞音拂羽舞皇舞故書作䍿旄舞干舞人舞樂師敎國子小舞羽内則曰十三舞勺成童舞象二十舞大夏四方以宗廟以人山川以干旱暵以皇禮社稷以帗國辟雍以旄漢樂志周官子習六舞三舞雅萬舞南籥詩鼓鐘箋三舞不僭二體舞者有文武左傳文始舞本舜招舞髙祖更名五行舞本周舞秦始皇更名四時孝文作漢樂志諸帝廟常奏文始四時五行舞八佾佾舞列也天子八諸侯六大夫四士二每佾人數如其佾數論語注士左傳服䖍注天子八八諸侯六八大夫四八二八劉原父曰士無舞穀梁傳舞夏天子八佾諸公六佾諸侯四佾文舞羽籥武舞干戚書舞干羽于兩階三皇伏羲扶來立基神農扶持下謀祝融屬續孝經緯五帝三皇樂黄帝咸池少昊九淵顓頊六莖樂緯五莖帝嚳五英樂緯六英堯大章舜招讀曰韶禹夏湯濩武王武周公勺漢志周存六代之樂至秦唯韶武二樂存莊子云文王有辟雍之樂武王周公作武周淮南子武象四代樂器拊搏玉磬揩擊揩居八反大琴大瑟中琴小瑟明堂位魯四夷樂東方韎南方任西方株離北方禁周禮䪘􅀈氏掌四夷之樂注東夷曰昧南夷曰南西夷曰侏離北夷曰禁毛詩傳南夷曰兜西夷曰禁北方曰昧東夷曰離白虎通作班固東都賦禁僸昧作佅六鼓雷鼓八面祀靈鼓六面祭路鼓四面享鼖鼓軍鼛鼓役晉鼓金奏周禮鼓人夏足鼓殷楹鼓周縣鼓明堂位魯三代鼓四金錞和鐲節鐃止鐸通周禮鼓人三大舞唐七徳本秦王破陣樂武舞九功本功成慶善樂文舞上元髙宗作樂志雅樂二十器金二鎛鐘編鐘石一磬絲四琴瑟筑箏竹三簫篪笛匏二笙竽土一塤革五建鼓雷鼗靈鼓靈鼗路鼓路鼗雷鼓節鼓木二柷敔隋志武六成始而北出再成而滅商三成而南四成而南國是疆五成而分周公左召公右六成復綴以崇綴丁劣反樂記注每奏武曲一終為一成六音鞉鼓椌楬壎篪樂記此六者徳音之音也注以其聲質椌楬謂柷敔椌苦江反楬苦瞎反左右五鐘天子將出撞黄鐘之鐘右五鐘皆應入則撞㽔賔之鐘左五鐘皆應尚書傳右五鐘林鐘至應鐘右隂主靜左五鐘大吕至中吕左陽主動三器牘應雅周禮笙師注三器六代舞大夏大濩大武正徳武徳山雲隋志後周武帝造山雲舞以備六代鐘磬三等宋王朴樂太髙李照樂太重胡瑗阮逸樂弇鬱劉几請下王朴三律八音樂器鎛鐘編鐘歌鐘錞鐃鐲鐸金大磬編磬歌磬石壎嘂土雷鼓靈鼓路鼓建鼓鼗鼓縣鼓節鼓拊相革琴瑟頌瑟阮咸筑絲柷敔雅應木笙竽巢和匏簫管篪笛舂牘竹唐樂志樂六變凡六樂一變致羽物及川澤之示再變致臝物及山林之示三變致鱗物及邱陵之示四變致毛物及墳衍之示五變致介物及土示六變致象物及天神大司樂樂八變九變樂六變天神皆降樂八變地示皆出樂九變人鬼皆得而禮同上三節奏俱備謂之成備而更新謂之變禮義宗樂九變者舞九終八變者舞八終六變者舞六終二樂縵樂燕樂磬師注二樂六璽漢皇帝行璽之璽信璽天子行璽之璽信璽秦制也八寶唐八璽皆玉為之神璽受命璽餘前同武后改諸璽皆為寶中宗復為璽開元復為寶九寶宋鎭國受命定命併六璽為九寶六彞雞鳥斚音稼黄虎蜼音誄周禮司尊彞掌六彞小宗伯辨六彞三代尊夏雞夷讀為彞殷斚周黄目明堂位尊灌尊魯有三代灌及勺夏龍勺殷疏勺周蒲勺六尊獻音犧象著直略反壺大音泰山司尊彞掌六尊小宗伯辨六尊四代尊泰虞山罍夏著殷犧象周明堂位魯四代尊欹器虚則欹中則正滿則覆荀子四類日月星辰周禮小宗伯注兆日於東郊兆月與風師於西郊兆司中司命於南郊兆雨師於北郊四望日月星海大宗伯注鄭司農五嶽四鎭四瀆鄭康成注魯三望泰山河海公羊傳海岱淮榖梁傳注分野之星國中山川左傳注皆因郊而望祭七廟三昭三穆太祖之廟王制觀徳書七世之廟可以祭法王立七廟穀梁傳天子七廟諸侯五大夫三士二禮器云士一殷荀子曰有天下者事七世夏五廟禹二昭二穆六廟契湯二昭二穆梁周后稷文王武王親廟四宋漢韋𤣥成議晉宋齊皆立親廟周捨論云晉齊梁立七廟六享肆他厯反獻祼饋食祠春禴夏作爾雅礿嘗秋烝冬周禮大宗伯四時祭春礿夏禘秋嘗冬烝王制四夏殷祭名祭統祭有時祭義春禘秋嘗夏殷禮爾雅春祭日祠夏祭曰礿秋祭曰嘗冬祭曰烝詩正義周公制禮改夏為禴禘為大祭八蜡先嗇司嗇農郵表畷貓虎坊水庸昆蟲禮記郊特牲王肅分貓虎為二無昆蟲横渠先生曰百種八也昆蟲是為害者不常祭五祀句芒重正木蓐収該正金𤣥冥修熙水正祝融犂一作黎火正后土句龍土正左傳蔡墨對五祀之大宗伯五祀注五官神門秋行冬户春竈夏中霤中央季夏月令曲禮注周禮小祝注司命中霤門行厲王制大夫祭五祀注門井户竈中霤白虎通漢郊祀志後漢祭祀志注太𤣥淮南子唐月令冬祀井不祀行禘郊宗祖報國語展禽曰此五者國之祀典七祀司命春中霤季夏國門秋國行冬泰厲秋户春竈夏祭法諸侯五祀曰公厲無竈大夫三祀曰族厲門行六宗在天地四方六者之門助隂陽變化實一而名六宗大