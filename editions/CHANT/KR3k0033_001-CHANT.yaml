九日唐書建除滿平定執破危成收開閉淮南天文訓云寅為建卯為除辰為滿巳為平主生午為定未為執主陷申為破主衡酉為危主杓戌為成主少德亥為取主大德子為開主太歲丑為閉主太陰史記日者傳有建除家以為不吉漢書王莽傳以戊辰直定注曰以建除之次其日當定又云十一月壬子直建冬至注曰其日當建卯酉午戌亥漢翼奉曰詩有五際注詩內傳曰云云陰陽終始祭會之歲詩緯云卯天保也酉祈父也午采芑也亥大明也郎顗傳四始之缺五際之戹百刻也樂記百度得數而有常注正義晝夜百刻十二時每時八刻二十分每刻六十分周禮總義孔壺為漏浮箭為刻四十八箭二十四氣各有晝夜古今刻漏之法有二曰浮漏曰稱漏尚書緯謂刻為商士昏禮目錄云日入三商為昏難經百刻圖三朝三朝元日也謂歲之朝月之朝日之朝漢書谷永曰三朝之會班固東都賦春王三朝鮑宣曰三始正月一日為雞二日為狗三日為豬四日為羊五日為牛六日為馬七日為人北史魏收傳董勛問答禮俗云八日為穀東方朔占書六日七分四正之卦卦有六爻爻主一氣震離兌坎餘六十卦卦主六日七分八十分日之七易緯後漢郎顗善六日七分十二月卦出於孟氏章句十二辟卦復子臨丑泰寅大壯卯夬辰乾巳姤午遯未否申觀酉剝戌坤亥卦氣起中孚中孚公復辟屯侯謙大夫睽卿升還從公周而復始京氏以卦爻配朞之日坎離震兌其用事自分至之首皆得八十分日之七十三頤晉井大畜皆五日十四分餘皆六日七分唐曆志中數曰歲十二月中氣一周總三百六十五日四分日之一朔數曰年十二月之朔一周三百五十四日周禮太史正歲年以序事注至朔同日謂之章同在日首謂之蔀蔀終六旬謂之紀歲朔又復謂之元續漢志六術黃帝使羲和占日常儀占月車區占星氣伶倫造律呂大撓造甲子隸首作算數容成綜斯六術晉志黃帝顓頊夏殷周魯漢劉向總六歷列是非作五紀論續漢志黃帝造歷元起辛卯顓頊用乙卯虞用戊午夏用丙寅周用丁巳魯用庚子周髀蓋天宣夜殷代之制渾天晉志言天者有三家漢蔡邕言宣夜絕無師法周髀術數具存考驗天狀多所違失惟渾天近得其情賀道養渾天記曰一曰方天興於王充二曰軒天起於姚信三曰穹天聞於虞昺皆臆斷浮說唯渾天徵驗不疑月令正義凡有六等一曰蓋天見周髀二曰渾天三曰宣夜四曰昕天昕讀為軒吳姚信說五曰穹天虞氏說六曰安天虞喜論顓頊曆高帝太初武帝三統劉歆作四分章帝乾象靈帝戊寅元武德甲子元麟德大衍開元五紀寶應正元建中觀象元和宣明長慶崇玄景福應天建隆乾元太平興國儀天咸平崇天天聖明天治平奉元熙寧觀天元祐占天崇寧紀天大觀統元紹興乾道淳熙會元紹熙統天慶元會天寶祐成天咸淳備數和聲審度嘉量權衡漢律志司馬文正公曰黃鍾所生凡有五法一十百千萬漢律志隸首作數內則六年教之數謂一十百千萬億兆京垓秭壤溝澗正載數術記遺黃帝為法數有十等上中下夏陽侯算經序黃帝三數為十等水潤下火炎上木曲直金從革土稼穡洪範以微著為次左傳天生五材皋陶謨撫于五辰注五行之時天一生水于北地六成地二生火于南天七成天三生木于東地八成地四生金于西天九成天五生土于中地十成行于四時為五德漢志騶子論著終始五德之運洪範天地生五行之序月令木火土金水五行相生之序典引注五德五行之德自伏羲以下帝王相代各據一行始於木終於水則復始太玄曰鑿井澹水鑽火㸐木流金陶土以和五美注五行之美左傳序為五節注得五行之節太極圖曰五氣順布水火金木土穀大禹謨以水克火以火克金以金克木以木克土而生五穀五行相克之序溫木涼金寒水燥火溼土火陽中之陽水陰中之陰木陽中之陰金陰中之陽土居二氣之中子華子青東木甲赤南火丙白西金庚黑北水壬黃中央土戊文子色有五章綠碧紅紫騮月令五方之正色也以木克土則青黃合而成綠以金克木則白青合而成碧以火克金則赤白合而成紅以水克火則黑赤合而成紫以土克水則黃黑合而成騮此五方之間色也紺紅縹紫流黃環齊要略間色有五黃曰金白曰銀赤曰銅青曰鈆黑曰鐵漢食貨志五色之金注鹹水潤下冬黑羽苦火炎上夏赤徵酸木曲直春青角辛金從革秋白商甘上稼穡中央黃宮羶木焦火香土腥金朽水月令少陰君火太陰溼土少陽相火陽明燥金太陽寒水厥陰風木素問子華子曰金木水火土五精之總也寒熱風燥溼五氣之聚也寒生水熱生火風生木燥生金溼生土太昊木炎帝火黃帝土少昊金顓頊水帝嚳木唐火虞土夏金商水周木三統曆以相生為義郊祀志夏木殷金周火秦水五運秦以周為火用水勝之漢歷志頗推五勝注五行相勝鄒衍以相勝為義張蒼則以漢水勝周火賈誼公孫臣則以漢土勝秦水漢土德色尚黃光武始正火德色尚赤行始於祖行終於臘水子祖辰臘火午祖戌臘木卯祖丑臘金酉祖丑臘土戌祖辰臘魏土晉金宋水齊木梁火陳土後魏水繼西晉後周木隋火唐土後唐土晉金漢水周木宋火雨水霽火蒙木驛金克土卜五此卜兆也洪範稽疑荀子五卜周禮太卜注洪範曰雨曰濟曰圛曰蟊曰剋蟊音蒙貞內卦悔外卦占用二玉陽瓦陰原陰陽之半周禮太卜掌三兆之法杜子春云玉兆顓頊瓦兆堯原兆周經兆之體百有二十其頌千有二百頌繇也曲禮卜筮不過三儀禮占者三人卜用三兆筮用三易金縢卜三龜方功義弓卜師開龜之四兆占兆之書也方兆占四方之事功兆占立功之事義兆占行義之事弓兆有射意灼兆其兆有四巫更巫咸巫式巫目巫易巫比巫祠巫參巫環簭人巫讀為簭或曰以其人為書龜五兆易式唐志太卜春己巳丁丑夏甲申壬辰秋己亥丁未冬甲寅壬戌後漢蘇賁曰八魁上帝開塞之將也雷公太一六壬其局以楓木為天棗心為地刻十二神下布十二神唐六典太一式凡舉事皆欲發三門順五將乾納甲壬月盈甲望壬二十九日坤納乙癸月滅乙晦癸二日震納庚月出生明巽納辛月退生魄坎納戊水流月陰中離納巳火就日陽中艮納丙月消下弦兌納丁月見上弦五音十四聲一脣聲并餅清二舌聲靈歷清三齒聲陟珍清四牙聲迦佉濁五喉聲綱各濁一開口聲阿哥河等二合口聲菴甘諶諳等三蹴口聲憂丘鳩休等重四撮脣聲烏姑乎枯重五開脣聲波坡摩婆輕六隨鼻聲灼蒿考姑等重七舌根聲奚雞溪等重八蹴舌下卷聲伊酌等重九垂舌聲遮車奢者輕十齒聲止其始等輕十一牙聲迦佉俄等輕十二齶聲鴞等輕十三喉聲鴉加瘕等輕十四牙齒齊呼開口送聲叱沙孥茶輕廣韻沈存中筆談韻之法先類其字各歸其母辰音齒音各八牙音喉音各四舌音十半齒半舌音二凡三十六分為五音天下之聲總于是矣每聲復有四等謂清次清濁平也孫炎始作字音觀物外篇先閉後開春也純開夏也先開後閉秋也冬則閉而無聲通志聲為經音為緯平上去入四聲也宮商角徵羽半徵半商七音也八十四調黃帝吹九寸之管得黃鍾正聲半之為清聲倍之為緩聲三分損益之以生十二律十二律旋相為宮以生七調為一均均有七調凡十二均八十四調而大備後周王朴云今見存者九曲唐祖孝孫以十二月旋相為六十聲八十四調清平側文選注三調清平瑟隋何妥傳三調平清瑟楚側宋書五調蔡邕五弄楚調四弄唐樂志琴工猶傳楚漢舊聲及清調云云謂之九弄度量衡程逈述三器圖義玄英青陽朱明白藏梁武帝作鍾律緯制為四器名為通又制十二笛以寫通聲又引古五正二變之音旋相為宮得八十四調改九夏為十二雅以協律陰呂陽十二管旋相之義黃鍾姑洗無射唐楊收言琴通三均側出諸調馬少良琴譜三均以姑洗為中呂浮箭秤沈箭不息元祐初蘇頌製史記注馬融王肅謂日長晝漏六十刻日短晝漏四十刻鄭玄曰日長五十五刻日短四十五刻曆五十變黃帝至秦曆凡七變漢四百年曆凡四變魏晉迄隋十六變而後魏後周六曆不預焉唐三百年曆凡九變五代調元次及欽天而曆法始弊自建隆迄紹熙二百五十年曆十四變上距黃帝之曆凡五十變李心傳朝野雜記鄧平太初劉洪乾象楊偉景初宋書志三人漢魏之善曆者九天之上六甲子九地之下六癸酉後漢書注玄女三宮戰法周在洛邑漢在潁川陽城唐在浚儀司馬文正公日景圖日行黃道每歲有差地中當隨而轉移大衍數五十河圖中宮天五乘地十而得之朱子本義數始於一備於五小行之而成十大衍之而為五十五十數之成成則不動故損一以為用程子易說生數自一二三四而極於五成數自七八九六而極於十故大衍之數五十取天地之極數以立本也布算者生數至四而止遇五則變而為一成數至九而止遇十則變而為一故其用四十有九取天地之變數以起用也易玩辭項氏參天兩地而為五故十者兩其五也五十者十其五也呂氏一者體太極不動之數四十九者用兩儀四象分太極之數朱子發參伍以變凡占之法有變有數每爻三揲為三變每揲有象兩象三象時象閏象再閏為五小變此參伍以變也三揲之奇分而計之則得三少三多一少兩多一多兩少之數去三揲之奇以左右手之正策合而計之則得四九四六四七四八之數此錯綜其數也通六爻之變得十有八遂成初二三四五上以為剛柔相雜之文極六爻之數得七八九六遂定重單交拆以為內外兩卦之象易玩辭七日來復姤陽之始消也七變而成復程子易傳自五月姤而一陰始生至此七爻而一陽來復易本義姤午一陰坤初六遯未否申觀酉剝戌坤亥復子一陽乾初九復七日來復陽言日臨至于八月有凶陰言月甲庚三日蠱先甲三日後甲三日巽九五先庚三日後庚三日易本義甲日之始事之端也先甲三日辛也後甲三日丁也前事過中而將壞則可自新以為後事之端而不使至於大壞後事方始而尚新然便當致其丁寧之意以監前事之失而不使至於速壞庚更也事之變也先庚三日丁也後庚三日癸也丁所以丁寧於其變之前癸所以揆度於其變之後易玩辭甲者日之首事之始也庚更也續也甲庚者十日十二辰之綱也戊巳分王四時自甲歷乙丙丁三日而至庚自庚歷辛壬癸三日而至甲故取以為三日之象甲庚之先後皆稱三日先後者上下卦也三日者三爻也一之日二之日一之日周正月也建子二之日殷正月也建丑三之日夏正月也建寅四之日周四月也夏之二月建卯毛詩傳七月九月陰生矣則言月一之日二之日陽生矣則言日與易臨至于八月有凶七日來復同意四月正陽言月陰生也陰始于四月生于五月王氏詩義孟春之月以元日祈穀又擇元辰躬耕帝籍盧植云郊天陽也故以日籍田陰也故以辰日甲至癸也辰子至亥也亥者辰之末故記稱元辰法曰吉亥蔡邕月令章句云日幹也辰支也有事於天用日有事於地用辰元善也南齊禮志夏十寸為尺殷九寸為尺周八寸為尺蔡邕獨斷禹十寸為尺湯十二寸為尺武王八寸為尺通鑑外紀一姑洗玉律二小呂玉律三西京銅望臬四金錯望臬五銅斛六古錢七建武銅尺晉律志秦始十年考古器挍今尺所挍古法有七品兩尺漢章帝時泠道舜祠下得玉律度以為尺謂之漢官尺晉始平得古銅尺晉律志兩尺長短度同大戴禮記布指知寸布手知尺舒肘知尋公羊傳注側手為膚按指為寸投壺注鋪四指曰扶一指按寸國語注五尺為墨倍墨為丈八尺為尋倍尋為常七閏一章日與天會而多五日九百四十分日之二百三十五為氣盈月與日會而少五日九百四十分日之五百九十二為朔虛合氣盈朔虛而閏生焉十有九歲七閏氣朔分齊是為一章朱文公書說十九年七閏天之償也太玄單拆交重唐六典易之策四十有九其變有四十八變而成卦內卦為貞朝占用之外卦為悔暮占用之三少為重九三多為交六兩多一少為單七兩少一多為拆八儀禮疏古用木畫地今用錢八會堪輿大會有八小會亦有八周禮占夢注今八會其儀象也疏云云星時數辭太玄占有四旦則用經一五七夕則用緯三四八亥有二首六身襄公三十年三月癸未絳縣老人曰臣生之歲正月甲子朔夏正月四百四十有五甲子矣其季於今三之一也三分六甲之一得甲子甲戌盡癸未奇二十日師曠曰卻成子會于承匡之歲也文公十一年七十三年矣史趙曰亥有二首六身下二如身是其日數也亥字二畫在上并三六為身如算之六也下亥上二畫豎置身旁下二畫使就身士文伯曰然則二萬六千六百有六旬也左傳說文調黃鍾調六律調五音調五聲調五行調律曆調陰陽調正德所行月令正義易通卦驗云夏至冬至人主從八能之士續漢禮儀志冬至夏至八能之士八人陽七之靜始於坎陽九之動始於震陰八之靜始於離陰六之動始於兌唐大衍曆卦議四象之變皆兼六爻而中節之應備矣曆本議中氣議合朔議卦候議卦議日度議九道議日蝕議五星議唐一行大衍曆議十篇志載其九步中朔發斂步日躔步月離步軌漏步交會步五星大衍曆術七篇以本氣者尚其體以綜數者尚其文以考類者尚其象以作事者尚其時以占往者尚其源以知來者尚其流續漢曆志六十律六十律相生之法以上生下皆三生二以下生上皆三生四陽下生陰陰上生陽終於中呂而十二律畢矣中呂上生執始執始下生去滅上下相生終於南事而六十律畢矣續漢志漢京房受學焦延壽云云十二律之變至於六十猶八卦之變至於六十四也三百六十律一律而生五音十二律而為六十音因而六之故三百六十音以當一歲之日淮南子宋錢樂之因京房南事之餘引而伸之更為三百律終於安運合舊為三百六十律日當一管隋志十二笛晉荀勗以五聲十二律還相為宮之法制十二笛黃鍾之笛正聲應黃鍾下徵應林鍾以姑洗為清角大呂之笛正聲應大呂下徵應夷則以外諸均例皆如是天宮夾鍾圜鍾圜丘地宮林鍾函鍾方丘人宮黃鍾宗廟周禮大司樂注正聲下徵清角晉律志笛三宮二十一變宮有七聲錯綜用之伏孔四曰正角倍角變宮變徵正高中呂道調南呂仙呂黃鍾為七宮越調大食調高大食調雙調小食調歇指調林鍾為七商大食高大食雙小食歇指林鍾越為七角中呂調正平調高平調仙呂調黃鍾般涉調高般涉為七羽唐樂志俗樂二十有八調皆從濁至清迭更其聲下則益濁上則益清徐景安樂書俗樂調有宮商角羽而無徵調征象與謀果至雨瘳周禮大卜以邦事作龜之八命占人以八簭占八頌以八卦占簭之八故征行役征討象天象變動與共事謀圖事果有為至有行雨卜時之雨瘳卜疾之瘳筮有八故龜有八命三代卜筮塗山之兆從而夏啟世飛燕之卜順故殷興百穀之筮吉故周王史記龜策傳潤暵生成動周世宗觀泗州大水記以問竇儼儼以為天地有五德子午卯酉得東西南北之中周髀注四和崑崙四方其氣和暖三禮義宗三伏伏者金氣伏藏之日立秋以金代火金畏火故庚日必伏後漢志注秦德公始為伏祠反支日戌亥朔一日申酉朔二日午未朔三日辰巳朔四日寅卯朔五日子丑朔六日後漢王符潛夫論明帝時公車以反支日不受章奏注陰陽書反支日用月朔為正黃鍾為宮為土大蔟為商為金姑洗為角為木林鍾為徵為火南呂為羽為水應鍾為變宮為月蕤賓為變徵為日五代會要王仁裕曰三正合天地之美天地人七宗固陰陽之序五繇卜征五年歲習其祥班固典引五繇之碩慮注云四始大明在亥水始也四牡在寅木始也嘉魚在巳火始也鴻雁在申金始也詩正義詩緯汎歷樞云二至日長至陰陽爭死生分君子齊戒處必掩身毋躁止聲色毋或進薄滋味毋致和節嗜欲定心氣百官靜事毋刑以定晏陰之所成夏至日短至陰陽爭諸生蕩君子齊戒處必掩身身欲寧去聲色禁耆慾安形性事欲靜以待陰陽之所定冬至月令孟序仲序叔序季序北史黃帝四序經文歲差二術宋祖沖之於歲周之末創設差分冬至漸移不循舊軌每四十六年卻差一度梁虞𠠎歷法嫌沖之所差太多因以一百八十六年冬至移一度隋張冑玄以此二術年限懸隔追撿古注所失極多遂折中兩家以為度法冬至所宿歲別漸移八十三年卻行一度上合堯時日永星火次符漢曆宿起牛初隋書古曆日有常度天周為歲終故係星度干節氣其說似是而非故久而益差虞喜覺之使天為天歲為歲乃立差以追其變使五十年退一度何承天以為太過乃倍其年而反不及皇極取二家中數為七十五年蓋近之矣唐大衍曆議田曹兵曹集曹倉曹金曹二始二終二中天數始於一地數始於二合二始以位剛柔天數終於九地數終於十合二終以紀閏餘天數中於五地數中於六合二中以通律曆唐大衍曆議立端於始立首氣於初節之日表正於中示斗建於月半之辰推餘於終退餘閏於相望之後素問六日冬至子午夏至卯酉冬至加三日則夏至之日也歲遷六日終而復始淮南子高誘曰遷六日今年以子冬至後年以午冬至文選陸倕刻漏銘六日無辨五夜不分注云云銅壺香篆圭表輥彈薛季宣云今之為晷漏者其法有四高正下陂險達微回侈弇薄厚周禮典同以十有二聲謂之齊量直上向背為木兆直下向足為水兆邪向背為火兆邪向下為金兆橫為土兆周禮占人疏灼龜五兆
