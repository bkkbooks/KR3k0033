body:
  text: 小學紺珠卷四宋王應麟撰藝文類六藝禮五樂六射五御五書六數九周禮大司徒保氏五經又曰五學易書禮詩春秋揚子法言惟五經為辯詩書禮樂春秋漢藝文志五者五常之道易為之原五學世有變改周易尚書毛詩左氏春秋禮記唐五經博士書詩禮易春秋公羊漢建元五年立五經博士六經又曰六藝六學六籍詩書樂易禮春秋禮記經解記六藝政敎得失易書詩禮樂春秋漢武帝表章六經憲章六學藝文志并論語孝經小學為九種樂經亡又莊子孔子治詩書禮樂易春秋六經六經之名始見曰詩以導志書以導事禮以導行樂以導和易以導陰陽春秋以導名分以史記孔子曰六藝於治一也禮以節人樂以發和書道事詩以達意易以神化春秋以義典漢儒林傳古之儒者博學六藝之文六學者王敎之籍經解以詩為首七略藝文志七錄易居前七志孝經為初陸龜蒙曰六籍者聖人之海也九經易書詩周禮儀禮禮記春秋孝經論語經典釋文序錄易書詩禮樂春秋論語孝經小學漢志六藝九種著唐谷那律稱為九經庫九經之名始見韋表微九經師授譜後唐校九經鏤木於國子監七經易書詩三禮春秋秦宓曰文翁遣相如東受七經還敎吏民傅咸七經詩七隋樊深七經義綱經論詩書春秋周禮儀禮禮記論語劉敞七經小傅四術四敎詩書禮樂王制樂正崇四術立四敎春秋敎以禮樂冬夏敎以詩書四術詩書禮樂四敎春夏秋冬春夏陽也詩樂者聲聲亦陽也秋冬陰也書禮者聲聲亦陰也文王世子春誦夏弦秋學禮冬讀書三史書詩春秋文中子聖人述史三焉二經春秋孝經中庸注孔子曰吾志在春秋行在孝經固足以明之公羊傳序曰孔子有云云云此二學者聖人之極致治世之要務也孝經疏孝經鉤命決云志在春秋行在孝經大經中經小經禮記春秋左氏傳大為經詩周禮儀禮中為經易尚書春秋公羊傳穀梁傳小為經唐選舉志通孝經論語兼百官志論語孝經爾雅附中經立身以力學為先力學以讀書為本今取六經及論語孟子孝經以字計之毛詩三萬九千二百二十四字尚書二萬五千七百字周禮四萬五千八百六字禮記九萬九千二十字周易二萬四千二百七字春秋左氏傳一十九萬六千八百四十五字論語一萬二千七百字孟子三萬四千六百八十五字孝經一千九百三字大小九經合四十八萬四千九十五字且以中才為率若日誦三百字不過四年半可畢或以天資稍鈍減中才之半日誦一百五十字亦止九年可畢茍能熟讀而溫習之使入耳著心久不忘失全在日積之功耳里諺曰積絲成寸積寸成尺寸尺不已遂成丈匹此語雖小可以喻大後生勉之鄭耕老勸學古之學者耕且養三年而通一藝存其大體玩經文而已是以用日少而畜德多三十而五經立漢藝文志五經正義周易尚書毛詩禮記春秋唐孔穎達與諸儒選定五經義疏凡一百七十卷詔改為正義十二經詩書禮樂易春秋六經又加六緯一說易上下經并十翼一云春秋十二公經莊子孔子西藏書於周室繙十二經以說老耼四經易皇春皇帝王霸體意言象數用書帝夏虞夏商周體仁義禮智用詩王秋文武周召體性情形體用春秋霸冬秦晉齊楚體聖賢才哲用邵子皇極經世左氏穀梁春秋古文尚書毛詩後漢建初八年詔選高才生受四經十經周易尚書毛詩禮記周官儀禮春秋左氏公羊穀梁一各為經論語孝經為經合十經助敎分掌宋百官志國子助敎十人五經五緯南史周續之通十經六經五經及樂緯漢書注是易緯稽覽圖乾鑿度坤靈圖通卦驗類謀辨終備書緯璇璣鈐考靈耀刑德攷帝命驗運期授斗詩緯推度災汜歴樞含神霧禮緯含文嘉稽命徵威儀樂緯動聲移稽耀嘉汁圖徵圖春秋緯演孔圖元命包文耀鉤運斗樞感精符合誠考異郵保乾圖漢含孳佐助期握誠圖潛潭巴說題辭七緯易書詩禮樂孝經春秋後漢書注緯隋志七經三十六篇孝經緯援神契鉤命河圖七前六後八左九右關子明云伏羲氏王天下龍馬出河遂則其文以畫八卦孔安國云圖邵子曰圓者河圖之數方者洛書之文朋朱子曰河之位一與六共宗而居乎北二與七為而居乎南三與八同道而居乎東四與九為友而居乎西五與十相守而居乎中洛書九前一後三左七右四前左二前右八後左六後右關子明云禹治水時神龜負文而列於背有數至九禹遂因而次第之以成九類孔安國云易大傳曰河出圖洛出書聖人則之關子明洞極經邵康節皆以十為河圖九為洛書出劉牧以九為河圖十為洛書又引大傳以為二者皆於伏羲之世姚氏曰戴九履一之圖乃易乾鑿度九宮之法劉牧以為河圖兩又以生數就成數依五方圖之以為洛書洞極經易之三易連山始艮夏歸藏始坤坤殷亦曰乾周易始乾周周禮大卜掌三易之法其經卦皆八其别皆六十四贛歐陽文忠公曰易至漢分為三有田何之易焦之易費直之易八索八卦之說謂之八索左傳以書序注國語史伯曰平八索成人八體以應八卦乾為首坤為腹震為足㢲為股離為目兌為口坎為耳艮為手馬融說八索八卦賈逵云八王之法十言伏羲作十言之敎曰乾坤震㢲坎離艮兌消息左傳正義八卦乾天健一南坤地順八北震雷動四㢲風入五坎水陷六離火麗三艮山止七兌澤說二伏羲始作卦因重之為六十四文王作卦辭周公作爻辭文王八卦離南坎北離乾坤三畫以初相易而成震㢲以中相易而成坎以三相易而成艮兌六十四卦乾坤屯蒙需訟師比小畜履泰否同人大有謙豫隨蠱臨觀噬嗑賁剝復无妄大畜頤大過坎離上右經咸恒遯大壯晉明夷家人暌蹇解損益夬姤萃升困井革鼎震艮漸歸妹豐旅㢲兌渙節中孚小過旣濟未濟下右經四象太陽一九少陰二八少陽三七太陰四六兩儀之上各生一奇一耦而為二畫者四乾老陽震坎艮少陽坤老陰㢲離兌少陰七少陽單八少陰不拆爻變九老陽重六老陰變交爻繫辭兩儀生四象四象生八卦易本義云四象者次為二畫以分大少乾兌艮坤生於二太為天之四象離震㢲坎生於二少為地之四象三陳九卦履謙復恒損益困井㢲繫辭三陳九卦以明處憂患之道之初陳損履德之基益謙德之柄困復德之本恒德固德之修德之裕德之辨而井德之地而㢲德之制恒再陳不履和而至謙尊光復小辯於物雜而厭損先難而後易㢲益長裕而不設而不遷稱而隱三陳困窮而通履以和行井居其所謙以制禮困復以自知井恒以一德㢲損以逺害先益以興利次以寡怨以辯義以行權釋卦名言兩卦之體末推卦用四營分而為二以象兩掛一以象三揲之以四歸奇於扐繫辭四營而成易十有八變而成卦爻易變也謂一變也三變成爻十八變則成六易之策數萬物備焉而經營之者不出於四其初左右手數之以四其次得三少三多及一少一多亦止於四其終即三少三多之餘以四除之得九與六積萬一千五百二十策一少一多之餘以四除之得七與八亦積萬一千五百二十策二篇之策皆四之所成也是故八卦為四者二六十四卦為四四者四故曰四營而成易此言揲蓍之法也三揲之餘然後畫卦以小變言之每一揲具五小變以三揲合十五小變為十有八變而畫一爻以大變言之每一揲為一大變合十八揲為十八大變而畫一卦八卦與六十四卦皆十八之所成也是故上經三十卦反對為十八卦下經三十四卦反對亦為十八卦故曰十有八變而成卦此亦求卦之法也立位初二三四五上易以爻為位以卦為時天道大明於元氣旣行之後始於子午終於己亥各以六辰而成一氣而三百六十五度分焉易象大明於奇畫旣生之後始於復姤終於乾坤各以六位而成卦而三百八十四爻列焉六虚六位也史記自序八卦位曰八位二萬之策二篇三百八十四爻陰陽各半合萬一千五百二十策繫辭注上經起乾坤至坎離三十卦下經起咸恒至旣未濟三十四卦雜卦無上下經之分然自乾坤至困亦三十卦自咸恒至夬亦三十四卦鄭東卿云二用用九者乾之坤用六者坤之乾乾爻七九九變而七無為易占其變用九不用七坤爻八六六變而八無為用六不用八七於乾坤見之其餘可知純九六變八不變者揲蓍之法遇則變叅同契二用無爻位周流行六虚十三卦罔罟取離包犧耒耨取益為市取噬嗑神農衣裳取乾坤舟楫取渙服牛乗馬取隨重門擊柝取豫臼杵取小過弧矢取暌宮室取大壯棺槨取大過書契取夬黄帝堯舜易繫辭卦正義曰象卦制器皆取之爻象之體十翼上彖下彖上象下象上繫下繫文言說卦序卦雜卦孔子作鄭康成始以彖象連經文王弼又以文言附乾坤二卦易三義易一名而含三義易簡一也變易二也不易三也鄭康成易贊古易十二篇上經下經王伏犧畫文周公辭十翼孔子所作傳呂成公祖謙定經二卷傳十卷易聖人之道四以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占繫辭動君子居則觀其象而玩其辭則觀其變而玩其占讀易之法盡於此易三家施讎孟喜梁邱賀藝文志易學啟蒙四篇本圖書原卦畫明蓍策考變占朱文公象五贊原述旨稽類明筮警學三墳伏羲神農黄帝之書言大道左傳書序山氣形張商英得於泌陽民家坤山墳連山氣墳歸藏形墳乾三禮禮為人防墳大防也張平子說三氣天地人之氣馬融說五典少昊顓頊高辛唐虞之書言常道同上五周禮外史掌三皇帝之書張平子說五典五帝之常道馬融說五典五行九邱九州之志謂之九邱左傳篇書序邱劉原父云即九共九古文與共相近故誤為共逵禹貢言形質九邱言情性子馬融說九州之數賈說九州亡國之戒張平說周禮之九刑九疇又曰九章九法一五行二五事三八政四五紀五皇極六三德七稽疑八庶徵九五福六極洪範河劉歆云圖洛書相為經緯八卦九章相為表裏書五十七篇伏生得二十九篇敎於齊魯之間儒林傳堯典臯陶謨禹貢甘誓湯誓盤庚高宗肜日西伯戡黎微子牧誓洪範金滕大詔康詔酒誥梓材召詔洛詔多方多士立政無逸君奭顧命呂刑文侯之命費誓秦誓漢凡二十八篇儒以為今文泰誓武帝世始得為二十九篇古文增多伏生二十五篇書序大禹謨五子之歌𦙍征仲虺之誥湯誥伊訓太甲三篇咸有一德說命三篇泰誓三篇武成旅獒微子之命蔡仲之命周官君陳畢命君牙冏命復出者舜典益稷盤庚二篇康王之誥五凡篇又序一篇共五十九篇四十二篇亡為例有十典謨貢歌誓誥訓命征範六誓甘誓湯誓泰誓牧誓費誓秦誓七誥湯誥大誥康誥酒誥召誥洛誥康王之誥七觀六誓可以觀義五誥可以觀仁甫刑可以觀誡洪範可以觀度禹貢可以觀事臯陶謨可以觀治堯典可以觀美尚書大傳孔子曰觀文心雕龍云書標七六詩又曰六義風賦比興雅頌周禮大師敎六詩禮詩序詩有六義漢樂志國子誦六詩用風雅頌詩之體賦比興詩之三經三緯四始關雎之亂為風始鹿鳴為小雅始文王為大雅始清廟為頌始詩序鹿史記牡學記宵雅肄三鳴四皇皇者華四詩魯詩申公齊詩轅固韓詩韓嬰毛詩毛萇藝文志詩分為四二南周南召南三頌周魯商三類風雅頌左傳晏子曰一氣二體三類四物五聲六律七音八風九歌朱子曰二南正風房中之樂也鄉樂也二雅之正雅朝廷之樂也商周之頌宗廟之樂也二雅小雅大雅九能建邦能命龜田能施命作器能銘使能造命升高能賦師旅能誓山川能說喪紀能誄祭祀能語毛詩傳君子能此九者可謂有德音可以為大夫也五禮禮五經吉十有二凶五賓八軍五嘉六舜典修五禮注吉凶賓軍嘉禮臯陶謨自我五禮有庸哉注公侯伯子男五等之春官注曲禮五其别三十有六祭統禮有五經謂吉凶賓軍嘉大司徒以防萬民之偽而敎之中唐五禮賓軍嘉凶吉三禮天神地祗人鬼之禮舜典伯夷作秩宗典三禮注注班固幽通賦姜本支乎三趾趾禮也謂鄭𤣥說天事地事人事之禮林少穎以郊廟祭祀為主禮之本也周禮儀禮禮記後漢儒林傳有鄭𤣥注通為三禮唐明經三禮科聶崇義考正三禮圖宗崔靈恩三禮義六禮冠昏喪祭鄉相見王制修六禮以節民性荀子立太學設庠序修六禮九禮冠婚朝聘喪祭賓主鄉飲酒軍旅大戴禮記此之謂九禮六儀祭祀之容賓客之容朝廷之容喪紀之容軍旅之容車馬之容周禮保氏六典治典天官冢宰敎典地官司徒禮典春官宗伯政典夏官司馬刑典秋官司冦事典冬官司空周禮大宰建六典考周官經六篇司空之篇亡以工記補之儀禮十七篇士冠士昏士相見鄉飲酒鄉射燕大射聘公食大夫覲喪服士喪旣夕士虞特牲饋食少牢饋食有司徹漢高堂生博士禮十七篇禮古經多三十九篇禮三家戴德戴聖慶普藝文志皆后倉弟子三家立於學官禮經三百謂冠婚吉凶藝文志禮經三百威儀三千臣瓚曰禮經三百謂冠婚吉凶謂周禮六篇其官三百六十禮器經禮三百曲禮三千注經禮謂周禮中庸禮儀三百經禮制之凡也曲禮文之目也禮記說禮記四十九篇禮記百三十一篇藝文志七十子後學者所記戴德刪為八十五篇戴聖又刪為四十六篇馬融又益月令明堂位樂記合四十九篇隋志周禮致太平論五十一篇内治七國用十六軍衞四刑禁六官人八敎道九李泰伯撰周劉子駿鄭康成皆以周禮為公致太平之迹周禮綱領三養君德正朝綱均國勢陳傅良君舉說周禮三家杜子春鄭大夫興鄭司農衆周禮疏鄭康成所存注者二家二鄭皆康成之先故言官不言名字五射白矢矢貫侯過見其鏃白參連前放一矢後三矢連續而去剡注羽頭高鏃低而去剡剡然襄尺臣與君射不與君並立襄君一尺而退音讓井儀四矢貫侯如井之容儀氏周禮保注五馭鳴和鸞和在式鸞在衡升車則馬動馬動則鸞鳴鸞鳴則和應逐水曲御車隨逐水勢屈曲而不墜水過君表毛詩傳曰褐纏旃以為門君表即褐纏旃也舞交衢衢道也謂御車在交道車旋應於舞節逐禽左御驅逆之車逆驅禽獸使左當人君以射之周禮保氏注六樂六代樂雲門黄帝門大司樂雲大卷大咸堯池咸大韶舜作大司樂㲈大夏禹大濩湯大武武王周所存六代之樂以周禮保氏注大司樂樂舞敎國子氏大司徒以防萬民之情而敎之和疏云保敎六樂敎以書大司樂敎以舞葛天氏八闋載民𤣥鳥遂草木奮五穀敬天常達帝功依地德總萬民之極呂氏春秋樂記二十三篇樂本樂論樂施樂言樂禮樂情樂化樂象一云象法賓牟賈師乙魏文侯合十一篇為一篇奏樂樂器樂作意始樂穆說律季札樂道樂義昭本昭頌竇公名十二篇存書亡禮記正義八樂雲門五英六莖大卷韶濩夏武易通卦驗舞八樂雅樂四曲鹿鳴騶虞伐檀文王魏杜䕫傳舊雅樂四曲樂語五均河間獻王樂元語云天子取諸侯之士以立五均則市不二賈四民常均漢食貨志注魯四代樂象箾南籥文王大武武王韶濩湯大夏禹韶箾舜左傳吳公子札來聘請觀周樂注魯用四代樂正義云不得用雲門大咸鄉飲樂十七章鹿鳴三奏南陔一奏南有嘉魚四奏崇邱一奏關雎五奏鵲巢三奏唐會要升歌三終工歌鹿鳴四牡皇皇者華儀禮鄉飲酒禮管大射乃歌鹿鳴三終乃新宮三終其篇亡笙入三終笙入樂南陔白華華黍鄉飲酒禮間歌三終合樂三終乃間歌魚麗笙由庚歌南有嘉魚笙崇邱歌南山有臺笙由儀間代也謂一歌則一吹乃合樂周南關雎葛覃卷耳召南鵲巢采蘩采蘋合樂謂歌樂與衆聲俱作同上飲燕禮遂歌鄉樂鄉酒義工告樂備九招樂招音韶舜樂簫韶九成故曰九招史記帝舜紀樂禹乃興九招之樂大司九磬之舞劉原父曰招有九名識其名焉祈徵角之謂也五樂琴瑟春笙竽夏鼓季夏鐘秋磬冬漢郊祀志舜修五樂注鼓鐘鐸磬鞀鬻子禹以五聲聽治九夏王夏肆夏昭夏納夏章夏齊夏側皆反族夏祴夏古哀反驁夏五羔反周禮鐘師以鐘鼓奏九夏夏大也樂之大歌有九九夏皆詩篇名頌之族類也三夏二曰肆夏一名樊國語作𦂳三曰韶夏一名遏四曰納夏一名渠左傳也奏肆夏之三肆三夏天子所以享元侯國語金奏夏繁遏渠周禮注呂叔玉云肆夏時邁也繁遏執競也渠思文也樊遏渠左傳國語注分為三夏之别名文王之三大雅之首文王大明緜左傳工歌文王之三兩君相見之樂也鹿鳴之三小雅之首鹿鳴四牡皇皇者華左傳歌鹿鳴之三禹歌四章大化大訓六府九原尚書大傳之注四章皆歌禹功春秋三傳五傳左氏邱明魯太史公羊高齊人穀梁赤一名喜一名俶魯人并鄒氏夾氏為五傳鄒氏無師夾氏未有書藝文志春秋分為五公武帝立五博士春秋羊孝宣立穀梁平帝立左氏五始元者氣之始春者四時之始王者受命之始正月者政敎之始公即位者一國之始漢書注書春秋正月王者九十二月二月書王者二十三三書王者十九四繫以事繫日以日繫月以月繫時以時繫年杜預春秋左傳序五例一曰微而顯二曰志而晦三曰婉而成章四曰盡而不汙五曰懲惡而勸善左傳序例發傳之體有三為之情有五五家穀梁說尹更始劉向周慶丁姓王彦漢賈逵兼通五家穀梁說三國史記晉乗楚檮杌魯春秋孟子春秋綱領七家孟子莊子董子文中子邵子張子程子胡文定公春秋傳春秋五十凡稱凡者五十其别四十有九釋例義母弟二凡其不異三科九旨新周故宋以春秋當新王此一科三旨也所見異辭所聞異辭所傳聞異辭此二科六旨也内其國而外諸侯内諸侯而外夷狄此三科九旨也何休說百二十國寶書孔子制春秋之義使子夏等十四人求周史記得百二十國寶書公羊傳疏史通如楚書鄭志魯之春秋魏之紀年此其可得言者國語二十一篇周魯齊晉鄭楚吳越四譜國譜年譜地譜人譜鄧明世春秋四譜三傳疏左氏正義孔穎達公羊疏徐彥穀梁疏楊士勛古易五家呂大防十二篇晁說之并十二為八睢陽王氏東萊呂氏各定為十二篇周燔乂改更次序讀書目言古易者為五家易九家荀爽京房馬融鄭𤣥宋衷虞翻陸績姚信翟子𤣥釋文序集荀爽九家解易九師說淮南王安聘明易者九人號九師說漢藝文志易九圖河圖洛書伏羲八卦次序八卦方位六十四卦次序六十四卦方位伏羲四圖其說出邵氏文王八卦次序八卦方位卦變朱文公易本義易之圖九四易有天地自然之易有伏羲之易有文王周公之易有孔子之易易本義易有四體一用三伏羲先天體也連山天易歸藏地易周易人易用也張行成云易百有餘家所可取者古先天圖揚雄太𤣥關子明洞極魏伯陽參同契邵堯夫皇極經世而已四家之學皆兆於先天圖鄭東卿云書三家歐陽字和伯大小夏侯勝建漢儒林傳補亡詩六篇南陔白華華黍由庚崇邱由儀晉束晳肄修鄉飲之禮補著其文無劉原父曰六篇有聲無詩故云笙不云歌非亡失乃也朱文公曰鄉飲酒燕禮曰笙曰樂曰奏而不言歌則有聲而無辭明矣三禮圖冠冕衣服見吉凶之象宮室車旗見古今之制弓矢射侯見尊卑之别鐘鼓管磬見法度之均祭器祭玉見大小之數圭璧繅藉見君臣之序喪葬飾具見上下之紀聶崇義重集三禮圖二十卷禮五傳弟子高堂生傳蕭奮孟卿后蒼戴德戴勝鄭康成六藝論儀禮經傳通解朱文公以儀禮為經取禮記及諸經史書所載附本經之下具列注疏諸儒之說為經傳通解二十三卷家禮五鄉禮三國學禮十一邦禮四集傳集注十四卷王朝禮十四喪祭二禮屬之門人黄榦類次三朝記孔子三見哀公言成七卷七略曰孔子三見哀公作三朝記七篇三家禮範司馬氏程氏張氏張宣公栻所次孝經六家孔安國古文二十二章鄭康成十八章韋昭王肅虞翻劉邵孝經序舉六家之異同三古文庻人章分為二曾子敢問章分為又多閨門一章孝經二家孔安國鄭氏或云鄭𤣥隋志梁代二家並立國學經唐劉子元上孝經注議云孝非鄭𤣥所注其驗十二條行孔廢鄭於義為允司馬貞請鄭孔並行明皇纂諸說自注以奪二家論語三家古論二十一篇分堯曰下章有兩子張魯論二十篇齊論二十二篇有問王知道論語十三家衞瓘繆播欒肇郭象蔡謨袁宏江惇蔡系李充孫綽周懷范甯王珉皇侃疏列十三人云此十三家江熙所集四子大學論語孟子中庸朱文公曰四子六經之階梯近思錄四子之階梯而先讀大學次及語孟後會其歸於中庸孟子音釋二家張鎰丁公著孫奭等刊正二家集成音義一卷爾雅十九篇釋詁釋言釋訓釋親釋宮釋器釋樂釋天釋地釋邱釋山釋水釋草釋木釋蟲釋魚釋鳥釋獸釋畜許六反疏云釋詁一篇蓋周公所作釋言以下或言仲尼所增子夏所足叔孫通所益梁文所補小爾雅十三章孔鮒撰晁氏曰先儒謂爾雅周公訓成王之書鄭氏九書周書尚書尚書中候尚書大傳毛詩周禮儀禮禮記論語唐劉子𤣥曰晉中經簿凡九詩皆曰鄭氏注名𤣥五說詩書春秋禮樂唐劉迅三經書詩周禮龜山先生三經義辯辯王安石三經義之失羣經音辯辯字同音異辯字音清濁辨彼此異音辯字音疑混辯字訓得失賈昌朝辨正凡五門河洛六藝河洛五九六藝四九謂八十一篇後漢張衡傳注百名百名以上書於策不及百名書於方聘禮之名書文也今謂字策簡也方版也三字石經古篆隸水經注魏正始中立六書象形日月之類會意武信之類轉注考老之類處事上下之類說文云指事漢志云象事假借令長之類諧聲江河之類云說文云形聲漢志象聲周禮保氏注九數方田以御田疇界域粟米以御交質變易差分一名衰分以御貴賤稟稅少廣以御積幕方圓商功以御力程積實均輸以御逺近勞費盈朒一云贏不足以御隱雜互見方程以御錯糅正負勾股一云旁要以御高深廣逺即九章周禮保氏注六内則十年學書計謂書九數三蒼蒼頡篇李斯作訓纂篇揚雄作滂喜篇賈訪作隋志蒼頡篇爰歴篇趙髙作博學篇胡毋敬作通謂之三蒼說文繫傳六體書古文奇字篆書隸書又曰佐書繆篆蟲書說文甄豐等改定古文時有六書大篆小篆八分隸書行書草書張懷瓘六體論八體書大篆小篆刻符蟲書摹印署書殳書隸書說文秦書有八體古文大篆小篆隸飛白八分行草周越書苑八體四體古文篆隸草衞恒四體書勢十體古文大篆八分小篆飛白倒薤散隸懸針鳥書垂露唐元度十體古文大篆籀文小篆八分隸書章草行書飛白草書張懷瓘十書書學石經三體古文篆隸說文字林唐志書五變古文蒼頡大篆史篆小篆李斯隸書程邈草書漢隋志字五體古文廢而不用大篆石經載之小篆印璽旛碣所用八分石經碑碣所用隸書典籍表奏公私文疏所用庾肩吾曰隸書今之正書唐六典三體古文秦篆漢隸句中正書孝經俗通正顏氏干祿字書算學九章海島孫子五曹張邱建夏侯陽周髀五經綴術緝古記遺二等數唐志七略輯略六藝略諸子略詩賦略兵書略術數略方技略劉歆總羣書奏七略七志宋經典諸子文翰軍書陰陽術藝圖譜道佛附見王儉撰七唐韋述續志七錄梁經典記傳子兵文集技術佛道阮孝緒隋許善心效七錄更制七林四部四類甲六藝小學乙諸子兵書術數丙史記舊事丁詩賦圖讚汲冢書晉荀勗分四部經甲史乙子丙集丁唐志分為四類四庫書本有正有副元行沖上羣書四類之康節先生勸學曰二十歲之後三十歲前朝經暮史畫子夜集九流儒家出於司徒之官道家出於史官陰陽家出於羲和之官法家出於理官名家出於禮官墨