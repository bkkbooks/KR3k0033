五貴有德貴貴貴老敬長慈幼祭義先王所以治天下者五天地民四時之務國語楚觀射父曰先王之祀以七事政不節使民疾宮室榮女謁盛苞苴行讒夫昌成湯遭旱以六事自責後漢鍾離意上疏又荀子敬老尊齒樂施親賢好德惡貪廉讓家語孔子曰七教者治民之本至禮不讓而天下治至賞不費而天下士悅至樂無聲而天下民和家語至強至辨至明荀子此三至者非聖人莫之能盡不可使處不完不可使擊不勝不可使欺百姓荀子議兵為將三至至謂一守而不變仁義禮智信之法家語象天儀地和民順時共神國語周太子晉曰蔑棄五則夏尚忠殷尚質周尚文漢董仲舒曰夏上忠殷上質周上文杜欽曰殷因於夏尚質周因於殷尚文郊特牲虞祭尚用氣殷尚聲周尚臭考工記虞尚陶夏上匠殷上梓周上輿檀弓夏尚黑殷尚白周尚赤夏五十而貢殷七十而助考工記注作筯周百畝而徹孟子其實皆什一也周制畿內用夏之貢法稅夫無公田邦國用殷之筯法制公田不稅夫考工記注墨劓剕宮大辟書舜典注呂刑周官之五刑其屬三千五百穆王之五刑其屬三千周禮疏漢文帝除肉刑宮刑至隋乃赦野軍鄉官國周禮大司寇糾萬民墨劓宮刖殺司刑甲兵斧鉞刀鋸鑽笮鞭撲國語臧文仲曰杖鞭徒流死後周大律笞杖徒流死唐用刑有五正刑五流宥鞭撲左傳周公制禮曰在九刑不忘鄭康成注尚書云叔向曰周有亂政而作九刑韋昭説同正刑一議刑八服虔注刑新國用輕典刑平國用中典刑亂國用重典周禮大司寇建邦之三典宮官國野軍周禮士師掌五禁之法以左右刑法治神治民治地治功治器治摯周禮司約約言語之約束親故賢能功貴勤賓律疏曰今之八議周之八辟也漢刑法志周官有八議周禮小司寇以八辟麗邦法附刑罰親者王之親故者王之故舊賢有德行能有道藝功有大勳力貴大夫以上勤勞五事賓三恪二代之後張平子説八索周禮八議之刑辭色氣耳目小司寇以五聲聽獄訟求民情墨百鍰劓惟倍二百鍰剕倍差五百鍰宮六百鍰大辟千鍰呂刑五刑不簡正于五罰罰贖也誓軍旅誥會同禁田役糾國中憲都鄙周禮士師以五戒先後刑罰不孝不睦不姻不弟不任不恤造言亂民大司徒糾萬民祀明堂教諸侯孝食三老五更於大學教弟祀先賢於西學教德耕籍教養朝覲教臣祭義五者天下之大教事鬼神之道君臣之義父子之倫貴賤之等親疏之殺爵賞之施夫婦之別政事之均長幼之序上下之際祭統祭有十倫三王之禮中庸王天下有三重焉呂與叔云謂議禮制度考文祼升歌武宿夜祭統祭有三重訪問於善為咨咨親為詢咨禮為度咨事為諏咨難為謀左傳穆叔如晉晉侯享之歌鹿鳴之三三拜曰皇皇者華君教使臣曰必咨於周臣獲五善敢不重拜穆叔叔孫豹國語重之以六德謂諏謀度詢咨周恭敬以信忠信以寬明察以斷家語子路治蒲孔子三稱其善慈幼養老振窮恤貧寬疾安富周禮太司徒以養萬民散利薄征緩刑弛力舍禁去幾眚禮殺哀殺所界反蕃樂多昏索鬼神除盜賊同上以聚萬民稼穡三農樹藝園圃作材虞衡阜蕃藪牧飭材百工通財商賈化材嬪婦斂材臣妾生材間民學藝世事服事同上頒執事十有二以登萬民九職加三事會鄄又會鄄會幽又會幽會柳會貫會首戴左氏作首止會寧毋會葵丘論語齊桓公九合諸侯不以兵車謂衣裳之會也穀梁傳云衣裳之會十有一不取北杏及陽穀為九論語疏史記漢志注兵車之會三北杏陘新城乘車之會六鄄二幽首止洮葵丘齊語兵車之會六北杏鄄二柳醎淮乘車之會三陽穀首止葵丘左傳晉悼公八年之中九合諸侯謂會戚會城棣會鄬會邢丘盟戲會柤戍虎牢同盟亳城北會蕭魚土地人民政事孟子諸侯之寶三大農大工大商六韜三寶生殺貧富貴賤齊語慎用其六柄管子六柄者主之所操刑德韓子二柄三常愛親明賢政之幹禮賓矜窮禮之宗禮以紀政國之常國語僖負羈云君以舉賢為常官以任賢為常士以敬賢為常周書陰符治國有三常鄉長所進官長所選公所訾相齊語訾量也相視也三適古者諸侯貢士一適謂之好德再適謂之賢賢三適謂之有功尚書大傳漢書適得其人則象法化決塞心術計數管子德有六興義有七體禮有八絃法有五務權有三度管子注五者可以輔弼國政節用賢佐法度必誅天時地宜管子明主六務老老慈幼恤孤養疾合獨問疾通窮振困接絶管子九惠之教四順民惡憂勞我佚樂之民惡貧賤我富貴之民惡危墜我存安之民惡滅絶我生育之管子曰順政之所興在順民心官人使吏之材士大夫官師之材卿相輔佐之材荀子能論官此三材無失其次人主之道也以家為家以鄉為鄉以國為國以天下為天下如地如天如月如日管子德當位功當祿能當官管子文武威德管子曰四位者主之所處得百姓之力者富得百姓之心者強得百姓之譽者榮荀子三德具而天下歸之平政愛民隆禮敬士尚賢使能荀子君人者之大節也勸賞畏刑恤民左傳聲子曰三者禮之大節也仁義威荀子王者仁眇天下義眇天下威眇天下知此三具者欲王而王欲霸而霸欲強而強善生養人善班治人善顯設人善藩飾人荀子君道明天道德仁義分守形名因任原省是非賞罰莊子古之語大道者五變而形名可舉九變而賞罰可言也文中子化至九變王道其明乎注孔子曰三年有成九成二十七年漢武帝詔曰詩云九變復貫知言之選五穀桑麻揚子七賦之所養臣下職君法明刑稱陳言有節上通利荀子成相君論有五約以明三不欺子産治鄭民不能欺子賤治單父民不忍欺西門豹治鄴民不敢欺史記生殺豫奪賞罰文子淮南子進業者登九歲再登者平三登曰太平二十七歲漢食貨志明國家大體通人事終始能直言極諫漢文帝策賢良三道之要鼂錯對仁義忠信勇謀人君有六守六韜道民與上同意天陰陽寒暑時制地遠近險易廣狹死生將智信仁勇嚴法曲制官道主用孫子經之以五事禮仁信義勇智司馬法六德智信仁勇嚴劉子兵術五德敬老慈幼救疾恤孤賑貧窮任失業唐陸贄説黜陟使六德勇智仁信忠六韜將有五材氣勢地勢因勢淮南子兵有三勢上知天道下習地形中察人情淮南子將有三隧興農桑以養其生審好惡以正其俗宣文教以章其化立武備以秉其威明賞罰以統其法荀悅申鑒揚子五政之所加注五常之政德義有聞清謹明著公平可稱恪勤匪懈唐考功近侍選司考挍禮官樂官判事宿衛督領法官挍正宣納學官軍將政教文史糾正句撿監掌役使屯官倉庫歷官方術關津市司牧官鎮防同上一最四善為上上一最三善為上中一最二善為上下身治正閨門治左右正功賞得德厚吏良漢谷永對五者王事之綱紀措刑官人知賢去疑招諫勸賞息兵安宗子唐陳子昂奏八科教太子正邦本封諸王固磐石出宮人嫁宗女時召宰相講庶政次對群臣廣聰明復正衙奏事許方幅糾彈禁非時貢獻省出畋遊元稹上奏十事其治法其佐賢其民願其俗美荀子王霸篇四者齊注齊謂無所闕漏泄稽緩違失忘誤唐志中書舍人見可欲則思知足將興繕則思知止處高危則思謙降臨滿盈則思挹損遇逸樂則思撙節在宴安則思後患防壅蔽則思延納疾讒邪則思正巳行爵賞則思因喜而僭施刑罰則思因怒而濫唐魏徵上疏得地形卒服習器用利漢鼂錯上書言兵體三章清心敦教化盡地利擢賢良恤獄訟均賦役西魏蘇綽六條詔書以準皆各其及即若范蜀公云若春秋之凡明禮崇樂熙政正刑勸農經武後周竇儼上疏清心奉公修德責實明察勸課革弊文臣修身守職公平訓習簡閲存恤威嚴武臣真宗作仁明武司馬文正公官人信賞必罰司馬文正公慈儉勤慎誠明蘇文忠公保業惜時遠謀重微務實司馬文正公畏天愛民修身謀學任賢納諫薄斂省刑去奢無逸呂文獻公明黜陟抑僥幸精貢舉擇官長均公田厚農桑修武備減徭役覃恩信重命令范文正公師傅六官經界鄉黨貢士兵役民食四民山澤分數明道先生立志責任求賢伊川先生曰當世之務所尤先者三三者之中復以立志為本德才勞唐沈既濟言古今選用之法九流常敘有三科三科力役有上中下論語注茂異賢良幹蠱陸贄説黜陟使以三科登俊乂賢良方正能直言極諫經學優深可為師法詳間吏理達於教化後周制舉三科忠恪匪躬孝敬盡禮友于兄弟潔身勞謙信義可復學以為巳晉武帝令諸郡中正以六條舉淹滯魏尚書陳群立九品官人之法州郡皆置中正擇有識鑒者為之區別人物第其高下晉劉頌轉吏部尚書為九班之制治身莫先於孝治國莫先於公司馬文正公五禁初命曰誅不孝無易樹子無以妾為妻再命曰尊賢育材以彰有德三命曰敬老慈幼無忘賓旅四命曰士無世官官事無攝取士必得無專殺大夫五命曰無曲防無遏糴無有封而不告孟子桓公葵丘之會今之諸侯皆犯此五禁六術制號政令欲嚴以威慶賞刑罰欲必以信處舍收藏欲周以固徙舉進退欲安以重欲疾以速窺敵觀變欲潛以深欲伍以參遇敵決戰必道吾所明無道吾所疑荀子議兵臨武君問為將曰是謂六術無欲將而惡廢無怠勝而忘敗無威內而輕外無見利而不顧害慮事欲熟而用財用泰同上是之謂五權通觀其所禮貴觀其所進富觀其所養聽觀其所行止觀其所好習觀其所言窮觀其所不受賤觀其所不為呂氏春秋賢主所以論人民勤於力則功築宰民勤於財則貢賦少民勤於食則百事廢穀梁傳古之君人者必時視民之所勤政善而吏惡吏善而政惡政吏駢惡揚子民有三勤廢兵之冗食蠲法之撓人省官之不急去物之不用罷事之非要唐陸贄説黜陟使以五要簡官事均節六條兩稅之弊兩稅以布帛為額長吏以增戶加稅闢田為課績稅限迫促以稅茶錢置義倉備水旱兼并之家私斂重於公稅陸贄奏均節財賦六條三君問政葉公問政夫子曰政在説近來遠魯哀公問政夫子曰政在選賢齊景公問政夫子曰政在節財説苑韓子三君問政於夫子夫子對之不同縉紳之儒守和親介胄之士言征伐漢胸奴傳贊革命之日市不易肆克服天下在即位後未嘗殺一無罪百年方四葉百年無腹心患康節先生謂本朝五事自唐虞以下所未有仁惠公直明敏廉謹紹興中舉薦四條律巳以廉撫民以仁存心以公蒞事以勤真文忠公四事守潭州以勵其僚結人心厚風俗存紀綱蘇文忠公夏禹刑商湯刑周九刑左傳晉叔向曰三辟之興皆叔世也周得中策漢得下策秦無策漢書嚴尤周得上策秦得其中漢無策唐劉貺上策自治中策取魏下策浪戰杜牧罪言治河有上中下策漢賈誼義兵王應兵勝忿兵敗貪兵破驕兵滅文子用兵有五漢魏相上書布縷粟米力役孟子君子用其一緩其二盜律賊律囚捕二雜律具律魏李悝著法經商鞅改為律漢蕭何加李悝所造戶興廄三篇謂之九章之律魏律十八篇增九篇晉律二十篇就漢九章增十一篇梁律二十篇北齊律十二篇後周律二十五篇隋律十二篇唐因隋舊宋建隆重定刑統三十卷設於此而逆彼之至曰格設於此而使彼效之曰式禁其未然之謂令治其已然之謂敕神宗云祗道稱賢典師四戚伍長群長群醜什長戒卒周書文政篇順九典邦汋邦賊邦諜犯邦令嬌邦令為邦盜為邦朋為邦誣周禮士師掌土之八成注行事有八篇三刺訊群臣訊群吏訊萬民三宥不識過失遺忘三赦幼弱老耄蠢愚周禮司刺以此三法求民情折民中夫家衆寡六畜車輦稼穡耕耨旗鼓兵革周禮遂大夫以四達戒其功事注治民之事大通者有四行已恭事上敬養民惠使民義論語謂子産有君子之道四賢士藏匿四民遷業上下相徇廉恥道消毀譽亂真直言不聞後唐康澄言深可畏者六功五品以德立宗廟定社稷曰勳以言曰勞用力曰功明其等曰伐積日曰閲史記功臣表古者人臣功有五品軍伐善君以道事其君能其官晉語趙衰曰先且居有三賞即位三策天子即位上卿進曰能除患則為福授天子一策中卿進曰先事慮事先患慮患授天子二策下卿進曰敬戒無怠授天子三策荀子七福民不鑄錢黥罪不積偽錢不蕃民不相疑采銅鑄作反於耕田輕重斂散貨物必平多少有制用別貴賤官富貴而末民困制棄財則敵必壞漢賈誼諫除盜鑄錢令七福可致足食足兵得士唐盧景亮三足記命物之名方圓白黑毀譽之名善惡貴賤況謂之名賢愚愛憎尹文子名有三科刑名從商爵名從周文名從禮荀子正名義立而王信立而霸權謀立而亡荀子王霸三者明主之所慎擇也解狐得舉祁午得位伯華得官左傳祁奚能舉善建一官而三物成一官軍尉物事也師於牛首師於向觀兵於鄭東門左傳晉悼公三駕而楚不能與爭注三興師鄭遂服無聲之樂無體之禮無服之喪禮記孔子間居守邊備塞勸農力本漢鼂錯言當世急務二事眚伐壇音善削侵正殘杜滅周禮大司馬九伐之法掌交九戎之威注九伐之戎萬民之利害為一書禮俗政事教治刑禁之逆順為一書悖逆暴亂作慝猶犯令者為一書札喪凶荒厄貧為一書康樂和親安平為一書周禮小行人比五物每國辨異之欲富國者務廣其地欲強兵者務富其民欲王者務博其德史記司馬錯曰三資者備而王隨之矣校能記功任賢敘常唐元稹對策設四式以任人拔擢以旌其異能黜罷以糾其失職序進以謹其守常陸贄奏核才馭吏有三術輔翊太子選任大臣振舉綱維變化風俗愛養民力修明軍政朱文公封事天下之大本心也今日之急務六者是也相臣庶官京司闕官考課遺滯藩府官屬唐趙憬忠愛無私用賢簡能又選注尸子曰治國有四術文德武功法度防固刑賞後魏高閭上表為國之道其要有五政先仁恕不偉邊功法行自近宦豎不與政絶貢獻戚屬不任臺省接大臣以禮群臣得犯忌諱絶道佛營造推此鑒戒為萬代法唐姚崇以十事要説而後輔政文武魏元忠言天子之柄有二文武而已
