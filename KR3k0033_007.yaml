body:
  text: 氏族類姬酉祈巳滕葴任荀僖姞儇依晉語黃帝之子二十五宗其得姓者十四人為十二姓注十四人二人為姬二人為巳故十二姓左傳衆仲曰天子建德因生以賜姓胙之土而命之氏巳董彭禿妘曹斟芊鄭語娥皇女英後漢劉毅曰有虞二妃周室三母二妃堯二女大姜大王之妃大任王季之妃大姒文王之妃崔琦外戚針周興三母后稷母姜嫄文王母大任武王母大姒並後漢書注伯邑考武王管叔鮮周公旦蔡叔度曹叔振鐸成叔武霍叔處康叔封冉季宰冉一作聃史記武王同母兄弟十人毛詩注大姒十子虢仲虢叔文王弟國語文王敬友二虢晉魯衛鄭曹滕姬姓邾小邾曹姓宋子姓齊姜姓莒巳姓和姒姓薛任姓左傳注云實十三國高陽氏八愷高辛氏八元左傳文十八年大史克曰十六族世濟其美魯公伯禽康叔唐叔左傳三者皆叔也而有令德故昭之以分物因氏頜氏工婁氏須遂氏左傳莊十七年注四族遂之彊宗頜烏納反齊二惠公孫竈子雅公孫蠆子尾皆惠公之孫左傳昭三年晏子曰二惠競爽猶可欒高二族皆出惠公鄭穆公十一子子然二子孔三族巳亡子羽不為卿故唯言七穆子罕公子喜子展公孫舍之罕氏子駟公子騑子西公孫夏駟氏子國公子發子産公孫僑國氏子良公子去疾伯有良霄良氏子良孫子耳子子游公子偃子大叔游吉游氏子游孫子蟜子子豐子石公孫段豐氏子印伯石印段印氏子印孫子張子左傳襄二十六年叔向曰鄭七穆罕氏其後亡者也子展儉而一罕駟國良游豐印七人子孫並有才名世任鄭國之政焉子展賦草蟲伯有賦鶉之賁賁子西賦黍苗子産賦隰桑子大叔賦野有蔓草印段賦蟋蟀公孫段賦桑扈二十七年鄭伯享趙武于垂隴子展伯有子西子産子大叔二子石從趙孟曰七子從君以寵武也請皆賦亦以觀七子之志子齹賦野有蔓草子皮子嬰齊子皮罕虎子展子子産賦鄭之羔裘子大叔賦褰裳子游賦風雨駟帶之子駟偃子旗賦有女同車公孫段之子豐施子柳賦籜弓印段之子印癸左傳昭十六年鄭六卿餞韓宣子於郊宣子曰二三君子請皆賦起亦以知鄭志皇緩為右師皇非我為大司馬皇懷為司徒靈不緩為左師樂茷為司城樂朱鉏為大司寇三族皇靈樂左傳哀二十六年重耳夷吾左傳慶父為仲孫氏亦曰孟氏至彘九世叔牙為叔孫氏至舒八世季友為季孫氏至肥八世魯哀公三子世秉魯政左傳論語檀弓云三臣費季氏郈叔孫氏成孟氏自季武子始專國政歷悼平桓子凡四世季文子初得政至桓子五世趙趙衰成子始為卿至襄子無恤七世范士會武子始為卿至昭子吉射五世知荀首莊子始為卿至襄子瑤六世中行荀林父桓子始為卿至文子寅五世魏魏絳莊子始為卿至襄子曼多四世韓韓厥獻子始為卿至簡子不信四世荀家惇惠荀禬文敏欒黶果敢韓無忌鎮靖晉語悼公使四人為公族大夫胥籍狐箕欒郤柏先羊舌董韓晉語文公昭舊族十一族晉之舊姓實掌近官九宗懷姓九宗一姓為九族左傳翊九宗五正頃父之子嘉父逆晉侯于隋注唐叔始封受懷姓九宗職官五正遂世為晉強家知趙韓魏史記世家四卿分范中行故地銅鞮伯華赤叔向肸叔魚鮒叔虎世木季夙左傳同姓五十五武王成康所封數百而同姓五十五史記表兄弟之國十有五人姬姓之國四十人左傳荀子立七十一國姬姓五十三人管蔡郕霍魯衛毛聃郜雍曹滕畢原酆郇文之昭也邗晉應韓武之穆也凡蔣邢茅胙祭周公之胤也左傳富辰云周公封建親戚以藩屏周正義文武周公之子孫為二十六國上古無名號之君周禮小宗伯都宗人注漢郊祀志注九皇上古有人皇者九人春秋命曆序皇伯皇仲皇叔皇季皇少五姓同期俱駕龍號曰五龍泄氏孔氏子人氏左傳僖七年子重子辛皆出穆王左傳子重子反二卿華元華喜昭屈景楚屈原為三閭大夫掌王族三姓曰昭屈景至漢皆徙關中齊王閎燕王旦廣陵王胥史記三王世家武帝同日封三子作策申戒王談平阿商成都立紅陽根曲陽逢時高平成帝舅五人同日封世謂之五侯長君廣國字少君竇氏兄弟崔駰曰竇氏二君以淳淑守道成名呂霍上官王趙丁傅潘嶽西征賦窺七貴於漢廷疇一姓之或在注后族也庾亮曰西京七族東京六姓二竇鄧閻梁何樊郭陰馬漢明帝為四姓小侯之學張文朱武陸忠顧厚世說吳四姓陳桓呂竇公孫司馬徐傅吳録八族陸機吳趨行八族未足侈四姓實名家孔魏虞謝世說會稽孔沈魏顗虞球虞存謝奉並四族之雋范陽盧敏清河崔宗伯滎陽鄭義太原王瓊孝文重門族四姓衣冠所推并趙郡李為五姓趙郡諸李人物尤多世言高華者以五姓為首滎陽鄭岡頭盧澤底李土門崔國史補皆為鼎甲太原王亦四姓之匹甲姓乙姓丙姓丁姓柳芳論得入者謂之四姓後魏隴西李寶太原王瓊滎陽鄭溫范陽盧子遷盧澤盧輔清河崔宗伯崔元孫前燕博陵崔懿晉趙郡李楷唐高宗詔七姓十家不得自為昏先是後魏太和中定四海望族以寶等為冠騶忌騶衍騶奭史記齊有三騶子王導洽珣曇首僧虔揖筠梁王筠與諸子書吾門七葉名德重光爵位相繼人人有集應順子疊疊生郴郴生奉奉生劭劭弟珣珣子瑒璩後漢應四子有才名至瑒七世通顯應奉至亨五葉著作宇文泰安定公廣陵王欣李弼趙公李虎隴西公獨孤信河內公趙貴南陽公于謹常山公侯莫陳崇彭城公西魏八人為柱國號八柱國家稱門閥者咸推八柱國家琅邪西陽汝南南頓彭城晉五王渡江太安之際童謠云五馬浮渡江一馬化為龍元帝自琅邪登大位漢石奮及四子建甲乙慶皆二千石景帝號奮為萬石君嚴延年兄弟五人皆二千石東海號其母曰萬石嚴嫗馮揚八子皆為二千石號為萬石君秦襲與群從同時為二千石者五人三輔號曰萬石秦氏唐張文瓘為侍中四子皆至三品時謂萬石張家三柱唐劉仁軌位將相封樂城縣公子及兄子授上柱國者三人州黨號所居為樂城鄉三柱里三戟唐張儉兄弟三人門皆立戟時號三戟張家李峴峘嶧門列三戟崔琳與弟圭瑤俱列棨戟世號三戟崔家韋陟斌由縚四第同時列戟三喜唐楊敬之兼太常少卿是日二子戎戴登科時號楊家三喜三眷裴氏自晉魏為名族居燕者號東眷居涼者西眷居河東者中眷五代史唐宰相世系表東眷有居道休徹熄冕度西眷有寂矩中眷有光庭遵度樞贄韋氏潛號西眷穆號東眷八院唐裴寬兄弟八人皆擢明經任臺省刺史於東都治第八院相對隴西天水安定北地上郡西河漢六郡良家子選給羽林期門名將多出焉七業晉劉毅有七子各授一經一子授太史公一子授漢書一門之內七業俱興崔孝伯修國史鴻撰十六國春秋後魏宮商角徵羽按堪輿經黃帝對天老始言五姓春秋以陳衛秦為水姓齊衛宋為火姓或所出之祖所分之星所居之地五姓張王為商武庾為羽以音相諧附至柳為宮趙為角則又不然其間一姓而兩屬復姓數字不得所歸呂才卜宅篇始祖為正姓高祖為庶姓禮記大傳注正姓若姜姬庶姓若三桓七穆褎成侯漢平帝封孔均褎亭侯永元四年損徙封宗聖侯魏文帝封孔羡奉聖亭侯晉武帝封孔震崇聖大夫後魏封孔乘崇聖侯孝文封孔珍恭聖侯北齊鄒國公周武帝隋仍舊紹聖侯煬帝改褎聖侯唐貞觀十一年封孔德倫文宣公開元二十七年封孔璲芝衍聖公宋至和二年封孔宗願杞宋詩振鷺箋周封夏殷之後郊特牲天子存二代之後殷紹嘉公漢成帝封孔子世孔吉平帝改宋公周承休公武帝始封姬嘉為周子南君元帝尊為周承休侯成帝進爵為公平帝改鄭公介酅唐以周隋為二王後封酅公武后玄宗以周漢為二王後後復舊酅萊後梁以介公為三恪以酅公唐宗子李嵩為萊國公為二王後氏於國則齊魯秦吳風俗通齊魯宋衛氏於諡則文武成宣氏於官則司馬司徒氏於爵則王孫公孫氏於字則孟孫叔孫氏於居則東門北郭氏於志則三烏五鹿潛夫論青牛白馬氏於事則巫乙匠陶風俗通巫卜唐柳芳論氏族凡氏之興九事號唐虞夏殷諡爵國官字居事職風俗通氏姓篇西陵氏纍祖方雷氏女節彤魚氏嫫母皇甫諡世紀帝嚳四子帝嚳卜其四妃之子皆有天下有邰氏姜原生后稷有娀氏簡狄生契陳鋒氏生帝堯陬訾氏生帝摯大戴禮帝繫五宗景帝子十三人為王而母五人同母者為宗榮德閼干栗餘非端程彭祖勝賈唐越寄乘舜王史記五宗世家穆陸賀劉樓干嵇尉代人魏遷洛有八氏十姓三十六族九十二姓睿宗五子宋申楚玄宗岐薛慶忠棣鄂榮光儀穎永延盛濟唐開元後以十舉全數壽信義陳豐恆涼七王就封亦居十宅長信宮王太后永信宮傅太后中安宮丁姬漢哀帝時興慶宮郭太后義安殿王太后大內蕭太后唐文宗時六人三品崔邠酆郾郇鄯鄲兄弟六人至三品邠郾鄲凡為禮部五吏部再酆司農卿郇大理卿鄯右金吾將軍鄲相宣宗宣宗曰鄲一門孝友可為士族法題曰德星堂京兆民即其里為德星社楚齊吳淮南燕梁淮陽趙代酈寄曰劉氏所立九王楚元王惠人河間獻王智人東平王蒼仁人東海王疆義人文中子注云言四王善紹有惠智仁義土揖庶姓無親者勳賢時揖異姓婚姻甥舅之國天揖同姓兄弟之國周禮司儀東京賦三揖之禮同姓從宗合族屬異姓主名治際會大傳條氏徐氏蕭氏索氏長勺氏尾勺氏六族魯左傳陶氏施氏繁氏錡氏樊氏饑氏終葵氏七族衛左傳有信以名生若唐叔虞有義以德命若文王武王有象以類命若孔子有假取於物若伯魚有類取於父若子同左傳申繻對欒郤胥原狐續慶伯左傳叔向曰注八姓晉舊臣之族伯霜中雪叔熊季紃國語荊子熊嚴生子四人張良大父開地相韓昭侯宣惠王襄哀王父平相釐王悼惠王史記五世謂相五王卞壼二子眕盱忠孝之道萃于一門謝琰二子父子忠孝萃于一門公子騑子駟公子發子國公子嘉子孔公子輒子耳公子蠆子蟜公孫舍之子展左傳襄九年同盟于戲河間獻王德沛獻王輔晉書齊王以兩獻之親弘二南之沛王輔濟南王康東平王蒼中山王焉肅宗詔四王讚皆勿名金張七葉珥貂張安世子孫相繼自宣元以來為侍中中常侍諸曹散騎列挍尉十餘人金日磾世名忠孝七世內侍七世自武至平功名之世唯有金氏張氏左思詩金張七葉珥漢貂陳紀字元方諶字季方太丘長實之子後漢贊曰二方承則韋權孔衡弟瓚孔玉矩孔規三輔決録韋子才三子兄弟孝友逢盜俱死時人號韋三義王元才北平侯益才安喜侯顯才蒲陰侯仲才新市侯季才唐侯水經注王談北平侯不同王莽子興生五子並避亂隱居涿郡故安縣西山其舊居世以為五大夫城光武即位封為五侯所謂中山五王也昭氏屈氏景氏懷氏田氏漢高祖紀九年徙齊楚大族五姓關中夏侯勝建韋順韋豹韋義文高三子號韋氏三君京兆舊事陳實仲弓子紀諶並著高名號三君姜肱字伯淮二弟仲海季江友愛天常常共臥起梁韋放於諸弟雍穆同一室臥起時比之三姜馮野王君卿弟立聖卿相代為上郡太守治行相似吏民歌曰大馮君小馮君兄弟繼踵相因循周公康叔猶二君唐馮宿拱之定介夫方漢二馮二馮梁蕭景再為兗州弟昂來代時人方之馮氏劉之亨代兄之遴為南郡太守武帝曰豈直大馮小馮而巳荀彧文若荀攸公達文中子曰生以救時死以明道唐林子高尊伯高蘇章孺文蘇不韋公先後漢贊曰二蘇徑烈劉辟彊德向慶忌敘傳奕世宗正子政博學三世成名德向歆楊氏四公楊震字伯起震子秉字叔節秉子賜字伯獻賜子彪字文先相繼為三公四世太尉德業相繼贊曰楊氏載德乃世柱國震畏四知秉去三惑賜亦無諱彪誠匪忒孔融曰