body:
  text: 小學紺珠卷七宋王應麟撰氏族類黄帝十二姓姬酉祈已滕葴任荀僖姞儇依晉語黄帝之子二十五宗其得姓者十四人為十二姓注十四人二人為姬二人為已故十二姓以左傳衆仲曰天子建徳因生賜姓胙之土而命之氏祝融八姓已董彭秃妘曹斟芉鄭語虞二妃娥皇女英後漢劉毅曰有虞二妃周室三母二妃堯二女周三母大姜大王之妃大任王季之妃大姒文王之妃崔琦外戚箴周興三母后稷母姜嫄文王母大任武王母大姒並後漢書注十子伯邑考武王管叔鮮周公旦蔡叔度曹叔振鐸成叔武霍叔處康叔封冉季載冉一作𥅆史記武王同母兄弟十人毛詩注大姒十子二虢虢仲虢叔文王弟友國語文王敬二虢七姓十二國晉魯衞鄭曹滕姬姓邾小邾曹姓宋子姓齊姜姓莒已姓杞姒姓薛任姓左傳注云實十三國十六族高陽氏八愷髙辛氏八元左傳文十八年大史克曰十六族世濟其美三叔周魯公伯禽康叔唐叔左傳三者皆叔也而有令徳故昭之以分物遂四族因氏頜氏工婁氏須遂氏左傳莊十七年注四族遂之彊宗鴿烏納反齊二惠公孫竈子雅公孫蠆子尾皆惠公之孫左傳昭二年晏子曰二惠競爽猶可出欒髙二族皆惠公鄭七穆七子鄭穆公十一子子然二子孔三族已亡子羽不為卿故唯言七穆子罕公子喜子展公孫舎之罕氏子駟公子騑子西公孫夏駟氏子國公子發子産公孫僑國氏子良公子去疾伯有良霄良氏子良孫子耳子子游公子偃子大叔游吉游氏子游孫子蟜子子豐子石公孫段豐氏子印伯石印段印氏子印孫子張子左傳襄二十六年叔向曰鄭七穆罕氏其後亡者也子展儉而壹名罕駟國良游豐印七人子孫並有才世任鄭國之政焉子展賦草蟲伯有賦鶉之賁賁子西賦黍苗子産賦隰桑子大叔賦野有蔓草印段賦蟋蟀公孫段賦桑扈二十七年鄭伯享趙武于垂隴子展伯有子西子産子大叔二子石從趙孟曰七子從君以寵武也請皆賦亦以觀七子之志六卿子齹賦野有蔓草子皮子嬰齊子皮罕虎子展子子産賦鄭之羔裘子大叔賦褰裳子游賦風雨駟帶之子駟偃子旗賦有女同車公孫段之子豐施子栁賦蘀兮印段之子印癸左傳昭十六年鄭六卿餞韓宣子於郊宣子曰二三君子請皆賦起亦以知鄭志宋六卿三族皇緩為右師皇非我為大司馬皇懷為司徒靈不緩為左師樂茷為司城樂朱鉏為大司寇三族皇靈樂左傳哀二十六年晉二公子重耳夷吾左傳魯三桓又曰三家三臣慶父為仲孫氏亦曰孟氏至彘九世叔牙為叔孫氏至舒八世季友為季孫氏至肥八世魯哀公三子世秉魯政左傳論語云檀弓三臣三都費季氏郈叔孫氏成孟氏自季武子始專國政歴悼平桓子凡四世季文子初得政至桓子五世晉六族又曰六卿趙趙衰成子始為卿至襄子無恤七世范士㑹武子始為卿至昭子吉射五世知荀首莊子始為卿至襄子瑶六世中行荀林父桓子始為卿至文子寅五世魏魏絳莊子始為卿至襄子曼多四世韓韓厥獻子始為卿至簡子不信四世四公族大夫荀家惇惠荀禬文敏欒黶果敢韓無忌鎮靖晉語悼公使四人為公族大夫十一族胥籍狐箕欒郤柏先羊舌董韓晉語文公昭舊族十一族晉之舊姓實掌近官九宗懷姓九宗一姓為九族左傳翼九宗五正頃父之子嘉父逆晉侯于隨注唐叔始封受懷姓九宗職官五正遂世為晉强家四卿知趙韓魏史記世家四卿分范中行故地羊舌四族銅鞮伯華赤叔向肸叔魚鮒叔虎世本季夙左傳同姓五十五武王成康所封數百而同姓五十五史記表兄弟之國十有五人姬姓之國四十人左傳荀子立七十一國姬姓五十三人二十六國管蔡郕霍魯衞毛聃郜雍曹滕畢原酆郇文之昭也邘晉應韓武之穆也凡蔣郉茅胙祭周公之𦙍也左傳富辰云周公封建親戚以藩屏周正義文武周公之子孫為二十六國九皇六十四氏上古無名號之君周禮小宗伯上都宗人注者漢郊祀志注九皇古有人皇九人皇春秋命歴序皇伯皇仲皇叔皇季少五姓同期俱駕龍號曰五龍鄭三族洩氏孔氏子人氏左傳僖七年楚二穆子重子辛皆出穆王左傳子重子反二卿宋二華華元華喜三閭昭屈景楚屈原為三閭大夫掌王族三姓曰昭屈景至漢皆徙關中漢三王齊王閎燕王旦廣陵王胥史記三王世家武帝同日封三子作䇿申戒五侯王譚平阿商成都立紅陽根曲陽逢時髙平成帝舅五人同日封世謂之五侯竇氏二君長君廣國字少君竇氏兄弟崔駰曰竇氏二君以淳淑守道成名七貴吕霍上官王趙丁傅潘岳西征賦窺七貴於漢廷疇一姓之或在注后族也鄧庾亮曰西京七族東京六姓二竇閻梁何四姓樊郭隂馬漢明帝為四姓小侯之學呉四姓八族張文朱武陸忠顧厚世説呉四姓陳桓吕竇公孫司馬徐傅呉録八族陸機呉趨行八族未足侈四姓實名家㑹稽四族孔魏虞謝世説㑹稽孔沈魏顗虞球虞存謝奉並四族之雋後魏四姓五姓范陽盧敏清河崔宗伯滎陽鄭義太原王瓊孝文重門族四姓衣冠所推髙并趙郡李為五姓趙郡諸李人物尤多世言華者以五姓為首唐四姓滎陽鄭岡頭盧澤底李土門崔國史補皆為鼎甲太原王亦四姓之匹甲姓論乙姓入丙姓之丁姓栁芳得者謂四姓七姓後魏隴西李寳太原王瓊榮陽鄭温范陽盧子遷盧澤盧輔清河崔宗伯崔元孫前燕博陵崔懿晉趙郡李楷唐髙宗詔七姓十家不得自為昏先是後魏太和中定四海望族以寳等為冠三騶子騶忌騶衍騶奭史記齊有三騶子七葉王導洽珣曇首僧䖍揖筠梁王筠與諸子書吾門七葉名徳重光爵位相繼人人有集應順子疊疊生郴郴生奉奉生劭劭弟珣珣子瑒璩後漢應四子有才名至瑒七世通顯應奉至亨五葉著作八柱國宇文泰安定公廣陵王欣李弼趙公李虎隴西公獨孤信河内公趙貴南陽公于謹常山公侯莫陳崇彭城公西魏八人為柱國號八柱國家稱門閥者咸雅八柱國家五馬琅邪西陽汝南南頓彭城晉五王渡江謡太安之際童云五馬浮渡江一馬化為龍元帝自琅邪登大位萬石漢石奮及四子建甲乙慶皆二千石景帝號奮為萬石君嚴延年兄弟五人皆二千石東海號其母曰萬石嚴嫗馮揚八子皆為二千石號為萬石君秦襲與羣從同時為二千石者五人三輔號曰萬石秦氏唐張文瓘為侍中四子皆至三品時謂萬石張家三柱唐劉仁軌位將相封樂城縣公子及兄子授上柱國者三人州黨號所居為樂城鄉三柱里三㦸唐張儉兄弟三人門皆立㦸時號三㦸張家李峴峘嶧門列三㦸崔琳與弟珪瑶俱列棨㦸世號三㦸崔家韋陟斌由縚四第同時列㦸三喜唐楊敬之兼太常少卿是日二子戎戴登科時號楊家三喜三眷裴氏自晉魏為名族居燕者號東眷居涼者西眷居河東者中眷五代史唐宰相世系表東眷有居道有休澈垍冕度西眷寂䞇矩中眷有光庭眷遵度東樞韋氏潛號西穆號眷八院唐裴寛兄弟八人皆擢明經任臺省刺史於東都治第八院相對六郡良家隴西天水安定北地上郡西河漢六郡良家子選給羽林期門名將多出焉七業晉劉毅有七子各授一經一子授太史公一子授漢書一門之内七業俱興一門二史崔孝伯修國史鴻撰十六國春秋後魏五姓宫商角徴羽按堪輿經黄帝對天老始言五姓春秋以陳衞秦為水姓齊衞宋為火姓或所出之祖所分之星所居之地張王為商武庾為羽以音相諧附至栁為宫趙為角則又不然其間一姓而兩屬複姓數字不得所歸吕才卜宅篇始祖為正姓髙祖為庶姓禮記大傳注正姓若姜姬庶姓若三桓七穆孔子後襲封襃成侯漢平帝封孔均襃亭侯永元四年損徙封宗聖侯魏文帝封孔羨奉聖亭侯晉武帝封孔震崇聖大夫後魏封孔乘崇聖侯孝文封孔珍恭聖侯北齊鄒國公周武帝隋仍舊紹聖侯煬帝改襃聖侯唐貞觀十一年封孔徳倫文宣公開元二十七年封孔璲芝衍聖公宋至和二年封孔宗愿二王後杞宋詩振鷺箋子周封夏殷之後郊特牲天存二代之後殷紹嘉公漢成帝封孔子世孔吉平帝改宋公周承休公武帝始封姬嘉為周子南君進元帝尊為周承休侯公成帝爵為公平帝改鄭介酅唐以周隋為二王後封酅公復武后𤣥宗以周漢為二王後後舊酅萊後梁以介公為三恪以酅公唐宗子李崧為萊國公為二王後八氏九亊氏於國則齊魯秦呉風俗通齊魯宋衞氏於諡則文武成宣氏於官則司馬司徒氏於爵則王孫公孫氏於字則孟孫叔孫氏於居則東門北郭氏於志則三烏五鹿潛夫論青牛白馬氏於事則巫乙匠陶風俗通巫卜唐桞芳論氏族凡氏之興九事號唐虞夏殷諡爵國官字居事職風俗通氏姓篇黄帝四妃西陵氏嫘祖方雷氏女節彤魚氏嫫母皇甫謐世紀帝嚳四子帝嚳卜其四妃之子皆有天下有邰氏姜原生后稷有娀氏簡狄生契陳鋒氏生帝堯陬訾氏生帝摰大戴禮帝繫五宗漢景帝子十三人為王而母五人同母者為宗親榮徳閼于栗餘非端程彭祖勝賈發唐越寄乗舜王史記五宗世家八姓後魏穆陸賀劉樓于嵇尉代人魏遷洛有八氏十姓三十六族九十二姓五王宅唐睿宗五子宋申楚𤣥宗岐薛十王宅慶忠棣鄂榮光儀潁永延盛濟唐開元後數以十舉全壽信義陳豐恒涼七王就封亦居十宅三宫長信宫王太后永信宫傅太后中安宫丁姬漢哀帝時興慶宫郭太后義安殿王太后大内蕭太后唐文宗時六人三品唐崔邠酆郾郇鄯鄲兄弟六人至三品邠郾鄲凡為禮部五吏部再酆司農卿郇大理卿鄯右金吾將軍鄲相宣宗宣宗曰鄲一門孝友可為士族法題曰徳星堂京兆民即其里為徳星社劉氏九王漢楚齊呉淮南燕梁淮陽趙代酈寄曰劉氏所立九王四王楚元王惠人河間獻王智人東平王蒼仁人東海王彊義人文中子注云言四王善終有惠智仁義三揖土揖庶姓無親者勲賢時揖異姓婚姻國甥舅之天揖同姓兄弟之國周禮司儀之東京賦三揖禮同姓從宗合族屬異姓主名治際㑹大傳殷民六族七族條氏徐氏蕭氏索氏長勺氏尾勺氏六族魯左傳陶氏施氏繁氏錡氏樊氏饑氏終葵氏七族衞左傳五名有信以名生若唐叔虞有義以徳命若文王武王有象以類命若孔子有假取於物若伯魚有類取於父若子同左傳申繻對晉八姓欒郤胥原狐續慶伯左傳叔向曰注八姓晉舊臣之族荆四子伯霜中雪叔熊季紃國語荆子熊嚴生子四人五世相韓張良大父開地相韓昭侯宣惠王襄哀王父平相釐王悼惠王史記五世謂相五王一門忠孝晉卞壼二子眕盱忠孝之道萃于一門謝琰二子父子忠孝萃于一門鄭六卿公子騑子駟公子發子國公子嘉子孔公子輒子耳公子蠆子蟜公孫舎之子展左傳襄九年同盟于戲兩獻漢河間獻王徳沛獻王輔晉書齊王以兩獻之親𢎞二南之化四王沛王輔濟南王康東平王蒼中山王焉肅宗詔四王讚皆勿名金張七葉珥貂張安世子孫相繼自宣元以來為侍中中常侍諸曹散騎列校尉十餘人金日磾世名忠孝七世内侍七世自武至平功名之世唯有金氏張氏漢左思詩金張藉舊業七葉珥貂二方陳紀字元方諶字季方太邱長寔之子則後漢贊曰二方承三義韋權孔衡弟瓚孔玉矩孔規三輔決録韋子才三子兄弟孝友逢盜俱死時人號韋氏三義中山五王王元才北平侯益才安喜侯顯才蒲隂侯仲才新市侯季才唐侯水經注北平侯王譚不同王莽之政子興生五子並避亂隠居涿郡故安縣西山其舊居世以為五大夫城光武即位封為五侯所謂中山五王也齊楚五姓昭氏屈氏景氏懷氏田氏漢髙祖紀九年徙齊楚大族五姓關中兩夏侯夏侯勝建三君後漢韋順韋豹韋義文髙三子號韋氏三君京兆舊事陳寔仲弓子紀諶並著髙名號三君三姜姜肱字伯淮