body:
  text: 器用類玉雕彤漆素周禮注三鼎黃帝作寶鼎三象天地人漢郊祀志禮祭天子九鼎諸侯七大夫五元士三公羊傳注周有砥厄史記作砨宋有結緑梁有懸黎史記作藜楚有和璞戰國策范睢曰四寶土之所生棠溪墨陽合伯鄧師宛馮龍淵大阿莫耶干將史記索隱晉太康地理志天下寶劍韓為衆桓公之蔥太公之闕文王之録莊周之曶闔閭干將莫耶巨闕辟閭荀子皆古之良劍余車夏胡奴車殷輜輦周司馬法大鳳大芳小輕仙遊芳亭大玉小玉土金石木獸草曲禮天子之六工注殷制典制六材轂輻牙考工記輪人金玉皮木土考工記飭五材注攻木之工七輪輿弓廬匠車梓攻金之工六築治鳧桌段桃攻皮之工五函鮑韗韋裘設色之工五畫繢鐘筐㡆摩之工五玉楖雕矢磬搏埴之工二陶瓬取幹以冬取角以秋絲漆以夏筋膠弓人取六材珠曰切象曰瑳玉曰琢石曰磨木曰刻金曰鏤革曰剝羽曰析周禮大宰注百工飭庀八材爾雅骨謂之切含光承影宵練列子衛孔周其祖得殷帝三寶劍龍淵太阿工市楚風胡子之吳見歐冶干將使作三寶劍楚龍淵韓棱蜀漢文郅壽濟南椎成陳寵後漢肅宗賜尚書三人寶劍自手署其名飛景流采華鋌典論魏文帝為三劍天子諸侯庶人莊子說劍臣有三劍六寶聖能制議百物以輔相國家王足以庇廕嘉穀使無水旱之災龜足以憲臧不珠足以禦火災金足以禦兵亂山林藪澤足以備財用楚語王孫圉曰國之寶而已三鑑以銅為鑑可正衣冠以古為鑑可知興替以人為鑑可明得失唐太宗曰朕常保此三鑑內防已過雜佩珩璜琚瑀衝牙之類詩雜佩以贈之上車以和鸞為節下車以珮玉為度上有雙衡下有雙璜衝牙玭珠以納其間琚瑀以雜之行以采茨趨以肆夏大戴禮天子佩白玉諸侯山玄玉大夫水蒼玉世子瑜玉士瓀玫玉藻上圭下璧南方璋西方琥北方璜東方圭覲禮方明上下四方之神設六玉雙印刻書文六十六字曰正月剛卯既決靈續漢志三席凡侍坐於大司成者遠近間三席可以問文王世子注容三席得指畫相分別也席之制廣三尺三寸所謂函丈也曲禮席間函丈注函容也講問宜相對容丈足以指畫莞藻次桃枝有次列成文蒲熊周禮注五席天子之席五重諸侯之席三重大夫再重禮器三代禮器劉敞著先秦古器記歐陽修著集古録李公麟著古器圖呂大臨著考古圖親得三代之器政和新成禮器制度皆出於此王普云博古圖品之多五十有九數之多五百三十有七領軍衛赤威衛青黑武衛鶩驍衛白左右衛黃唐儀衛志車馬衣服樂器朱戶納陛虎賁百尺斧鉞弓矢秬鬯禮含文嘉韓詩外傳諸侯有德天子錫之大路金路戎路左傳周襄王賜晉文公庭燎之差天子百公五十侯伯子男皆三十禮記郊特牲注刀劍矛戟矢齊語隱五刃注儀刀鄣刀橫刀陌刀純鉤一作鈞湛盧豪曹或曰盤郢魚腸巨闕吳越春秋越歐冶子作五劍白虹紫電辟邪流星青冥百里古今注吳大帝六劍五王帳玄宗友愛於殿中設五幄與諸王更處其中五王未王成器申王成義兄也岐王範薛王業弟也豳王守禮從兄也古帳大帳次帳小次帳小帳五等帳各三是為三部唐六典郊特牲注禮天子外屏諸侯內屏大夫以簾士以帷大翼長十丈中翼九丈六尺小翼九尺文選浮三翼注引越絶書伍子胥水戰兵法金管書忠孝銀管書德行斑竹管書文章梁文帝為湘東王時筆有三品管成侯毛元鋭即墨侯石虛中好時侯褚知白松滋侯易玄光文房四譜文嵩四侯傳象樽周山罍夏著樽殷梁明山賓議祭圖唯有三樽隋志稻米一斗得酒一斗為上尊稷米為中尊粟米為下尊漢書注圭璋璧琮考工記玉人注聘禮曰凡四器者唯其所寶以聘可也圭璋特達瑞也璧琮有加往德也伯雅容七升仲雅六升季雅五升劉表酒爵三典論方言秦晉之郊謂之孟雅也五十矢為束詩束矢其搜注古者一弓百矢周禮大司寇束矢注九和弓材美工巧為之時謂之參均角不勝幹幹不勝筋謂之參均量其力有參均均者三謂之九和考工記六轡六轡在手六轡如濡四馬八轡而言六轡有二轡繫之驂馬內轡納之於觖故在手者惟六轡八鸞鸞在鑣四馬則八鸞詩箋鸞鈴也效鸞鳥之聲鑣乃馬銜也席四端機鑑盥盤楹杖帶履屨觴豆戶牖劍弓矛大戴禮踐阼篇庖羲作琴神農造瑟女媧制簧暴辛為塤倕之和鐘叔之離磬馬融長笛賦六器猶以二皇聖哲黈益六章土之黃其象方天時變火以圜在裳山以章在衣讀為獐水以龍在衣鳥獸蛇在裳華蟲考工記畫繢之事禮運六章注畫繢事也雜四時五色之位以章之古人之象無天地王氏考工記解之曰火山龍畫之於服鳥獸蛇畫之於旗隨侯珠劍寶軒蛇劍玉寶璧受命寶和氏璧周康寶鼎汾上所獲漢郊祀志神爵元年立四祠於未央宮中晉之垂棘魯之璵璠宋之結緑楚之和璞魏文帝書四寶五齊五尊三酒三尊周禮酒正祭祀共五齊三酒以實八尊疏云二節以走一節以趨玉藻君召以三節雙節節度使賜雙旌雙節行則建節樹六纛唐百官志國史志旌節唐天寶中置凡命節度使有司給門旗二旌一節一麾槍二豹尾二偏團方元豐三年改製扇為三等繡雉古者扇編次雉羽尾為之唐開元改為孔雀大朝會陳一百五十六分左右二耜耜廣五寸二耜為耦考工記注古者耜一金兩人人併發之今之耜岐頭兩金后稷始甽田以二耜為耦漢食貨志淳熬淳母讀曰模炮豚炮牂搗珍漬熬肝膋周禮膳夫珍用八物食醫八珍之齊內則泛醴盎緹音體沈周禮酒正辨五齊之名酒人為五齊鬱齊獻酌祼醴齊縮酌朝盎齊涗酌饋凡酒修酌諸臣自酌司尊彝獻讀為莎修直歷反事昔清酒正辨三酒之物酒人為三酒內則清白事昔醙白酒也所九反黍清聘禮皆兩壺注凡酒稻為上黍次之梁次之皆有清白以黍問清白者互相備明三酒六壺也醴酒在室醍酒在堂澄酒在下坊記注三酒尚質不尚味郊特牲注五齊加明水三酒加玄酒清醫於巳反漿酏以支反酒正辨四飲之物水漿醴涼又作䣼醫又作酋酏又作𨠑漿人共王之六飲食醫和王之六飲醴酏漿水醷濫涼也內則亦謂之六飲水漿酒醴酏玉藻夏明水殷醴周酒明堂位五齊之上尊實明水山罍之上尊實明酒唐禮志朝事饋食加邊羞邊周禮邊人掌四邊之實朝事饋食加豆羞豆醢人掌四豆之實天子豆二十六諸公十六諸侯十二上大夫八下大夫六禮器昌本脾析蜃豚拍音博深蒲醢人共五齊注五齊當為齏楚辭注醢醬所和細切為齏醢吐感反螺力禾反蠯蒲佳反蚔魚兔雁同上醢人注鹿兔羊魚唐志掌醢牢鼎九羊牛豕魚臘膚腸胃鮮魚鮮臘陪鼎三膷臐膮周禮膳夫鼎十有二注聘禮飪鼎七無鮮魚鮮臘羞鼎三以實言曰羞以陳言曰陪豕魚臘玉藻三俎祭肺注五俎加羊與其腸胃羊豕魚臘膚少牢禮虞碗夏嶡殷椇周房俎明堂位四代俎牛宜稌羊宜黍豕宜稷犬宜粱雁宜麥魚宜苽周禮食醫和王之六膳春酸木夏苦火秋辛金冬鹹水皆有滑甘土禮運注食醫調以滑甘禮運五味六和十二食周禮凡藥以酸養骨以辛養筋以鹹養脈以苦養氣以滑養竅注以類相類凡食齊視春時溫羹齊視夏時熱醬齊視秋時涼飲齊視冬時寒麋鹿麇醢人注四膏春行羔豚膳膏香牛夏行腒鱐膳膏臊豕一云犬秋行犢麛膳膏腥雞冬行鮮羽膳膏羶羊庖人凡用禽獸張衡東京賦升獻六禽時膳四膏內則注此八物四時肥美為其大盛煎以休廢之膏節其氣也王者平旦食少陽之始晝食太陽之始脯食少陰之始暮食太陰之始凡四飯諸侯三飯卿大夫再飯白虎通天子食時舉樂論語亞飯于三飯繚四飯缺以樂侑食之官魯之樂官蓋凡三飯也上公九獻侯伯七獻子男五獻周禮大儀禮主人酌以獻賓賓酢主人主人又酌以酬賓乃成一獻之禮九獻者九為獻酬而禮始畢左傳正義散鹽煮海成之盬鹽引池化之形鹽掘地出之飴鹽於戎取之周禮鹽人後周四鹽引池而化周官所謂盬鹽也煮海煮井而成周官所謂散鹽也國史志鹽有二虞兩敦音對夏四璉殷六瑚周八簋明堂位魯特牲饋食禮設兩敦黍稷少牢饋食禮上佐食取四敦黍稷夏揭豆殷玉豆周獻豆獻素何反明堂位魯夏盞殷斝周爵明堂位魯特牲饋食禮爵一升觚二升觶三升角四升散五升獻酬酢詩賓之初筵箋云三爵不識禮主人獻賓賓飲而又酢主人主人飲而又酌以酬賓賓則奠之而不舉正義介爵酢爵僎爵僎音遵少儀皆居古注三爵皆飲爵也羊豕膚魚臘少牢饋食禮雍人陳鼎五牛羊豕魚麋漢書五鼎食注羊豕腸胃魚臘聘禮衆人行五鼎士祭三鼎大夫祭五鼎孟子注上大夫八豆八簋六鉶九俎鉶芼牛藿羊苦豕薇公食大夫禮鉶羹器也羊鉶豕鉶少牢饋食禮兩鉶大羹煮肉汁不和盛於登大古之羹鉶羹肉味有菜和盛之鉶羹器詩正義牛修鹿脯田豕脯麋脯麡脯麋鹿田豕麡皆有軒雉兔皆有芼爵鷃蜩范芝栭菱椇棗栗榛柿瓜桃李梅杏柤梨薑桂內則注三十一物皆人君燕食所加庶羞也周禮天子羞用百有二十品記者不能次録房中之羞內羞庶羞詩楚茨注豆謂內羞庶羞也正義有司徹云宰夫羞房中之羞司士羞庶羞注云房中之羞其邊糗餌粉餈其豆酏食糝食庶羞羊臐豕膮皆有胾醢房中之羞內羞也彼大夫賓尚有二羞明天子正祭有二羞有司徹注二羞所以盡歡心內羞在右陰也庶羞在左陽也挑匕今文作枕疏匕儀禮有司徹注此二匕皆有淺升狀如飲槮挑湯堯反或作桃詩注匕所以載鼎實秫稻必齊麴蘗必時湛熾必潔湛子廉反水泉必香陶器必良火齊必得月令仲冬乃命大酋兼用六物注大酋酒官之長於周則酒人古者穫稻而漬米麴至春而為酒孟春食麥羊孟夏食菽雞孟秋食麻犬孟冬食黍彘文選七命云四膳異肴注禮記曰三宥朔月月半以樂宥食周禮大司樂王大食三宥皆令奏鍾鼓注宥猶勸也史記索隱禮祭必立侑以勸尸食至三飯而止每飯有侑一人故曰三侑膳夫王日一舉以樂侑食王制民無菜色然後天子食日舉以樂也禘郊之事則有全蒸全其牲體而升之王公立飫則有房蒸半解其體升之房大俎也謂之房蒸親戚宴饗則有殽蒸升體道節折于俎謂之折俎周語晉隨會聘周定王饗之殽蒸范子私於原公曰此可禮也王曰子弗聞乎享有體薦半解其體而薦之所以示共儉宴有折俎體解節折升之於俎物皆食所以示慈惠禘飫宴三禮公當享卿當宴享設几而不倚爵盈而不飲肴乾而不食宴則相與共食左傳四重釀楚辭大招四酎并熟注舊注以為四器俱熟月令春釀孟夏乃成漢亦以春釀八月乃成九醞三日一釀滿九斛米止南都賦九醞甘醴注魏武上九醞酒奏曰云云廣雅醞投也酒經曰九投膮炙胾醢特牲饋食禮佐食羞庶羞四豆設于左注云上𦿉下𦿉特牲饋食禮兩𦿉執爵拜四人𦿉上佐食下佐食賓長二人少牢禮膷臐膮牛炙醢牛胾醢牛膾羊炙羊胾醢豕炙醢豕胾芥醬魚膾雉兔鶉鷃內則注此上大夫之禮庶羞二十豆公食大夫禮以鷃為鴐六簋簠簋皆一者簋以稷簠以黍用皆二者簋以黍稷簠以稻粱唐禮志易損二簋可用享內方外圓曰簋盛黍稷外方內圓曰簠盛稻粱一斗二升方曰簠圓曰簋納牲詔於庭血毛詔於室羹定詔於堂禮器三詔皆不同位夫人使下大夫勞以二竹簋方器名以竹為之狀如簠而方二竹簋方玄被纁裏有蓋其實棗蒸栗擇兼執之以進聘禮考工記案十二寸棗桌十二列諸侯純九大夫純五夫人以勞諸侯注夫人王后也萬民之食人四釜上三釜中二釜下周禮廩人注謂一月食米也六斗四升曰釜三釜曾子曰吾及親仕三釜而心樂莊子釋文小爾雅云六斗四升曰釜五秉十六斛曰秉五秉合為八十斛論語冉子與之粟五秉注黍稷稻梁詩權輿每食四簋注禮食之盛祭統以四簋黍天子八簋詩伐木陳饋八簋注箋云陳其黍稷為食禮祭統八簋之實注云天子之祭八簋稯禾秉芻缶米聘禮曰十六斗曰庾十庾曰秉秉一百六十斗也四秉曰筥十筥曰稯稯六百四十斛也魯語仲尼曰收田一井出云云注缶庾也十稯曰秅四百秉為一秅秅宅加反五稯為秭二秭而為秅出說文五兩十端也周禮媒氏入幣純帛無過五兩注云必言兩者欲得其配合之名十者象五行十日相成也雜記曰幣帛一束束五兩兩五尋然則每端二丈純側其反依字從系才內宰淳制注天子巡守禮云制幣丈八尺純四咫純謂幅廣制謂正長四種米詩彼疏斯稗箋云疏謂糲米也米之率糲十稗九鑿八侍御七正義云九章粟米之法云粟率五十糲米三十稗二十七鑿二十四侍御二十一言粟五升為糲米三升以下則米漸細故數益少四種之米皆以三約之萬鍾鍾量名受六斛四斗孟子白鹽食鹽黑鹽胡鹽戎鹽赤鹽駮鹽臭鹽馬齒鹽北史李孝伯傳四種非食鹽三風十愆恆舞于宮酣歌于室時謂巫風殉于貨色恆于遊畋時謂淫風侮聖言逆忠直遠耆德比頑童時謂亂風伊訓湯制官刑警于有位言未及之而言謂之躁言及之而不言謂之隱未見顏色而言謂之瞽論語侍於君子有三愆驕樂佚樂宴樂論語損者三樂處尊位而恐不聞其過得志而恐驕聞至道而恐不能行韓詩外傳明王有三懼酒味色高臺陂池戰國策魯君言務德慎言遠佞防姦後魏封軌四戒持酒以禮持才以愚魏管輅左右倫義分辨競爭莊子齊物論總佞諂諛讒賊慝險莊子人有八疵狂矜愚論語古者民有三疾貴而下賤則衆勿惡富能分貧則窮士弗惡知而教愚則童蒙勿惡通鑑外紀李克謂魏文侯三行老老而壯者歸不窮窮而通者積行乎冥冥施乎無報而賢不肖一荀子人有三行勢賄談窮量梁劉峻孝標廣絶交論云利交有五術知時知難知命知退知足宋李繹作五知先生傳言動交進名薛儀著五慎文以自警官行私曲失時悔富不儉用貧時悔藝不少學過時悔見事不學用時悔醉發狂言醒時悔安不將息病時悔寇萊公六悔銘屈巳任運觀行守一忘言省巳存神量味徐鉉保身八戒心口耳目手足唐皮日休六針清公勤明和慎余襄公靖從政六針視聽好學進德崇儉吳充宗室六針上有其六好勝人恥問過騁辨給眩聰明厲威嚴恣彊愎下有其三諂諛顧望畏懦唐陸贄請數對群臣云九弊不去不妄出入不妄語言不妄憂慮倪文節公思三戒孝友讀書謹行勤儉勉齊黃先生斡家訓謹禮法存忠厚親正直勤學問守家業橫浦張先生九成戒子清慎勤呂居仁童蒙訓當官三事勤謹和緩張文孝公觀守官四字莊守精密王介甫守常州呂正獻公告以四言弘大平粹朱文公答呂伯恭書曰四字謹書坐隅不遠復屏山劉先生彥沖多寡易止學記學者有四失教者必知方居其位無其言有其言無其行既得之而又失之地有餘而民不足衆寡均而倍焉雜記君子有五恥為禮而不終中不勝貌華而不實不度而施施而不濟國語秦伯曰幼不肯事長賤不肯事貴不肖不肯事賢荀子人有三不祥有賢而不知知而不用用而不仁說苑晏子曰國有三不祥遊俠遊說遊行荀悅世紀論世有三遊德之賊也僞私放奢荀悅申鑒先屏四患不教而殺謂之虐不戒視成謂之暴慢命致期謂之賊出納之吝謂之有司諭語屏四惡斯可以從政矣言輕則招憂行輕則招辜貌輕則招辱好輕則招淫法言去四輕則可謂之人官怠於宦成病加於少愈禍生於懈惰孝衰於妻子曾子曰察此四者慎終如始仁義使我愛身而後名仁義使我殺身以成名仁義使我身名並全列子昔有昆弟三人游齊魯之間同師而學進仁義之道彼三術相反而同出於儒籧篨戚施僬僥侏儒矇瞍嚚瘖聾聵僮昏國語聾昧頑嚚左傳富辰曰賤妨貴少陵長遠間親新間舊小加大淫破義左傳石碏曰不度德不量力不親親不徵辭不察有罪左傳息犯五不韙而以伐人游言行好惡知名韓文公五針五失一自求安逸靡甘淡泊二不知儒術不悅古道三勝巳者厭佞已者悅四崇好優游耽嗜麴蘗五急於名宦昵近權要柳玭誡子弟交非其人遊戲怠惰動作無儀臨事不恪用度不節呂氏鄉約不修之過治家十事持身以清潔處心以公平勿使婦人預政事擇師教子學未成勿使應科舉處庠序衣服器用皆出中制稱家有無濟恤孤貧謹慶弔之禮無蓄異物珍寶美妾少僕接賓客以和睦待奴婢以寬恕少儀外傳天知神知我知子知漢楊震畏四知持衡彈琴對鏡辭金冰壺文苑英華唐姚元崇五誡志於道德志於功名志於富貴靳裁之曰云云麟金鳳火龜水龍木禮運并白虎為五靈尚書緯五靈王者之嘉瑞左傳序鱗龍蛇屬木三百六十而龍為長羽飛鳥屬火三百六十而鳳為長裸一作倮蛙蚓屬土三百六十而人為長毛獸屬金三百六十而麟為長介龜鱉屬水三百六十而龜為長月令家語馬火乾牛土坤羊火兌豕金坎爾雅曰彘犬金艮爾雅曰狗雞木巽周禮庖人注始養之曰畜將用之曰牲爾雅釋畜獸異名畜是畜養獸是百獸孟子注草食曰芻牛羊穀食曰豢犬豕六擾職方氏豫州五擾並州無雞四擾幽州無雞犬六牲膳夫膳用六牲食醫六膳牧人牧六牲陽祀用騂陰祀用黝小宗伯毛七牲六畜六擾六牲牛曰一元大武豕曰剛鬣羊曰柔毛雞曰翰音犬曰羹獻曲禮牛屬司徒土雞屬宗伯木犬屬司寇金羊屬司馬火庖人注司寇主豕司馬主馬及羊小宗伯注五官奉六牲牛羊豕犬雞左傳五牲不相為用注麋鹿麇狼兔同上六畜五牲注後漢東都賦注麇鹿熊狼野豕服虔注牛羊豕禮記內則國語漢書注三牲具為太牢羊豕曰少牢又曰中牢孝經三牲注太牢也左傳三犧祭天地宗廟之儀夏牲尚黑殷白牡周騂剛明堂位夏牲用玄殷牲用白周牲用騂檀弓麋鹿熊麕野豕兔周禮庖人鄭司農注康成謂有狼無熊熊虎赤羆天鹿辟邪南山豐大特續漢輿服志皇后步搖六獸雁鶉鷃雉鳩鴿庖人鄭司農注羔豚犢麛雉雁鄭康成注黍稯秫稻麻大小豆大小麥大宰九穀鄭司農注康成謂無秫大麥而有粱苽苽雕胡也古今注黍稷稻粱三豆二麥黍稷稻粱禾麻菽麥本草注稻黍大麥小麥大豆小豆粟麻大象賦注稌黍稷粱麥苽膳夫注食醫牛宜稌羊宜黍豕宜稷犬宜粱雁宜麥魚宜苽六粢小宗伯六齍注黍稷稻粱麥苽六者六食六穀之飯食音嗣食醫饎人粢號黍曰薌合粱曰薌萁稷曰明粢稻曰嘉蔬曲禮麻金黍火稷土麥木豆水周禮疾醫五穀荀子序五種漢食貨志五種注春麥夏菽季夏稷秋麻冬黍月令五時食穀稻稷麥豆麻楚辭大招五穀注黍稷菽麥稻職方氏豫州宜五種史記黃帝藝五種月令出五種孟子五穀注四種兗州無菽三種幽州無菽麥五穀五種東方多麥稻西方多麻北方多菽中央多禾莊子計然稷五穀之長一穀不升謂之嗛二穀不升謂之饑三穀不升謂之饉四穀不升謂之康五穀不升謂之大侵穀梁傳黍稷稻梁苽大豆周禮舍人注六者皆有米麻小豆小麥三者無米桃李杏栗棗素問家語孔子曰果屬有六而桃為下魏鄭渾為魏郡太守益樹五果葵藿薤蔥韭素問穀梁傳注家作一園以種五菜疏云五辛之盤大小蒜韭藝薹胡荽歲時廣記庾肩吾詩云五辛盤風上記元日造五辛盤辛所以發五臟之氣故云耳韭菁茆葵芹箈音逮筍周禮醢人注箈箭萌醢人供七菹梁稻菽各二十種為六十疏果之實助穀各二十物理論百穀黍稷稻粱麻麥荏菽雕胡之屬國語周棄播殖百穀注汾水濁宜麻濟水和宜麥河水調宜菽洛水輕利宜禾江水肥宜稻渭水多力宜黍淮南子秬秠穈芑詩生民誕降嘉種箋云后稷以天為巳下此四穀祝鳩鷦鳩雎鳩王鳩鳲鳩鴶鵴爽鳩鷹鶻鳩鶻雕左傳少皞名官西方鷷東方鶅南方翟北方鵗伊洛之南翬同上春扈鳻鶞夏扈竊玄秋扈竊藍冬扈竊黃棘扈竊丹行扈唶唶宵扈嘖嘖桑扈竊脂老扈鷃鷃同上毛貂狐貒貉屬皂柞栗屬山林鱗魚龍屬膏楊柳屬一云當為櫜蓮芡川澤羽翟雉屬核李梅屬丘陵介龜鱉屬莢齊莢王棘屬墳衍裸虎豹貔離屬淺毛者叢萑葦屬原隰周禮大司徒以土會之法辨五地之物生動物植物脂牛羊屬膏豕屬為牲裸虎豹貔離淺毛屬羽鳥屬鱗龍蛇屬為筍簴考工記匠人霣石于宋五記聞聞其磌然視之則石察之則五六鷁退飛過宋都記見也視之則六察之則鷁徐而察之則退飛公羊傳僖十六年穀梁傳君于之於物無所苟而巳石鶂且猶盡其辭而況於人乎故五石六鷁之辭不設則王道不亢矣東方發明南方焦明西方鷫鷞北方幽昌中央鳳皇說文後漢五行志樂葉圖徵說五鳳皆五色為瑞者一為孽者四正月楊二月杏三月李四月桃五月榆六月梓七月楝八月柘九月槐十月檀十一月棗十二月櫟淮南時則訓周禮注鄹子曰春取榆柳之火夏取棗杏之火季夏取桑柘之火秋取柞楢之火冬取槐檀之火古者貨貝五貝為朋詩錫我百朋箋云云正義曰漢食貨志大貝壯貝么貝小貝不成貝為五小貝以上四種各二貝為一朋而不成者不為朋鄭箋言五種之貝相與為朋非總五貝為一朋也漢書注兩貝為朋神龜靈龜攝龜寶龜文龜筮龜山龜澤龜水龜火龜爾雅易十朋之龜馬鄭多取此解之石龜泉龜蔡龜江龜洛龜海龜河龜淮龜旱龜唐六典太卜卜龜九類北斗南辰五星八風二十八宿日月九州王龜史記龜策傳凡八名龜天龜靈屬俯地龜繹屬仰東龜果屬果讀為羸字前弇南龜獵屬後弇西龜靁屬靁力胃反左倪北龜若屬右倪周禮龜人六龜之屬三王之龜金滕注云云正義龜無三代之別卜法有三史記三王不同龜華騮緑耳赤驥白義渠黃踰輸盜驪山子列子周穆王穆天子傳絶地翻耳奔霄超影踰輝超光騰霧挾翼王子年拾遺記穆王御八龍之駿追風白兔躡景奔電飛翮銅爵晨鳧古今注秦始皇名馬七夏駱馬黑鬣殷白馬黑首周黃馬蕃鬣明堂位夏戎事乘驪殷乘翰周乘騵檀弓種玉路戎戎路齊金路道象路田田路駑給宮中之役周禮挍人辨六馬之屬天子十二間馬以種四馬內兩服外兩驂六馬兩驂之外又有兩騑天子之車盛則駕六常則駕四王度記天子駕六諸侯駕四大夫三士二邦國六間馬四種齊道田駑家四間馬二種田駑浮雲赤電絶群逸驃紫燕騮緑螭驄龍子驎駒絶塵西京雜記漢文帝良馬蒲梢龍文魚目汗血漢西域傳四駿馬騰霜白皎雪驄凝露驄縣光驄決波騟飛霞驃發電赤流金𩢍翔麟紫奔虹赤唐骨利幹獻馬取其異者號十子鼠丑牛寅虎卯兔辰龍巳蛇午馬未羊申猴酉雞戍犬亥豕王充論衡物勢論朱鳥玄武青龍白虎曲禮注以此四獸為軍陳象天也薺亭歷菥蓂呂氏春秋孟夏之昔殺三葉獲大麥德枳維大人大人枳維公公枳維卿卿枳維大夫大夫枳維士國枳維都都枳維邑邑枳維家周書小開篇言上下相維遞為藩蔽後漢馮衍賦曰揵六枳而為籬東觀記作八枳頭像天圓也目像日明也背像月偃也翼像風舒也足像地方也尾像緯五色具也口包命不妄鳴也心合度進退精也耳聽達居高明也舌詘伸能變聲也彩色光文采呈也冠矩朱南方行也距鋭鉤武可稱也音激揚聲遠聞也腹文戶不妄納也論語緯雞五德頭戴冠文足傅距武敵在前敢鬥勇見食相呼仁守夜不失時信新序其色中和小前大後死則丘首說文能飛不能過屋能緣不能窮水能游不能渡谷能穴不能掩身能走不能先人說文荀子梧鼠五技而窮蔡雍勸學篇鼫鼠五能不能一技術易釋文鼫鼠五技鼠也本草螻蛄一名鼫鼠虎鹿熊猿鳥後漢華他有五禽之戲當導引草木蟲食穀周禮疾醫注其治合之齊存乎神農子儀之術五藥神農經三品藥三百六十五應周天之數上藥為君養命中藥為臣養性下藥為佐養病本草草木金石穀文選沈休文詩五藥注龍伯芝參成芝燕脂芝夜光芝玉芝後漢馮衍傳注茅君內傳青芝生泰山文選注紫芝一名木芝赤芝生衡山一名丹芝黃芝生嵩山一名金芝白芝生華山一名玉芝黑芝生常山一名玄芝本草經青赤黃白黑紫養生經上藥養命以五石鍊形以六芝延年本草注芝有六色石芝靈芝肉芝沈休文詩注參成木渠建實抱朴子雲芝植根玉岩水芝芙蕖土芝甘瓜稽含瓜賦天子以鬯諸侯以薰大夫以蘭芝士以蕭庶人以艾王度記景星慶雲為大瑞名物六十有四白狼赤兔為上瑞名物三十有八蒼鳥朱雁為中瑞名物三十有二嘉禾芝草木連理為下瑞名物十四唐志芻化為禾鳳皇神龍曆草禽五色白烏神禾箑脯景星甘露述異記堯時十瑞井里之璞大山之器車唐叔異畝之禾子華子周日正薦所以為祥者三東方有比目魚鰈南方有比翼鳥鶼鶼西方有比肩獸蟨與邛邛岠虛記北方有比肩民中有枳首蛇爾雅赤者鳳黃者鵷雛青者鸞紫者鸑鷟白者鵠後漢蔡衡對象鳳者五戎田駑周禮馬質馬量三物良戎田駑詩駉注諸侯六間馬四種馬三物四種千駟馬八尺以上為龍七尺以上為騋六尺以上為馬庾人千駟四千匹論語注保樂甘露南普潤北普潤歧陽太平宜祿安定唐馬七十萬六千置八坊歧豳涇寧間凡監四十有八鵰鶻鷂鷹狗唐間廄使押五坊以供時狩飛黃吉良龍媒騊駼駃騠天苑隋左右六間飛龍祥麟鳳苑鵷鸞吉良六群唐武后置仗內六間亦號六廄西域貢馬羌溫溪心良馬西番駿馬蘇文忠公三馬圖贊臨江之麋黔之驢永某氏之鼠柳子厚三戒東方弧以梧牲以雞南方弧以柳牲以狗中央弧以桑牲以牛西方弧以㯤牲以羊北方弧以棗牲以彘賈誼書太子生懸弧之禮三槐九棘面三槐三公位焉槐之言懷也懷來人於此欲與之謀左九棘孤卿大夫位焉右九棘公侯伯子男位焉取其赤心而外刺周禮朝士外朝之法五柳先生晉陶潛七松處士唐鄭薰蓂十五莢堯為天子蓂莢生於庭為帝成曆田俅子始一日生一莢至月半生十五莢十六日落一莢至晦日而盡小月則一莢厭不落文選注朱草十五葉朱草日生一葉至十五日生十五葉十六日一葉落終而復始大戴禮明堂篇梧桐十二葉梧桐生十二葉一邊六葉從下數一葉為一月有閏十三葉遁甲經荊桃今櫻桃冬桃子冬熟榹桃實似桃而小爾雅潘嶽閒居賦三桃表櫻胡之別鋤粟民相助作一井之中所出九夫之稅粟屋粟民有田不耕所罰閒粟間民無職事者所出周禮旅師注興積謂三者之粟豕犬雞詩何人斯出此三物以詛爾斯注歲食美好志行商子農商官三官生蝨官者六成俗兵必大敗間客白鷴雪客鷺仙客鶴南客孔雀隴客鸚鵡李文正公昉五禽以客名說苑蟬五德頭上有緌文也含氣飲露清也黍稷不食廉也處不巢居儉也應候守節信也陸雲寒蟬賦序春占後左夏占前左秋占前右冬占後右中庸見乎蓍龜動乎四體注謂龜之四足蓍百莖蓍生滿百莖者其下必有神龜守之其上常有雲氣覆之史記上有叢蓍下有伏龜淮南子生千歲三百莖易以為數天子九尺諸侯七尺大夫五尺士三尺說文蓍百年一本生百莖洪範五行傳七十歲生一莖七百歲生十莖神靈之物故生遲論衡易釋文乾為馬健坤為牛順震為龍善動巽為雞善伏坎為豕質躁而外汙離為雉質野而外明艮為狗前剛而止物兌為羊內很而外說易說卦以物擬八卦時乘六龍以御天乾龍者物之能動者也不稱乾馬而稱震龍震動也乾之動自震始乾爻謂之六龍而三四獨稱君子九三上不在天下不在田故以君子言之九四上不在天下不在田中不在人故或之爻曰或文言曰君子示兼之也四馬曰乘易釋文凡卦爻稱馬者皆是陰爻屯三陰皆為乘馬賁六四為白馬晉下三爻為錫馬明夷六三渙初六皆為拯馬中孚三與四為正馬無非陰爻大畜九三特舉乾之本象稱為良馬可見它馬皆陰也論語陳文子有馬千乘注四千匹十二粟春分而禾生日夏至晷景可度禾有秒秋分而秒定律數十二秒而當一分十分而寸其以為重十二粟為一分十二分為一銖說文始於粟生於苗成於穟淮南子夫子見禾之三變五總龜龜千年五聚問無不知唐殷踐猷博學賀知章號為五總龜熊當中虎居上鹿在下雕雉猿居右雁兔魚居左歐陽文忠公九射格其物九為一大侯而寓以八侯蟲不犯境化及鳥獸豎子有仁心後漢魯恭中牟令
