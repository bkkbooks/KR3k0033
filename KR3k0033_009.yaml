body:
  text: 制度類公執桓圭九寸侯執信音身圭伯執躬圭各七寸子執穀璧男執蒲璧各五寸舜典輯五瑞注公侯伯子男之瑞圭璧修五禮五玉三帛五玉即五瑞如五器注謂圭璧五玉禮終復還諸侯以物言曰玉以寶言曰瑞以形言曰器周禮大行人上公執桓圭九寸諸侯執信圭七寸諸伯執躬圭諸子執穀璧五寸諸男執蒲璧大國之孤執皮帛以繼小國之君王執鎮圭下同五瑞周禮大宗伯以玉作六瑞以等邦國小行人成六瑞諸侯世子執纁公之孤執玄附庸之君執黃舜典注高陽氏之後用赤繒高辛氏之後用黑繒其餘用白繒鄭氏注玉帛楚語注明絜為精周禮大祝注幣號玉云嘉玉幣云量幣孤執皮帛卿執羔大夫執雁二生士執雉一死庶人執鶩音木工商執雞大宗伯以禽作六摯以等諸臣曲禮凡摯天子鬯諸侯圭卿羔大夫雁士雉庶人之摯匹婦人之摯椇榛脯脩棗栗蒼璧天黃琮地青圭東赤璋南白琥西玄璜北大宗伯以玉作六器以禮天地四方圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼小行人合六幣九鼎禹收九牧之金鑄九鼎象九州漢郊祀志武王克商遷九鼎于雒邑左傳小球尺二寸之鎮圭大球三尺之珽商頌正義天子所服所守唯此二玉十二章天子九章公侯自山而下七章伯自華蟲而下五章子男自藻而下三章卿大夫自粉米而下書皋陶謨鄭康成注日一月二星辰三山四龍五華蟲六雉六者繪之於衣宗彝七虎蜼藻八水草火九粉米十說文作黺𪓋黼十一白與黑黻十二黑與青六者繡之於裳書益稷鄭康成說衣之六章其序上而下裳之六章其序自下而上山一龍二華三蟲四藻五火六粉米七黼八黻九左傳杜牧注以華蟲為二龍一山二華蟲三火四宗彝五衣畫以為繢登龍於山登火於宗彝藻六粉米七黼八黻九裳稀以為繡周禮司服注周制以日月星辰畫於旂而袞冕九章以龍為首鷩冕七章華蟲為首毳冕五章虎蜼為首希冕三章玄冕一章冕服六大裘至玄冕弁服三韋弁文弁冠弁周禮屨人注王吉服有九舄有三等大裘袞鷩毳希又作絺玄司服弁師言五冕大裘之冕無旒不聯數六服同冕者首飾尊也公自袞而下侯伯自鷩而下子男自毳而下孤自希而下卿大夫自玄而下禕衣玄揄狄青音搖闕狄赤鞠衣黃展白張彥反綠衣黑吐亂反內司服狄當為翟雉名三翟褘衣畫翬揄翟畫搖闕翟刻而不畫三者皆祭服皮弁素積玄衣素裳緇衣玄端三禮義宗吉服并六冕有九赤舄為上冕服之舄白舄韋弁皮弁黑舄冠弁后玄舄為上禕衣之舄青舄赤舄鞠衣以下皆屨屨人注複下曰舄襌下曰屨始加緇布冠次加皮弁次加爵弁士冠禮冠義三加彌尊諭其志也大戴禮記公冠篇云公冠四加玄冕南齊志青東白西赤南黑北玄天黃地左傳鄭子大叔曰為九文六采五章以奉五色考工記畫績之事六色繢以為衣雜用天地四方之色青與白赤與黑玄與黃皆相次謂之六色青與赤文赤與白章白與黑黼黑與青黻五色備繡左傳考工記畫繢之事繡以為裳袂圜以應規曲袷如矩以應方負繩及踝以應直下齊如權衡以應平禮記深衣五法巳施故聖人服之韋弁兵事皮弁眂朝冠弁田獵周禮司服虞韍夏山殷火周龍章明堂位魯夏毋音牟追多雷反殷章甫周委貌夏收殷冔周弁郊特牲虞皇夏收殷冔周冕王制春獻冠幘縰為首服紈素為冬服輕綃為夏服漢元帝罷齊三服官袞冕鷩冕毳冕絺冕玄冕平冕爵弁武弁弁服進賢冠遠遊冠法冠高山冠委貌冠卻非冠平巾幘黑介幘介幘平紗綠幘具服從省服唐志春服蒼玉夏服赤玉季夏服黃玉秋服白玉冬服玄玉月令謂冠飾及所佩之衡璜弘璧琬琰大玉夷玉天球書顧命玉五重玉建太常金建大旂象建大赤革建大白木建大麾周禮巾車王之五路書大輅玉輅也綴輅金輅也先輅木輅也次路象輅革輅也以月令春乘鸞路夏乘朱路季夏乘大路秋乘戎路冬乘玄路法五時輅重翟厭翟於涉反安車翟車輦車巾車重翟厭翟翟車安車四望金根唐皇后之五車六虞鸞車夏鉤車殷大路周乘路明堂位行夏之時乘殷之輅木輅服周之冕樂則韶舞論語水乘舟陸乘車泥乘輴史記作毳昌芮反漢書作橇音蕝尸子作絕說文澤行乘山乘樏力追反史記作橋一作檋漢書作梮說文作欙書注戎路廣車闕車苹車輕車周禮車僕軫戈人殳戟酋矛考工記車有六等之數兵車也五兵與人也廬人六建既備千乘車一乘甲士步卒合七十五人馬氏之說八百家出車一乘包氏之說八十家出車一乘論語或問疑馬氏為可據千乘大國之賦成方十里出革車一乘甲士三人左持弓右持矛中人御步卒七十二人將重車者二十五人詩集傳千乘之地三百十六里有奇車千乘法當用十萬人為步卒者七萬二千人大國三軍為車三百七十五乘三萬七千五百人其為步卒不過二萬七千人坊記制國不過千乘都城不過百雉家富不過百乘注古者方十里其中六十四井出兵車一乘夏鉤車先正殷寅車先疾周元戎先良司馬法詩元戎十乘注大駕法駕小駕後漢志三駕鹵簿隋志梁三駕法天二仗法地槊仗隊仗青赤黃白黑立安車合十乘漢制坐乘者安車倚乘者立車指南記里鼓白鷺鸞旗辟惡宋改崇德皮軒耕根安車四望宋改明遠羊車黃鉞豹尾唐虎山國用人土國用龍澤國用以金為之旌道路用符門關用管都鄙用以竹為之周禮小行人達六節日月為常王交龍為旂諸侯青龍通帛為旜孤卿雜帛為物大夫士熊虎為旗師都鳥隼為旟州里朱雀龜蛇為旐縣鄙玄武全羽為旞道車析羽為旌斿車司常掌九旗東曰旗西曰典南曰獵北曰旂中央曰常黃帝五旗河圖虞旂夏綏當為緌殷大白周大赤明堂位注虞緌夏旂日晝行月夜行龍行水虎行林鳥行陂蛇行澤鵲行陸狼行山韟韜也載食而駕管子兵法九章著明青鍾大音赤鍾重心黃鍾洒光景鍾昧其明黑鍾隱其常管子黃帝作五鍾雲門大卷大咸大磬大夏大濩大武周禮大司樂以樂舞教國子以六舞大合樂明堂位朱于玉戚冕而舞大武周舞皮弁素積裼而舞大夏夏舞大胥以六樂之會正舞位帗舞音拂羽舞皇舞故書作䍿旄舞干舞人舞樂師教國子小舞內則曰十三舞勺成童舞象二十舞大夏四方以羽宗廟以人山川以于旱暵以皇社稷以帗辟雍以旄漢禮樂志周官國子習六舞雅萬舞南籥詩鼓鍾箋三舞不僭二體舞者有文武左傳文始舞本舜招舞高祖更名五行舞本周舞秦始皇更名四時孝文作漢樂志諸帝廟常奏文始四時五行舞八佾佾舞列也天子八諸侯六大夫四士二每佾人數如其佾數論語注左傳服虔注天子八八諸侯六八大夫四八士二八劉原父曰士無舞榖梁傳舞夏天子八佾諸公六佾諸侯四佾文舞羽籥武舞干戚書舞干羽于兩階伏羲扶來立基神農扶持下謀祝融屬續孝經緯黃帝咸池少昊九淵顓頊六莖樂緯五莖帝嚳五英樂緯六英堯大章舜招讀曰韶禹夏湯濩武王武周公勺漢志周存六代之樂至秦唯韶武二樂存莊子云文王有辟雍之樂武王周公作武淮南子周武象拊搏玉磬揩擊揩居反大琴大瑟中琴小瑟明堂位魯東方𩎟南方任西方株離北方禁周禮韙鞻氏掌四夷之樂注四夷樂東夷曰昧南夷曰南西夷曰侏離北方禁毛詩傳南夷曰兜西夷曰禁北方曰昧東夷曰離白虎通班固東都賦禁作伶昧作侏雷鼓八面祀靈鼓六面祭路鼓四面享鼖鼓軍鼛鼓役晉鼓金鼓周禮鼓人夏足鼓殷楹鼓周縣鼓明堂位魯三代鼓錞和鐲節鐃止鐸通周禮鼓人七德本秦王破陣樂武舞九功本功成慶善樂文舞上元高宗作樂志金三鏄鐘編鐘石一磬絲四琴瑟筑箏竹三簫篪笛匏二笙竽土一塤革五建鼓靈鼓靈鼗雷鼓雷鼗路鼓路鼗節鼓木二柷敔隋志始而北出再成而滅商三成而南四成而南國是彊五成而分周公左召公右六成復綴以崇綴丁劣反樂記注每奏武曲一終為一成鞉鼓椌楬壎篪樂記比六者德音之音也注以其聲質椌楬謂柷敔控苦江反楬苦瞎反左右五鐘天子將出撞黃鐘之鐘右五鐘皆應入則撞蕤賓之鐘左五鐘皆應尚書傳右五鐘林鐘至應鐘右陰主靜左五鐘大呂至中呂左陽主動牘應雅周禮笙師注三器大夏大護大武正德武德山雲隋志後周武帝造山雲舞以備六代王朴樂太高李照樂太重胡瑗阮逸樂弇鬱劉几請下王朴三律鎛鐘編鐘歌鐘錞鐃鐲鐸金大磬編磬歌磬石壎嘂土雷鼓靈鼓路鼓建鼓鼗鼓縣鼓節鼓拊鼓革琴瑟頌瑟阮咸筑絲柷敔雅應木笙竽巢和匏簫管篪笛舂牘竹唐樂志樂六變凡六樂一變致羽物及川澤之示再變致臝物及山林之示三變致鱗物及丘陵之示四變致毛物及墳衍之示五變致介物及土示六變致象物及天神大司樂樂八變樂六變天神皆降樂八變地示皆出樂九變人鬼皆得而禮同上節奏俱備謂之成備而更新謂之變三禮義宗樂九變者舞九終八變者舞八終六變者舞六終縵樂燕樂磬師注二樂皇帝行璽之璽信璽天子行璽之璽信璽秦制也八璽皆玉為之神璽受命璽餘同前武后改諸璽皆為寶中宗復為璽開元復為寶鎮國受命定命併六璽為九寶雞鳥斝音稼黃虎蜼音誄周禮司尊彝掌六彝小宗伯辨六彝夏雞夷讀為彝殷斝周黃目明堂位灌尊魯有三代灌尊及勺夏龍勺殷疏勺周蒲勺獻音犧象著直略反壺大音泰山司尊彝掌六尊小宗伯辨六尊泰虞山罍夏著殷犧象周明堂位魯四代尊虛則欹中則正滿則覆荀子日月星辰周禮小宗伯注兆日於東郊兆月與風師於西郊兆司中司命於南郊兆雨師於北郊日月星海大宗伯鄭司農注五嶽四鎮四瀆鄭康成注魯三望泰山河海公羊傳海岱淮穀梁傳注四望分野之星國中山川左傳注皆因郊而望祭三昭三穆太祖之廟王制書七世之廟可以觀德祭法王立七廟穀梁傳天子七廟諸侯五大夫三士二禮器云士一荀子曰有天下者事七世夏五廟禹二昭二穆殷六廟契湯二昭二穆周后稷文王武王親廟四漢韋玄成議晉宋齊梁皆立親廟周捨論云晉宋齊梁立七廟肆他歷反獻祼饋食祠春禴夏爾雅作礿嘗秋烝冬周禮大宗伯春礿夏禘秋嘗冬烝王制夏殷祭名祭統祭有四時祭義春禘秋嘗夏殷禮爾雅春祭曰祠夏祭曰礿秋祭曰嘗冬祭曰烝詩正義周公制禮改夏為禴禘為大祭先嗇司嗇農郵表畷貓虎坊水庸昆蟲禮記郊特牲王肅分貓虎為二無昆蟲橫渠先生曰百種八也昆蟲是為害者不常祭句芒重木正蓐收該金正玄冥修熙水正祝融犁一作黎火正后土句龍土正左傳蔡墨對五祀大宗伯五祀注五官之神門秋行冬戶春竈夏中霤中央季夏月令曲禮注周禮小祝注司命中霤門行厲王制大夫祭五祀注門井戶竈中霤白虎通漢郊祀志後漢祭祀志注太玄淮南子唐月令冬祀井不祀行禘郊宗祖報國語展禽曰此五者國之典祀司命春中霤季夏國門秋國行冬泰厲秋戶春竈夏祭法諸侯五祀曰公厲無戶竈大夫三祀曰族厲門行六宗在天地四方六者之間助陰陽變化實一而名六宗大小夏侯說歐陽說在天地四方之中為上下四方之宗後漢立祀從李郃議乾坤六子水火風雷山澤孔光劉歆說王莽立祠魏王肅亦以為易六子故不廢顏師古曰乾坤六子其最通乎天地間遊神孟康說天地四時馬融說天宗三日月星地宗三河海岱賈逵說星五緯辰十二次司中司命文昌第四第五星風師箕雨師畢鄭康成說天宗日月星辰寒暑之屬地宗社稷五祀之屬四方之宗四時五帝之屬司馬彪說三昭三穆張髦說孔氏說見天類書舜典禋于六宗先儒有丸說太極沖和之氣為六氣之宗魏劉邵議王氏程氏從之天皇大帝及五帝後漢孝文曰祭帝故稱禋通典取其說