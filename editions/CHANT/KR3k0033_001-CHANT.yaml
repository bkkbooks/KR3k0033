body:
  text: 天道類天地易繫辭易有太極是生兩儀正義云太極謂天地未分之前元氣混而為一老子云道生一是也混元既分即有天地老子云一生二也兩儀謂兩體容儀周子太極圖云無極而太極動而生陽動極而靜靜而生陰靜極復動一動一靜互為其根分陰分陽兩儀立焉此以陰陽為兩儀易本義云兩儀者始為一畫以分陰陽天地人易繫辭易之為書也廣大悉備有天道焉有人道焉有地道焉兼三材而兩之故六說卦立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦繫辭六爻之動三極之道也注三極三才也王肅云陰陽柔剛仁義為三極三極之道三才極至之理太玄經三儀同科三靈天地人之神道大天大地大王亦大老子域中有四大而王居一焉太易未見氣太初氣之始太始形之始太素質之始列子天無私覆地無私載日月無私照禮記孔子閒居奉三無私以勞天下中央鈞天東方蒼天一說昊東北變天北方玄天西北幽天西方昊天一說成呂氏春秋顥漢志注浩西南朱天南方炎天一說赤東南陽天淮南子天有九野廣雅九天東方皞天南方赤天西方成天餘同漢書郊祀志注東北昊天爾雅春為蒼天夏為昊天秋為旼天冬為上天離騷經指九天以為正周禮疏尚書說云天有五號尊而君之則曰皇天元氣廣大則稱昊天仁覆慜下則稱旼天自上監下則稱上天據遠視之則稱蒼天楚辭天問圜則九重注九陽數之極所謂九天中天羨天從天更天睟天廓天減天沈天成天太玄九天皆玄首為天名八十一首周九天青帝靈威仰赤帝赤熛怒黃帝含樞紐白帝白招拒黑帝汁音叶光紀周禮小宗伯兆五帝於四郊注大宗伯祀昊天上帝注以為天皇大帝者北辰耀魄寶也六天之說出於緯書唐顯慶二年黜鄭玄說日月五星書舜典在璿璣玉衡以齊七政七者運行於天有遲有速有順有逆猶人君之有政事也後漢曆志日月五緯各有終原而七元生焉史記曆書云七正天地人四時尚書大傳日月星漢書注史記天官書三光者陰陽之精後漢贊曰三精揚雄挍獵賦曰三靈書益稷注日月星為三辰周禮掌三辰之法注云日月星辰左傳三辰旂旗昭其明也注云日月星國語帝嚳能序三辰以固民注日月星大火伐北辰禮記鄉飲酒義紀之以日月參之以三光注日月斗漢書三統歷譜三辰之合於三統也日合於天統月合於地統斗合於人統日陽離月陰坎張衡思玄賦二紀五緯注二紀日月日行遲一日行一度一歲一周天月行速一日行天十二度十九分度之七計二十九日過半巳行天一周傅長虞詩二離四時祭法泰昭寒暑坎壇日王宮孔叢郊宮月夜明星幽宗水旱雩宗書舜典禋于六宗孔氏傳孔叢子王肅同蘇氏取其說星辰司中司命風師雨師鄭玄說後魏高閭曰議者不同凡十一家歲日月星辰歷數書洪範協用五紀注歲者序四時也月者定晦朔也日者正躔度也星經星緯星也辰日月所會十二次也歷數者步占之法所以紀歲日月星辰也歲東方木春仁貌熒惑南方火夏禮視太白西方金秋義言辰北方水冬知聽填中央土季夏信思緯星五行之精五星合於五行角亢氐房心尾箕七十五度東方蒼龍斗牛女虛危室璧九十八度四分度之一北方玄武奎婁胃昴畢觜參八十度西方白虎井鬼柳星張翼軫百十二度南方朱雀周禮二十有八星之位左傳天以七紀注二十八宿面七經星不動周天三百六十五度四分一柝木燕寅幽大火宋卯正東豫又曰大辰壽星鄭辰兗東方三辰鶉尾楚巳荊鶉火周午正南三河鶉首秦未雍南方三辰實沈晉申益大梁趙酉正西冀降婁魯戊齊西方三辰娵訾衛亥并又曰豕章玄枵齊子正北青星紀吳越丑揚北方三辰日月一歲十一會故有十二次至其初為節至其中為中氣天有十二次日月之所躔也地有十二分王侯之所國也周禮保章氏以星土辨九州之地在天為十二辰十二次在地為十二國十二州史記曰十二度上垣太微十星中垣紫微十五星下垣天市二十二星三垣四十七星中一百四十八星外一百三十三星東宮蒼龍南宮朱鳥西宮白虎北宮玄武二十八舍一百六十八星四宮二百八座一千一百三十六星天樞天日秦琁地月楚璣人火梁權時土吳玉衡音水燕開陽律木趙搖光星金齊天官書注一至四為魁五至七為杓其二陰星不見魁衡杓謂之斗綱如建寅之月昏則杓指寅夜半衡指寅平旦魁指寅他月倣此雨木肅春暘金乂秋燠火皙夏寒水謀冬風土聖鄭康成說書洪範念用庶徵在天為五行在人為五事修則休徵各以其類應之五事失則咎徵各以其類應之史記五是來備荀爽曰五韙咸備韙是也吳仁傑云雨水暘火燠木寒金蘇子由云雨土暘金燠木寒水風火艮為條一作融風立春匏大呂大簇震為明庶風春分竹圜鍾巽為清明風立夏木姑洗中呂離為景風夏至絲蕤賓坤為涼風立秋土函鍾夷則兌為閶闔風秋分金南呂乾為不周風立冬石無射應鍾坎為廣莫風冬至革黃鍾樂記八風從律而不姦左傳舞所以節八音而行八風服虔注八卦之風淮南子注條為笙明庶為管清明為柷景為絃涼為塤閶闔為鐘不周為磬廣莫為鼓爾雅南風謂之凱風東風謂之谷風北風謂之涼風西風謂之泰風東北炎艮東滔震東南熏巽南巨離西南淒坤西飂兌西北厲乾北寒坎呂氏春秋震離坎兌四方乾坤艮巽四維四維之風各主兩月周禮保章氏以十有二風察天地之和總義云八風每風行於兩月之間各得四十五日有奇如八卦之分直四時亦然以十二月言之亦曰十有二風王氏曰風之生於十二辰之位者四維之風兼於其月艮為條風而立春亦曰條風巽為清明而立夏亦曰清明風坤為涼風而立秋亦曰涼風乾為不周風而立冬亦曰不周風故八風變而言之又謂十二風陰金寒陽不變燠風土雨木晦水明火暘左傳天有六氣降生五味發為五色徵為五聲注金辛白商木酸青角水鹹黑羽火苦赤徵土甘黃宮又素問以寒暑燥溼風火為陰陽之六氣平旦為朝霞日中為正陽日入為飛泉夜半為沆瀣天玄地黃莊子御六氣之辯注馮衍賦飲六醴之清液注蓋六氣也楚辭遠遊飱六氣而飲沆瀣漱正陽而含朝霞注陵陽子明經春食朝霞日始欲出赤黃氣秋食淪陰日沒以後赤黃氣冬蝕沆瀣北方夜半氣夏食正陽南方日中氣并天地玄黃之氣為六氣歲歲星時四時日十日月十二月星二十八宿辰十二辰左傳伯瑕曰六物不同詩我辰安在箋云辰謂六物之吉凶祲陰陽氣相侵象陰柔附日凝結成象鑴日旁氣刺日許規切監陰氣抱日如冠珥闇陰氣閉日方晝而闇瞢陰氣蒙蔽日光瞢然彌氣貫日敘陰氣不常以敘而至隮虹也想雜氣有似可形想周禮眡祲掌十煇之法注煇日之光氣也音運夏至景尺五寸日南陸躔東井景短多暑冬至景丈三尺日北陸躔牽牛景長多寒春分秋分景七尺三寸六分春分日西陸躔婁景朝多陰秋分日東陸躔角景夕多風周禮說青為蟲白為喪赤為兵荒黑為水黃為豐保章氏五雲之物左傳黃帝以雲紀雲師雲名應劭曰春官為青雲夏官為縉雲秋官為白雲冬官為黑雲中官為黃雲日中星鳥春分南方朱鳥七宿之鶉火昏中日永星火夏至東方蒼龍七宿之大火昏中宵中星虛秋分北方玄武七宿之虛星昏中日短星昴冬至西方白虎七宿之昴宿昏中堯典朱文公說孔氏正義云四方中星總謂二十八宿或以象言鳥也或以次言火也或以星言虛昴也黃道一中青道二東赤道二南白道二西黑道二北月令正義鄭康成注考靈耀日有九道漢天文志日有中道月有九行中道者黃道一曰光道續漢曆志日舒月速當其同謂之合朔近一遠二謂之弦衡分天中謂之望光盡體伏謂之晦泰階六符三台謂之泰階兩兩成體三台故六觀色以知吉凶故曰符漢藝文志東方朔陳泰階六符注六星之符驗上階為天子中階為諸侯公卿大夫下階為士庶人天地人之正道書甘誓怠棄三正注蘇氏謂子丑寅之正辰以紀日宿以紀月日以紀德月以紀刑春以紀生夏以紀長秋以紀殺冬以紀藏歲以紀終周書歲月日星辰周語五位武王伐殷歲在鶉火張月在天駟房日在析木之津箕辰在斗柄星在天黿辰星玄枵甘氏齊甘德石氏魏石申夫巫咸殷晉志二百八十三官一千四百六十四星太一星大蓬坎水白攝提天內坤土黑軒轅天衝震木碧招搖天輔巽木綠天符天禽坤土黃青龍天心乾金白咸池天柱兌金赤太陰天任艮土白天一天英離火紫唐會要黃帝九宮經星經曰太一下行八卦之宮每四乃還於中央素問太始天元冊文九星注天蓬至天英易乾鑿度鄭玄注太一行九宮始於坎坤震巽中央乾兌艮終於離以陽出以陰入陽起於子陰起於午張衡曰聖人明天數審律曆重之以卜筮雜之以九宮孟春陬訾日在營室仲春降婁日在奎季春大梁日在胃孟夏實沈日在畢仲夏鶉首日在東井季夏鶉火日在柳孟秋鶉尾日在翼仲秋壽星日在角季秋大火日在房孟冬析木日在尾仲冬星紀日在斗季冬玄枵日在婺女月令注日月十二會孟春昏參旦尾仲春昏弧旦建星季春昏七星旦牽牛孟夏昏翼旦婺女仲夏昏亢旦危季夏昏火旦奎孟秋昏建星旦畢仲秋昏牽牛旦觜觿季秋昏虛旦柳孟冬昏危旦七星仲冬昏東璧旦軫季冬昏婁旦氐月令弧近井建近斗陳用之曰月令舉月本書舉月中朱文公曰堯時星中於午月令差於未唐一行所謂歲差方氏曰書言分至之所中月令言昏旦之所中六合儀三辰儀四遊儀唐李淳風為渾天儀表裏三重上將次將貴相司命司中司祿天官書景星周伯含譽格澤歸邪天保乾象新書至道儀在刻漏所韓顯符皇祐儀在天文院舒易簡熙寧儀在太史局沈括元祐儀在合臺蘇頌北戒南戒唐天文志一行以為天下山河之象存乎兩戒觀兩戒之象與雲漢之所始終而分野可知矣北戒北紀以限戎狄南戒南紀以限蠻夷星傳謂北戒為胡門南戒為越門四表二十八宿之外上下東西各萬五千里是為四遊之極謂之四表月令正義月三五而盈朔始與日合三日而明生八日而上弦其光半十五日而望其光滿三五而闕既望其漸虧二十二日而下弦其虧半三十日而晦其光盡禮運旁死魄月二日哉生明月三日既生魄十六日武成大火心伐參北辰北極公羊傳有星孛于大辰大火也何休曰大火與伐天所以示民時早晚天下取以為正故謂之大辰鄉飲酒義注三光三大辰也天之政教出於大辰上台司命為太尉中台司中為司徒下台司祿為司空周禮疏武陵太守星傳三台與文昌皆有司中司命十二歲太歲歲星與日同次之月斗所建之辰歲星為陽右行於天太歲為陰左行於地十二歲而小周周禮保章氏以十有二歲之相觀天下之妖祥注云歲星一歲移一辰一百四十四年跳一辰千七百二十八年一大周十二跳辰周禮疏太歲與歲星跳辰年數同歲星人所見太歲人所不覩歲星自商周迄春秋之季率百二十餘年而超一次至漢哀平間更八十四年而超一次大衍曆議三統曆法歲星一年行一次一次分為一百四十四分春秋分記每歲剩行一分一百四十四年滿大數所以超一次古今歷書推步五星金水日行一度土三百七十七日行十二度火七百八十日行四百十五度四者皆不得十二年而一終唯木三百九十八日行三十三度十二年而彊一同春秋正義五福君棊大遊小遊天一地一四神臣棊民棊直符宋朝太平興國六年楚芝蘭言按太一式十神皆天之尊神行五宮四十五年一移二百二十五年而一周渾天張衡所述蓋天周髀以為法宣夜無師法安天虞喜作昕天姚信作穹天虞聳作盧肇海潮賦後序自蓋天以下並好奇徇異之說今取渾天為法張行成曰堯之曆象蓋天法也舜之璣衡渾天法也角亢氐兗州鄭房心豫州宋尾箕幽州燕斗江湖牽牛婺女揚州吳越虛危青州齊營室至東璧并州衛奎婁胃徐州魯昴畢冀州趙觜觿參益州魏東井輿鬼雍州秦柳七星張三河周翼軫荊州楚天官書十二次見上此繫之二十八宿歲星主泰山徐青兗州熒惑主霍山揚荊交州鎮星主嵩高山豫州太白主華陰山涼雍益州辰星主恒山冀幽并州星經此繫之五星雍主魁冀主樞青兗主機揚徐主權荊主衡梁主開陽豫主搖光此繫之北斗杓自華以西南衡殷中州河濟之間魁海岱以東北保章氏解十二次分十二土合而言則為九州乾稱父純陽坤稱母純陰震長男陽在初巽長女陰在初坎中男陽在中離中女陰在中艮少男陽在末兌少女陰在末說卦天經雙規游規直舉規管平準輪赤道環黃道環龍柱水臬至道元年韓顯符渾儀九事九重之天司馬相如傳上暢九垓垓重也郊祀歌九閡閡亦陔也淮南子九陔之上謂九天之上人一呼一吸謂之一息一息之間天行八十餘里人之一晝一夜有萬三千六百餘息是故一晝一夜而天行九十餘萬里安定胡先生易說天地人命鶡子說三星三五三星在天心星昏始見於東方建辰之月也詩集傳三五在東三心五噣張救反心三星柳五星詩注疏七襄經星一晝一夜左旋一周而有餘終日之間自卯至酉當更七次詩跂彼織女終日七襄襄駕也分度凡周天三百六十五度四分度之一一度為千九百三十二里日一日行一度月一日行十三度十九分度之一洛書甄曜度後漢王符傳分度注日一歲而一周天月二十九日有奇而一周天又逐及於日而與之會一歲凡十二會方會則月光都盡而為晦巳會則月光復蘇而為朔朔後晦前各十五日日月相對則月光正滿而為望晦朔而日月之合東西同度南北同道則月揜日而日為之食望而日月之對同度同道則月亢日而月為之食詩集傳二極北極去地上三十六度南極入地亦三十六度嵩高正當天之中極南五十五度當嵩高之上又其南十二度為夏至之日道又其南三十四度為春秋分之日道又其南二十四度為冬至之日道朱文公書說春秋日食三十六穀梁以為朔二十六晦七夜二二日一公羊以為朔二十七二日七晦二左氏以為朔十六二日十八晦一不書日者二有甲乙者三十四食既三一行得二十七衛朴得三十五莊十八年三月古今算不入蝕法襄十一年九月十月頻食二十四年七月八月食黃鍾子十一月冬至大蔟寅正月雨水姑洗辰三月穀雨蕤賓午五月夏至夷則申七月處暑無射戌九月霜降周禮大師六律陽聲太玄經六始為律大呂丑十二月大寒夾鍾卯二月春分又曰圜鍾中呂巳四月小滿又曰小呂林鍾未六月大暑又曰函鍾百鍾南呂酉八月秋分應鍾亥十月小雪周禮六同陰聲國語為之六間太玄經六間為呂總而言之十有二律禮運五聲六律十二管還相為宮也注始於黃鍾管長九寸下生者三分去一上生者三分益一終於南呂更相為宮凡六寸樂記注清為蕤賓至應鍾濁謂黃鍾至中呂揚子雲曰律生於辰律管之長以九為本上下相生以三為法十二管皆徑三分有奇空圍九分而黃鍾之長九寸大呂以下律呂相間以次而短至應鍾而極宮土戊癸為君重濁商金秋乙庚為臣敏次濁角木春甲巳為民經清濁中徵火夏丙辛為事迭微清羽水冬丁壬為物抑清樂記爾雅凡聲濁者尊清者卑商角羽三聲無變宮徵二聲有變揚子雲曰聲生於日沈存中曰樂家以濁為宮稍清為商最清為角清濁不常為徵羽蔡邕月令章句曰孟春月大蔟為宮姑洗為商蕤賓為角南呂為徵應鍾為羽大呂為變宮夷則為變徵他月放此金鍾兌石磬乾絲琴瑟離竹簫管篪笛震匏笙竽艮土塤坤革鼓坎木柷敔巽舜典注金石土革絲木匏竹周禮大師八音宮商角徵羽少宮少商五絃象五行大絃為君小絃為臣文王武王加二絃以合君臣之恩七音七律周武王伐紂自午及子凡七日王因此以數合之以聲昭之故以七同其數以律和其聲謂之七音左傳注黃鍾為宮大蔟為商姑洗為角林鍾為徵南呂為羽應鍾為變宮蕤賓為變徵國語注七律左傳晏子曰七音一宮二商三角四變徵五徵六羽七變宮唐祖孝孫七音黃鍾林鍾大蔟天地人之始姑洗蕤賓南呂應鍾春夏秋冬之始漢律志書曰予欲聞六律五聲八音七始詠以出內五言七者天地四時人之始也樂志安世房中歌曰七始華始肅倡和聲平開宮上平商下平上發徵去收羽入閉角沈約傳四聲譜周顒注四聲切韻欲知宮舌居中喉音一曰脣音季夏土宮欲知商開口張齒頭正齒秋金商欲知角舌縮卻牙音春木角欲知徵舌拄齒舌音夏火徵欲知羽撮口聚侯音脣重脣輕冬水羽以上三十六字母演三百八十四聲唐權德輿三歲知變四聲沈存中曰又有半徵半商如來日二字是也梵學又有折攝二聲字母有四十二黃鍾大呂大蔟夾鍾朱文公曰半律通典謂之子聲後人失之唯存四律有四清聲即半聲也權太陰北冬水知衡太陽南夏火禮矩少陰西秋金義規少陽東春木仁繩陰陽之內四方之中四季土信漢律志天為繩墬為準春為規夏為衡秋為矩冬為權淮南時則訓陰陽大制有六度度量權衡唐六典太府以二法平物分寸尺丈引漢律志九十分黃鍾之長一為一分十分為寸十寸為尺十尺為丈十丈為引說苑十粟為一分說文手長八寸謂之咫周尺也十髮為程一程為分十分為寸周尺晉田父玉尺梁表尺漢官尺魏尺晉後尺後魏前尺中尺後尺東魏後尺蔡邕銅籥尺宋氏尺隋水尺雜尺梁俗間尺隋志陳祥道曰周法十寸八寸皆為尺考工記寸寸尺也說文王制八寸尺也龠合升斗斛漢律志起於