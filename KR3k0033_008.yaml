body:
  text: 職官類木正句芒火正祝融金正蓐收水正玄冥土正后土左傳蔡墨曰五行之官是謂五官楚語觀射父曰天地神民類物之官謂之五官太師太傅太保周官左傳三吏注三公也詩三事大夫王肅以三事為三公賈誼曰保保其身體傅傅之德義師道之教訓此三公之職也周禮注三公內與王論道中參六官之事外興六鄉之教漢百官表或説司馬司徒司空為三公少師少傅少保賈誼置三少皆上大夫也天官冢宰治地官司徒教春官宗伯禮夏官司馬政秋官司寇禁冬官司空土周禮六卿分職考工記外有九室九卿朝焉注六卿三孤為九卿周語外官不過九品周禮注六官皆總屬於冢宰六官之屬三百六十前疑後丞左輔右弼書益稷帝曰欽四鄰史記云敬四輔臣注尚書太傳四鄰疑丞輔弼孔叢子謂之四近文王世子虞夏商周有師保有疑丞設四輔及三公不必備太師太傅太保少傅漢四輔平帝時正官法治要師官成治凡司官法治目旅官常治數府官契治藏史官書贊治胥官敘治敘徒官令徵令周禮宰夫辨八職公侯皆方百里伯七十里子男五十里孟子書武成列爵惟五分土惟三注同孟子陸機五等論曰五等之制始於黃唐公方五百里侯方四百里伯方三百里子方二百里男方百里周禮書孟子指邦國實封之地而言之周禮兼附庸之地而言之漢諸侯王表序周立爵五等封國八百史記三王世家周爵五等春秋三等公侯伯漢表注五侯五等諸侯公侯伯六事天子六軍其將皆命卿各有軍事曰六事甘誓乃召六卿曰六事之人注云周禮王六軍大國三軍次國二軍小國一軍百二十官天子置三公九卿二十七大夫八十一元士凡百二十官下應十二子公羊傳注虞官五十夏官百殷二百周三百明堂位唐虞建官惟百夏商官倍周官千品民之徹官百王公之子弟之質能言能聽徹其官者而物賜之姓以監其官是為百姓姓有徹品十於王謂之千品五物之官陪屬萬為萬官官有十醜為億醜醜類也楚語觀射父曰百尹百官之長書顧命一命受職再命受服三命受位四命受器五命賜則六命賜官七命賜國八命作牧九命作伯周禮大宗伯以九儀之命正邦國之位後周九命每命為二以正為上凡十八命上公九命為伯侯伯七命子男五命典命掌諸侯之五儀注公侯伯子男之儀五儀王之三公八命其卿六命其大夫四命出封皆加一等同上注王之三公有德者加命為二伯大夫為子男卿為侯伯四命中下大夫王之上士三命中士再命下士一命五等之命公之孤四命其卿三命其大夫再命其士一命侯伯之卿大夫亦如之子男之卿再命其大夫一命其士不命典命諸臣之五等之命注五等謂孤以下四命三命再命一命不命左傳注古制公為大國侯伯為次國子男為小國士大夫卿莊子正考父三命釋文云左傳三命茲益其注三命上卿也卿大夫士左傳衛公子郢曰三揖在下注云三相天子三公者何天子之相也天子之相則何以三自陝而東者周公主之自陝而西者召公主之一相處乎內公羊傳六屬天官其屬六十掌邦治地官其屬六十掌教春官其屬六十掌禮夏官其屬六十掌政秋官其屬六十掌刑冬官其屬六十掌事周禮小宰以官府之六屬舉邦治今治官之屬六十三教官之屬七十八禮官之屬七十政官之屬六十九刑官之屬六十六意者簡編脫落司空之屬錯雜五官之中治職教職禮職政職刑職事職小宰以官府之六職辨邦治命者五公侯伯子男爵者四孤卿大夫士大行人以九儀辨諸侯之命等諸臣之爵掌交九禮之親注九儀之禮秦漢設九賓九州之牧周禮掌交九牧之維大史小史內史外史御史隋志周天子之史有五禮記動則左史書之言則右史書之漢志右史記事左史記言大府玉府內府外府泉府天府職內職金職幣漢食貨志大公為周立九府圜法宅乃事常任宅乃牧常伯宅乃準準人書立政宅以位言俊以德言三公左輔右弼前疑後丞孝經鄭氏注舜後陳夏後杞殷後宋杜氏左傳注黃帝後薊堯後祝舜後陳鄭康成説尊於諸侯卑於二王後唐天寶七載以魏周隋為三恪九載以商周漢為三恪十二載復魏周隋為三恪韓介酅大宰大宗大史大祝大士大卜曲禮天子建天官先六大典司六典注殷制司徒司馬司空司士司寇同上天子之五官典司五衆注殷制史記古公作五官有司司土司木司水司草司器司貨同上天子之六府典司六職注殷制大司徒大司馬大司空王制大樂正大司寇市司市也同上司徒農父主民司馬圻父主兵司空宏父主土酒誥齊語臣立三宰注三卿詩擇三有事魯頌三壽五長外薄四海咸建五長益稷五國為屬屬有長王制分唐叔職官五正左傳五官之長丞相太尉御史大夫大司徒大司馬大司空太尉司徒司空後魏唐後周宋唐武德七年定令以太尉司徒司空為三公宋政和二年罷依周制立三孤太常奉常光祿勳郎中令衛尉中大夫令太僕廷尉大理大鴻臚典客大行令宗正宗伯大司農治粟內史大農令少府尚書為中臺御史為憲臺謁者為外臺後漢書注謁者符節御史魏三臺文選注謁者司隸御史隋三臺御史中丞司隸挍尉尚書令宣秉拜御史中丞光武特詔與司隸尚書令會同並專席而坐京師號曰三獨坐易施讎孟喜梁丘賀京房書歐陽和伯夏侯勝建詩申公轅固韓嬰春秋嚴彭祖顏安樂禮戴聖戴德三公曹尚侍曹改吏曹二千石曹民曹客曹成帝置尚書五人一人為僕射四人分四曹又置三公曹為五曹六人後又分客曹為南北主客凡六曹中壘屯騎步兵越騎長水胡騎射聲虎賁凡八挍尉胡騎不常置故云七屯騎步兵射聲越騎長水南齊志五挍一公士二上造三簪裊四不更五大夫六官大夫七公大夫八公乘九五大夫十左庶長十一右庶長十二左更十三中更十四右更十五少上造十六大上造十七駟車庶長十八大庶長十九關內侯二十徹侯漢百官表皆秦制以賞功勞避武帝諱曰通侯列侯王列侯史記漢書漢爵二等王侯亭侯漢三等王公侯伯子男縣侯鄉侯亭侯關內侯理道要訣魏十等王一嗣王郡王二國公三開國郡公四縣公五侯六伯七子八男九唐志爵九等國王郡王國公郡公縣公侯伯子男隋九等尚書令僕射六曹尚書後漢五曹尚書二僕射一令魏左右僕射六尚書唐令左右僕射吏部禮部兵部都官度支工部六曹隋中郎侍郎郎中秦漢三郎五官郎左署郎右署郎漢三署郎續志光祿勳主諸郎謂之郎衛衛尉主衛士謂之兵衛春卿太常宗正司農夏卿太府少府太僕秋卿衛尉廷尉太匠冬卿光祿鴻臚太舟梁天監七年凡十二卿中書中書令門下侍中尚書尚書令漢政歸尚書魏歸中書元魏歸門下三省之長宰相職也唐代宗以前中書在上憲宗以後門下在上吏司封司勳考功戶度支金部倉部禮祠部膳部主客兵職方駕部庫部刑都官比部司門工屯田虞部水部中書舍人六員分押尚書六曹録令僕射總理六尚書事謂之都省隋志唐貞元二年六曹皆宰相分領齊映判兵部李勉刑部劉滋吏禮二部崔造判戶工二部尚書門下內史祕書殿內尚書門下集書中書祕書大司馬大將軍典司武事太子太傅少傅晉明帝為太子賀循太傅周顗少傅燕韓常李座俱傅東宮太子太師太傅太保少師少傅少保吏部左民客曹五兵度支魏五曹吏部三公客曹駕部屯田度支晉六曹吏部殿中五兵田曹度支左民晉太康六曹吏部祠部五兵左民度支晉五尚書宋又有都官為六尚書起部興立宮廟權置事畢省吏部祠部度支左戶都官五兵梁起部事畢省殿中劉納吏部劉顯金部孔虔孫左右戶蕭軌中兵王顒梁天監九年尚書五部吏禮兵左僕射判三部事民刑工右僕射判三部事隋吏戶禮左丞總焉兵刑工右丞總焉兵吏為前行刑戶為中行工禮為後行行總四司本行為頭司餘為子司唐太傅太尉司徒司空大將軍後漢樊準傳注太傅闕則謂之四府前漢趙充國段會宗杜鄴傳五府謂左右前後將軍二人及三公司徒司空劉愷傳頻歷二司右師左師司馬司徒司城司寇左傳文七年六卿和公室宋以武公廢司空大宰少宰左傳成十五年宋向帶為大宰魚府為少宰宋朝政和中左僕射為太宰右僕射為少宰薛瑩為左華核為右史通吳有左右二國史之職太常光祿衛尉宗正太僕大理鴻臚司農太府隋唐國子少府將作軍器都水唐國子少府將作都水長秋隋國子太學廣文四門律書算韓文公表七館選舉志六學無廣文又曰六館隋太學國子四門書算左右衛左右驍衛左右武衛左右威衛左右領衛左右金吾衛左右監門衛左右千牛衛南衙諸衛兵北衙禁軍親衛府一勳衛府二翊衛府二凡五府三衛分為五仗供奉親勳翊散手號衙內五衛弘文館武德置史館正觀置集賢殿開元置弘文館建隆初改昭文因唐故事命宰輔兼領三館太平興國中崇文院東廊為昭文館南廊為集賢院西廊為史館臺院侍御史殿院殿中侍御史察院監察御史左散騎常侍二人與侍中二人為左貂右散騎常侍二人與中書令二人為右貂皆金蟬珥貂謂之八貂應劭曰金取堅剛蟬居高飲潔貂內徑外溫胡廣曰趙武靈王效胡服以金璫飾首前插貂尾尚書銓中銓東銓文選吏部主之武選兵部主之皆為三銓尚書侍郎分主之乾元中改中銓為西銓三品以上官册授五品以上制授六品以下敕授六典以三銓分其選尚書為尚書銓侍郎二人分為中銓東銓主山林川澤之官月令鹽鐵度支戶部通鑑天祐三年以朱全忠為鹽鐵度支戶部三司都制置其名始於此三司使始後唐張延朗御史大夫中書門下唐志凡冤而無告者三司詰之三司太子監國則詹事庶子為三司唐志尚食尚藥尚衣尚乘尚舍尚輦唐殿中省其屬有六屬尚宮尚儀尚服尚食尚寢尚功內官六尚尚書左選舊審官東院尚書右選舊審官西院侍郎左選舊流內銓侍郎右選舊三班院宋元豐五年吏部分選有四并司封司勳考功為七司門下侍中審侍郎省給事中讀中書令宣侍郎奉舍人行通典敘職官以三師三公門下中書兩省為先宣諭五使劉大中胡蒙朱異明橐薛徽言紹興二年按吏七十九人薦士五十七人翰林學士內制中書舍人外制二相尚書左右僕射改左右丞相虞允文左梁克家右乾道八年尚書中書門下祕書殿中內侍通鑑武德七年定令兩臺六察左臺知百司監軍旅右臺察州縣省風俗武后改御史臺曰肅政臺分左右監察御史第一人察吏禮部第二人察兵工部第三人察戶刑部九品十八班十八品漢自中二千石至百石凡十六等後漢十三等魏更置九品梁定九品更置十八班增置為十品凡二十四品後魏置九品品各置從凡十八品自四品以下每品分為上下階凡三十階通典唐文散階二十九武散階四十五志周易王氏尚書鄭氏古文尚書孔氏毛詩鄭氏周官禮記鄭氏春秋左傳杜氏服氏論語孝經鄭氏晉元帝置博士九人又增儀禮春秋公羊合為十一人侍講學士王起許康佐侍書學士柳公權謂之三侍學士文宗召入便殿顧問大學士四員李嶠宗楚客趙彥昭韋嗣立學士八員李適劉憲鄭愔盧藏用李乂岑羲劉子玄崔湜直學士十二員薛稷馬懷素宋之問武平一杜審言沈佺期閻朝隱徐堅韋元旦徐彥伯劉允濟象四時八節十二月景龍二年置家令率更僕志東宮官詹事統三寺十率府之政左右率左右司禦左右清道左右監門左右內率均輸鍾官辨銅三令平準書上林三官鑄錢中郎有五官左右郎中有車戶騎百官表大將軍驃騎將軍車騎將軍衛將軍續漢志比公者四前後左右南齊志四軍南屯蒼龍玄武北屯朱爵東明朔平宮掖七門每門七人殿中御史丞相商子定