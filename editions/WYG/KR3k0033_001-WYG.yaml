十二月得乙則曰橘涂周而復始周禮硩蔟氏書十有二月之號注曰謂從陬至荼十二時日中午王食時辰公平旦寅卿雞鳴丑士夜半子皁人定亥輿黄昬戌隸日入酉僚晡時申僕日昳未臺隅中己日入卯闕不在第左傳日之數十故有十時亦當十位自王以下其二為公其三為卿日上其中食日為二旦日為三又曰天有十日人有十等三時春夏秋左傳三時不害注而穀梁傳罷民三時周語三時務農一時講武一時冬也五時四立立春立夏大暑立秋立冬漢儀讀五時令蔡邕曰以四立及季夏之節迎五帝於郊五夜甲夜乙夜丙夜丁夜戊夜夜有五更掌周禮司寤氏夜時注夜甲乙至戊更漢西域傳斥候之士五分夜撃刁斗自守注夜有五分而持之漢舊儀中黄門持五夜三司馬法昬鼔四通為大鼜夜半通為晨戒旦明五通為發昫三餘冬者歲之餘夜者日之餘陰雨者時之餘魏董遇從學者苦無日遇言以三餘三令節中和節二月朔上巳九日唐書建除十二辰建除滿平定執破危成収開閉淮南天文訓云寅為建卯為除辰為滿已為平主生午為定未為執主陷申為破主衡酉為危主杓戌為成主少德亥為収主大德子為開主太歲丑為閉主太陰史記日者傳有建除家以為不吉漢書王莽傳以戊辰直定注曰以建除之次其日當定又云十一月壬子直建冬至注曰其日當建五際卯酉午戌亥漢翼奉曰詩有五際注詩内傳曰云云陰陽終始際會之歲大詩緯云卯天保也酉祈父也午采芑也亥明也郎顗傳四始之缺五際之戹百度百刻也樂記百度得歲而有常注正義晝夜百刻十二時每時八刻二十分每刻六十分周禮總義孔壺為漏浮箭為刻四十八箭二十四氣各有晝夜古今刻漏之法有二曰浮漏曰稱漏尚書緯謂刻為商士昬禮目錄云日入三商為昬難經百刻圖三朝又曰三始三朝元日也謂歲之朝月之朝日之朝漢書谷永曰三朝之會班固東都賦春王三朝鮑宣曰三始正月一日為雞二日為狗三日為豬四日為羊五日為牛六日為馬七日為人北史魏収傳董勛問答禮俗云八日為穀東方朔占書六日七分四正之卦卦有六爻爻主一氣震離兌坎餘六十卦卦主六日七分八十分日之七易緯六後漢郎顗善日七分十二月卦出於孟氏章句十二辟卦復子臨丑泰寅大壯卯夬辰乾己姤午遯未否申觀酉剥戌坤亥卦氣起中孚中孚公復辟屯侯謙大夫睽卿升還從公周而復始京氏以卦爻配朞之日坎離震兌其用事自分至之首皆得八十分日之七十三頤晉井大畜皆五日十四分餘皆六日七分唐厯志中朔中數曰歲十二月中氣一周總三百六十五日四分日之一朔數曰年十二月之朔一周三百五十四日周禮太史正歲年以序事注至朔同日謂之章同在日首謂之蔀蔀終六旬謂之紀歲朔又復謂之元續漢志六術黄帝使羲和占日常儀占月車區占星氣伶倫造律呂大撓造甲子隸首作算數容成綜斯六術晉志六厯黄帝顓頊夏殷周魯漢劉向總六厯列是非作五紀論續漢志黄帝造厯元起辛卯顓頊用乙卯虞用戊午夏用丙寅周用丁巳魯用庚子言天三家周髀蓋天宣夜殷代之制渾天晉志言天者有三家漢蔡邕言宣夜絶無師法周髀術數具存考驗天狀多所違失惟渾天近得其情賀道養渾天記曰一曰方天興於王充二曰軒天起於姚信三曰穹天開於虞昺皆臆斷浮說唯渾天徵驗不疑月令正義凡有六等一曰蓋天見周髀二曰渾天三曰宣夜四曰昕天昕讀為軒吳姚信說五曰穹天虞氏說六曰安天虞喜論五厯漢顓頊厯高帝太初武帝三統劉歆作四分章帝乾象靈帝八厯唐戊寅元武德甲子元麟德大衍開元五紀寶應正元建中觀象元和宣明長慶崇元景福十六厯宋應天建隆乾元太平興國儀天咸平崇天天聖明天治平奉元熙寧觀天元祐占天崇寧紀天大觀統元紹興乾道淳熈會元紹熙統天紹元會天寶祐成天咸淳五法備數和聲審度嘉量權衡漢律志曰司馬文正公黄鍾所生凡有五法五數一十百千萬漢律志之隸首作數百内則六年敎數謂一十千萬數十等億兆京垓秭壤溝澗正載數術記遺黄帝為法數有十等三數上中下夏陽侯算經序黄帝分三數為十等五行又曰五材五氣五辰五德五美五節水潤下火炎上木曲直金從革土稼穡洪範以微著為次左傳天生五材六臯陶謨撫于五辰注五行之時生天一生水于北地成地二生火于南天七成天三木于東地八成地四生金于西天九成天五生土于中地十成行于四時為五德漢志騶子論著終始五德之運洪範天地生五行之序月令木火土金水五行相生之序一典引注五德五行之德自伏羲以下帝王相代各據行始於木終於水則復始五太𤣥曰鑿井澹水鑽火㸐木流金陶土以和五美注行之美左傳序為五節注得五行之節布太極圖曰五氣順六府水火金木土穀大禹謨以以水克火以火克金金克木以木克土而生五穀五行相克之序五氣溫木涼金寒水燥火濕土火陽中之陽水陰中之陰木陽中之陰金陰中之陽土居二氣之中子華子五色青東木甲赤南火丙白西金庚黑北水壬黄中央土戊文子色有五章綠碧紅紫駵月令五方之正色也以木克土則青黄合而成綠以金克木則白青合而成碧以火克金則赤白合而成紅以水克火則黑赤合而成紫以土克水則黄黑合而成駵此五方之間色也紺紅縹紫流黄環齊要略間色有五黄曰金白曰銀赤曰銅青曰鉛黑曰鐵漢食貨志五色之金注五味鹹水潤下冬黑羽苦火炎上夏赤徵酸木曲直春青角辛金從革秋白商甘土稼穡宮中央黄五臭羶木焦火香土腥金朽水月令五運六氣少陰君火太陰溼土少陽相火陽明燥金太陽寒水厥陰風木素問之子華子曰金木水火土五精總也寒熱風燥溼五氣之聚也寒生水熱生火風生木燥生金溼生土五運五勝太昊木炎帝火黄帝土少昊金顓頊水帝嚳木唐火虞土夏金商水周木三統厯以相生為義金郊祀志夏木殷周火秦水秦以周為火用水勝之漢厯志頗推五勝注五行相勝鄒衍以相勝為義張蒼則以漢水勝周火尚賈誼公孫臣則以漢土勝秦水漢土德色黄光武始正火德色尚赤行始於祖行終於臘水子祖辰臘火午祖戌臘木卯祖丑臘金酉祖丑臘土戌祖辰臘魏土晉金宋水齊木梁火陳土後魏水繼西晉後周木隋火唐土後唐土晉金漢水周木宋火五卜雨水霽火蒙木驛金克土卜五此卜兆也洪範稽疑曰荀子五卜圛周禮太卜注音洪範雨曰濟曰曰蟊曰尅蟊蒙貞内卦悔外卦占用二三兆玉陽瓦陰原陰陽之半周禮太卜掌三兆之法堯杜子春云玉兆顓頊瓦兆原兆周卜經兆之體百有二十其頌千有二百頌繇也三曲禮筮不過三儀禮占者三人卜用三兆筮用易三金縢卜龜四兆方功義弓卜師開龜之四兆占兆之書也方兆占四方之事功兆占立功之事義兆占行義之事弓兆有射意灼兆其兆有四九簭巫更巫咸巫式巫目巫易巫比巫祠巫參巫環簭人以巫讀為簭或曰其人為書卜筮四法龜五兆易式唐志太卜八魁春己巳丁丑夏甲申壬辰秋己亥丁未冬甲寅壬戌後漢蘇賁曰八魁上帝開塞之將也三式雷公太一六壬其局以楓木為天棗心為地刻十二神下布十二神唐六典太一式凡舉事皆欲發三門順五將納甲乾納甲壬月盈甲望日壬二十九坤納乙癸月滅乙晦癸二日震納庚月出生明㢲納辛月退生魄坎納戊水流月陰中離納己火就日陽中艮納丙月消下弦兌納丁月見上弦五音十四聲一脣聲并餅清二舌聲靈歴清三齒聲陟珍清四牙聲迦佉濁五喉聲綱各濁一開口聲阿哥河等二合口聲菴甘諶諳等三蹴口聲憂邱鳩休等重四撮脣聲烏姑乎枯重五開脣聲波坡摩婆輕六隨鼻聲灼高考姑等重七舌根聲奚雞溪等重八蹴舌下卷聲伊酌等重九垂舌聲遮車奢者輕十齒聲止其始等輕十一牙聲迦佉俄等輕十二齶聲鴞等輕十三喉聲鴉加瘕等輕十四牙齒齊呼開口送聲叱沙挐茶輕廣韻之沈存中筆談各歸切韻法先類其字其母脣音齒音各八牙音喉音各四舌音十半齒半舌有音二凡三十六分為五音天下之聲總于是矣每聲復四等謂清次清濁平也也孫炎始作字音冬觀物外篇先閉後開春也統開夏先開後閉秋也則閉而無聲也通志聲為經音為緯平上去入四聲宮商角徵羽半徵半商七音也八十四調十二均黄帝吹九寸之管得黄鍾正聲半之為清聲倍之為緩聲三分損益之以生十二律十二律旋相為宮以生七調為一均均有七調凡十二均八十四調而大備後周王朴云二今見存者九曲聲唐祖孝孫以十月旋相為六十八十四調三調清平側文選注三調清平瑟隋何妥傳三調五調平清瑟楚側宋書五調九弄蔡邕五弄楚調四弄唐樂志琴工猶傳楚漢舊聲及清調云云謂之九弄三器度量衡程逈述三器圖義四通𤣥英青陽朱明白藏梁武帝作鍾律緯制為四器名為通又制十二笛以寫通聲九又引古五正二變之音旋相為宮得八十四調改夏為十二雅以協律陰呂陽十二管旋相之義三均黄鍾姑洗無射唐楊収言琴通三均側出諸調馬少良琴譜三均以姑洗為中呂四刻漏浮箭秤沈箭不息元祐初蘇頌製長史記注馬融王肅謂日晝漏六十刻日短晝漏四十刻鄭𤣥曰日長五十五刻日短四十五刻厯五十變黄帝至秦厯凡七變漢四百年厯凡四變魏晉迄隋十六變而後魏後周六厯不預焉唐三百年厯凡九變五代調元次及欽天而厯法始弊自建隆迄紹熈三百五十年厯十四變上距黄帝之厯凡五十變李心傳朝野雜記後魏三厯鄧平太初劉洪乾象楊偉景初宋書志三人漢魏之善厯者九天九地九天之上六甲子九地之下六癸酉後漢書注𤣥女三宮戰法地中周在洛邑漢在潁川陽城唐在浚儀司馬文正公日景圖日行黄道每歲有差地中當隨而轉移大衍數五十河圖中宮天五乗地十而得之朱子本義數始於一備於五小行之而成十大衍之而為五十五十數之成成則不動故損一以為用程子易說生數自一二三四而極於五成數自七八九六而極於十故大衍之數五十取天地之極數以立本也布算者生數至四而止遇五則變而為一成數至九而止遇十則變而為一故其用四十有九取天地之變數以起用也易玩辭項氏參天兩地而為五故十者兩其五也五十者十其五也呂氏一者體太極不動之數四十九者用兩儀四象分太極之數朱子發參伍以變凡占之法有變有數每爻三揲為三變每揲有象兩象三象時象閏象再閏為五小變此參伍以變也三揲之奇分而計之則得三少三多一少兩多一多兩少之數去三揲之奇以左右手之正策合而計之則得四九四六四七四八之數此錯綜其數也通六爻之變得十有八遂成初二三四五上以為剛柔相雜之文極六爻之數得七八九六遂定重單交拆以為内外兩卦之象易玩辭七日來復姤陽之始消也七變而成復程子易傳自五月姤而一陰始生至此七爻而一陽復來易本義姤午一陰坤初六遯未否申觀酉剝戌坤亥復子一陽乾初九復七日來復陽言日臨至于八月有凶陰言月甲庚三日蠱先甲三日後甲三日㢲九五先庚三日後庚三日易本義甲日之始事之端也先甲三日辛也後甲三日丁也前事過中而將壞則可自新以為後事之端而不使至于大壞後事方始而尚新然便當致其丁寧之意以監前事之失而不使至於速壞庚更也事之變也先庚三日丁也後庚三日癸也丁所以丁寧於其變之前癸所以揆度於其變之後易玩辭甲者日之首事之始也庚更也續也甲庚者十日十二辰之綱也戊己分王四時自甲歴乙丙丁三日而至庚自庚歴辛壬癸三日而至甲故取以為三日之象甲庚之先後皆稱三日先後者上下卦也三日者三爻也一之日二之日一之日周正月也建子二之日殷正月也建丑三之日夏正月也建寅四之日周四月也夏之二月建卯毛詩傳七月九月陰生矣則言月一之日二之日陽生矣則言日與易臨至于八月有凶七日來復同意四月正陽言月陰生也陰始于四月生于五月王氏詩義孟春之月以元日祈穀又擇元辰躬耕帝籍盧植云郊天陽也故以日籍田陰也故以辰日甲至癸也辰子至亥也亥者辰之末故記稱元辰法曰吉亥蔡邕月令章句云日幹也辰支也有事於天用日有事於地用辰元善也南齊禮志三代尺夏十寸為尺殷九寸為尺周八寸為尺蔡邕獨斷禹十寸為尺湯十二寸為尺武王八寸為尺通鑑外紀古法七品一姑洗玉律二小呂玉律三西京銅望臬四金錯望臬五銅斛六古錢七建武銅尺晉律志泰始十年考古器校今尺所校古法有七品兩尺漢章帝時泠道舜祠下得玉律度以為尺謂之漢官尺晉始平得古銅尺晉律志兩尺長短度同尺大戴禮記布指知寸布手知舒肘知尋扶公羊傳注側手為膚按指為寸倍投壺注鋪四指曰一指按寸國語注五尺為墨墨為丈八尺為尋倍尋為常七閏一章日與天會而多五日九百四十分日之二百三十五為氣盈月與日會而少五日九百四十分日之五百九十二為朔虚合氣盈朔虚而閏生焉十有九歲七閏氣朔分齊是為一章朱文公書說十九年七閏天之償也太𤣥易四變單拆交重唐六典易之策四十有九其變有四十八變而成卦内卦為貞朝占用之外卦為悔暮占用之三少為重九三多為交六兩多一少為單七兩少一多為拆八儀禮疏今古用木畫地用錢八會堪輿大會有八小會亦有八周禮占夢注今八會其儀象也疏云云四占星時數辭太𤣥占有四用旦則用經一五七夕則緯三四八亥有二首六身襄公三十年三月癸未絳縣老人曰臣生之歲正月甲子朔夏正月四百四十有五甲子矣其季於今三之一也三分六甲之一得甲子甲戌至癸未二十日師曠曰魯叔仲惠伯㑹郤成子于承匡之嵗也文公十一年七十三年矣史趙曰亥有二首六身下二如身是其日數也亥字二畫在上三人在下以二為首以六為身上二畫豎置身旁始身當為㤥字士文伯曰然則二萬六千六百有六旬也左傳説文八能調黄鐘調六律調五音調五聲調五行調律厯調陰陽調正德所行月令正義易通卦驗云夏至冬至人主從八能之士八續漢禮儀志冬至夏至能之士八人四象唐陽七之靜始於坎陽九之動始於震陰八之靜始於離陰六之動始於兌唐大衍厯卦議四象之變皆兼六爻而中節之應備矣厯議十篇厯本議中氣議合朔議卦候議卦議日度議九道議日蝕議五星議唐一行大衍厯議十篇志載其九厯術七篇步中朔發斂步日躔步月離步軌漏步交會步五星大衍厯術七篇厯聖人之德六以本氣者尚其體以綜數者尚其文以考類者尚其象以作事者尚其時以占往者尚其源以知來者尚其流續漢厯志六十律六十律相生之法以上生下皆三生二以下生上皆三生四陽下生陰陰上生陽終於中呂而十二律畢矣中呂上生執始執始下生去滅上下相生終於南事而六十律畢矣續漢志漢京房受學焦延壽云云十二律之變至於六十猶八卦之變至於六四也三百六十律一律而生五音十二律而為六十音因而六之故三百六十音以當歲之日淮南子宋錢樂之因京房南事之餘引而伸之更為三百律終於安運合舊為三百六十律日當一管隋志十二笛晉荀勗以五聲十二律還相為宮之法制十二笛黄鍾之笛正聲應黄鍾下徵應林鍾以姑洗為清角大呂之笛正聲應大呂下徵應夷則以外諸均例皆如是三宮天宮夾鍾圜鍾圜邱地宮林鍾函鍾方邱人宮黄鍾宗廟周禮大司樂注正聲下徵清角晉律志笛三宮二十一變四宮有七聲錯綜用之伏孔曰正角倍角變宮變徵二十八調正高中呂道調南呂仙呂黄鍾七為宮越調大食調高大食調雙調小食調歇指調林鍾七為商大食高大食雙小食歇指林鍾越七為角中呂調正平調高平調仙呂調黄鍾般涉調高般涉七為羽唐樂志俗樂二十有八調皆從濁至清迭更其聲下則益濁上則益清徐景安樂書俗樂調有宮商角羽而無徵調龜八命征象與謀果至雨瘳周禮太卜以邦事作龜之八命占人以八簭占八頌以八卦占簭之八故征行役征討象天象變動與共事謀圖事果有為至有行雨卜時之雨瘳卜疾之瘳筮有八故龜有八命三代卜筮塗山之兆從而夏啓世飛燕之卜順故殷興百穀之筮吉故周王史記龜策傳五德潤暵生成動周世宗觀泗州大水記以問竇儼儼以為天地有五德四和子午卯酉得東西南北之中周髀注崐崘四方其氣和暖三禮義宗三伏伏者金氣伏藏之日立秋以金代火金畏火故庚日必伏後漢志注伏秦德公始為祠反支日戌亥朔一日申酉朔二日午未朔三日辰巳朔四日寅卯朔五日子丑朔六日後漢王符潛夫論明帝時公車以反支日不受章奏注陰陽書反支日用月朔為正七宗黄鍾為宮為土大簇為商為金姑洗為角為木林鍾為徵為火南呂為羽為水應鍾為變宮為月㽔賓為變徵為日五代會要王仁裕曰三正合天地之美天地人七宗固陰陽之序五繇卜征五年歲習其祥班固典引五繇之碩慮注云四始大明在亥水始也四牡在寅木始也嘉魚在已火始也鴻雁在申金始也詩正義詩緯汎歴樞云二至日長至陰陽爭死生分君子齊戒處必掩身毋躁止聲色毋或進薄滋味毋致和節耆欲定心氣百官靜事毋刑以定晏陰之所成夏至日短至陰陽爭諸生蕩君子齊戒處必掩身身欲寧去聲色禁耆慾安形性事欲靜以待陰陽之所定冬至月令四序孟序仲序叔序季序北史黄帝四序經文歲差二術宋祖冲之於歲周之末創設差分冬至漸移不循舊軌每四十六年却差一度梁虞􅒠厯法嫌冲之所差太多因以一百八十六年冬至移一度隋張胄𤣥以此二術年限懸隔追檢古注所失極多遂折中兩家以為度法冬至所宿歲别漸移八十三年却行一度上合堯時日永星火次符漢厯宿起牛初隋書古厯日有常度天周為歲終故係星度于節氣其說似是而非故久而益差虞喜覺之使天為天歲為歲乃立差以追其變使五十年退一度何承天以為太過乃倍其年而反不及皇極取二家中數為七十五年蓋近之矣唐大衍厯議五曹算經田曹兵曹集曹倉曹金曹二始二終二中天數始於一地數始於二合二始以位剛柔天數終於九地數終於十合二終以紀閏餘天數中於五地數中六合二中以通律厯唐大衍厯議立端於始立首氣於初節之日表正於中示斗建於月半之辰推餘於終退餘閏於朔望之後素問六日冬至子午夏至卯酉冬至加三日則夏至之日也歲遷六日終而復始淮南子高誘曰遷六日今年以子冬至後年以午冬至文選陸倕刻漏銘六日無辨五夜不分注云云晷漏四法銅壺香篆圭表輥彈薛季宣云今之為晷漏者其法有四十二聲高正下陂險達微囘侈弇薄厚周禮典同以十有二聲謂之齊量五兆直上向背為木兆直下向足為水兆邪向背為火兆邪向下為金兆横為土兆周禮占人疏灼龜五兆小學紺珠卷一
