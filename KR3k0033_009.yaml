六枚鍾磬二八在一簴謂之堵磬一堵謂之肆金再作升歌清廟下管象仲尼燕居子曰大饗有四焉注謂饗諸侯來朝者四者謂云云二十四戟凡戟廟社宮殿之門二十有四東宮之門十八一品之門十六二品及京兆河南太原尹大都督大都護之門十四三品及上中都督上都護上州之門十二下都督都護中州下州之門各十唐百官志宋崇寧中文宣王廟立戟二十四九陌錢梁武帝大同元年詔外閒多用九陌錢可通用足陌大同後八十為百名東錢七十為百名西錢京師九十為百名長錢宋晉平王休祐以短錢一百賦民唐昭宗末京師用錢每百纔八十五河南府以八十為百五代錢出入皆以八十為陌漢三司使王章始令入者八十出者七十七謂之省陌永通萬國以一當千五行大布以一當十五銖後周三品並用賦算百二十漢法民年二十五已上至六十出口賦錢人百二十以為算孝文減至四十孝宣減三十孝成減四十唐制民始生為黃四歲為小十六為中二十一為丁六十為老開元詔三歲以下為黃十五以下為小二十以下為中天寶更民十八以上為中二十三以上成丁廣德詔二十五為成丁五十五為老絘布列肆之稅絘音次總布守斗斛銓衡著之稅質布質人所罰犯質劑者之泉罰布犯市令者之泉廛布貨賄諸物邸舍之稅周禮廛人歛布之五布藏曰泉行曰布大市曰旭百族為主朝市朝時商賈為主夕市夕時販夫販婦為主司市郊特牲注周禮市有三期景福殿賦俯眺三市內有九室路寢之裏外有九室路門之表考工記匠人大閱四表百步為一表為三表則三百步又五十步為一表則三百五十步周禮大司馬中冬教大閱虞人萊所田之野為表射六耦二人為耦二耦同射一侯則十二人周禮大司馬大射合諸侯之六耦射人以六耦射三侯惠戈劉鉞戣瞿銳古文作鈗書顧命正義七兵朱干中干伐櫓大盾其二者未聞周禮司兵掌五盾疏云鞞鐸內拂何妥作八佾四舞百雉五板為堵五堵為雉百雉曰城公羊說方丈曰堵三堵曰雉一雉之墻長三丈高一丈杜預說一丈為板五板為堵毛詩傳鄭氏曰板六尺八尺為板韓詩說百雉為長三百丈方五百步坊記都城不過百雉注霸城清明宣平覆盎安西安章城直城雍洛城廚城橫音光三輔黃圖平城上西雍廣陽津小苑開陽耗中東上東穀夏百官志晉洛陽東有建春東陽清明二門南有開陽平昌宣陽建陽四門西有廣陽西明閶闔三門北有大夏廣夏二門明德啟夏安化南春明通化延興東金光開遠延平西北面無門隋志北面光化一門花萼相輝勤政務本開元中興慶宮西南置樓鬱儀結鄰在東內大明宮欽賢翹材接士西京雜記公孫弘為相開東門分三館六門陵陽等五門與宣陽為六晉成帝始繕苑城修六門六關塞關陽關之屬左傳臧文仲廢六關九市長安立九市六在道西三在道東西都賦注漢宮闕疏朱敬則以孝義世被旌顯一門六闕相望楊炎祖哲父播三世以孝行聞門樹六闕尹仁恕曾祖養祖怦父慕先一門四闕一封軺傳律當乘傳及發駕置傳者皆持尺五寸木傳信封以御史大夫印章其乘傳參封之有期會累封兩端端各兩封凡四封也乘置馳傳五封之兩端各二中央一也軺傳兩馬再封之一馬一封也鄰里鄉黨五家為鄰二十五家為里萬二千五百家為鄉五百家為黨論語注三長五家立鄰長五鄰立里長五里立黨長孝文太和十年置黨里鄰三長定民戶籍漢鼂錯言守邊備塞曰古之制邊縣以備敵使五家為伍伍有長十長一里里有假士四里一連連有假五百十連一邑邑有假候漢十里一亭亭有長十亭一鄉鄉有三老有秩嗇夫游徼隋五百家為鄉置鄉正百家為里置里長唐百戶為五里為鄉四家為鄰四鄰為保後周百戶為團團置耆長二人金陵燕然扶桑崦嵫後魏於洛水橋南作四館處降者丹陽竹格朱雀驃騎孝武寧康元年詔除四桁稅昭陽飛翔增成合驩蘭林披香鳳凰鴛鸞張衡西京賦應劭曰後宮有八區增成第三李虎元欣李弼獨孤信趙貴于謹侯莫陳崇宇文泰八柱國元贊元育元廊侯莫陳順宇文遵達奚武李遠豆盧寧宇文貴賀蘭祥楊忠王雄是為十二大將軍每大將軍督二開府凡為二十四員分團統領是二十四軍每一團儀同二人北史宇文泰位總百揆都督中外軍事廣陵王欣元氏懿戚從容禁闥此外六人各督一大將軍分掌禁旅都亭驛以待遼都亭西驛以待西蕃阿黎于闐新羅渤海懷遠驛以待交趾同文館以待青唐高麗六參文武官職事九品以上及二王後朝朔望文臣五品以上及兩省供奉官監察御史員外郎太常博士日參號常參官武官三品以上三日一朝號九參官五品以上及折衝當番者五日一朝號六參官百官志孝悌力行經史儒術藻思詞鋒廉平彊直顯慶五年詔四科舉人取士有三取士之科大要有三由學館曰生徒凡學六館二由州縣曰鄉貢選舉志孝廉賢良文學漢蔡邕封事儢漢之得人數路而已賢良方正孝廉秀才中興增敦樸有道賢能直言獨行高節質直清白敦厚之屬後漢論九經五經開寶通禮三禮三傳三史學究明法太平興國二年講武殿覆試八科三舍法太學外舍生二千內舍生二百上舍生百總為二千四百員月一私試歲一公試補內舍生閒歲又一試補上舍生三等俱優為上一優一平為長中若一優一否為下元豐二年大學三舍法置八十齋齋容三十人行義純固節操方正知勇過人公正聰明經術精通學問該博文章典麗善聽獄訟善治財賦練習法令元祐元年司馬文正公請設十科以舉士孝悌睦婣任恤忠和大觀元年詔士有八行貢入太學嵩陽河南府嶽麓潭州睢陽應天府白鹿洞南康軍太祖太宗九王後曰睦親秦王後曰廣親英宗二王曰親賢神宗五王曰棣華徽宗諸王曰蕃衍朝野雜記蒼璧天黃琮地四圭有邸感生帝兩圭有邸神州社稷圭璧日月青圭赤璋白琥玄璜黃琮五帝經義詩賦紹興十五年詔分為兩科二十七年詔兼習兩科三十一年復分科取士南五門南薰廣濟宣化廣利安上東五門上善廣津朝陽含輝善利西五門順天順濟開遠金輝咸豐北四門寧德景陽永泰安肅南三門朱雀保康崇德東二門麗景宜春西二門宜秋閶闔北三門景龍安遠天波南三門宣德左掖右掖東一門東華西一門西華北一門拱宸東京記
