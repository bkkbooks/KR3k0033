body:
  text: 名臣類漢三傑留文成侯張良子房酇文終侯蕭何淮陰侯韓信新言曰漢祖驂三龍而乘雲路十八侯酇侯蕭何平陽侯曹參宣平侯張敖絳侯周勃舞陽侯樊噲曲周侯酈商魯侯奚涓汝陰侯夏侯嬰潁陰侯灌嬰陽陵侯傅寬信武侯靳歙安國侯王陵棘蒲侯陳武清河侯王吸廣平侯薛歐汾陰侯周昌陽都侯丁復曲成侯蟲達功臣表高祖論功定封侯者百四十有三人作十八侯之位次班固沛泗水亭銘十八侯之次有留侯張良曲逆侯陳平襄平侯紀通而無奚涓薛歐丁復中興輔佐十一人霍光子孟大司馬大將軍博陸侯張安世子孺衛將軍富平侯韓增車騎將軍龍額侯趙充國翁孫後將軍營平侯魏相弱翁丞相高平侯丙吉少卿丞相博陽侯杜延年幼公御史大夫建平侯劉德路宗正陽城侯梁丘賀長翁少府蕭望之長倩太子太傅蘇武子卿典屬國宣帝思股肱之美圖畫其人於麒麟閣明著中興輔佐列于方叔淑召虎仲山甫凡十一人三儒董仲舒江都相公孫弘兒寬內史循吏傳序三人皆儒者通於世務以經術潤飾吏事七相丞相車千秋長陵人黃霸王商杜陵人韋賢平當魏相王嘉平陵人班固西都賦七相五公五公太尉田蚡長陵人大司馬張安世大司空朱博杜陵人大司徒平晏大司馬韋賢西都賦山西將十五人白起郿王翦頻陽王圍甘延壽郁郅公孫賀傅介子義渠李廣李蔡成紀蘇建蘇武杜陵上官桀趙充國上邽廉褒襄武辛武賢慶忌狄道蘇辛父子著節漢功臣三十一人蕭何曹參張良陳平韓信彭越黥布張耳韓王信盧綰吳芮劉賈王陵周勃樊噲酈商夏侯嬰灌嬰傅寬靳歙酈食其劉敬叔孫通魏無知隋何董公轅生紀信周苛侯公陸機作頌武宣名臣孝武儒雅則公孫弘董仲舒兒寬德行則石建石慶質直則汲黯卜式推賢則韓安國鄭當時定令則趙禹張湯文章則司馬遷相如滑稽則東方朔枚皋應對則嚴助朱買臣歷數則唐都洛下閎協律則李延年運籌則桑弘羊奉使則張騫蘇武將卒則衛青霍去病受遺則霍光金日磾孝宣蕭望之梁丘賀夏侯勝韋玄成嚴彭祖尹更始以儒術進劉向王褎以文章顯將相則張安世趙充國魏相丙吉于定國杜延年治民則黃霸王成龔遂鄭弘召信臣韓延壽尹翁歸趙廣漢嚴延年張敞之屬漢書贊名卿張廷尉之平釋之雋京兆之見不疑尹扶風之潔翁歸王子貢之介尊揚子法言近世名卿名將條侯之守周亞夫長平冠軍之征伐衛青霍去病博陸之持重霍光法言輔政四人蕭望之前將軍周堪光祿大夫劉更生宗正金敞侍中元帝朝四人同心輔政二李李固李膺皆師宗荀淑贊曰二李師淑二疏太子太傅疏廣字仲翁太子公傅疏受字公子廣兄子宣帝時以老告退二耆艾龔勝邴漢策曰光祿大夫大中大大耆艾二人魯兩生叔孫通徵魯諸生共起朝儀魯有兩生不肯行法言曰齊魯有大臣史失其名二逸民谷口鄭子真朴蜀嚴君平遵揚雄著書稱此二人近古之逸民也三王京兆尹王尊子贛王王駿先是有趙廣漢張敞京師稱曰前有趙張後有三王後漢邊鳳延篤為京兆尹有能名郡中語曰前有趙張三王後有邊延二君唐賈敦頤張仁願為洛州長史時時人語曰洛有前賈後張敵京兆三王河西五守武威太守梁統金城太守庫鈞張掖太守史苞酒泉太守竺魯燉煌太守辛肜五人共雅竇融為河西大將軍歸心世祖二十八將鄧禹高密侯字仲華吳漢廣平侯字子顏賈復膠東侯字君文耿弇好畤侯字伯昭寇恂雍奴侯字子翼岑彭舞陽侯字君然馮異夏陽侯字公孫朱祐鬲侯字仲先祭遵潁陽侯字弟孫景丹櫟陽侯字孫卿蓋延安平侯字巨卿銚期安成侯字次況耿純東光侯字伯山臧宮朗陵侯字君翁馬武楊虛侯字子張劉隆慎侯字元伯馬成全椒侯字君遷王梁阜城侯字君巖陳俊祝阿侯字子昭杜茂參蘧侯字諸公傅俊昆陽侯字子衛堅鐔合肥侯字子伋王霸淮陽侯字元伯任光阿陵侯字伯卿李忠中水侯字仲都萬修槐里侯字君游邳肜靈壽侯字偉君劉植昌成侯字伯先河北一十八將光武所與定天下明帝圖畫于南宮雲臺又益四人王常山桑侯字顏卿李通固始侯字次元竇融安豐侯字周公卓茂宜德侯一作褎德字子唐合三十二人馬援以椒房之親不與兩將岑彭馮異建方面之號自函谷以西方城以南兩將之功為大八使杜喬周舉郭遵馮羡欒巴張綱周栩劉班順帝時遣循行風俗三侯高密侯鄧禹固始侯李通膠東侯賈復光武時列侯唯三侯與公卿參議國家大事二守任延九真光交址領南華風始傳二守四長荀淑當塗長季和韓韶嬴長仲黃陳實太丘長仲弓鍾皓林慮音廬長季明皆潁川人循吏傅序潁川四長並以仁信篤誠使人不欺三哲劉向谷永耿育敘傳休湯誕救在三哲三將軍周亞夫細柳劉禮霸上徐厲棘門文帝備胸奴二十四賢杜喬叔榮張奐然明向詡甫興後漢作栩陳蕃仲舉施延君子李膺元禮朱㝢季陵杜密周甫韓融元長荀爽慈明房植伯武姜肱伯淮陳球伯真王暢叔茂申屠蟠子龍張儉元節鄭玄康成冉璆孟玉李固子堅郭泰林宗朱穆公叔魏朗少英徐稚孺子皇甫規威明魏文帝旌表八賢漁父屈原季主賈誼楚老龔勝孫登嵇康晉謝萬敘四隱四顯為八賢論以處者為優出者為劣世說注六賢樊子昭虞承賢李叔才郭子瑜楊孝祖和陽士治汝南先賢傳楚接輿老萊子黔婁先生於陵子王仲孺梁鴻唐季渤托古聯德高蹈者六人圖像讚其行三賢後漢王充仲任王符節信仲長統公理韓文公作贊唐元德季紫芝文行先生蕭穎士茂挺文元先生劉迅捷卿李華作論三名儒董仲舒劉向揚雄劉敞作贊伊川先生曰漢有三儒毛公董仲舒揚雄兩龔龔勝字君賓龔舍字君倩楚人皆清節法言曰楚兩龔之潔其清矣乎二良史司馬遷文直而事核班固文贍而事詳後漢論二子有良史之才三名卿馮野王陳咸逢信翟方進傳御史大夫缺三人皆名卿俱在選中六君子漢汲黯蕭望之李固吳張昭唐魏鄭公狄仁傑東坡王元之贊足以追配此六君子三名臣管仲樂毅諸葛亮唐李翰三名臣論諸葛自比管樂兩伏波路博德馬援漢兩伏波將軍五伯鄧彪字智伯與同郡宗武伯翟敬伯陳綏伯張弟伯齊名南陽號曰五伯五處士後漢豫章徐稚孺子彭城姜肱伯淮汝南袁閎夏甫京兆韋著休明潁川李曇子雲陳蕃胡廣薦五處士四皓園公綺里季夏黃公甪音祿里先生漢書避秦入商雒山二仲求仲羊仲蔣詡元卿還杜陵舍中有三徑二人從之游見高士傳二子孝養毛義薛包後漢二子能以孝養四子逢萌子康徐房平原李曇子雲王遵君公不仕亂世相與為友時人號四子高士傳三君竇武天下忠誠竇游平陳蕃天下義府陳仲舉劉淑天下德弘劉仲承言一世之所宗八俊李膺天下模楷李元禮王暢天下英秀王叔茂杜密薛瑩漢書杜楷天下良輔杜周甫朱㝢天下冰陵朱季陵魏朗天下忠貞魏少英荀昱薛瑩漢書荀緄天下好交荀伯條劉祜天下稽古劉伯祖趙典天下才英趙仲經張儉檀彬褚鳳張肅薛蘭馮禧魏玄徐乾八顧郭泰天下和雍郭林宗夏馥天下慕侍夏子治尹勳天下英藩尹伯元羊陟天下清苦羊嗣祖劉儒天下寶金劉叔林蔡衍天下雅志蔡孟喜巴肅天下臥虎巴恭祖宗慈天下通儒宗孝初後漢書無劉儒有范滂田林張隱劉表薛郁王訪劉祗宣靖公緒恭八及陳翔海內貴珍陳子麟張儉海內忠烈張元節范滂海內謇諤范孟博檀敷海內通士檀文友孔昱海內才珍孔世元苑康海內彬彬苑仲真岑晊海內珍好岑公孝劉表海內所稱劉景升後漢書無范滂有翟超朱楷田槃疏耽薛敦宋布唐龍嬴咨宣褎八廚王商海內賢智王伯義蕃嚮海內修整蕃嘉景秦周海內貞良秦平玉胡毋班海內珍奇胡毋季皮劉翊海內光光劉子相王孝海內依怙王文祖張邈海內嚴恪張孟卓度尚海內清明度博平後漢書無劉翊有劉儒六子桓梁晉馮李育郭基王雍殷肅班固奏記東平王蒼曰此六子皆有殊行絶才二烈士臧洪陳容汝南六孝廉周子居黃叔度艾伯堅郅伯向封武興盛孔叔太守李倀選六人應歲舉三休金尚元休第五巡文休韋端休甫號京兆三休二稚周澤字稚都孫堪字子稚京師號二稚三達韋彪孟達公孫伯達魏仲達並平陵人同時齊名決録三明涼州三明張奐然明皇甫規威明段熲紀明晉中興三明諸葛恢蔡謨荀闓皆字道明建安七子孔融字文舉陳琳字孔璋王粲字仲宣徐幹字偉長阮瑀字元瑜應瑒字德璉劉楨字公幹建安獻帝年號魏文帝典論論文七子者於學無所遺於辭無所假四賢蜀司馬相如王褎嚴君平揚子雲元魏常景以四賢皆有高才而無重位記意讚之魏四友司馬懿陳群朱鑠吳質號太子四友吳四友諸葛恪左輔瑾之子張休右弼昭之子顧談輔正雍之子陳表翼正武之子皆為中庶子褚炫劉俁謝朏江斆宋王澄王敦庾敳胡毋輔之晉王衍四友一云王敦謝鯤庾敳阮修宋謝靈運與族弟惠連何長瑜荀雍羊璿之時謂四友五君顧邵諸葛瑾步騭嚴畯張承吳周昭著書稱五君四英諸葛亮蔣琬費禕董允四子諸葛孔明曰昔初交州平崔屢聞得失後交元直徐庶勤見啓誨前參事於幼宰董和每言則盡後從事於偉度胡濟數有諫止與此四子終始好合亦足明其不疑於直言也竹林七賢阮籍嗣宗嵇康叔夜山濤巨源劉伶伯倫阮咸仲容向秀子期王戎濬沖魏嘉平中並居河內山陽共為竹林之遊號竹林七賢宋顏延年五君詠述七賢山濤王戎以貴顯被黜袁宏作竹林名士傳正始名士三人夏侯太初玄何平叔晏王輔嗣弼袁宏作傳中興名士八人裴叔則楷樂彥輔廣王夷甫衍庾子嵩敳王安期承阮千里瞻衛叔寶玠謝幼輿鯤袁宏作傳世說東京士二十人李固周舉之淵謨左謨黃瓊之政事桓焉楊厚儒學崔瑗馬融文章吳祐蘇种皓欒巴牧民龐參虞詡將帥王龔張皓推士張綱杜喬糾違郎顗陰陽張衡機術順帝時東京之士於茲盛焉三傑諸葛亮張飛關羽三國志注傅子曰以劉備之略三傑之才魏佐命臣二十一人曹真曹休夏侯尚桓階陳群鍾繇張郃徐晃張遼樂進華歆王朗曹洪夏侯淵朱靈文聘臧霸李典龐德典韋荀攸正始六年祫祭太祖廟始祀佐命臣二十一人不及荀彧以末年異議江表諸將程普黃蓋韓當蔣欽周泰陳武董襲甘寧凌統徐盛潘璋丁奉吳志皆江表之虎臣孫氏所厚待也二君子張昭周瑜陸機辨亡論二君子弘敏而多奇雅達而聰哲三國名臣魏九人荀彧文若攸公達袁渙曜卿崔琰季圭徐邈景山陳群長文夏侯玄泰初王經承宗陳泰玄伯蜀四人諸葛亮孔明龐統士元蔣琬公琰黃權公衡吳七人周瑜公瑾張昭子布魯肅子敬諸葛瑾子瑜陸遜伯言顧雍元歎虞翻仲翔晉袁宏作序贊三偉人鍾繇太尉華歆司徒王朗司空文帝此三公乃一代之偉人後世殆難繼矣五雋薛兼紀瞻閔鴻顧榮賀循三俊顧榮陸機陸雲榮與機兄弟同入洛時人號為三俊二子顧榮賀循琅邪王至建業王導曰榮循此土之望宜引之以結人心二子既至則無不來矣八公安平王孚太宰鄭沖太傳王祥太保義陽王望太尉何曾司徒荀顗司空石苞大司馬陳蹇大將軍晉武帝初八公同辰攀龍附翼漢淮南八公左吳李尚蘇飛田由毛被雷被晉昌伍被中朝八達董昶仲道王澄平子阮瞻千里庾敳子嵩謝鯤幼輿胡毋輔之彥國于法龍沙門光逸孟祖三康孔愈敬康丁潭世康張茂偉康時謂會稽三康晉陽秋百六掾琅邪王睿元帝辟掾屬百餘人時人謂之百六掾刁協軍咨祭酒王承卞壺事中郎諸葛恢陳頵行參軍庾亮西曹掾通鑑兩哲劉頌李重贊曰懋哉兩哲邦家之基江表偉人謝安桓沖二妙衛瓘為尚書令與尚書郎索靖俱善