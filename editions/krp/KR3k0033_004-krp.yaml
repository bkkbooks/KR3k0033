稽古嘉言以廣之善行以實之朱文公佩觿三科造字四聲傳寫郭忠恕佩觿三卷上卷列三科通釋部敘通論袪妄類聚錯綜疑義系述徐鍇傳說文繫文字之學有三體制謂點畫有縱横曲直之殊說文之類訓詁謂稱謂有古今雅俗之異爾雅方言之類音韻呼吸有清濁高下之不同沈約四聲譜及西域反切之學始一終亥形也始東終法聲也五體千文篆八分眞行草范度寶章集十篇王方慶上十世從祖羲之十一世祖導十世祖洽九世祖珣八世祖曇首七世祖僧綽六世祖仲寶五世祖騫高祖規曾祖褎九世從祖獻之等凡二十八人書唐武后求羲之書方慶奏詔崔融序其伐閱號寶章集復以賜方慶百家諸子百六十九家言百舉全數也後漢書注三子孟子好詩書荀子好禮揚子好易孟子之文直而顯荀子之文富而麗揚子之文簡而奥司馬文正公注法言序曾子七篇内篇一外篇雜篇各三劉淸之子澄集錄莊子七篇逍遙遊齊物論養生主人間世德充符大宗師應帝王内篇沈約宋書論在昔中興元風獨扇為學窮於柱下博物止乎七篇孫子十三篇始計作戰謀攻軍形兵勢虚實軍爭九變行軍地形九地火攻用間孫武三家孫子陳曹公杜牧皥注素書六章原始正道本德宗道求人之志遵義安樂黄石公三略上略中略下略黄石公申鑒五篇政體時事俗嫌雜言上下後漢荀悅作申鑒本傳載政體篇中論二十篇治學法象修本虚道貴驗貴言藝紀覈辨智行爵祿考偽譴交厯數别壽夭務本審大臣謹所從亡國賞罰民數魏徐幹著中論二别本有復三年制役篇七術威神法五龍養志法靈龜實意法騰蛇分威法伏熊散勢法鷙鳥轉圜法猛獸損兌法靈蓍鬼谷子陰符七術列女傳八篇母儀賢明仁智貞愼節義辯通孽嬖七篇頌圖劉向女誡七章卑弱夫婦敬愼婦行專心曲從和叔妹後漢班昭作戰國策三十三篇東周西周秦齊楚趙魏韓燕宋衞中山及孔衍春秋後語除二周宋衞中山所留者七國宗寺四書宋朝玉牒仙源積慶圖宗藩慶系錄宗枝屬籍圖書十志李淑藏書二萬八百十一卷十志五十七類八目晁公武讀書志分為四部每讀一書終撮其大旨論之會要二十一類宋朝帝系后妃禮分為五樂輿服儀制崇儒運厯瑞異職官選舉道釋食貨刑法兵方域蕃夷冊府元龜三十一部帝王閏位僭偽列國君儲宮宗室外戚宰輔將帥臺省邦計憲官諫諍詞臣國史掌禮學校刑法卿監環衞銓選貢舉奉使内臣牧守令長宮臣幕府陪臣總錄外臣一千一百四門三大典開元禮通典會要周竇儼言三者經國之大典鴻烈二十篇原道俶眞天文地形時則覽㝠精神本經主術繆稱齊俗道應汜論詮言兵略說山說林人間修務泰族漢淮南王安三經孝經道德經東京記崇慶坊司空李昉宅有三經堂陰符三百言百言演道百言演法百言演術陰符經李筌曰上有神仙抱一之道中有富國安民之法下有彊兵戰勝之術黄帝九經黄帝内經十八卷九卷素問卷第十一卷師氏藏之今唯八九卷靈樞鍼經皇甫謐曰黄帝創制於九經山海經十八篇南西北東中山經為五篇海内海外大荒三經南西北東各一篇海内經一篇總十八篇相傳以為夏禹所記漢志山海經十三篇劉歆所校凡三十二篇定為十八篇五家史周齊梁陳隋唐令狐德棻建言修五家史歴年圖起共和庚申訖顯德己未凡一千八百年司馬文正公為五圖每圖為五重每重為六十行每行記一年之事古史七本紀十六世家三十七列傳蘇子由通鑑綱目表歲以首年因年以著統大書以提要分注以備言綱倣春秋而參取羣史之長目倣左氏而稽合諸儒之粹朱文公十流偏記小錄逸事瑣言郡書家史别傳雜記地理都邑簿劉知幾史通偏記小說其流有十四類年表官閥政迹凡例汪藻修元符以来日厯為四類求之讀史六事儆戒擇善閫範論事處事治體呂成公祖謙敎人讀史分六事史錄十三類正史編年偽史雜史起居注故事職官雜傳記儀注刑法目錄譜牒地理唐藝文志八圖太極三才正性天文地理王伯學術九流學術帝王紹運百官文武黄文忠公裳為翊善作八圖獻文章三易易見事易識字易讀誦顏氏家訓沈約曰文章當從三易文有二道著述出於書之謨訓易之象繫春秋之筆削比興出於虞夏之詠歌殷周之風雅柳文三多看讀多持論多著述多楊文莊公言學者當取三多三多之中持論尤難辭賦十家荀卿宋玉枚乗兔園相如上林賈誼鵩鳥子淵洞簫孟堅兩都張衡二京子雲甘泉延壽靈光文心雕龍凡此十家辭賦之英傑八詩天成元澤維南有山楊之華二月英英有蘭和風嘉木唐𤣥宗時宰相蕭嵩會百官賦詩八篇繼雅頌之體百一詩應璩休璉知序云時謂曹爽曰公今聞周公巍巍之稱安百慮有一失乎百一之名蓋興於此宋頌九篇皇祖聖祖湯湯莫醜金陵聖文六合雷聲聖武明道石介作百篇松風雪月天花竹鶴雲煙詩酒春池雨山僧道柳泉唐有日試百篇宋太平興國五年趙國昌應百篇科自陳求試上親出五言四句詩凡二十字為五篇率四韻至晚僅成數十首特賜及第五題賦詩制書批答金鑾密記唐翰林學士入院試文五藝文志杜元穎五題一卷詩評三品鍾嶸詩評自漢以來能詩者一百二十二人分三品為評三謝詩靈運惠連元暉唐子西取六十四篇為三謝詩詩二十四名賦頌銘贊文誄箴詩行詠吟題怨歎章篇操引謠謳歌曲詞調元􅐃樂府古題序詩之流為二十四名皆詩人六義之餘三十六體李商隱溫庭筠段成式唐書用儷偶相夸號三十六體三人皆行第十六二友陶淵明柳子厚二集東坡謂之南遷二友四科𤣥儒文史宋泰始六年初置總明觀四科科置學士各十人奏論宜雅書論宜理銘誄尚實詩賦欲麗魏文帝典論論文此四科不同故能之者偏詩三變自書傳所記虞夏以來下及漢魏為一等自晉宋間顏謝以後下及唐初為一等自沈宋以後定著律詩下及今日為一等朱文公曰古今之詩凡有三變江西詩社宗派圖二十五人黄庭堅宗派之祖陳師道潘大臨謝逸洪朋洪芻饒節祖可徐俯林敏修洪炎汪革李錞韓駒李彭晁沖之江端本楊符謝邁夏倪林敏功潘大觀王直方善權高荷呂本中本中作圖博學宏辭十二體制誥詔表露布檄箴銘記贊頌序詩六對正名對天地日月同類對花葉草芽連珠對蕭蕭赫赫雙聲對黄槐綠柳疊韻對彷徨放曠雙擬對春樹秋池詩苑類格唐上官儀云詩八對的名異類雙聲疊韻聨綿雙擬迴文隔句同上賦二十體叙事頌德紀功贊序緣情明道祖述論理詠物述詠引類指事析微體物假象旁喻叙體總數雙關變態范文正公賦林衡鑑析二十門以分其體勢墨義十條五經取通五明經通六唐選舉志集錄三類楚辭别集總集舊唐志丁部四庫唐經庫馬懷素史庫沈佺期子庫武平一集庫薛稷景龍文館記六閣宋經典史傳子書文集天文圖畫景德二年龍圖閣下列六閣羣書六例六籍瓊華信史瑤英玉海九流集苑金鑾絳闕蕊珠鳳首龍編南唐朱遵度羣書麗藻目錄撰古今文章著為六例總雜文一萬三千八百首百將傳起周太公至五代劉詞凡百人張預撰十國紀年吳唐蜀後蜀吳越閩漢楚荆南北漢劉恕十國紀年四十卷百官公卿表宋朝自建隆元年至治平四年依司馬遷法記大事於上方司馬光趙彥若修起建隆迄靖康李燾續元和制策元稹獨孤郁白居易唐藝文志三卷歌詩四章日重光月重輪星重輝海重潤古今注漢明帝為太子樂人作歌詩贊太子之德五詩明堂辟雍靈臺寶鼎白雉班固東都賦五篇之詩五頌班固賈逵傅毅楊終侯諷論衡永平中詔上神雀頌百官文皆瓦石唯五頌金玉孝明覽焉十二州箴荆揚兖豫徐靑幽冀并雍益交揚雄十二州箴州箴莫善於虞箴作箴三都賦蜀都呉都魏都晉左思賦三都注張載為注魏都劉逵呉蜀四子講德論微斯文學虚儀夫子浮游先生陳邱子漢王褒旣為益州刺史王襄作中和樂職宣布之詩又作傳名曰四子講德四論帝王好尚選任賢能近名推委臣下范文正公為四論以獻小學紺珠卷四
