body:
  text: 小學紺珠卷八宋王應麟撰職官類五官木正句芒火正祝融金正蓐收水正𤣥冥土正后土左傳蔡墨曰五行之官是謂五官之楚語觀射父曰天地神民類物之官謂五官三公周年後魏隋唐曰三師吏宋政和二為三公又曰三三事太師太傅太保周官亊左傳三吏注三公也三詩三大夫王肅以三亊為公賈誼曰保保其身體傅傳之徳義師道之教訓此三公之職也周禮注三公内與王論道中參六官之亊外說六鄉之教司漢百官表或司馬司徒空為三公三孤又曰三少孤宋政和為三少師少傅少保賈誼置三少皆上大夫也六卿又曰六官卿并三孤為九天官冢宰治地官司徒教春官宗伯禮夏官司馬政秋官司寇禁冬官司空土周禮六卿分職考工記外有九室九卿朝焉注六卿三孤為九卿九品周禮注六官皆總屬於冢宰周語外官不過六官之屬三百六十四輔四鄰前疑後丞左輔右弼書益稷帝曰欽四鄰尚史記云敬四輔臣注書大傳四鄰疑丞輔弼疑孔叢子謂之四近不文王世子虞夏商周有師保有丞設四輔及三公必備太師太傅太保少傅漢四輔平帝時八職正官法治要師官成治凡司官法治目旅官常治數府官契治藏史官書贊治胥官敘治敘徒官令徴令周禮宰夫辨八職五爵五等五侯公侯皆方百里伯七十里子男五十里孟子爵書武成列惟五分土惟三注同孟子於陸機五等論曰五等之制始黄唐公方五百里侯方四百里伯方三百里子方二百里男方百里周禮言書孟子指邦國實封之地而言之周禮兼附庸之地而之漢諸侯王表序周立爵五等封國八百史記三王世家周爵五等春秋三等公侯伯漢表注五侯五等諸侯三圭公執桓圭侯執信圭伯執躬圭鄭康成曰殷有三等莊子三旌之位三一作三珪謂諸侯卿皆執珪六事天子六軍其將皆命卿各有軍事曰六事甘誓乃召六卿曰六事之人注云二周禮王六軍大國三軍次國軍小國一軍百二十官天子置三公九卿二十七大夫八十一元士凡百二十官下應十二子公羊傳注虞官五十夏官百殷二百周三百明堂位唐虞建官惟百夏商官倍周官千品民之徹官百王公之子弟之質能言能聽徹其官者而物賜之姓以監其官是為百姓姓有徹品十於王謂之千品五物之官陪屬萬為萬官官有十醜為億醜醜類也楚語觀射父曰百尹百官之長書顧命九命壹命受職再命受服三命受位四命受器五命賜則六命賜官七命賜國八命作牧九命作伯周禮大宗伯以九儀之命正邦國之位命後周九命每命為二以正為上凡十八五儀上公九命為伯侯伯七命子男五命典命掌諸侯之五儀注公侯伯子男之儀王之三公八命其卿六命其大夫四命出封皆加一等同上注王之三公有徳者加命為二伯之大夫為子男卿為侯伯四命中下大夫王上士三命中士再命下士一命五等之命公之孤四命其卿三命其大夫再命其士壹命侯伯之卿大夫亦如之子男之卿再命其大夫壹命其士不命典命諸臣之五等之命注五等謂孤以下四命三命再命一命不命下左傳注古制公為大國侯伯為次國子男為國三命士大夫卿莊子正考父三命釋文云卿左傳三命兹益共注三命上也三揖卿大夫士左傳衞公子郢曰三揖在下注云三相天子三公者何天子之相也天子之相則何以三自陜而東者周公主之自陜而西者召公主之一相處乎内公羊傳六屬天官其屬六十掌邦治地官其屬六十掌教春官其屬六十掌禮夏官其屬六十掌政秋官其屬六十掌刑冬官其屬六十掌事周禮小宰以官府之六屬舉邦治今治官之屬六十三十教官之屬七十八十禮官之屬七十脫政官之屬六九刑官之屬六六意者簡編落司空之屬錯雜五官之中六職治職教職禮職政職刑職事職小宰以官府之六職辨邦治九儀九牧命者五公侯伯子男爵者四孤卿大夫士大行人以九儀辨諸侯之命等諸臣之爵九掌交九禮之親注九儀之禮秦漢設賓九州之牧周禮掌交九牧之維五史二史大史小史内史外史御史隋志周天子之史有五禮記動則左史書之言則右史書之漢志右史記事左史記言九府大府玉府内府外府泉府天府職内職金職幣漢食貨志太公為周立九府圜法三宅宅乃事常任宅乃牧常伯宅乃準準人書立政以宅以位言俊徳言爭臣七人三公左輔右弼前疑後丞孝經鄭氏注三恪舜後陳夏後杞殷後宋杜氏左傳注黄帝後薊堯後祝舜後陳鄭康成説尊於諸侯卑於二王後唐天寳七載以魏周隋為三恪九載以商周漢為三恪十二載復魏周隋為三恪韓介酅六大大宰大宗大史大祝大士大卜曲禮天子建天官先六大典司六典注殷制五官司徒司馬司空司士司寇同上天子之五官典司五衆注殷制五史記古公作官有司六府司土司木司水司草司器司貨同上天子之六府典司六職注殷制三官大司徒大司馬大司空王制大樂正大司寇市司市也同上諸侯三卿司徒農父主民司馬圻父主兵司空宏父主土酒誥宰齊語臣立三注三卿魯詩擇三有事頌三壽五長五正外薄四海咸建五長益稷五國為屬屬有長王制分唐叔職官五正左傳五官之長漢三公丞相太尉御史大夫大司徒大司馬大司空太尉司徒司空後魏年唐令後周尉宋徒唐武徳七定以太司司空為三公周宋政和二年罷依制立三孤九卿又曰九列太常奉常光禄勲郎中令衞尉中大夫令太僕廷尉大理大鴻臚典客令大行宗正宗伯大司農治粟内史大農令少府三臺尚書為中臺御史為憲臺謁者為外臺後漢書注謁者符節御史魏三臺文選注謁者司𨽻御史隋三臺三獨坐御史中丞司𨽻校尉尚書令宣秉拜御史中丞光武特詔與司隸尚書令㑹同並專席而坐京師號曰三獨坐十四博士易施讐賀孟喜房梁邱京書歐陽和伯建夏侯勝詩申公轅韓嬰固春秋嚴彭祖顔安樂禮戴聖戴徳尚書五曹六曹三公曹常侍曹改吏曹二千石曹民曹客曹成帝置尚書五人一人為僕射四人分四曹又置三公曹為五曹六人後又分客曹為南北主客凡六曹七校五校中壘屯騎步兵越騎長水胡騎射聲虎賁凡八校尉胡騎不常置故云七屯騎步兵射聲越騎長水南齊志五校二十爵一公士二上造三簪褭四不更五大夫六官大夫七公大夫八公乘九五大夫十左庶長十一右庶長十二左更十三中更十四右更十五少上造十六大上造十七駟車庶長十八大庶長十九關内侯二十徹侯漢百官表皆秦制以賞功勞避武帝諱曰通侯列侯王列侯史記漢書漢爵二等王侯亭侯漢三等王公侯伯子男縣侯鄉侯亭侯關内侯理道要訣魏十等王一嗣王郡王二國公三開國郡公四縣公五侯六伯七子八男九唐志等爵九國王郡王國公郡公縣公侯伯子男隋九等八座尚書令僕射六曹尚書後漢五曹尚書二僕射一令魏左右僕射六尚書唐令左右僕射吏部禮部兵部都官度支工部六曹隋三郎三署郎中郎侍郎郎中秦漢三郎五官郎左署郎右署郎漢三署郎續志郎光禄勲主諸郎謂之衞衞尉主衞士謂之兵衞十二卿春卿太常司宗正農夏卿太府太少府僕秋卿衛尉大廷尉匠冬卿光禄太鴻臚舟梁天監七年凡十二卿唐三省中書中書令門下侍中尚書尚書令漢政歸尚書魏歸中書元魏歸門下三省之長宰相職也唐代宗以前中書在上憲宗以後門下在上六部二十四司吏司封考司勲功户度支倉金部部禮祠部主膳部客兵職方駕部部庫刑都官司比部門工屯田水虞部部中書舎人六員分押尚書六曹二録令僕射總理六尚書事謂之都省隋志刑唐貞元年六曹皆宰相分領齊映判兵部李勉判部劉滋判吏禮二部崔造判户工二部五省隋尚書門下内史祕書内侍尚書門下内史殿内祕書二大後魏北齊司馬大將軍典司武事二傅六傅太子太傅少傅晉明帝為太子賀循太傅周顗少傅燕韓常李座俱傅東宫太子太師太傅太保少師少傅少保六尚書吏部左民客曹五兵度支魏五曹吏部三公客曹駕部屯田度支晉六曹吏部殿中五兵田曹度支左民晉大康六曹吏部祠部五兵左民度支晉五尚書為宋又有都官六尚書起部興立宫廟權置亊畢省吏部祠部度支左户都官五兵梁起部事畢省殿中劉納吏部劉顯金部孔䖍孫左右户蕭軌中兵王顒梁天監九年尚書五部吏禮兵左僕射判三部亊民刑工右僕射判三部亊隋吏户禮左丞總焉兵刑工右丞總焉兵吏為前行刑户為中行工禮為後行行總四司本行為頭司餘為子司唐五府太傅太尉司徒司空大將軍後漢樊準傳注太傅闕則謂之四府左前漢趙充國段㑹宗杜鄴傳五府謂右前後將軍二人及三公二司司徒司空劉愷傳頻歴二司六卿右師左師司馬司徒司城司寇左傳文七年六卿和公室宋以武公廢司空二宰大宰少宰左傳成十五年宋向帶為大宰魚府為少宰宋朝政和中左僕射為太宰右僕射為少宰二國史薛瑩為左華覈為右史通呉有左右二國史之職九寺太常光祿衞尉宗正太僕大理鴻臚司農太府隋唐五監國子少府將作軍器都水唐國子少府將作都水長秋隋七學六學國子太學廣文四門律書算韓文公表七館選舉志六學無廣文又曰六館隋太學國子四門書算十六衞左右衞左右驍衞左右武衞左右威衞左右領衞左右金吾衞左右監門衞左右千牛衞南衙諸衞兵北衙禁軍三衞五衞親衞府一勲衞府二翊衞府二凡五府供三衞分為三仗奉親勲翊㪚手號衙内五衞三館𢎞文館武徳置史館貞觀置集賢殿開元置𢎞文館建隆初改昭文因唐故亊命宰輔兼領三館賢太平興國中崇文院東廊為昭文館南廊為集院西廊為史館三院臺院侍御史殿院殿中侍御史察院監察御史八貂左散騎常侍二人與侍中二人為左貂右散騎常侍二人與中書令二人為右貂皆金蟬珥貂謂之八貂應劭曰金取堅剛蟬居髙飲潔貂内勁外温胡廣曰趙武靈王效胡服以金璫飾首前插貂尾三銓尚書銓中銓東銓文選吏部主之武選兵部主之皆為三銓尚書侍郎分主之乾元中改中銓為西銓六三品以上官册授五品以上制授六品以下敕授品以三銓分其選尚書為尚書銓侍郎二人分為中銓東銓四監主山林川澤之官月令三司鹽鐵度支戸部通鑑天祐三年以朱全忠為鹽鐵度支户部三司都制置其名始於此張三司使始後唐延朗御史大夫中書門下唐志凡寃而無告者三司詰之大子監國則詹事庶子為三司唐志六尚尚食尚藥尚衣尚乗尚舎尚輦唐殿中省其屬有六屬尚宫尚儀尚服尚食尚寢尚功内官六尚四選吏部七司尚書左選舊審官東院尚書右選舊審官西院侍郎左選舊流内銓侍郎右選舊三班院宋元豐五年吏部分選有四并司封司勲考功為七司兩省門下侍中審侍郎省給亊中讀中書令宣侍郎奉舎人行通典敘職官以三司三公門下中書兩省為先五使宣諭五使劉大中胡蒙朱異明橐薛徽言紹興二年五按吏七十九人薦士十七人兩制翰林學士内制中書舎人外制二相尚書左右僕射改左右丞相虞允文左梁克家右乾道八年六省尚書中書門下祕書殿中内侍通鑑武徳七年定令兩臺六察左臺知百司監軍旅右臺察州縣省風俗武后改御史臺曰肅政臺分左右監察御史第一人察吏禮部第二人察兵工部第三人察户刑部九品十八班十八品漢自中二千石至百石凡十六等後漢十三等魏更置九品梁定九品更置十八班増置為十品凡二十四品後魏置九品品各置從凡十八品自四品以下毎品分為上下階凡三十階通典唐文散階二十九武㪚階四十五志九博士晉周易王氏尚書鄭氏古文尚書孔氏毛詩鄭氏周官禮記鄭氏春秋左傳杜氏服氏論語孝經鄭