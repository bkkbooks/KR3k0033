body:
  text: 歷代論太昊伏羲氏炎帝神農氏黃帝有熊氏孔安國書序皇甫謐帝王世紀伏羲女媧神農鄭康成伏羲神農祝融白虎通燧人伏羲神農宋均譙周風俗通云遂皇戲皇農皇天皇地皇人皇皇王大紀天皇地皇泰皇史記秦紀索隱炎黃二帝雖相承帝王世紀中間隔八帝五百餘年少昊金天氏史記有黃帝無少昊顓頊高陽氏帝嚳高辛氏帝堯陶唐氏帝舜有虞氏書序帝王世紀黃帝顓頊帝嚳帝堯帝舜史記大戴禮家語太皞木炎帝火黃帝土少皞金顓頊水月令家語包犧神農黃帝堯舜皇王大紀堯甲辰即帝位舜黃帝炎帝國語夏商又殷周漢書注三季三代之末左傳注二叔夏殷之叔世夏禹商湯周文王孟子注孔子閒居注虞夏殷周學記注黃帝堯舜禹湯祭法并顓頊嚳為七代唐虞夏殷周魯靈光殿賦五帝三王陸機五等論崔寔政論八世注三皇五帝夏殷論語周監於二代湯太甲太戊祖乙盤庚武丁孟子太宗太甲中宗太戊高宗武丁漢劉歆曰周公為母逸之戒舉殷三宗以勸成王大王王季文王詩三后在天禹湯文王離騷三后之純粹文王武王詩昊天有成命二后受之二后文武也禹湯文武左傳四王之王也注堯舜禹湯文武陸贄奏議此六君者天下之盛王也莫不從諫以輔德詢眾以成功夏伯昆吾商伯大彭豕韋周伯齊桓晉文齊桓晉文宋襄秦穆楚莊左傳五伯之霸也注孟子五霸者三王之罪人也注齊桓晉文秦穆宋襄楚莊漢地理志注同齊桓晉文楚莊吳闔閭越句踐荀子五伯齊桓宋襄晉文秦穆吳夫差漢諸侯王表注晉文侯仇文公重耳左傳復二文之業周南召南正風邶鄘衛王鄭齊魏唐秦陳檜曹豳變風今詩之次第豳齊衛檜陳唐秦鄭魏曹變風之先後周召邶鄘衛王鄭齊豳秦魏唐陳檜曹未刪詩之前季札所聽樂歌次第周召邶鄘衛王檜鄭齊魏唐秦陳曹豳鄭氏詩譜次第歐陽子詩譜序周召王豳同出於周邶鄘并於衛檜魏無世家其可考者陳齊衛晉曹鄭秦封國之先後夏啟有鈞臺之享商湯有景亳之命周武有孟津之誓成有岐陽之蒐康有酆宮之朝穆有塗山之會左傳椒舉言六王之事伏羲神農張衡東京賦踵二皇之遐武堯取人以狀舜取人以色禹取人以言湯取人以聲文王取人以度大戴禮此四代五王之取人容成氏大庭氏柏皇氏中央氏栗陸氏驪畜氏軒轅氏赫胥氏尊盧氏祝融氏伏戲氏神農氏莊子注十二氏皆古帝王續漢曆志元命包乾鑿度皆以為開闢至獲麟二百七十六萬歲三皇五帝夏禹史記伊尹言素王及九主之事索隱云或曰謂九皇隱十一桓十八莊三十二閔二僖三十三文十八宣十八成十八襄三十一昭三十三定十五哀十四二百四十二年封禪七十二君管仲曰吾封泰山禪梁父者七十二家夷吾所記者十有二無懷氏虙羲神農氏炎帝神農後黃帝顓頊帝嚳堯舜禹湯周成王史記漢郊祀志班固典引曰作者七十有四人注自古封禪七十二君并漢武帝光武韓詩外傳古封泰山禪梁父者萬餘人仲尼觀焉不能盡識魯齊晉秦楚宋衛陳蔡曹鄭燕史記漢書東方朔傳注十二國謂魯衛齊楚宋鄭魏燕趙中山秦韓史記表十二諸侯首魯訖吳實十三國不數吳劉向戰國策序萬乘之國七千乘之國五燕召公奭始封楚始熊繹受封魏魏斯分晉趙趙籍分晉韓韓虔分晉齊田和并齊并秦為七國又曰七雄并宋微子始封衛康叔始封中山鮮虞為九國賈誼過秦論云九國之師高祖太宗文帝世宗武帝中宗宣帝世祖光武顯宗明帝肅宗章帝文中子續書有七制皆漢之賢君太宗世宗中宗顯宗肅宗楊賜傳二祖五宗高祖世祖漢二祖太祖武帝高祖文帝烈祖明帝魏三祖漢劉備昭烈魏曹丕文帝吳孫權大帝吳東晉司馬宋劉齊蕭梁蕭陳陳皆都建康晉宋後魏拓跋北齊高後周宇文隋楊文中子續詩備六代夏殷周秦漢魏曹元首六代論太宗玄宗憲宗范祖禹曰貞觀之治幾於三代開元之治幾於貞觀元和之政號為中興梁唐晉漢周五十六年更八姓十有四君前趙劉淵稱漢曜號趙後趙石勒冉閔號魏前秦苻洪後秦姚萇西秦乞伏國仁前燕慕容皝後燕慕容垂南燕慕容德北燕馮跋前涼張軓後涼呂光南涼禿髮烏孤西涼李暠北涼沮渠蒙遜夏赫連勃勃蜀李維壽稱漢吳楊行密南唐李昇後稱江南前蜀王建後蜀孟知祥南漢劉隱楚馬殷吳越錢鏐閩王審知延政號殷南平高季興東海劉崇邵子曰三皇春也五帝夏也三王秋也五霸冬也七國冬之餘洌也漢王而不足晉霸而有餘三國霸之雄者也十六國霸之叢者也南五代霸之借乘者也北五朝霸之傳舍者也隋晉之子也唐漢之弟也隋季諸郡之霸江漢之餘波也唐季諸鎮之霸日月之餘光也後五代之霸日未出之星也西楚項籍衡山吳芮臨江共敖九江英布常山張耳代趙歇臨淄田都濟北田安膠東田市雍章邯塞司馬欣翟董翳燕臧荼遼東韓廣魏魏豹殷司馬卬韓韓成河南申陽漢表譜十八王九頭五龍攝提合雒連通序命循飛因提禪通流訖廣雅自開闢至獲麟二百七十六萬歲分為十紀大率一紀二十七萬六千年後漢曆志元命苞乾鑿度皆以開闢至獲麟二百七十六萬歲九頭紀五龍紀攝提紀合洛紀連通紀序命紀六藝論遂皇之後歷六紀九十一代西周東周大事記顯王二年趙與韓分周為二東西周各為列國又見前世本西周桓公揭居河南東周惠公班居洛陽后稷不窋鞠陶公劉慶節皇僕差弗毀隃音踰公非高圉亞圉公祖大王王季文王十八王加武王成王康王周語大子晉曰自后稷之始基靖民十五王而文始平之十八王而康克安之衛彪傒曰后稷勤周十有五世而興禹湯文武成王周公禮運齊桓有召陵之師晉文有踐土之盟左傳椒舉言二公之事漢志二伯齊桓晉文皇伯皇仲皇叔皇季皇少春秋命曆序五姓同期俱駕龍號曰五龍唐虞夏殷周王符潛夫論顓頊帝嚳堯舜史記自序維昔黃帝法天則地四聖遵序各成法度殷王中宗高宗祖甲周文王無逸堯舜禹湯周文王淮南子孝公惠文王武王昭襄王孝文王莊襄王賈生過秦論曰始皇奮六世之餘烈北朝魏周齊南朝陳文中子除四代之法伏羲文王孔子漢藝文志易道深矣人更三聖世歷三古伏羲為上古文王為中古孔子為下古禹周公孔子孟子曰禹抑洪水而天下平周公兼夷狄驅猛獸而百姓寧孔子成春秋而亂臣賊子懼堯舜禹董仲舒曰禹繼舜舜繼堯三聖相授而守一道漢功臣表湯法三聖文王武王周公漢諸侯王表三聖制法伯夷聖之清伊尹聖之任柳下惠聖之和孟子三子者不同道其趨一也伯夷太公孟子二老者天下之大老也老子老萊子孫綽天台山賦躡二老之玄縱德行顏淵回閔子騫損冉伯牛耕仲弓冉雍言語宰我予子貢端木賜政事冉有求季路仲由文學子游言偃子夏卜商論語顏子配享升曾子為十哲曾子配享升子張為十哲十哲曾參子輿顓孫師子張澹臺滅明子羽宓不齊子賤原憲子思公冶長子長南宮括子容公皙哀季次曾蒧皙顏無繇路商瞿子木高柴子羔漆雕開子開公伯寮子周司馬耕子牛樊須子遲有若公西赤子華巫馬施子期梁鱣叔魚顏辛子柳冉孺子魯曹恤子循伯虔子析公孫龍子石冉季子產公孫句茲子之秦祖子南漆雕哆子歛顏高子驕漆雕徒父壤駟赤子徒商澤子季石作蜀子明任不齊選公良孺子正后處子里秦冉開公夏首乘奚容蒧子皙公肩定子中顏祖襄罕父黑子索鄡單音善子家句井疆秦商子丕申黨周顏之僕叔榮旂子祺縣成子祺左人郢行燕伋思鄭國子徒秦非子之施之常子恒顏噲子聲步叔乘子車原亢籍樂欬子聲廉潔庸叔仲會子期顏何冉狄黑皙邽巽子斂孔忠子蔑公西輿子上公西蒧子上史記列傳孔子曰受業身通者七十七人皆異能之上也蘇氏古史云秦冉顏何不載於家語琴牢陳亢不錄於史記二書不可偏廢而琴張陳亢又見論語並錄之凡七十九人孟子軻荀卿況韓文公進學解顏回胥附端木賜奔輳顓孫師先後仲由禦侮尚書大傳孔叢子孔子曰吾有四友六侍仲尼志意不立子路侍儀服不修公西華侍禮不習子路侍辭不辯宰我侍亡忽古今顏回侍節小物冉伯牛侍尸子曰吾以夫六子自厲也伯夷叔齊虞仲夷逸朱張柳下惠少連論語七人皆逸民之賢者王弼注朱張字子弓荀卿以比孔子長沮桀溺荷蓧丈人晨門荷蕢儀封人楚狂接輿同上舊說伏羲神農黃帝堯舜禹湯同上張子曰左丘明卜子夏公羊高榖梁赤伏勝高堂生戴聖毛萇孔安國劉向鄭眾賈逵杜子春馬融盧植鄭玄服虔王弼何休王肅杜預范甯唐貞觀二十一年配享孔子廟濂溪周惇頤茂叔明道程顥伯淳伊川程頤正叔康節邵雍堯夫橫渠張載子厚涑水司馬光君實朱文公作贊胡文定公奏西都有邵雍程顥頤關中有張載四人道學德行名於當世請加封號載在祀典謝良佐顯道游酢定夫呂大臨與叔楊時中立二程先生門人漢諸儒言詩於魯則申培公於齊則轅固生於燕則韓太傅言尚書自濟南伏生言禮自魯高堂生言易自菑川田生言春秋於齊魯自胡母生於趙自董仲舒史記儒林傳先師若漢禮有高堂生樂有制氏詩有毛公書有伏生文王世子注孟軻荀卿揚雄王通韓愈孔道輔繪五賢於兗州夫子廟元豐七年孟子配享荀揚韓從祀周二程張朱熹元晦淳祐元年列于從祀禹孔墨韓文公爭臣論回之信顏淵賜之敏子貢由之勇子路師之莊子張家語子路冉有公西華三子言志由也果賜也達求也藝論語宰我子貢有若孟子注三子言孔子子路勇士子貢辯士顏淵聖士韓詩外傳子路士子貢士君子顏淵明君子荀子孟軻荀況董仲舒司馬遷劉向揚雄漢書贊此數公皆博物洽聞通達古今傳曰聖人不出其間必有命世者豈近是乎築巖翁釣溪翁卜年翁感麟翁伯陽翁漆園翁竺乾翁臥龍翁橫渠先生八翁吟明由必育成博隕丘論語摘輔象燧人出天四佐出洛金提鳥明視默紀通仲起陽起論語摘輔象敘古蒙求云賢庸六輔蚩尤為當時天通鑑外紀云風后太常為廩者地奢龍為土師東祝融為司徒南大封為司馬西后土為李北管子黃帝得六相風后天老五聖知命窺紀地典力墨或作牧論語摘輔象風后配上台天老配中台五聖配下台帝王世紀謂之三公沮誦蒼頡隸首孔甲黃帝四史官重為句芒木正該為蓐收金正修及熙為玄冥水正左傳蔡墨云漢張衡云四敘三正舜為司徒契為司馬禹為司空后稷為田疇夔為樂正倕為工師伯夷為秩宗皋陶為大理益掌敺禽說苑堯知九職之事戰國策堯有九佐淮南子堯之佐九人伯禹宅百揆棄后稷契作司徒皋陶作士垂其工益作朕虞伯夷作秩宗夔典樂龍納言舜典咨汝二十有二人注禹垂益伯夷夔龍六人新命有職四岳十二牧凡二十有二人薛氏曰四岳十二牧九官也四岳為一人漢劉更生曰舜命九官濟濟相讓南正重司天屬神火正黎司地屬民史記顓預命重黎其後二官咸廢所職堯復遂重黎之後不忘舊者使復典之而立羲和之官義仲春羲叔夏和仲秋和叔冬堯典注重黎之後羲氏和氏世掌天地四時之官四岳即羲和四子分掌四岳之諸侯周語四伯謂四岳也漢食貨志堯命四子以敬授民時朱文公說四岳一人總四岳諸侯之事馬融云羲氏掌天官和氏掌地官四子掌四時高陽氏有才子八人蒼舒隤敳檮戭大臨尨降庭堅仲容叔達左傳文十八年太史克曰齊聖廣淵明允篤誠天下之民謂之八愷垂益禹皋陶之倫水經注隤敳益左傳皋陶庭堅高辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍同上忠肅其懿宣慈惠和天下之民謂之八元稷契朱虎熊羆之倫八愷八元同上十六族世濟其美舜舉十六相禹稷契皋陶伯益論語舜有臣五人而天下治禹為司空契為司徒皋陶為李后稷為田疇管子舜四士石戶之農北人無擇卞隨務光呂氏春秋四士之節伯夷為陽伯羲仲之後為羲伯棄為夏伯羲叔之後為羲伯咎繇為秋伯和仲之後為和伯垂為冬伯闕一人尚書大傳伯夷降典禹平水工稷降播種書呂刑堯命三后恤功于民周公君陳畢公畢命三后協心禹契后稷淮南子禹稷禼皋陶伯夷垂益夔楚辭東方朔七諫注雄陶一作雒方回續牙伯陽東不訾秦不虛靈甫尸子逸士傳戰國策顏斶曰堯有九佐舜有七友禹有五丞湯有三輔禹皋陶后稷史記殷紀大撓作甲子黔如作慮首容成作曆羲和作占日尚儀作占月后益作占歲胡曹作衣夷羿作弓祝融作市儀狄作酒高元作室虞姁作舟伯益作井赤冀作臼乘雅作駕寒哀作御王冰作服牛史皇作圖巫彭作醫巫咸作筮呂氏春秋此二十官者聖人所以治天下也奚仲作車蒼頡作書后稷作稼皋陶作刑昆吾作陶夏鯀作城同上此六者所作當矣倕作弓浮游作矢奚仲作車乘杜作乘馬世本云相土荀子伊尹伊陟臣扈巫咸巫賢甘盤書君奭注伊尹至甘盤六臣黃帝學乎太真顓頊學乎綠圖帝嚳學乎赤松子堯學乎尹壽荀子作君疇舜學乎務成跗荀子作昭禹學乎西王國湯學乎威子伯文王學乎鉸時子斯武王學乎郭叔周公學乎太公仲尼學乎老聃新序子夏曰此十一聖人未遭此師則功業不著乎天下神農學悉老黃帝學太真顓頊學伯夷父帝嚳學伯招帝堯學州支父帝舜學許由禹學大成執湯學小臣文王武王學太公望周公旦齊桓公學管夷吾隰朋晉文公學咎犯隨會秦穆公學百里奚公孫支楚莊王學孫叔敖沈尹竺吳王闔閭學伍子胥文之儀越王勾踐學范蠡大夫種同上呂子曰此皆聖人之所學也皋陶稷契史皇蒼頡淮南子伊尹右仲虺左晉志成湯初置二相以伊尹仲虺為之左傳仲虺為湯左相伊尹為右相孟子伊尹萊朱注萊朱一曰仲虺是也慶誧伊尹湟里且東門虛南門蠕西門疵北門側鬻子湯得七大夫佐以治天下微子去之箕子為之奴比干諫而死論語閎夭太公望左傳釋文曰太顛南宮适散宜生尚書大傳詩疏附先後奔奏禦侮孔叢子文王胥附奔輳先後禦侮謂之四鄰率下親上曰疏附相道前後曰先後喻德宣譽曰奔奏武臣折衝曰禦侮周書維人四佐左傳注文王有四臣伯達伯适仲突仲忽叔夜叔夏季隨季騧論語周有八士國語文王詢於八虞注周八士皆在虞官鄭玄以為成王時劉向馬融以為宣王時周書注武王賢臣周公旦召公奭太公望畢公榮公太顛閎夭散宜生南宮适文母劉原父謂子無臣母之義荅邑美也論語泰誓予有亂臣十人或曰亂本作乿古治字周公在前召公在後畢公在左史佚在右後漢書四子周公立於前謂之道太公立於後謂之充召公立於右謂之弼史佚立於左謂之承大戴禮召公為太保周公為太傅太公為太師賈誼傳召公太公書金縢召公畢公顧命注二公為二伯周公召公太公畢公高蘇公忿生呂氏春秋武王之佐五人注太公周公召公畢公毛公淮南子注虢叔閎夭泰顛散宜生南宮适孔叢子五臣同寮比德以贊文武書君奭注五臣佐文王為胥附奔走先後禦侮之任書大傳散宜生閎夭南宮括三子學乎太公武王立虢叔先死故曰惟茲四人東伯周公畢公代西伯召公書正義王制八百各以其屬屬於天子之老二人分天下為左右曰二伯公羊傳自陝以東周公主之自陝以西召公主之史記宣王即位二相輔之注召公周公狐偃趙衰顛頡魏武子犨司空季子胥臣臼季左傳叔向曰文公生十七年有士五人袁宏云五臣顯而重耳霸劉越石詩重耳任五賢狐偃趙衰賈它晉語三材侍之卿才三人也里克荀息晉語丕鄭曰二國士之所圖無不遂也荀罃將中軍知武子士匄佐范宣子荀偃將上軍中行獻子韓起佐宣子鑾黶將下軍桓子士魴佐彘恭子趙武將新軍文子魏絳佐莊子左傳襄八年鄭子展曰晉君方明四軍無闕八卿和睦知莊子荀首范文子士燮韓獻子厥欒武子曰三卿為主可謂眾矣注皆晉之賢人管夷吾甯戚隰朋賓胥無鮑叔牙齊語甯戚為田官隰朋為大行東郭牙為諫臣弦寧為大理王子成甫為大司馬新序管仲鮑叔牙隰朋袁宏曰三賢進而小白興秦奄息仲行鍼虎詩左傳子車氏三子鄭叔詹堵叔師叔左傳僖七年管仲曰三良為政未可間也晉王導郗鑒庾亮蘧瑗伯玉史狗文子史鰌史魚公子荊公子發文子公子朝左傳襄二十九年吳公子札適衛曰衛多君子未有患也趙孟為大夫文子伯瑕為佐士文伯史趙師曠而咨度焉叔向女齊以師保其君左傳襄三十年季武子曰晉未可媮也其朝多君子令尹子西太宗子敖葉公子高司馬子反昭奚恤新序秦欲伐楚使使者往觀楚之寶器昭奚恤曰楚國所寶者賢臣也秦使者曰楚多賢臣未可謀也祁午張趯籍談女齊梁丙張骼輔躒力狄反苗賁皇扶云反左傳楚薳啟彊曰羊舌盻之下八大夫皆諸侯之選也國子高子左傳管仲有天子之二守國高在天下所命為齊守臣皆上卿也守手友反裨諶世叔游吉行人子羽東里子產論語為命裨諶草創之世叔討論之行人子羽修飾之東里子產潤色之注更此四賢而成故鮮有敗事由余百里奚蹇叔丕豹公孫支史記李斯上書曰昔繆公求士西取由余於戎東得百里奚於宛迎蹇叔于宋求丕豹公孫支於晉此五子者不產於秦而繆公用之仲孫蔑孟獻子季孫行父文子左傳子叔聲伯曰二人者魯國社稷之臣也樂正裘牧仲其三人忘之孟子仲叔圉治賓客孔文子祝鮀治宗廟王孫賈治軍旅論語舌庸苦成大夫種范蠡皋如國語越王勾踐召五大夫問戰牛畜荀卿徐越公仲進三人子夏田子方段干木新序白圭曰文侯師子夏友田子方敬段干木三士翊之徒師沼郄辛芒卯說苑魏太子曰此三大夫魏國之大寶檀子守南城盻子守高唐黔夫守徐州徐音舒種首備盜賊史記魏王問曰王亦有寶乎齊孟嘗君田文魏信陵君公子無忌趙平原君趙勝楚春申君黃歇賈誼曰四賢皆明智而忠信寬厚而愛人游俠傳序游談者以四豪為稱首子良昭常景鯉戰國策令尹子文葉公子高莫敖大心棼冒勃蘇蒙榖戰國策莫敖子華對威王
