蟠陸龜蒙三髙士贊梁何𦙍與兄求㸃號何氏三髙范蠡鴟夷子皮張翰季鷹江東步兵陸龜蒙魯望甫里先生呉江三髙祠三髙士五代鄭遨隱華山與道士羅隱之李道服世目以為三髙士雙廟唐張巡許逺廟在睢陽二孝宋潘綜呉達王韶之有詩唐侯知道程俱羅李華作贊九老唐胡杲八十九吉􅌈八十六鄭據八十四劉眞一作嘉盧眞皆八十二張渾白居易皆七十四狄兼謨盧貞皆未七十唐書繪皆髙年讌集人為九老圖四賢宋朝范仲淹余靖尹洙歐陽修景祐中蔡襄作四賢一不肖詩一不肖髙若訥也彦國之言鋪陳富弼晦叔之言簡當吕公著君實之言優游司馬光伯淳之言條暢程顥熈寧間康節邵先生雍四賢吟四眞富弼真宰相歐陽修真學士包拯真中丞胡翼之真先生瑗嘉祐中洛陽耆英十二人富弼七十九文彦博席汝言皆七十七王尚恭七十六趙丙劉几馮行已皆七十五樊建中七十三王愼言七十二張問張燾皆七十司馬光未七十預㑹武成王廟十哲唐白起韓信諸葛亮李靖李勣列於左張良田穰苴孫武呉起樂毅列於右八仙賀知章汝陽王璡李適之崔宗之蘇晉李白張旭焦遂號飲中八仙二文公韓愈李翺四俊苗延嗣吕太一貟嘉靜崔訓張嘉貞所薦皆位清要當時語曰令君四俊三諫臣張符趙璘牛叢宣宗曰諫臣舉職三人足矣六逸孔巢父韓準裴政李白張叔明陶沔同隱徂徠山號竹溪六逸清節三人開元後治廣有清節者宋璟李朝隱盧奐三人二良陸長源汴州鄭通誠徐州白居易哀二良文四眞莊子南華眞人文子通元眞人列子沖虚眞人庚桑子洞靈眞人韓文公詩四眞三隱周續之劉遺民陶淵明宋潯陽三隱阮孝緒劉訏劉歊梁之都下謂三隱李伯時公麟徳素粢元中沖元宋龍眠三隱三儒燉煌張湛金城宗欽武威段承根後魏崔浩曰三人皆儒者三賢五代桑維翰李濤王朴王元之懐賢詩全節三士王彦章裴約劉仁贍五代史全節之士三五君宋徐鉉李昉石熈載王祐李穆李至為五君詠五鳳李穆宋白賈黄中吕蒙正李至同入翰林扈蒙詩五鳳齊飛入禁林四御史曹修古郭勸楊偕段少連天聖末三諫官歐陽修余靖王素三得人富弼宰相歐陽修翰林學士張昇御史中丞升卿至和中六御史吕誨吕大防范純仁趙瞻傅堯俞龔鼎臣治平中三舎人宋敏求次道蘇頌子容李大臨才元熈寧中四先生陳襄述古陳烈季慈周希孟公闢鄭穆閎中閩人號為四先生劉􅉓執中與四人為友鄉人號五先生四學士黄庭堅秦觀張耒晁補之皆游蘇軾之門之陳無已云蘇公門有客四人黄魯直秦少游晁無咎則長公之客也張文潛則少公之客也張文潛詩云長公波濤萬頃陂少公巉秀千尋麓黄郎蕭蕭日下鶴陳子峭峭霜中竹秦文倩麗舒桃李晁論崢嶸走珠玉三老文彦博張方平范鎮元祐初蘇軾言國之元老歴事四朝耄期稱道者獨三人而已三友髙懌張嶤許勃從种放號南山三友四友韓維持國司馬光君實吕公著晦叔王安石介甫馮元孫質陸參夏侯圭二龍吕晦叔司馬君實明道先生詩二龍閒臥洛波清三傑程顥鄠縣簿張少甫武功簿朱光庭萬年簿關中號為三傑四賢杜衍清謹而守規矩范仲淹恢廓自信而不疑韓琦純正而質直富弼明敏而果銳歐陽修上書云此四人者可謂公正之賢也三人並登兩府王堯臣伯庸第一韓琦稚圭第二趙槩叔平第三天聖五年榜王珪禹玉第二韓絳子華第三王安石介甫第四慶歴二年楊寘榜龍首四人吕蒙正聖功李迪復古王曽孝先宋庠公序石揚休詩皇朝四十三龍首身到黄扉止四人五賢王十朋龜齡馮方圓仲胡憲原仲查籥元章李浩徳逺紹興中太學為五賢詩三元孫何漢公王曽孝先楊寘審賢馮京當世七王韓世忠蘄劉光世鄜張俊循岳飛鄂楊存中和吳玠涪呉璘信中興將四將劉錡岳飛李顯忠魏勝章潁上四將傳六朝勲臣曹彬至邵曄二百四人慶歴三年定范質至藍元振一百十六人政和三年增二俊王文正曽劉子儀筠陳恕領春官以文正為舉首歲中拔子儀於常選云吾得二俊名世才也陳襄薦三十三人司馬光韓維吕公著蘇頌孫覺李常范純仁蘇軾曽鞏孫洙王存顧臨林希逸李師中傅堯俞胡宗愈王安國劉摰虞太熈程顥劉載薛昌期張載蘇轍孔文仲呉賁呉恕林英孫奕林旦鄒何唐坰鄭俠宋熈寧間事紹興元年詔曰徳行言語政文學皆所具備慶厯衆賢得象殊相衍樞密使弼仲淹琦樞密副使修靖素襄諫官石介聖徳頌衆賢之進如茅斯拔惟仲淹弼一夔一契盛徳五人富文忠司馬文正趙清獻范忠文鎮張文定方平配饗功臣二十四人皇武殿趙普曹彬大定殿薛居正潘定石熈載熈文殿李沆李王旦繼隆美成殿王曽曹瑋吕夷簡治隆殿韓琦亮曽公大明殿富弼重光殿司馬光承元殿韓忠彦皇徳殿吕頥浩韓世忠趙鼎張俊系隆殿陳康伯史浩美明殿葛邲垂光殿趙汝愚太祖將帥十四人李漢超屯關南馬仁瑀守瀛州韓令坤鎮常山賀惟忠守易州何繼筠鎮棣州以拒北虜郭進控山西武守琪戍晉州李謙傅守隰州李繼勲鎭昭義以禦北漢趙贊屯延州姚内贇守慶州董遵誨屯環州王彦昇守原州馮繼業鎭靈武以備西戎元祐三黨洛黨程頥為領袖羽朱光庭賈易等為翼蜀黨蘇軾為領袖翼吕陶等為羽朔黨劉摰為領袖七從官韓忠彦李清臣黄履陸佃郭知章曾肇龔原元符三年尚書從官除七人謂之快活差除二名臣向敏中張詠淳化中飛白書二名付宰相曰此名臣也二相文彦博富弼士大夫相慶得人仁宗語歐陽修曰朕用二相人情如此豈不賢於夢卜哉四人傑韓范富歐陽東坡范文正公集序二將狄青种世衡歐陽公言兵興以來惟得邊將二人二卿劇可久張仁瑑國史贊劇張二卿用法持平名臣言行録五朝起趙普至蘇洵凡五十五人三朝起韓琦至陳師道凡四十人朱文公撰三詞人李邴漢老汪藻彦章樓鑰大防西山眞文忠公云南渡以來詞人三人五君子漢諸葛亮忠武侯唐杜工部顔文忠公韓文公宋范文正公朱文公序王龜齡集此五君子其心光明正大疎暢洞達十賢呉隱之宋璟李尚隱盧奐李勉孔戣盧鈞蕭倣滕修王綝廣州十賢八人增二人蔣之竒為贊元祐建中列傳元祐黨籍建中上書邪等名在兩籍者三百九人龔頥正訪求闕遺成列傳譜述一百卷書於編者三百五人不可詳者四人謚文正三人王曾范仲淹司馬光李昉王旦皆謚文貞制䇿入三等四人呉育蘇軾范百禄孔文仲至道九老張好問年八十五李運年八十宋琪武允臣皆年七十九僧贊寧年七十八魏丕年七十六楊徽之年七十五朱昂李昉皆年七十一南都五老杜祁公衍王渙畢世長朱貫馮平西京五老文潞公范景仁鎮張仲巽史中輝炤劉伯壽几三鄉老逸老王規拙老任粹野老士建中鄆州人學易集三老傅堯俞范純仁劉摰皆守和州有三老堂洛中七交歐陽永叔張堯夫汝士尹師魯洙楊子聰梅聖俞堯臣張太素王幾道三君子王文貞公旦之天下謂大雅寇萊公準之天下謂大忠馬正惠公知節至天下謂之直制科十五人何泳富弼蘇紳呉育張方平田況錢明逸錢彦逺呉奎夏噩陳舜俞錢藻蘇軾王介蘇轍仁宗時四明五先生楊適杜醇王致樓郁王說四先生舒璘元質沈煥叔晦楊簡敬仲袁燮和叔三林林栗枅大中四明郡守有聲三賢謝絳希深范仲淹希文孫甫之翰守鄧州皆號循吏翰林學士買黯鄧人也創三賢堂於百花洲曾肇子開劉攽貢父孔文仲經父東坡和二舎人詩三賢起江右五賢陶潛淵明劉渙凝之李常公擇劉恕道原陳瓘瑩中朱文公守南康祠五賢三忠歐陽文忠公修楊忠襄公邦乂胡忠簡公銓廬陵三忠堂周益公記三友李舒李展張舜儀李子長為邠州得善士三人圖其象於學館名堂曰三友浮休集三豪石曼卿延年詩歐陽永叔文杜師雄黙歌石守道三豪詩四賢程正叔黄魯直尹彦明焞譙天授定涪州四賢樓在北巖宋元憲景文連庶庠安州四賢堂三絶才絶畫絶癡絶晉顧愷之謝澹喜霽詩靈運寫鯤詠宋梁元帝圖宣尼象為贊而書之鄭䖍自寫詩并畫唐𤣥宗曰三絶宋令文富文辭工書有力子之問文章皆之悌趫勇之愻草𨽻得父一絶李揆門地人物文學韋暠善判蒲州司户李亘工書司士徐彦伯屬辭司兵河東三絶李白歌詩裴旻劒舞張旭草書文宗詔以為三絶李潼有曽閔之行孫樵有揚馬之文司空圖有巢由之風僖宗在蜀行在三絶薛稷畫鶴郎餘令畫鳳賀知章書秘書省三絶四絶李華為元徳秀碑顔眞卿書李陽冰篆額號四絶碑詩楚詞草書畫宋文同五絶六絶虞世南徳行忠直博學文辭書翰太宗稱有五絶李邕文章書翰正直辭辯義烈英邁時號六絶八絶呉呉範相風劉惇占氣趙達算皇象書嚴子卿棊宋壽占夢曹不興畫鄭嫗相三妙舌力筆呉沈支有三妙二寳謝靈運詩書宋文帝稱為二寳胡伸汪藻有聲太學學中為之語曰江左二寶二絶顧野王畫古賢王褒書贊梁伏曼容袁粲宋二一臺絶宋世軌廷尉少卿蘇珍之大理正北齊中時人以為寺二絶三服韓雲卿文辭李陽冰篆書韓擇木八分文公科斗書二始三始阮咸始平顔延之始安宋顔延之出為始安太守謝晦謂曰昔阮咸斥為始平郡今卿又為始安可謂二始之梁裴邃左遷始安太守與吕僧珍書曰阮咸有二始歎吾才不逮古人今為三始非其願也兩雋何妥蕭眘隋何妥傳時人語曰世有兩雋白陽何妥青陽蕭眘三素望阮萬齡袁豹江夷為孟昶長史司馬時人謂昶府有三素望宋書四友子祀子輿子犁子來四人相與為友莊子三友子桑户孟子反子琴張三人相輿為友莊子三大夫宋孔父義形於色仇牧不畏彊禦晉荀息不食其言春秋公羊傳人春秋通㫖曰三大夫聖取其死節五大夫呉起西門豹北門可樂羊李克説苑魏翟黄進五大夫三帥郤克士燮欒書晉百里孟明視西乞術白乙丙秦傳左四子王倪齧缺被衣許由莊子堯見四子藐姑射之山汾水之陽龍逢比干宫之竒屈原陸贄奏議四子既去四君亦危龍逢比干韓非陳蕃劉蕡對䇿四子商君白起呉起大夫種戰國䇿四子成功而不去四士子胥輔果穆生鄒陽文選阮元瑜書四生程元仇璋董常薛收文中子程太原府君曰夫子得仇董薛而六經益明對問之作四生之力也六子墨子蔽於用而不知文宋子蔽於欲而不知得慎子蔽於法而不知賢申子蔽於勢而不知知音智惠子蔽於辭而不知實莊子蔽於天而不知人荀子解蔽篇而蘇氏曰荀子譏六子之蔽荀卿之蔽不下於六子二子北宫黝孟施舎孟子曰二子之勇魏成翟璜史記文侯謂李克曰二子何如司馬相如枚臯梁張率奏賦武帝曰相如工而不敏枚臯速而不工卿可謂兼二子於金馬矣李栖筠李鄘唐書贊二子其剛者歟小學紺珠卷六
