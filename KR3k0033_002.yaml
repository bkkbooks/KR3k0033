二十一州梁朱異請分為五品五品之外又有二十餘州凡一百七州赤畿望緊上中下唐陸贄奏議縣邑有七等之異京府都督都護府四輔六雄十望十緊上州中州下州陸贄奏議州府有九等之差壽陽盰眙淮陰元魏高閭曰三鎮淮南之本原碻磝滑臺洛陽虎牢通鑑城陽琅邪高密膠東東萊北海齊千乘濟南平原泰山臨菑後漢耿弇平齊樹十二郡旗鼓吳楚趙膠西濟南菑川膠東兩銅柱馬援植兩銅柱於象林南界與西屠國分漢之南境林邑國記上黨壺關漢書地理志太原北九十里皇甫士安隋書地理志崔頤問一知二瓜沙伊肅鄯甘河西蘭岷廓唐大中五年張義潮以十一州歸于有司并揚益荊隋天下唯有四總管以晉秦蜀三王及韋世康為之太華少華張衡西京賦綴以二華注二山二崤崤有二陵焉其南陵夏后皋之墓也其北陵文王之所辟風雨也左傳二崤之阻西都賦初池麋池牛首池蒯池積草池東陂池西陂池當路池犬臺池郎池三輔黃圖漢少府有上林中十池監安邑解唐食貨志有鹽池五總曰兩池土五色王者封五色土為社建諸侯各割其方色土與之使立社燾以黃土苴以白茅禹貢徐州貢土五色注天子有泰社東方青南方赤西方白北方黑上方黃史記春秋大傳尚書緯上冒以黃土獨斷云天子泰社封諸侯者取其土苞以白茅授之以立社西內苑東內苑禁苑玉津瓊林瑞聖宜春京兆馮翔扶風河東河南河內文選六輔承風注兒寬開六輔渠韋昭謂云云軹關陘太行陘白徑陘三陘在河內滏口陘鄴西井陘飛狐陘蒲陰陘三陘在中山軍部陘在幽州元和郡縣志述征記曰太行山首始於河內自河內北至幽州凡有八陘山陽東陽暨陽世說注餘干餘姚餘杭閩山西九仙山東粵王山北南豐道山亭記福州城中三山紫蓋天柱石廩一名石囷祝融芙蓉衡山五峰祖瀛玄炎長元流生鳳麟聚窟東方朔十洲記雄樠酉潕辰水經注武陵有五溪東成皋南伊闕西函谷北孟津文選注洛陽記相國井西井金牛池方井白龜池小方井李泌引西湖水以足民用黃河析支河湟中河通典羌爰劍入三河闕白馬盟盟津唐杜牧傳河南淄青淮西河北成德魏博盧龍唐憲宗曰兩河數十州政令所不及爾雅兩河間曰冀州通典西則龍門之河東則洚水大洛之河幽薊瀛莫涿檀順新媯儒武雲應寰朔蔚石晉割十六州賂契丹益津霸州瓦橋雄州淤口信安軍周世宗取三關萬年長安富平醴泉同州華州寧州岐州豳州西麟州涇州宜州唐兵志武德初析關中為十二道皆置府三年更為十二軍劍南西川成都東川梓州山南西道興元通鑑三川東夷西戎南蠻北狄王制蠻夷戎狄總名四夷猶公侯伯子男皆號諸侯東方曰寄南方曰象西方曰狄鞮北方曰譯同上南方蠻閩從蟲北方狄從犬東方貉從豸西方羌從羊說文蠻南閩南夷東貉東北周禮司隸帥四翟之隸玄菟樂浪高驪滿飾鳧更索家東屠倭人天鄙爾雅疏畎夷干夷方夷黃夷白夷赤夷玄夷風夷陽夷通典後漢書夷有九種孔子欲居九夷明堂位九夷八蠻六戎五狄職方氏四夷八蠻七閩九貉五戎六狄天竺咳首僬僥跛踵穿胸儋耳狗軹旁脊爾雅疏書旅獒通道于九夷八蠻僥夷戎夫老白耆羌鼻息天剛爾雅疏月支穢貊胸奴單于白屋爾雅疏林胡樓煩東胡史記趙世家備燕三胡馬韓辰韓辨辰後漢東夷傳韓有三種蒙巂越析浪穹邆睒施浪蒙舍唐開元末合六詔為一南詔傳女訶陵南水白狗逋租弱水清遠咄霸唐西山羌八國請入朝昆崙析支渠叟禹貢地理志注三國名皆織皮毛婼羌且末精絶戎盧渠勒皮山烏秅西夜蒲犁依耐無雷捐毒桃槐休循疏勒尉頭烏貪卑陸渠類谷郁立師單桓蒲類西且彌劫國狐胡山國車師凡一十七國小國杅彌于闐難兜莎車溫宿龜茲尉犁危須焉耆凡九國次大國荀悅漢紀後分為五十四國皆在胸奴之西中國人衆大秦寶衆月氏馬衆外國傳劉淵胸奴石勒羯慕容皓鮮卑苻洪氐姚萇羌魯州麗州含州塞州依州契州唐調露元年置東夷南蠻西南夷西羌西域南胸奴烏桓鮮卑後漢書傳范曄曰六夷諸序論筆勢縱放實天下之奇作西南夷發於唐蒙司馬相如兩粵起嚴助朱買臣朝鮮由涉何漢書贊三方之開皆自好事之臣幽并涼三州後漢鮮卑寇三邊新羅辨韓苗裔高麗百濟扶餘別種唐東夷傳三域自蔥嶺以東流沙以西為一域姑墨以南月氏以北為一域兩海之間水澤以南為一域後魏董琬使西域言其地為三域
