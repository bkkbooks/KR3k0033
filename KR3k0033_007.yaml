室標約九十八族宰相三百六十九人凡九十八族宰相世系表王播起鐸杜元穎審權讓能蕭瑀時文嵩華復履初置俯思謙倣思道遘得聖八葉宰相名德相望蘇環子頲再世稱賢宰相張嘉貞延賞弘靖三世宰相號三相張家張廷圭張九齡張休皆牧洪州有三張之稱文粹鄭從讜河東鄭畋鳳翔以忠義號二鄭蓋文達文懿以儒學稱號二蓋武元衡伯蒼儒衡延碩舊傳贊曰平一辭榮鍾在二衡韋處厚表微為翰林學士岑羲金壇令仲翔長洲令仲休溧水令稱江東三岑竇常中行牟貽周群丹列庠胄卿鞏友封為連珠集義取兄弟若五星然五代竇禹鈞五子儀儼侃稱僖皆登進士第號竇氏五龍楊憑居履道坊於陵居新昌坊汝士居靖恭坊時稱三楊皆為盛門靖恭尤著憑善文辭與弟凝凌皆有名時號三楊李遜友道建杓直崔邠鄯郾鄲舊唐書贊二李英英四崔濟濟八崔崔珙父頲生八子皆有才世以擬漢荀氏八龍三崔二張北齊時人語曰三崔暹昂季舒二張亮徽纂不如一康陳元康高釴翹之銖權仲鍇弱金二高並秀包何佶融二子齊名世稱二包三羅二皇甫羅虯與宗人隱鄴齊名時號三羅皇甫冉茂政曾孝常時號二皇甫張獻誠獻恭獻甫舊唐書三獻軍謀臣節克紹家風李適之峴勉夷簡程石回知柔林甫傳贊唐宰相以宗室進者九人宗室表宰相十一人福宗閔親王宰相四人秦齊平雍三裴裴休兄弟三人有盛名世謂俅不如儔儔不如休杜正玄正藏正倫隋世重舉秀才天下不十人而正倫一門三秀才皆高第後周蘇亮弟湛一家舉二秀才韋叔楷庫部弟叔謙考功兄季武主爵皆為郎中同省時號三列宿王福畤三子勔音緬勮音遽勃皆著才名杜易簡稱三珠樹李乂尚一尚貞兄弟俱以文章名同為一集號李氏花萼集晉郗愔弟曇郗純士美士美言十二父友蕭穎士顏真卿柳芳曰異日當交二郗之間李德林百藥安期三世掌制誥羲仲又為中書舍人徐齊聃堅嶠三世中書舍人孫逖宿簡三世掌誥張說均濛三代自中書舍人拜侍郎卓異記張嘉貞延賞弘靖次宗四代掌綸誥卓異記蔣乂子係伸偕二世踵修國史世稱良筆張知謇知玄知晦知泰知默兄弟五人皆明經高第韓弘弟充子公武弘公武田弘正布父子同時為節度李晟四子願憲訴聽皆秉麾節卓異記溫顏二家兄弟大雅在隋與思魯俱在東宮弟彥博與愍楚同直內史省彥將與遊秦並典挍祕閣二家兄弟各為一時人物之盛學業顏氏為優職位溫氏為盛周訪子撫撫子楚三世為益州四十一年王儉暕承梁王承為國子祭酒祖儉父暕皆為國職三世為國師前代未之有薛琮榮兼晉薛兼傳孔穎達志惠元何尚之偃戢昌㝢敬容五世為吏部尚書南史謝莊瀹覽自祖至孫三世居選部劉林甫祥道齊賢唐三世典選郎餘令從父知年霍王元軌曰郎家二賢皆入府不意培塿而松柏為林也後周扈蒙載兄弟並掌內外制號二扈陳堯叟唐夫堯佐希元堯咨嘉謨堯叟堯咨兄弟狀元陳宗召景南貴謙益父貴誼正父父宏辭宋庠公序元憲公宋祁子京景文公蘇軾子瞻蘇轍子由父洵號為三蘇孔文仲經父武仲常父平仲毅父洪朋龜父芻駒父炎玉父羽鴻父黃庭堅四甥洪適景伯遵景嚴邁景盧兄弟宏辭呂蒙正聖功文穆夷簡坦夫文靖公著晦叔正獻三世宰相夷簡公著父子平章五代三呂侍郎琦之後端夢奇後蒙正夷簡公著咸休之後大防韓綜仲文絳子華維持國縝玉汝億八世以高陽里目之三子位公府綜知制誥吳育春卿充沖卿范純仁堯夫純禮彝叟純粹德孺仲淹三子自謂純仁得其忠純禮得其靜純粹得其略范鎮百祿祖禹祖禹詩玉堂三世見題名隋劉焯炫唐劉懿之褘之夙賓之朔復之宋劉敞仲原父攽叔貢父敞攽奉世為三劉靖之子和清之子澄爚炳曾鞏子固布子宣肇子開李柬之李受致仕命賦詩送之王圭序云二李遠過二疏李柟和伯樗遷仲杜純孝錫紘君章沈遘文通括存中遼睿達文通孫晦元用祖孫狀元明道皓伊川頤二先生王安石介甫安國平甫安禮和甫王回深父向子直冏容季任孜遵聖伋師中當時謂大任小任唐坰祖肅父詢叔介兄淑問繼為御史錢易希白子彥遠子高明逸子飛彥遠子協穆父胡宿宗愈交修世將交修裒次為四世絲綸集謝懋岐舉廉世充同榜登第號臨江四謝李昉宗諤昭述昭述言我家三世學士石懋憑悠號橘林三少呂文穆文靖正獻蘇魏公詩五朝京兆尹三世大司空安德裕子守亮張去華子師德梁皓子固孫何漢公僅鄰幾兄弟狀元孫立節介夫子協志節勴志舉父子知名號梅江三孫陳公弼兄之子庸諭俱中進士第里人表其閭曰三雋坊朱昂弟協皆享眉壽謂之渚宮二疏陳堯咨表其居為東西致仕坊三人鳳閣唐王擇從易從朋從言從昆弟四人擢進士第至鳳閣舍人者三人號鳳閣王氏贊質員賞穆寧四子皆以守道行誼顯崔祐甫為穆氏四子講藝記兄弟皆和粹世人以珍味目之贊為酪質為酥員為醍醐賞為乳腐韓休穆寧言家法者尚韓穆二門梁韋睿裴邃二門子弟各著名節世本十五篇世本録黃帝以來至春秋時帝王公侯卿大夫祖世所出賈弼匪之淵字希鏡三世傳譜學凡十八州士族合百袠七百餘卷南齊書百氏譜凡三百五十八姓漢姓三百七蕃姓一百二十五唐裴楊休百氏譜國邑鄉亭地姓字名次族官爵凶德吉德技事諡爵系國系族系名氏國爵邑系官名邑諡諡氏爵諡代北復姓關西復姓代北三字姓代北四字姓諸方復姓鄭樵通志氏族略杜正獻衍趙康靖概王文忠堯臣蔡敏肅挺張文定方平林敏功子仁敏修子來呂大忠進伯大防微仲大鈞和叔大臨與叔范致君致明致虛致祥致厚相繼登第有五桂堂管師復師常兄弟齊名號二管劉韐子羽珙光獻曹后宣仁高后欽聖向后昭慈孟后張宣公曰家法之美無如宋四后以賢聖之德為宗社之福龔夬弟大壯梁皓適子美崔殷子雙為東祖邯為西祖㝢為南祖亦號中祖李楷五子睿為東祖芬與弟徑共稱西祖輯與弟晃共稱南祖鄭溫子曄為北祖簡為南祖恬為中祖薛懿三子恢號北祖雕南祖興西祖唐世系表陸遜凱世說陸凱一宗二相五侯周札懋贊縉協韋仁約子承慶嗣立鄭珣瑜子覃朗六世封石泉王方慶曾祖褎至孫俌六世封石泉褎鼒弘直綝字方慶睎俌三代執金吾趙道興父才子皎三代執金吾濟南王彧安豐王延明中山王熙時人語曰三王楚琳琅未若濟南備圓方宗室陸玩萬載仲元陸慧曉傳趙犨弟昶子珝韋仁約濟弘景盧懷慎子奐奕三居中丞宮清節似之韋顧昆吾商頌苞有三蘗魏齊韓漢敘傳三枿之起朱買臣王朝邊通張湯傳三長史欒書黶盈錡犨至申生重耳夷吾晉語三公子子頽叔帶子朝陸機五等論周之衰干位者三子章德竇和熹鄧安思閻順烈梁桓思竇靈思何東都臨朝六后邛成樂昌陽平外戚三王齊王將閭濟北王志菑川王賢膠東王雄渠膠西王卬濟南王辟光齊悼惠王六子為王鄒陽傳云六齊淮南王安衡山王勃廬江王賜淮南厲王三子為王鄒陽傳曰三淮南韋執誼韓泰韓曄柳宗元劉禹錫陳諫凌準程異王叔文之黨楊駿弟珧濟晉楊虞卿汝士漢公唐張又新李續張權輿劉栖楚李虞程昔範姜洽李訓李逢吉黨八人而傅會又八人皆任要劇號八關十六子張文蔚楊涉薛貽矩蘇循張策趙光逢五代史唐六臣傳為冊寶使副朝梁郭彰石崇陸機陸雲和郁潘嶽崔基歐陽建繆徵杜斌摯虞諸葛詮王粹杜育鄒捷左思劉環周恢牽秀陳眕許猛劉訥劉輿琨皆附賈謐汝南王亮楚王瑋趙王倫齊王冏長沙王乂成都王穎河間王顒東海王越西晉八王呂高帝上官昭帝霍宣帝趙成帝王平帝竇章帝鄧和帝閻安帝竇桓帝梁順帝何靈帝後漢論後世外戚自東西京十有餘族注外戚十餘族外戚二十有餘人保位全家者唯文景武帝太后及邛成后四人漢外戚傳贊文帝薄景帝竇武帝王邛成王始安王遙光徐孝嗣江祏蕭坦之江祀劉暄蕭衍曰六貴同朝穰侯魏冉華陽君芊戎宣太后之異父同母弟涇陽君高陵君昭王同母弟秦范睢曰四貴蕭道成袁粲禇淵劉秉宋更日入直決事號為四貴孫騰司馬子如高嶽高隆之東魏鄴中謂之四貴廣平王雄高顈虞慶則蘇威隋稱為四貴江泉穀伯史疇笨伯張嶷猾伯羊聃瑣伯擬古之四凶郭子儀朔方魯炅淮西李奐興平許叔冀滑濮李嗣業鎮西北庭李廣琛鄭蔡崔光遠河南李光弼河東王思禮關內澤潞肅宗以子儀光弼皆元勳難相統屬故不置元帥九節度之兵潰於相州和士開婁定遠趙彥深袁文遙唐雍綦連猛高阿那肱胡長粲牛弘蘇威宇文述張瑾虞世基裴蘊裴矩牛弘為吏部尚書威等參掌選事時人謂之選曹七貴韓彭英盧
