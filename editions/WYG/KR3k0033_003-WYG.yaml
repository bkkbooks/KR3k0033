body:
  text: 小學紺珠卷三宋王應麟撰人倫類九族上自高祖下至𤣥孫堯典以親九族孔氏傳朱詩序棄其九族鄭氏箋文公書說高祖至𤣥孫之親舉近以該逺五服異姓之親亦在其中親親以三為五已上親父下親子三也以父親祖以子親孫五也以五為九以祖親高祖以孫親𤣥孫九也禮記父族四母族三妻族二異義夏侯歐陽說異姓有親屬者白虎通朱文公從孔傳夏氏從夏侯歐陽外祖父外祖母從母子妻父妻母姑之子姊妹之子女子之子已之同族左傳親其九族杜氏注與孔鄭不同九屬𤣥孫曾孫仍孫子身父祖父曾祖父高祖父太𤣥注亦禮九族之序三族父子孫周禮小宗伯掌三族之别注仲尼燕居注父族母族妻族漢書注如淳云父昆弟已昆弟子昆弟儀禮注昏禮注六親父子兄弟夫婦老子注傳後漢馮衍注父母兄弟妻子漢賈誼以奉六親注云呂氏春秋謂六戚父子從父昆弟從祖昆弟曾祖昆弟族昆弟漢禮樂志賈誼書云父子兄弟姑姊甥舅昏媾姻亞左傳注五宗大宗一别子為祖繼别為宗百世不遷之宗小宗四繼高祖繼祖繼曾祖繼禰五世則遷之宗禮記大傳公白虎通君别子為祖如魯桓公生四子莊旣立為則慶父叔牙季友為别子小繼别為宗如公孫敖繼慶父是為大宗悼繼禰者為宗如季武子立悼子悼子之兄曰公彌子旣為大宗則繼公彌者為小宗謂之繼禰者蓋自繼其父為小宗不繼祖故也上至高祖下及孫後漢書注五宗適子為小宗次者為貳宗左傳注五屬斬衰齊衰大功小功緦麻漢韋元成傳天序五行人親五屬注云同族之五服緦學記師無當於五服注斬衰至麻之親五品又曰五典五敎父子有親君臣有義夫婦有别長幼有序朋友有信孟子堯舜使契為司徒敎以人倫敬舜典曰契百姓不親五品不遜汝作司徒敷五敎在寬朱文公注五品父子君臣夫婦長幼朋友五者之名位等級也五敎父子有親至朋友有信五典克從注同卑程子曰五者人倫也言長幼則兄弟尊皆備矣言朋友則鄉黨賔客備矣父母兄弟子鄭𤣥說五品王肅曰五常五敎父義母慈兄友弟恭子孝左傳舜舉八元使布五敎舜典五典克從孔氏注同五五品不遜敬敷五敎在寬孔氏注五品謂五常五敎常之敎臯陶謨五典君牙𢎞敷五典孔氏注五常之敎敎國語五義紀宜注同左傳五七敎父子兄弟夫婦君臣長幼朋友賓客王制司徒明七敎以興民德六順君義臣行父慈子孝兄愛弟敬左傳石碏曰所謂六順也十義又曰十敎父慈子孝兄良弟弟夫義婦聽長惠幼順君仁臣忠禮運十者謂之人義君令臣共父慈子孝兄􅋢弟敬夫和妻柔姑慈婦聽晏子曰禮也明荀子立太學設庠序修六禮十敎注十敎即十義五達道君臣父子夫婦昆弟朋友中庸天下之達道五三綱君臣父子夫婦君為臣綱父為子綱夫為妻綱白虎通含文嘉禮緯太𤣥曰三綱得於中極嚴漢谷永曰勤三綱之六紀諸父有善昆弟有親族人有序諸舅有義師長有尊朋友有舊白虎通禮緯四正君臣父子管子天無二日土無二王家無二主尊無二上坊記四德庸勲親親暱近尊賢左傳富辰云七德尊貴明賢庸勲長老愛親禮新親舊國語富辰云三達尊爵齒德孟子三友友直友諒友多聞論語益者三友三樂父母俱存兄弟無故一樂也仰不愧於天俯不怍於人二樂也得天下英才而敎育之三樂也孟子五致居則致其敬養則致其樂病則致其憂喪則致其哀祭則致其嚴孝經五者備矣然後能事親致彭忠肅公龜年集格言為五錄四行事君忠事親孝交友信處鄉順孔叢子婦德婦言婦容婦功班昭女誡女有四行為人子孝為人弟弟為人臣忠為人少順冠義將責四者之行於人九兩牧以地得民長以貴得民師以賢得民儒以道得民宗以族得民主以利得民吏以治得民友以任得民藪以富得民周禮太宰以九兩繫邦國之民兩猶耦也六本俗媺宮室族墳墓聨兄弟聨師儒聨朋友同衣服大司徒以本俗六安萬民三事父師君國語欒共子曰民生於三事之如一父生之師敎之君食之事親有隱而無犯事君有犯而無隱事師無犯無隱禮記三孝三道大孝尊親其次弗辱其下能養小孝用力中孝用勞大孝不匱祭義曾子曰孝有三養順喪哀祭敬時祭統孝子事親有三道始於事親中於事君終於立身孝經五養養體養目養耳養口養志呂氏春秋曾子曰養有五道四禮冠婚喪祭文中子弟凝正家以四禮雞初鳴咸盥潄櫛縰笄總而朝君臣之道也惻隱之恩父子之道也會計有無兄弟之道也閨閫之内朋友之道也白虎通婦事夫有四禮六禮納采問名納吉納徵請期親迎士昏禮文中子婚嫁必具六禮二戒命義莊子天下有大戒二子之愛親命也臣之事君義也四敎婦德貞順婦言辭令婦容婉娩婦功絲麻周禮九嬪掌婦學之法禮記昏義古者婦人敎以婦德婦言婦容婦功德後漢論九嬪掌敎四德班昭女誡曰女有四行婦婦言婦容婦功敎干寶晉紀論聞四於古六德柔順清潔不妬儉約恭謹勤勞司馬文正公家範曰為人妻者其德有六四科容悅凡臣社稷股肱天民行道大人正身孟子章指凡此四科優劣之差六位君臣父子夫婦莊子云音義三善父子之道君臣之義長幼之節禮記文王世子行一物而三善皆得世子齒於學五行貴賤明隆殺辨和樂而不流弟長而無遺安燕而不亂鄉飲酒義五行三本天地者生之本先祖者類之本君師者治之本荀子禮論禮有三本故禮上事天下事地尊先祖而隆君師三恕事君報親敬兄荀子君子有三恕有君不能事有臣而求其使非恕也有親不能報有子而求其孝非恕也有兄不能敬有弟而求其聽令非恕也三行正君臣親父子和長幼冠義注三行五義父義母慈兄友弟恭子孝國語五義紀宜注云服術有六親親尊尊名出入長幼從服大傳四戚内姓外婚朋友同里周書政有四戚四隱交友故舊邑里門郭呂氏春秋四民士農工商齊語管子曰四民者勿使雜處殖漢食貨志學以居位曰士闢土穀曰農作巧成器曰工通財鬻貨曰商五民遊子樂其俗不復歸故有五方之民漢地理志齊地具五民五儀庸人士人君子賢人聖人家語孔子曰人有五儀又荀子秀士選士俊士造士進士王制六正聖臣良臣忠臣智臣貞臣直臣說苑人臣之行有六正七屬國任貴鄉任正官任長學任師族任宗家任主先任賢大戴禮文王官人篇倫有七屬十際十數十等君臣父子兄弟朋友夫妻呂氏春秋十際王臣公公臣大夫大夫臣士士臣皁皁臣輿輿臣隸隸臣僚僚臣僕僕臣臺國語史伯曰合十數以訓百體注自王以下位有十等左傳人有十等三老五更三老國老也五更庶老也月令章句三公老者為三老卿大夫老者為五更盧植禮記注老人更知三德五事鄭康成注父事三老兄事五更漢書注鄉陳用之曰古者建國立三卿飲酒立三賓禮曰三公在朝三老在學三公非一人則三老五更亦非一人矣三擯卿為上擯大夫為承擯士為紹擯聘禮天子見公擯者五人見侯伯擯者四人見子男擯者三人覲禮注上皆宗伯為擯上公七介侯伯五介子男三介聘義五不名四不名諸父兄上大夫盛德之士老臣公羊傳注禮君於臣不名者有五諸父諸兄先王之臣盛德之士說苑伊尹曰君之所不名臣者四七族父之姓姑之子姊妹之子女之子母之姓從子妻父母史記索隱下張晏曰上至曾祖至曾孫羣昭羣穆昭如字同宗父子祭統注宗廟之次左為昭右為穆子孫亦以為序羣昭南向取其向明羣穆北向取其深逺中庸章句或問父昭子穆孫復為昭一昭一穆相次而下國語注父南面曰昭明也子北面曰穆順也決疑要注四擇擇術然後學之擇師然後傳之擇交然後親之擇君然後事之劉敬弟子記君子有四擇五孝天子諸侯卿大夫士庶人孝經序雖五孝之用則别而百行之源不殊天子虞舜高宗夏禹王殷周文諸侯周公旦間魯孝公河惠王卿大夫孔子穎孟莊子考叔士高柴奮樂正子春孔黄香庶人江革廉范汝郁殷陶陶淵明孝傳贊五遂居處莊事君忠莅官敬朋友信戰陳勇祭義曾子言孝堂張魏公名方耕道曰五遂三言夫婦别父子親君臣嚴禮記哀公問願聞所以行三言之道九序孟孟仲季仲孟仲季季孟仲季太𤣥三從父夫子儀禮婦人有三從之義無專用之道六輔公輔天子卿輔公大夫輔卿士輔大夫京師輔君諸夏輔京師何休春秋例十五儒自立容貌備豫近人特立剛毅自立仕憂思寬裕舉賢援能任舉特立獨行規為交友尊讓禮記儒行其尊讓有如此者注云此兼上下五儒蓋聖人之儒行也五致致反始致鬼神致物用致義致讓祭義合此五者以治天下之禮也三老上壽中壽下壽左傳杜氏注工老商老農老服氏注三壽三卿詩三壽作朋如岡如陵或曰壽與岡陵等而為三三老張衡東京賦送迎拜於三壽注三老也三類孝行著於家門仁慈稱於九族義斷行於鄉黨魏夏侯𤣥議三者之類取於中正隱者三槩上焉者身藏而德不晦其次絜治世具弗得伸持峭行不可屈於俗末焉者資槁薄樂山林唐隱逸傳七等州國氏人名字子何休春秋例卿何氏傳王朝公書官大夫書字上士中士書名下士書人九等上上聖人始於宓犧上中仁人上下智人中上中中中下下上下中下下愚人始於蚩尤漢古今人表列九等之序五人曰茂十人曰選百人曰俊千人曰英倍英曰賢萬人曰傑萬傑曰聖白虎通禮别名記德萬人者謂之俊德千人者謂之豪德百人者謂之傑鶡冠子俗人俗儒雅儒大儒荀子大儒者天子三公也小儒者諸侯大夫士也衆人者工農商賈也五政天子公卿大夫士大戴禮均五政注三名公卿大夫周禮疏易通卦驗云輔有三名三世所見所聞所傳聞公羊傳自祖至孫曲禮三世注什伍五人為伍二伍為什周禮宮正會其什伍注首周書大聚篇五户為伍以為長十夫為什以年為長四常道親親尊尊長長男女有别禮記大傳常四者人道之四名天人神人至人聖人莊子耳注凡此四名一人所自言之異三親夫婦父子兄弟顏氏家訓一家之親此三者而已至於九族皆本於三親四制恩理節權禮記喪有四制三忠大忠周公之於成王次忠管仲之於桓公下忠子胥之於夫差荀子二物夫治外婦治内左傳子太叔曰為夫婦外内以經二物注各治其物三德禮賓親親善善晉語衞甯莊子曰五等親周大功小功緦麻袒免唐百官志宗正寺凡親有五等三行孝如曾參孝已信如尾生高廉如鮑焦史鰌戰國策蘇代謂燕昭王曰兼此三行以事王四行事親孝事君忠交友信居鄉悌呂氏春秋此尹文曰有四行可謂士乎三順臣事君子事父妻事夫韓非子三者順則天下治六職王公士大夫百工商旅農夫婦功考功記國有六職百工與居一焉鄉約四事德業相勸過失相規禮俗相交患難相恤藍田呂氏性理類四德元善之長春仁亨嘉之㑹夏禮利義之和秋義貞事之幹冬智易乾文言罔北冬直東春蒙南夏酋西秋㝠北太𤣥四端惻隱之心仁之端羞惡之心義之端辭讓之心禮之端是非之心智之端孟子人有四端五常仁木春義金秋禮火夏智水冬信土夏季漢書水中庸注信知土注白虎通曰五性德益稷仁義禮智信五之言五事貌木恭肅言金從乂視火明哲聽水聦謀思土睿聖書洪範火蘇子由云貌土言金視木聽水思蔡氏云貌水言火視木聽金思土四維禮義廉恥管子四敎文行忠信論語子以四敎六德知仁聖義忠和周禮大司徒鄉三物一曰六德六行孝友睦婣任恤周禮大司徒鄉三物二曰六行三德正直剛克柔克洪範之剛柔正直三德俊曰三俊至德為道本敏德為行本孝德知逆惡周禮師氏以三德敎國子義以生利祥以事神仁以保民國語富辰曰明王不失此三德忠信調和均辨荀子三德者誠乎上三行孝行親父母友行尊賢良順行事師長周禮師氏敎三行三達德知仁勇中庸仁者不憂知者不惑勇者不懼論語君子道者三九德寬而栗柔而立愿而恭亂而敬擾而毅直而溫簡而廉剛而塞彊而義臯陶謨亦行九德上九字人之性質下九字以輔成其德明其德之不偏也三德有家六德有邦九德之中有其三有其六堯四德欽明文思堯典開欽之一字此書中卷第一義文王九德心能制義曰度德正應和曰莫照臨四方曰明勤施無私曰類敎誨不倦曰長賞慶刑威曰君慈和徧服曰順擇善而從之曰比經緯天地曰文左傳九思視思明聽思聦色思溫貌思恭言思忠事思敬疑思問忿思難見得思義論語君子有九思三思少思學老思敎有思施荀子云孔子曰君子有三思九容足容重手容恭目容端口容止聲容靜頭容直氣容肅立容德色容莊禮記玉藻四勿非禮勿視非禮勿聽非禮勿言非禮勿動勿者禁止之辭目論語顏淵問仁子曰克巳復禮為仁請問其子曰云云伊川先生作四箴四無毋意毋必毋固毋我子絶四曰毋史記作無程子此毋字非禁止之辭聖人絶此四者何用禁止圖慈湖楊先生有絶四說譙定為八三畏畏天命畏大人畏聖人之言論語君子有三畏和靖尹先生一室名三畏齋為仁五者恭寬信敏惠論語三戒少戒色壯戒鬬老戒得論語君子有三戒五福壽富康寧攸好德考終命洪範四敎勤儉恭恕文中子弟凝御家以四敎四重重言有法重行有德重貌有威重好有觀揚子法言取四重去四輕則可謂之人三有慈儉不敢為天下先老子三寶有文中子三七情喜怒哀懼愛惡欲禮運六情六志喜怒哀樂愛惡白虎通六情好惡喜怒哀樂左傳子大叔云六志好北方貪狼申子怒東方陰賊亥卯惡南方廉貞寅午喜西方寬大己酉樂上方姦邪辰未哀下方公正戌丑漢翼奉封事六情三子言性孟子言人性善荀子言人性惡揚子言人性善惡混性三品上焉善中焉可上下下焉惡韓文公原性五至志之所至詩亦至焉詩之所至禮亦至焉禮之所至樂亦至焉樂之所至哀亦至焉夫子五德溫良恭儉讓論語注夫子行此五德九言無始亂無怙富無恃寵無違同無敖禮無驕能無復怒無謀非德無犯非義左傳子太叔語趙簡子九言卒古者以一句為一言一言蔽之曰思無邪揚之水章之四言秦漢以來衆儒訓詁乃有句稱樂六德中和祗庸孝友周禮大司樂以樂德敎國子大師敎六詩以六德為之本王氏解云中和祗庸孝友鄉三物六德六行六藝周禮大司徒敎萬民而賓興之諫五義譎諫戅諫降諫直諫諷諫家語忠臣之諫君有五義諷諫順諫闚諫指諫陷諫大戴禮曰公羊傳注三直諫四曰爭諫五曰戅諫一二同大戴禮戅陟降反君子五敎有如時雨化之者有成德者有達財者財與材同有答問者有私淑艾者孟子師術有四尊嚴而憚耆艾而信誦說而不陵不犯知微而論荀子三知生而知之學而知之困而知之中庸學論語困而之知命知禮知言論語知逺之近知風之自知微之顯中庸注三知三行安而行之利而行之勉彊而行之中庸三近好學近乎知力行近乎仁知恥近乎勇同上五本柔以仁誠以信富貴無敢以驕人恭以敬寛以靜說苑信德孝悌讓晉王祥訓子孫五者立身之本五守聰明廣智守以愚多聞博辨守以儉武力勇毅守以畏富貴廣大守以狹德施天下守以讓文子此五者先王所以守天下也四敎禁於未發之謂豫當其可之謂時不陵節而施之謂孫相觀而善之謂摩學記大學之法此四者敎之所由興也興道諷誦言語周禮大司樂以樂語敎國子六生公生明偏生闇端慤生通詐偽生塞誠信生神夸誕生惑荀子此六生者君子愼之而禹桀所以分也六有言有敎動有法晝有為宵有得息有養瞬有存横渠先生云六和靖尹先生一室名有齋四益無益之言勿聽無益之事勿為無益之文勿觀無益之友勿親張魏公浚戒子四德忠則順天孝則生福勤則業進儉則心逸同上德四銘孝德之始弟德之序信德之厚忠德之正大戴禮孔子曰參也中夫四德者矣養生四印忍黙平直黄魯直誌四可可勉者行可信者言可委者命可記者天康節邵先生四可吟曲禮四箴敖不可長欲不可縱志不可滿樂不可極張文定公方平以曲禮四句為四箴四持持容持忍持黙持謙崔鶠德符四持銘三善見人之一善而忘其百非見人有善若已有之聞善必躬親行之然後道之說苑曾子曰吾學夫子之三善而未能行四易簡而易用要而易守炳而易見法而易言揚子君子之道有四易七無無諾責無財怨無專利無茍說無伐善無棄人無蓄憾文中子仇璋謂薛収大學三綱領八條目明明德親民止於至善大學章句三者大學之綱領格物致知誠意正心脩身齊家治國平天下八者大學之條目為學之序博學之審問之愼思之明辨之篤行之中庸書朱子白鹿洞院示學者修身之要言忠信行篤敬懲忿窒慾遷善改過同上處事之要正其誼不謀其利明其道不計其功董子曰同上接物之要已所不欲勿施於人行有不得反求諸已同上六言六蔽好仁不好學其蔽也愚好知不好學其蔽也蕩好信不好學其蔽也賊好直不好學其蔽也絞好勇不好學其蔽也亂好剛不好學其蔽也狂論語益者三樂五敎反樂節禮樂樂道人之善樂多賢友論語三立立德黄帝堯舜立功禹稷立言史佚周任臧文仲左傳穆叔曰五德聰明睿知生知之質寬裕溫柔仁發强剛毅義齊莊中正禮文理密察知中庸者章句云五之德三好衆人好已從賢人好已正聖人好巳師揚子天下有三好三省謀不忠交不信傳不習論語曾子曰吾日三省吾身五愼強勞忠信恭說苑子路將行仲尼贈以言劉子曰季路抱五愼之誡四經德仁義禮文中子人六等善信美大聖神孟子注人有是六等樂正子二之中四之下十一德敬忠信仁義知勇敎孝惠讓國語單襄公曰此十一者晉周皆有焉悼公三患未之聞患弗得聞旣聞之患弗得學旣學之患弗能行禮記雜記君子有三患二名無名天地之始有名萬物之母老子釋孫綽天台山賦二名之同出一謙四益天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙漢藝文志易一謙而四益人有三安仁利仁強仁表記九年大成比年入學每歲中年考校間歲一年視離經辨志三年視敬業樂羣樂正孝反五年視博習親師七年視論學取友謂之小成九年知類通達強立而不反謂之大成學記三就大成次成小成大戴禮子貢曰夫子之門人蓋三就焉注云立傅之道六知慮不躁身行寬惠威嚴不易重利不變恭於敎和於下戰國策趙立周紹為傅周紹曰云云六謙德德行寬容而守之以恭者榮土地廣大而守之以儉者安位尊祿重而守之以卑者貴人衆兵強而守之以畏者勝聰明睿智而守之以愚者哲博聞強記而守之以淺者不溢韓詩外傳此六者皆謙德也人事類君子四時朝以聽政晝以訪問夕以修令夜以安身左傳子產曰士朝而受業晝而講貫夕而修復夜而計過國語公父文伯母曰四氣春夜臥早起廣步於庭夏夜臥早起無厭於日秋早臥早起與雞俱興冬早臥晚起必待日光素問四氣調神論三命上壽百二十中壽百年下壽八十文選注養生論行善得善曰受命行善得惡曰遭命行惡得惡曰隨命孝經援神契孟子注六夢正噩思寤列子作覺喜懼周禮占夢夢有六候列子太卜三夢之法致夢觭夢咸陟五藏五氣肺氣熱金言魄藏心氣次之火思神藏肝氣凉木視魂藏脾氣溫土貌志藏腎氣寒水聽精藏周禮疾醫注膽金雲為肺火氣為肝木風為腎水雨為脾土雷為心土之為五行主淮南子心通舌肝通目肺通鼻腎通耳脾通口子華子曰脾腎心肝肺五官之司口舌鼻耳目五官之候九藏又曰九紀正藏五胃旁胱大腸小腸周禮注建國語史伯曰九紀以立純德注九藏也正藏五又有胃旁胱腸膽之莊子釋文身别有九藏氣天候頭角之氣人候耳目氣地候口齒之氣三部各有天地人神藏五形藏四故九五管五藏之腧六府喉咽量腸之府胃五穀之府大腸轉輸之府小腸受成之府膽積精之府旁胱湊液之府韓詩外傳大腸小腸心府胃脾府旁胱肺府三焦腎府膽肝府白虎通大小腸旁胱三焦莊子釋文九竅陽竅七陰竅二周禮注一六為前為耳水二七為目火三八為鼻木四九為口金五五為後土太𤣥言易咸主心故言拇言股心言頰舌皆在前者艮主背故言趾言限言躬言輔皆在後者四關心口耳目文子四淮南子關四佐脾腎肝肺周書心有四佐五官耳目鼻口形荀子心居中虚以治五官夫是之謂天君聖人清其天君正其天官三宮君子道三食視聽淮南子三宮交爭容貌顏色辭氣論語曾子曰君子所貴乎道者三七體目為心視耳為心聽口為心談鼻為心芳國語史伯曰正七體以役心注七竅也五指巨指食指將指無名指小指又曰季指春秋正義手五指之名五綦又曰五鑿目欲綦色耳欲綦聲口欲綦味鼻欲綦臭氣香亦謂臭心欲綦佚綦極也荀子此五綦者人情所不必免也又曰五鑿為政心從而壞五慮耳目鼻口心管子五性肝靜仁甲已心躁禮丙辛脾力信戊癸肺堅義乙庚腎敬知丁壬漢翼奉傳五性注喜怒欲懼憂大戴禮民有五性五文選注文子曰人有情九􅉔音拜稽首頓首空首振動吉􅉔凶􅉔奇􅉔奇偶之奇襃􅉔音報肅􅉔周禮大祝辨九􅉔以享右祭祀三不惑酒色財漢楊秉四無妄耳無妄聽目無妄顧口無妄言心無妄慮康節先生四無妄吟五聲言語宮聲和商聲剛角聲清徵聲疾羽聲弱周禮疾醫注九候三部寸關尺九候浮中沈素問難經三門由於情欲入自禽門由於禮義入自仁門由於獨智入自聖門揚子天下有三門三變望之儼然即之也溫聽其言也厲論語子夏曰君子有三變八體乾為首首㑹諸陽屬乾坤為腹腹藏衆陰坤震為足巽為股足動股隨雷風相與坎為耳離為目耳目通竅水火相逮艮為手兌為口口與鼻通山澤通氣說卦以身之八體擬八卦為足主下六經為震手主上六經艮耳輪限内為坎目精附外為離巽下開為股兌上開為口覺則用目而視離日主晝也寐則用耳而寤坎月主夜也曉一身之榮衞還周會於手太陰一日之陰陽昏會於艮時故艮時在人其象為手三始正容體齊顏色順辭令冠義禮義之始注三始旣備服未備者未可求以三始也四代尚齒有虞氏貴德而尚齒夏后氏貴爵而尚齒殷人貴富而尚齒周人貴親而尚齒祭義升階四等連步栗階亦名散等歴階越階儀禮燕禮疏升階之法有四等漢禮云五武成步步六尺國語注云六尺為步半步為武九體手足臂脛股肱要腹肩㗇喖音瘕牯謂唐湖面顙太𤣥音湖疑作頡胡六辭將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭游失其守者其辭屈八徵問之以言以觀其辭窮之以辭以觀其變與之間諜以觀其誠明白顯問以觀其德使之以財以觀其廉試之以色以觀其貞告之以難以觀其勇醉之以酒以觀其態六韜八徵皆備則賢不肖别矣故為得喪哀樂生死列子覺有八徵九徵逺使之而觀其忠近使之而觀其敬煩使之而觀其能卒然問焉而觀其知急與之期而觀其信委之以財而觀其仁吿之以危而觀其節醉之以酒而觀其則雜之以處而觀其色莊子九徵至不肖人得矣神精筋骨氣色儀容言劉邵人物志九徵皆至純粹之德五至伯已什巳若已厮役徒𨽻鶡冠子博選篇道凡四稽天地人命人有五至北面事人則伯巳者至先趨而後息先問而後黙則什巳者至人趨巳趨則若巳者至憑几據杖指麾而使則厮役者至樂嗟苦咄則徙𨽻之人至矣故帝者與師處王者與友處亡主與徒處韓文公讀鶡冠子云四稽五至之說當矣十二材清節法術國體器能臧否伎倆智意文章儒學口辯雄傑劉邵人物志四事飲食衣服居處言語呂成公曰為學自四事起小學紺珠卷三
