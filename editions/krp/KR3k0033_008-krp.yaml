音附别聽禄位以禮命聽取予以書契聽賣買以質劑子隨反聽出入以要㑹同上六敘六計正位進治作事制食受㑹聽情同上以官府之六敘正羣吏亷善亷能亷敬亷正亷法亷辨以六計弊羣吏之治十二教以祀禮教敬以陽禮教讓以隂禮教親以樂禮教和以儀辨等以俗教安以刑教中以誓教恤以度教節以世事教能以賢制爵以庸制禄大司徒六功王功曰勲若周公國功曰功若伊尹民功曰庸若后稷事功曰勞若禹治功曰力若咎繇戰功曰多若韓信陳平司勲六唐㑹要韋挺議曰周禮功之官皆配大烝九法制畿封國設儀辨位進賢興功建牧立監制軍詰禁施貢分職簡稽鄉民均守平則比小事大大司馬建邦國之九法掌交九禁注九法之禁九經修身尊賢親親敬大臣體羣臣子庶民來百工柔逺人懷諸侯中庸為天下國家有九經五美惠而不費勞而不怨欲而不貪泰而不驕威而不猛論語尊五美斯可以從政矣宥其罪戾赦其過失救其菑患賞其徳刑教其不及左傳子産曰大適小有五美三務春夏秋三時之務左傳三務成功秋管子民有三務春夏務農擇人因民從時左傳晉士文伯曰務三而已五先治親報功舉賢使能存愛禮記大傳聖人南面而聽天下所宜先者五貴有徳貴貴貴老敬長慈幼祭義先王所以治天下者五七事天地民四時之務國語楚觀射父曰先王之祀以七亊六事政不節使民疾宫室榮女謁盛苞苴行䜛夫昌成湯遭旱以六事自責子後漢鍾離意上疏又荀七教敬老尊齒樂施親賢好徳惡貪亷讓家語孔子曰七教者治民之本三至至禮不讓而天下治至賞不費而天下士悦至樂無聲而天下民和家語至彊至辨至明荀子此三至者非聖人莫之能盡不可使處不完不可使擊不勝不可使欺百姓荀子議兵為將三至至謂一守而不變五法仁義禮智信之法家語五則象天儀地和民順時共神國語周太子晉曰蔑棄五則三代所尚夏尚忠殷尚質周尚文漢董仲舒曰夏上忠殷上質周上文杜欽曰殷因於夏尚質周因於殷尚文陶郊特牲虞祭尚用氣殷尚聲周尚臭考工記虞上夏上匠殷上梓周上輿尚檀弓夏尚黒殷白周尚赤三代取民夏五十而貢殷七十而助考工記注作莇周百畞而徹孟子其實皆什一也莇周制畿内用夏之貢法税夫無公田邦國用殷之法制公田不税夫考工記注五刑墨劓剕宫大辟書舜典注屬吕刑五周官之五刑其三千百穆王之五刑其屬三千至周禮疏漢文帝除肉刑宫刑隋乃赦野軍鄉官國周禮大司寇糾萬民墨劓宫刖殺司刑甲兵斧鉞刀鋸鑽笮鞭扑國語臧文仲曰杖鞭徒流死後周大律笞杖徒流死唐用刑有五九刑正刑五流宥鞭扑贖左傳周公制禮曰在九刑不忘鄭康成注尚書云刑韋昭説同叔向云周有亂政而作九正刑一議刑八服䖍注三典刑新國用輕典刑平國用中典刑亂國用重典周禮大司寇建邦之三典五禁宫官國野軍周禮士師掌五禁之法以左右刑罰六約於妙反治神治民治地治功治器治摰周禮司約約言語之約束八議親故賢能功貴勤賔律疏曰今之八議周之八辟也法漢刑法志周官有八議故周禮小司寇以八辟麗邦附刑罰親者王之親族者王之故舊賢有徳行能有道藝功有大勲力貴大夫以上勤勞五事賓三恪二代之後張平子說八索周禮八議之刑五聽辭色氣耳目小司寇以五聲聽獄訟求民情五罰墨百鍰劓惟倍二百鍰剕倍差五百鍰宫六百鍰大辟千鍰吕刑五刑不簡正于五罰罰贖也五戒誓軍旅誥㑹同禁田役糾國中憲都鄙周禮士師以五戒先後刑罰鄉八刑不孝不睦不婣不弟不任不恤造言亂民大司徒糾萬民五教祀明堂教諸侯孝食三老五更於大學教弟祀先賢於西學教徳耕籍教養朝覲教臣祭義五者天下之大教十倫事鬼神之道君臣之義父子之倫貴賤之等親疎之殺爵賞之施夫婦之别政事之均長幼之序上下之際祭統祭有十倫三重三王之禮中庸王天下有三重焉吕與叔云謂議禮制度考文祼升歌武宿夜祭統祭有三重五善三善訪問於善為咨咨親為詢咨禮為度咨事為諏咨難為謀左傳穆叔如晉晉侯享之歌鹿鳴之三三拜曰皇皇者華君教使臣曰必咨於周臣獲五善敢不重拜穆叔叔孫豹國語重之以六徳謂諏謀度詢咨周恭敬以信忠信以寛明察以斷家語子路治蒲孔子三稱其善保息六慈幼養老振窮恤貧寛疾安富周禮大司徒以養萬民荒政十有二散利薄征緩刑弛力舎禁去幾𤯝禮殺哀殺所界反蕃樂多昏索鬼神除盜賊同上以聚萬民十二職稼穡三農樹蓺園圃作材虞衡阜蕃藪牧飭材百工通財商賈化材嬪婦斂材臣妾生材閒民學藝世事服事同上頒執亊十有二以登萬民九職加三事九合㑹鄄又㑹鄄㑹幽又㑹幽㑹檉㑹貫㑹首戴左氏作首止㑹甯母㑹葵邱論語齊桓公九合諸侯不以兵車謂衣裳之㑹也論穀梁傳云衣裳之㑹十有一不取北杏及陽穀為九語疏史記漢志注兵車之㑹三北杏葵陘邱新城兵乘車之㑹六鄭二鄄幽齊語車之㑹六北杏二首止醎洮淮檉年乗車之㑹三陽穀㑹首止㑹葵邱之中九合諸侯謂戚城棣左傳晉悼公八㑹鄬㑹邢邱同盟戲城㑹柤㑹戍虎牢盟亳北蕭魚三寳土地人民政事孟子諸侯之寳三大農大工大商六韜三寳六柄二柄生殺貧富貴賤齊語愼用其六柄操管子六柄者主之所刑徳韓子二柄三常愛親明賢政之幹禮賓矜窮禮之宗禮以紀政國之常國語僖負羈云君以舉賢為常官以任賢為常士以敬賢為常周書隂符治國有三常三選鄉長所進官長所選公所訾相齊語訾量也相視也三適古者公侯貢士一適謂之好徳再適謂之賢賢三適謂之有功尚書大傳其漢書適得人七法則象法化決塞心術計數管子五輔徳有六興義有七體禮有八絃法有五務權有三度管子注五者可以輔弼國政六務節用賢佐法度必誅天時地宜管子明主六務九惠老老慈幼恤孤養疾合獨問疾通窮振困接絶管子九恵之教四順民惡憂勞我佚樂之民惡貧賤我富貴之民惡危墜我存安之民惡滅絶我生育之管子曰順政之所興在順民心三材官人史吏之材士大夫官師之材卿相輔佐之材荀子君道篇官此三材無失其次人主之道也六親以家為家以鄉為鄉以國為國以天下為天下如地如天如月如日管子三本徳當位功當禄能當官管子四位文武威徳管子曰四位者主之所處三徳得百姓之力者富得百姓之心者强得百姓之譽者榮荀子三徳具而天下歸之三節平政愛民隆禮敬士尚賢使能荀子君人者之大節也勸賞畏刑恤民左傳聲子曰三者禮之大節也三具仁義威荀子王者仁眇天下義眇天下威眇天下知此三具者欲王而王欲霸而霸欲強而强四統善生養人善班治人善顯設人善藩飾人荀子君道九變明天道徳仁義分守形名因任原省是非賞罰莊子古之語大道者五變而形名可舉九變而賞罰可言也文中子化至九變王道其明乎注孔子曰三年有成九成二十七年漢武帝詔曰詩云九變復貫知言之選七賦五穀桑麻揚子七賦之所養五論臣下職君法明刑稱陳言有節上通利荀子成相篇君論有五約以明三不欺子産治鄭民不能欺子賤治單父民不忍欺西門豹治鄴民不敢欺史記六律生殺予奪賞罰文子子淮南三登進業者登九歲再登者平三登曰太平二十七歲漢食貨志三道明國家大體通人事終始能直言極諫漢文帝䇿賢良三道之要鼂錯對六守仁義忠信勇謀人君有六守六韜五事道民與上同意天隂陽寒暑時制地逺近險易廣狹死生將智信仁勇嚴法曲制官道主用孫子經之以五亊六徳五徳禮仁信義勇智司馬法六徳智信仁勇嚴劉子兵術五徳敬老慈幼救疾恤孤賑貧窮任失業唐陸䞇説黜陟使六徳五材勇智仁信忠六韜將有五材三勢三隧氣勢地勢因勢淮南子兵有三勢上知天道下習地形中察人情淮南子將有三隧五政興農桑以養其生審好惡以正其俗宣文教以章其化立武備以秉其威明賞罰以統其法荀悦申鑒加揚子五政之所注五常之政四善徳義有聞清謹明著公平可稱恪勤匪懈唐考功二十七最近侍選司考校禮官樂官判事宿衞督領法官校正宣納學官軍將政教文史糾正勾撿監掌役使屯官倉庫歴官方術關津市司牧官鎭防同上一最四善為上上一最三善為上中一最二善為上下五事身治正閨門治左右正功賞得徳厚吏良漢谷永對五者王事之綱紀八科措刑官人知賢去疑招諫勸賞息兵安宗子唐陳子昻奏八科十事教太子正邦本封諸王固磐石出宫人嫁宗女時招宰相講庶政次對羣臣廣聰明復正衙奏事許方幅糾彈禁非時貢獻省出畋游元􅐃上奏十亊四齊其治法其佐賢其民愿其俗美荀子王霸篇四者齊注齊謂無所闕四禁漏洩稽緩違失忘誤唐志中書舎人十思見可欲則思知足將興繕則思知止處髙危則思謙降臨滿盈則思挹損遇逸樂則思撙節在晏安則思後患防壅蔽則思延納疾讒邪則思正已行爵賞則思因喜而僭施刑罰則思因怒而濫唐魏徴上疏兵體三章得地形卒服習器用利漢鼂錯上書言兵體三章六條清心敦教化盡地利擢賢良恤獄訟均賦役西魏蘇綽六條詔書律八例以准皆各其及即若范蜀公云若春秋之凡六綱明禮崇樂熈政正刑勸農經武後周竇儼上疏文武七條清心奉公修徳責實明察勸課革弊文臣修身守職公平訓習簡閲存恤威嚴武臣眞宗作修心三要仁明武司馬文正公治國三要官人信賞必罰司馬文正公六事慈儉勤愼誠明蘇文忠公五規保業惜時逺謀重微務實司馬文正公十事畏天愛民修身謀學任賢納諫薄斂省刑去奢無逸吕文獻公明黜陟抑僥倖精貢舉擇官長均公田厚農桑修武備減徭役覃恩信重命令范文正公師傅六官經界鄉黨貢士兵役民食四民山澤分數明道先生三先務立志責任求賢伊川先生曰當世之務所尤先者三三者之中復以立志為本三科徳才勞唐沈既濟言古今選用之法九流常敘有三科力役有上中下論語注茂異賢良幹蠱陸䞇説黜陟使以三科登俊乂賢良方正能直言極諫經學優深可為師法詳閑吏理達於教化後周制舉三科六條忠恪匪躬孝敬盡禮友于兄弟潔身勞謙信義可復學以為已晉武帝令諸郡中正以六條舉淹滯九品九班魏尚書陳羣立九品官人之法州郡皆置中正擇有識鑒者為之區别人物第其髙下為晉班劉頌轉吏部尚書九之制二先治身莫先於孝治國莫先於公司馬文正公五禁初命曰誅不孝無易樹子無以妾為妻再命曰尊賢育材以彰有徳三命曰敬老慈幼無忘賔旅四命曰士無世官官事無攝取士必得無專殺大夫五命曰無曲防無遏糴無有封而不告孟子桓公葵邱之㑹今之諸侯皆犯此五禁六術制號政令欲嚴以威慶賞刑罰欲必以信處舎收藏欲周以固徙舉進退欲安以重欲疾以速窺敵觀變欲潛以深欲伍以參遇敵決戰必道吾所明無道吾所疑荀子議兵篇臨武君問為將曰是謂六術五權無欲將而惡廢無急勝而忘敗無威内而輕外無見利而不顧害慮事欲熟而用財欲泰同上是之謂五權八觀通觀其所禮貴觀其所進富觀其所養聽觀其所行止觀其所好習觀其所言窮觀其所不受賤觀其所不為吕氏春秋賢主所以論人三勤民勤於力則功築罕民勤於財則貢賦少民勤於食則百事廢穀梁傳古之君人者必時視民之所勤政善而吏惡吏善而政惡政吏駢惡揚子民有三勤五要廢兵之冗食蠲法之撓人省官之不急去物之不用罷事之非要唐陸䞇説黜陟使以五要簡官亊均節六條兩税之弊兩税以布帛為額長吏以增户加税闢田為課績税限迫促以税茶錢置義倉備水旱兼并之家私斂重於公税陸䞇奏均節財賦六條三君問政葉公問政夫子曰政在説近來逺魯哀公問政夫子曰政在選賢齊景公問政夫子曰政在節財説苑韓子三君問政於夫子夫子對之不同兩科縉紳之儒守和親介胄之士言征伐漢匈奴傳贊五事革命之日市不易肆克服天下在即位後未嘗殺一無罪百年方四葉百年無腹心患康節先生謂本朝五事自唐虞以下所未有四條四事仁惠公直明敏亷謹紹興中舉薦四條律已以亷撫民以仁存心以公涖事以勤眞文忠公四亊守潭州以勵其僚三言結人心厚風俗存紀綱蘇文忠公三辟夏禹刑商湯刑周九刑左傳晉叔向曰三辟之興皆叔世也三䇿周得中䇿漢得下䇿秦無䇿漢書嚴尤周得上䇿秦得其中漢無䇿唐劉貺上䇿自治中䇿取魏下䇿浪戰杜牧罪言治河有上中下䇿漢賈讓五兵義兵王應兵勝忿兵敗貪兵破驕兵滅文子用兵有五漢魏相上書三征布縷粟米力役孟子緩君子用其一其二法經六篇盜律賊律囚捕二雜律具律魏李悝著法經商鞅改為律九章漢蕭何加李悝所造戸興廐三篇謂之九章之律魏律十八篇増九篇晉律二十篇就漢九章增十一篇梁律二十篇北齊律十二篇後周律二十五篇隋律十二篇唐因隋舊宋建隆重定刑統三十卷設於此而逆彼之至曰格設於此而使彼效之曰式禁其未然之謂令治其已然之謂敕神宗云九典祗道稱賢典師四戚伍長羣長羣醜什長戒卒周書文政篇順九典八成邦汋邦賊邦諜犯邦令撟邦令為邦盜為邦朋為邦誣周禮士師掌士之八成注行事有八篇三法三刺訊羣臣訊萬民訊羣吏三宥不識遺忘過失三赦幼弱蠢老耄愚周禮司刺以此三法求民情斷民中四達夫家衆寡六畜車輦稼穡耕耨旗鼓兵革周禮遂大夫以四達戒其功事注治民之亊大通者有四君子道四行已恭事上敬養民惠使民義論語謂子産有君子之道四六畏賢士藏匿四民遷業上下相徇亷恥道消毁譽亂眞直言不聞後唐康澄言深可畏者六功五品以徳立宗廟定社稷曰勲以言曰勞用力曰功明其等曰伐積日曰閲史記功臣表古者人臣功有五品三賞軍伐善君以道事其君能其官晉語趙衰曰先且居有三賞即位三䇿天子即位上卿進曰能除患則為福授天子一䇿中卿進曰先事慮事先患慮患授天子二䇿下卿進曰敬戒無怠授天子三䇿荀子七福民不鑄錢黥罪不積偽錢不蕃民不相疑采銅鑄作反於耕田輕斂重散貨物必平多少有制用别貴賤官富貴而末民困制棄財則敵必壞漢賈誼諫除盜鑄錢令七福可致三足足食足兵得士唐盧景亮三足記三名命物之名方圓白黑毁譽之名善惡貴賤況謂之名賢愚愛憎尹文子名有三科刑名從商爵名從周文名從禮荀子正名三擇義立而王信立而霸權謀立而亡荀子王霸三者明主之所謹擇也三物解狐得舉祁午得位伯華得官左傳祁奚能舉善建一官而三物成一官軍尉物事也三駕師於牛首師於向觀兵於鄭東門左傳晉悼公三駕而楚不能與爭注三興師鄭遂服三無無聲之樂無體之禮無服之喪禮記孔子間居二急務守邊備塞勸農力本漢鼂錯言當世急務二事九伐九戎𤯝伐壇音善削侵正殘杜滅周禮大司馬九伐之法伐掌交九戎之威注九之戎五物萬民之利害為一書禮俗政事教治刑禁之逆順為一書悖逆暴亂作慝猶犯令者為一書札喪凶荒厄貧為一書康樂和親安平為一書周禮小行人此五物每國辨異之三資欲富國者務廣其地欲彊兵者務富其民欲王者務博其得史記司馬錯曰三資者備而王隨之矣四式校能記功任賢敘常唐元􅐃對䇿設四式以任人拔擢以旌其異能黜罷以糾其失職序進以謹其守常陸䞇奏覈才馭吏有三術六急務輔翊太子選任大臣振舉綱維變化風俗愛養民力修明軍政朱文公封事天下之大本心也今日之急務六者是也審官六議相臣庶官京司闕官考課遺滯藩府官屬唐趙憬四術忠愛無私用賢簡能文選注尸子曰治國有四術為國五要文徳武功法度防固刑賞後魏髙閭上表為國之道其要有五姚崇十事政先仁恕不倖邊功法行自近宦䜿不與政絶貢獻戚屬不任臺省接大臣以禮羣臣得犯忌諱絶道佛營造推此鑒戒為萬代法唐姚崇以十亊要説而後輔政二柄文武魏元忠言天下之柄有二文武而已小學紺珠卷八
