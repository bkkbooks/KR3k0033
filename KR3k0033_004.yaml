body:
  text: 藝文類禮五樂六射五御五書六數九周禮大司徒保氏易書禮詩春秋揚子法言惟五經為辨詩書禮樂春秋漢藝文志五者五常之道易為之原五學世有變改周易尚書毛詩左氏春秋禮記唐五經博士書詩禮易春秋公羊漢建元五年立五經博士詩書樂易禮春秋禮記經解記六藝政教得失易書詩禮樂春秋漢武帝表章六經憲章六學藝文志并論語孝經小學為九種樂經亡莊子孔子治詩書禮樂易春秋六經六經之名始見又曰詩以導志書以導事禮以導行樂以導和易是以導陰陽春秋以導名分史記孔子曰六藝於治一也禮以節人樂以發和書以道事詩以達意易以神化春秋以義漢儒林傳古之儒者博學六藝之文六學者王教之典籍經解以詩為首七略藝文志七録易居前七志孝經為初陸龜蒙曰六籍者聖人之海也易書詩周禮儀禮禮記春秋孝經論語經典釋文序録易書詩禮樂春秋論語孝經小學漢志六藝九種唐谷那律稱為九經庫九經之名始見韋表微著九經師授譜後唐挍九經鏤本于國子監易書詩三禮春秋秦宓曰文翁遣相如東受七經還教吏民傅咸七經詩隋樊深七經義綱七經論詩書春秋周禮儀禮禮記論語劉敞七經小傳詩書禮樂王制樂正崇四術立四教春秋教以禮樂冬夏教以詩書四術詩書禮樂四教春夏秋冬春夏陽也詩樂者聲聲亦陽也秋冬陰也書禮者聲聲亦陰也文王世子春誦夏弦秋學禮冬讀書書詩春秋文中子聖人述史三焉春秋孝經中庸注孔子曰吾志在春秋行在孝經固足以明之公羊傳序曰孔子有云云云此二學者聖人之極致治世之要務也孝經疏孝經鉤命決云志在春秋行在孝經禮記春秋左氏傳為大經詩周禮儀禮為中經易尚書春秋公羊傳穀梁傳為小經唐選舉志孝經論語兼通百官志論語孝經爾雅附中經大經中經小經立身以力學為先力學以讀書為本今取六經及論語孟子孝經以字計之毛詩三萬九千二百二十四字尚書二萬五千七百字周禮四萬五千八百六字禮記九萬九千二十字周易二萬四千二百七字春秋左氏傳一十九萬六千八百四十五字論語一萬二千七百字孟子三萬四千六百八十五字孝經一千九百三字大小九經合四十八萬四千九十五字且以中才為率若日誦三百字不過四年半可畢或以天資稍鈍減中才之半日誦一百五十字亦止九年可畢苟能熟讀而溫習之使入耳著心久不忘失全在日積之功耳里諺曰積絲成寸積寸成尺寸尺不巳遂成丈匹此語雖小可以喻大後生勉之鄭耕老勸學古之學者耕且養三年而通一藝存其大體玩經文而巳是以用日少而畜德多三十而五經立漢藝文志周易尚書毛詩禮記春秋唐孔穎達與諸儒選定五經義疏凡一百七十卷詔改為正義十二經詩書禮樂易春秋六經又加六緯一說易上下經并十翊一云春秋十二公經莊子孔子西藏書於周室翻十二經以說老聃易皇皇帝王霸體春意言象數用書帝虞夏商周體夏仁義禮智用詩王文武周召體秋性情形體用春秋霸秦晉齊楚體冬聖賢才術用邵子皇極經世左氏穀梁春秋古文尚書毛詩後漢建初八年詔選高堂生受四經周易尚書毛詩禮記周官儀禮春秋左氏公羊穀梁各為一經論語孝經為經合十經助教分掌宋百官志國子助教十人五經五緯南史周續之通十經五經及樂緯漢書注易緯稽覽圖乾鑿度坤靈圖通卦驗是類謀辨終備書緯琁璣鈴考靈耀刑德考帝命驗運期授詩緯推度災汜歷樞倉神務禮緯含文嘉稽命徵斗威儀樂緯動聲移稽耀嘉汁圖徵春秋緯演孔圖元命包文耀鉤運斗樞感精符合誠圖考異郵保乾圖漢含孳佑助期握誠圖潛潭巴說題辭易書詩禮樂孝經春秋後漢書注隋志七經緯三十六篇孝經緯援神契鉤命決七前六後八左九右關子明云河圖伏羲氏王天下龍馬出河遂則其文以畫八卦孔安國云邵子曰圓者河圖之數方者洛書之文朱子曰河圖之位一與六其宗而居乎北二與七為朋而居乎南三與八同道而居乎東四與九為友而居乎西五與十相守而居乎中九前一後三左七右四前左二前右八後左六後右關子明云洛書禹治水時神龜負文而列于背有數至九禹遂因而次第之以成九類孔安國云易大傳曰河出圖洛出書聖人則之關子明洞極邵康節皆以十為河圖九為洛書劉牧以九為河圖十為洛書又引大傳以為二者皆出於伏羲之世姚氏曰戴九履一之圖乃易乾鑿度九宮之法劉牧以為河圖又以生數就成數依五方圖之以為洛書洞極經兩易之連山始艮夏歸藏始坤殷亦曰坤乾周易始乾周周禮大卜掌三易之法其經卦皆八其別皆六十四歐陽文忠公曰易至漢分為三有田何之易焦贛之易費直之易八索八卦之說謂之八索左傳書序國語史伯曰平八索以成人注八體以應八卦乾為首坤為腹震為足巽為股離為目兌為口坎為耳艮為手馬融說八索八卦賈逵云八王之法十言伏羲作十言之教曰乾坤震巽坎離艮兌消息左傳正義乾天健一南坤地順八北震雷動四巽風入五坎水陷六離火麗三艮山止七兌澤說二伏羲始作八卦因而重之為六十四文王作卦辭周公作爻辭文王八卦離南坎北乾坤三畫以初相易而成震巽以中相易而成坎離以三相易而成艮兌乾坤屯蒙需訟師比小畜履泰否同人大有謙豫隨蠱臨觀噬嗑賁剝復無妄大畜頤大過坎離右上經咸恆遁大壯晉明夷家人睽蹇解損益夬姤萃升困井革鼎震艮漸歸妹豐旅巽兌渙節中孚小過既濟未濟右下經太陽一九少陰二八少陽三七太陰四六兩儀之上各生一奇一偶而為二畫者四乾老陽震坎艮少陽坤老陰巽離兌少陰七少陽單八少陰拆爻不變九老陽重六老陰交爻變繫辭兩儀生四象四象生八卦易本義云四象者次為二畫以分大少乾兌艮坤生於二太為天之四象離震巽坎生於二少為地之四象履謙復恆損益困井巽繫辭三陳九卦以明處憂患之道初陳履德之基謙德之柄復德之本恆德之固損德之修益德之裕困德之辨井德之地巽德之制再陳履和而至謙尊而光復小而辨於物恆雜而不厭損先難而後易益長裕而不設困窮而通井居其所而不遷巽稱而隱三陳履以和行謙以制禮復以自知恆以一德損以遠害益以興利困以寡怨井以辨義巽以行權先釋卦名次言兩卦之體末推卦用分而為二以象兩掛一以象三揲之以四歸奇於扐繫辭四營而成易十有八變而成卦易變也謂一變也三變成爻十八變則成六爻易之策數萬物備焉而經營之者不出於四其初左右手數之以四其次得三少三多及一少一多亦止於四其終即三少三多之餘以四除之得九與六積萬一千五百二十策一少一多之餘以四除之得七與八亦積萬一千五百二十策二篇之策皆四之所成也是故八卦為四者二六十四卦為四四者四故曰四營而成易此言揲蓍之法也三揲之餘然後畫卦以小變言之每一揲具五小變以三揲合十五小變為十有八變而畫一爻以大變言之每一揲為一大變合十八揲為十八大變而畫一卦八卦與六十四卦皆十八之所成也是故上經三十卦反對為十八卦下經三十四卦反對亦為十八卦故曰十有八變而成卦此言求卦之法也初二三四五上易以爻為位以卦為時天道大明於元氣既行之後始於子午終於巳亥各以六辰而成一氣而三百六十五度分焉易象大明於奇畫既生之後始於復姤終於乾坤各以六位而成卦而三百八十四爻列焉六虛六位也史記自序八卦位曰八位二萬之策二篇三百八十四爻陰陽各半合萬一千五百二十策繫辭注上經起乾坤至坎離三十卦下經起咸恆至既未濟三十四卦雜卦無上下經之分然自乾坤至困亦三十卦自咸恆至夬亦三十四卦鄭東卿云二用用九者乾之坤用六者坤之乾乾爻七九九變而七無為易占其變用九不用七坤爻八六六變而八無為用六不用八於乾坤見之其餘可知九六變七八不變者揲蓍之法遇純則變參同契二用無爻位周流行六虛罔罟取離包犧耒耨取益為市取噬嗑神農衣裳取乾坤舟楫取渙服牛乘馬取隨重門擊柝取豫臼杵取小過弧矢取睽宮室取大壯棺槨取大過書契取夬黃帝堯舜易繫辭正義曰象卦制器皆取卦之爻象之體上彖下彖上象下象上繫下繫文言說卦序卦雜卦孔子作鄭康成始以彖象連經文王弼又以文言附乾坤二卦易三義易一名而含三義易簡一也變易二也不易三也鄭康成易贊上經下經伏犧畫文王周公辭十翊孔子所作傳呂成公祖謙定經二卷傳十卷以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占繫辭君子居則觀其象而玩其辭動則觀其變而玩其占讀易之法盡於此施讎孟喜梁丘賀藝文志本圖書原卦畫明蓍策考變占朱文公五贊原象述旨明筮稽類藝學三墳伏羲神農黃帝之書言大道左傳書序山氣形張商英得於北陽民家山墳連山氣墳歸藏形墳坤乾三禮禮為人防墳大防也張平子說三氣天地人之氣馬融說五典少昊顓頊高辛唐虞之書言常道同上周禮外史掌三皇五帝之書張平子說五典五帝之常道馬融說五典五行九州之志謂之九丘左傳書序劉原父云即九共九篇古文丘與共相近故誤為共禹貢言形質九丘言情性馬融說九州之數賈逵說九州亡國之戒張平子說周禮之九刑一五行二五事三八政四五紀五皇極六三德七稽疑八庶徵九五福六極洪範劉歆云河圖洛書相為經緯八卦九章相為表裏書五十七篇伏生得二十九篇教于齊魯之間儒林傳堯典皋陶謨禹貢甘誓湯誓盤庚高宗肜日西伯戡黎微子牧誓洪範金縢大誥康誥酒誥梓材召誥洛誥多方多士立政無逸君奭顧命呂刑文侯之命費誓秦誓凡二十八篇漢儒以為今文泰誓武帝世始得為二十九篇古文增多伏生二十五篇書序大禹謨五子之歌胤征仲虺之誥湯誥伊訓太甲三篇咸有一德說命三篇泰誓三篇武成旅獒微子之命蔡仲之命周官君陳畢命君牙冏命復出者舜典益稷盤庚二篇康王之誥凡五篇又序一篇共五十九篇四十二篇亡為例有十典謨貢歌誓誥訓命征範甘誓湯誓泰誓牧誓費誓秦誓湯誥大誥康誥酒誥召誥洛誥康王之誥六誓可以觀義五誥可以觀仁呂刑可以觀誡洪範可以觀度禹貢可以觀事皋陶謨可以觀治堯典可以觀美尚書大傳孔子曰文心雕龍云書標七觀風賦比興雅頌周禮大師教六詩詩序詩有六義漢禮樂志國子誦六詩風雅頌詩之體賦比興詩之用三經三緯關睢之亂為風始鹿鳴為小雅始文王為大雅始清廟為頌始詩序史記學記宵雅肆三鹿鳴四牡皇皇者華魯詩申公齊詩轅固韓詩韓嬰毛詩毛萇藝文志詩分為四周南召南周魯商風雅頌左傳晏子曰一氣二體三類四物五聲六律七音八風九歌朱子曰二南正風房中之樂也鄉樂也二雅之正雅朝廷之樂也商周之頌宗廟之樂也小雅大雅建邦能命龜田能施命作器能銘使能造命升高能賦師旅能誓山川能說喪紀能誄祭祀能語毛詩傳君子能此九者可謂有德音可以為大夫也吉十有二凶五賓八軍五嘉六舜典修五禮注吉凶賓軍嘉皋陶謨自我五禮有庸哉注公侯伯子男五等之禮春官注曲禮五其別三十有六祭統禮有五經謂吉凶賓軍嘉大司徒以防萬民之僞而教之中唐五禮賓軍嘉凶吉天神地祇人鬼之禮舜典伯夷作秩宗典三禮注班固幽通賦姜本支呼三止注止禮也鄭玄說天事地事人事之禮林少穎謂以郊廟祭祀為主禮之本也周禮儀禮禮記後漢儒林傳鄭玄注通為三禮唐明經有三禮科聶崇義考正三禮圖崔靈恩三禮義宗冠昏喪祭鄉相見王制修六禮以節民性荀子立大學設庠序修六禮冠婚朝聘喪祭賓主鄉飲酒軍旅大戴禮記此之謂九禮祭祀之容賓客之容朝廷之容喪紀之容軍旅之容車馬之容周禮保氏治典天官冢宰教典地官司徒禮典春官宗伯政典夏官司馬刑典秋官司寇事典冬官司空周禮大宰建六典周官經六篇司空之篇亡以考工記補之士冠士昏士相見鄉飲酒鄉射燕大射聘公食大夫覲喪服士喪既夕士虞特牲饋食少牢饋食有司徹漢高堂生傳士禮十七篇禮古經多三十九篇戴德戴聖慶普藝文志皆后倉弟子三家立於學官謂冠婚吉凶藝文志禮經三百威儀三千臣瓚曰禮經三百謂冠婚吉凶禮經三百謂周禮六篇其官三百六十禮器經禮三百曲禮三千注經禮謂周禮中庸禮儀三百經禮制之凡也曲禮文之目也禮記說禮記百三十一篇藝文志七十子後學者所記戴德刪為八十五篇戴聖又刪為四十六篇馬融又益月令明堂位樂記合四十九篇隋志內治七國用十六軍衛四刑禁六官人八教道九李泰伯撰劉子駿鄭康成皆以周禮為周公致太平之跡養君德正朝綱均國勢陳傅良君舉說杜子春鄭大夫興鄭司農衆周禮疏鄭康成所存注者三家二鄭皆康成之先故言官不言名字白矢矢貫侯過見其鏃白參連前放一矢後三矢連續而去剡注羽頭高鏃低而去剡剡然襄尺臣與君射不與君並立襄君一尺而退音讓井儀四矢貫侯如井之容儀周禮保氏注鳴和鸞和在式鸞在衡升車則馬動馬動則鸞鳴鸞鳴則和應逐水曲御車隨逐水勢屈曲而不墜水過君表毛詩傳曰褐纏旃以為門君表即褐纏旃也舞交衢衢道也謂御車在交道車旋應於舞節逐禽左御驅逆之車逆驅禽獸使左當人君以射之周禮保氏注雲門黃帝大司樂雲門大卷大咸堯咸池大韶舜大司樂作㲈大廈禹大濩湯大武武王周所存六代之樂周禮保氏注大司樂以樂舞教國子大司徒以防萬民之情而教之和疏云保氏教六樂教以書大司樂教以舞載民玄鳥遂草木奮五穀敬天常達帝功依地德總萬民之極呂氏春秋樂本樂論樂施樂言樂禮樂情樂化樂象一云象法賓牟賈師乙魏文侯十一篇合為一篇奏樂樂器樂作意始樂穆說律季札樂道樂義昭本昭頌竇公十二篇名存書亡禮記正義雲門五英六莖大卷韶護夏武易通卦驗舞八樂鹿鳴騶虞伐檀文王魏杜夔傳舊雅樂四曲樂語五均河間獻王樂元語云天子取諸侯之士以立五均則市不二賈四民常均漢食貨志注象簫南籥文王大武武王韶濩湯大夏禹韶簫舜左傳吳公子札來聘請觀周樂注魯用四代樂正義云不得用雲門大咸鹿鳴三奏南陔一奏南有嘉魚四奏崇丘一奏關睢五奏鵲巢三奏唐會要工歌鹿鳴四牡皇皇者華儀禮鄉飲酒禮大射乃歌鹿鳴三終乃管新宮三終其篇亡笙入三終笙入樂南陔白華華黍鄉飲酒禮間歌三終合樂三終乃間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀間代也謂一歌則一吹乃合樂周南關睢葛覃卷耳召南鵲巢采蘩采蘋合樂謂歌樂與衆聲俱作同上燕禮遂歌鄉樂鄉飲酒義工告樂備九招樂舜樂簫韶九成故曰九招史記帝舜紀禹乃興九招之樂大司樂九㲈之舞劉原父曰招有九名識其名焉祈徵角之謂也琴瑟春笙竽夏鼓季夏鐘秋磬冬漢郊祀志舜修五樂注鼓鐘鐸磬鞀鬻子禹以五聲聽治王夏肆夏昭夏納夏章夏齊夏側皆反族夏祴夏古哀反驁夏五羔反周禮鐘師以鐘鼓奏九夏夏大也樂之大歌有九九夏皆詩篇名頌之族類也三夏二曰肆夏一名樊國語作緊三曰韶夏一名遏四曰納夏一名渠左傳奏夏之三三夏天子所以享國語金奏肆夏繁遏渠周禮注呂叔之云肆夏時邁也繁遏執競也渠思文也樊遏渠左傳國語注分為三夏之別名文王之三大雅之首文王大明綿左傳工歌文王之三兩君相見之樂也鹿鳴之三小雅之首鹿鳴四牡皇皇者華左傳歌鹿鳴之三大化大訓六府九原尚書大傳注四章皆歌禹之功左氏丘明魯太史公羊高齊人穀梁赤一名喜一名俶魯人并鄒氏夾氏為五傳鄒氏無師夾氏未有書藝文志春秋分為五武帝立五博士春秋公羊孝宣立穀梁平帝立左氏元者氣之始春者四時之始王者受命之始正月者政教之始公即位者一國之始漢書注春秋正月書王者九十二二月書王者二十三三月書王者十九以事繫日以日繫月以月繫時以時繫年杜預春秋左傳序一曰微而顯二曰志而晦三曰婉而成章四曰盡而不汙五曰懲惡而勸善左傳序發傳之體有三為例之情有五尹庚始劉向周慶丁姓王亥漢賈逵兼通五家穀梁說晉乘楚檮杌魯春秋孟子孟子莊子董子文中子邵子張子程子胡文定公春秋傳春秋五十凡稱凡者五十其別四十有九釋例母弟二凡其義不異三科九旨新周故宋以春秋當新王此一科三旨也所見異辭所聞異辭所傳聞異辭此二科六旨也內其國而外諸夏內諸夏而外夷狄此三科九旨也何休說百二十國寶書孔子制春秋之義使子夏等十四人求周史記得百二十國寶書公羊傳疏史通如楚書鄭志魯之春秋魏之紀年此其可得言者周魯齊晉鄭楚吳越國譜年譜地譜人譜鄧明世春秋四譜左氏正義孔穎達公羊疏徐彥穀梁疏揚士勛呂大防十二篇朝說之并十二為八睢陽王氏東萊呂氏各定為十二篇周燔又改更次序讀書目言古易者為五家荀爽京房馬融鄭玄宋衷虞翻陸績姚信翟子玄釋文序荀爽九家集解易九師說淮南王安聘明易者九人號九師說漢藝文志河圖洛書伏羲八卦次序八卦方位六十四卦次序六十四卦方位伏羲四圖其文王八卦次序八卦方位卦變朱文公易本義易之圖九有天地自然之易有伏羲之易有文王周公之易有孔子之易四易易有四體一用三伏羲先天體也連山天易歸藏地易周易人易用也張行成云易百有餘家所可取者古先天圖揚雄太玄關子明洞極魏伯陽參同契邵堯夫皇極經世而巳四家之學皆兆於先天圖鄭東卿云歐陽字和伯大小夏侯勝建漢儒林傳南陔白華華黍由庚崇丘由儀晉束皙肆修鄉飲之禮補著其文劉原父曰六篇有聲無詩故云笙不云歌非亡失乃無也朱文公曰鄉飲酒燕禮曰笙曰樂曰奏而不言歌則有聲而無辭明矣三禮圖冠冕衣服見吉凶之象宮室車旗見古今之制弓矢射侯見尊卑之別鐘鼓管磬見法度之均祭器祭玉見大小之數圭璧繅藉見君臣之序喪葬飾具見上下之紀聶崇義重集三禮圖二十卷高堂生傳蕭奮孟卿后蒼戴德戴聖鄭康成六蓻論儀禮經傳通解朱文公以儀禮為經取禮記及諸經史書所載附本經之下具列注疏諸儒之說為經傳通解二十三卷家禮五鄉禮三學禮十一邦國禮四集傳集注十四卷王朝禮十四喪祭二禮屬之門人黃幹類次三朝記孔子三見哀公言成七卷七略曰孔子三見哀公作三朝記七篇司馬氏程氏張氏張宣公栻所次孔安國古文二十二章鄭康成十八章韋昭王肅虞翻劉邵孝經序舉六家之異同古文庶人章分為二曾子敢問章分為三又多閨門一章孔安國鄭氏或云鄭玄隋志梁代二家並立國學唐劉子玄上孝經注議云孝經非鄭玄所注其驗十二條行孔廢鄭於義為允司馬貞請鄭孔並行明皇纂諸說自注以奪二家古論二十一篇分堯曰下章有兩子張魯論二十篇齊論二十二篇有問王知道衛瓘繆播欒肇郭象蔡謨袁宏江悙蔡系李充孫綽周懷范寧王悙皇侃疏列十三人云此十三家江熙所集大學論語孟子中庸朱文公曰四子六經之階梯近思録四子之階梯先讀大學次及語孟而後會其歸於中庸張鎰丁公著孫奭等刊正二家集成音義一卷釋詁釋言釋訓釋親釋宮釋器釋樂釋天釋地釋丘釋山釋水釋草釋木釋蟲釋魚釋鳥釋獸釋畜許六反疏云釋詁一篇蓋周公所作釋言以下或言仲尼所增子夏所足叔孫通所益梁文所補小爾雅十三章孔鮒撰朝氏曰先儒謂爾雅周公訓成王之書周易尚書尚書中候尚書大傳毛詩周禮儀禮禮記論語唐劉子玄曰晉十經簿凡九書皆曰鄭氏注名玄詩書春秋禮樂唐劉迅書詩周禮龜山先生三經義辨辨王安石三經義之失辨字同音異辨字音清濁辨彼此異音辨字音疑混辨字訓得失賈昌朝辨正凡五門河洛五九六藝四九謂八十一篇後漢張衡傳注百名百名以上書於策不及百名書於方聘禮名書文也今謂之字策簡也方版也古篆隸水經注魏正始中立象形日月之類會意武信之類轉注考老之類處事上下之類說文云指事漢志云象事假借令長之類諧聲江河之類說文云形聲漢志云象聲周禮保氏注方田以御田疇界域粟米以御交質變易差分一名分以御貴賤稟稅少廣以御積羃方圓商功以御功程積實均輸以御遠近勞費盈朒一云贏不足以御隱雜互見方程以御錯糅正負勾股一云旁要以御高深廣遠即九章周禮保氏注內則十年學書計謂六書九數蒼頡篇李斯作訓纂篇揚雄作滂喜篇賈滂作隋志蒼頡篇爰歷篇趙高作博學篇胡毋敬作通謂之三蒼說文繫傳古文奇字篆書隸書又曰佐書繆篆蟲書說文甄豐等改定古文時有六書大篆小篆八分隸書行書草書張懷瓘六體論大篆小篆刻符蟲書摹印署書殳書隸書說文秦書有八體古文大篆小篆隸飛白八分行草周越書苑八體古文篆隸草衛恆四體書勢古文大篆八分小篆飛白倒薤散隸懸針鳥書垂露唐玄度十體古文大篆籀文小篆八分隸書章草行書飛白草書張懷瓘十體石經三體古文篆隸說文字林唐志古文蒼頡大篆史籀小篆李斯隸書程邈草書漢隋志古文廢而不用大篆石經載之小篆即璽幡碣所用八分石碣經碑所用隸書典籍表奏公私文疏所用庾肩吾曰隸書今之正書唐六典古文秦篆漢隸句中正書孝經俗通正顏氏于祿字書九章海島孫子五曹張丘建夏侯陽周髀五經綴術緝古記遺二等數唐志輯略六藝略諸子略詩賦略兵書略術數略方技略劉歆總群書奏七略經典諸子文翰軍書陰陽術藝圖譜道佛附見王儉撰唐韋述續七志經典記傳子兵文集技術佛道阮孝緒隋許善心效七録更制七林甲六藝小學乙諸子兵書術數丙史記舊事丁詩賦圖讚汲冢書晉荀勗分四部經甲史乙子丙集丁唐志分為四類四庫書本有正有副元行沖上群書四類康節先生勸學曰二十歲之後三十歲之前朝經暮史晝子夜集儒家出於司徒之官道家出於史官陰陽家出於羲和之官法家出於稷官名家出於禮官墨家出於清廟之官從橫家出於行人之官雜家出於議官農家出於農稷之官并小說為十家小說家出於稗官藝文志陰陽儒墨法名道司馬談論六家要指子張氏子思氏顏氏孟氏漆雕氏仲良氏孫氏樂正氏韓非子孔子之後儒分為八陶淵明聖賢群輔録仲良氏公孫氏天玄二十七首中至事地玄二十七首更至昆人玄二十七首減至養揚雄太玄三方九州二十七部八十一家七百二十九贊為天地人三玄首衝錯測攡瑩數文梲圖告凡十一篇禮論樂論續書續詩元經讚易續書以存漢晉之實續詩以辨六代之俗修元經以斷南北之疑讚易道以申先師之旨正禮樂以旌後王之失老子道德經莊子南華真經文子通玄真經列子沖虛真經唐崇玄學習老莊文列曰道舉相里氏相夫氏鄧陵氏韓非子墨子之後墨離為三莊子相里勤之弟子鄧陵之屬相為別墨宋鉶尹文相里勤五侯子苦獲巳齒鄧陵子陶淵明集三墨有始孝行慎大先識審分審應離俗恃君呂氏春秋八覽開春慎行貴直不苟似順士容呂氏春秋六論紀十二月呂氏春秋十二紀禮記月令是紀之首文士之筆端武士之鋒端辨士之舌端韓詩外傳君子避三端權謀十三家形勢十一家陰陽十六家技巧十三家家三門兵書五十三李靖問對太公謀八十一篇言七十一篇兵八十五篇孫子吳子六韜司馬法三略尉繚子李靖問對道天地將法李靖問對文武龍虎豹犬莊子金版六韜漢志周史六韜後漢注霸典文論文師武論龍韜主將虎韜偏裨豹韜校尉犬韜司馬儒周孔之教道老氏之教釋佛氏之教文中子程元曰三教何如子曰政惡多門久矣後周武帝定三教先後以儒為先道為次釋為後遂禁佛道二教老釋韓文編年始左氏紀傳始司馬遷呂氏曰論一時之事紀傳不如編年論一人之終始編年不如紀傳司馬遷史記班固漢書范曄後漢書唐殷侑言三史亞於六經後魏劉延明以三史文繁著略記百三十篇禮樂律歷天官封禪河渠平準律歷禮樂刑法食貨郊祀天文五行地理溝洫藝文律歷禮儀祭祀天文五行郡國百官輿服司馬彪續漢書史記司馬遷漢書班固後漢書范曄三國志陳壽晉書房玄齡等宋書沈約南齊書蕭子顯梁書姚思廉陳書姚思廉後魏書魏收北齊書李百藥後周書令狐德棻隋書顏師古等南史宋至陳李延壽北史魏至隋李延壽唐書歐陽修五代史歐陽修禮樂儀衛車服歷天文五行地理選舉百官兵食貨刑法藝文才學識唐劉知幾曰史有三長達道義章法式通古今著功勳表賢能荀悅漢紀序立典有五志律令格式唐志名例衛禁職制戶婚廄庫擅興賊盜鬥訟詐僞雜律捕亡斷獄同上離騷經九歌東皇大一雲中君湘君湘夫人大司命少司命東君河伯山鬼國殤禮魂天問九章九篇遠遊卜居漁父綱罟伏羲豐年神農雲門軒轅九淵少昊五莖顓頊六英高辛咸池陶唐大韶有虞大夏夏大濩商元結補樂歌鹿鳴伐檀騶虞鵲巢白駒將歸猗蘭龜山孔子越裳周公拘幽文王岐山周公履霜伯奇雉朝飛沭犢子別鵲商陵穆子殘形曾子水仙懷陵一作懷伯牙韓文公取十操刪伯牙二操烈女楚樊妃伯妃魯伯妃貞女魯次室女思歸衛女霹靂楚商梁走馬樗里牧恭箜篌霍子高即公無渡河琴引秦屠門高楚引楚龍丘子風俗通遊春淥水坐愁秋思幽居稽康琴賦注俗傳蔡氏五曲相如形似司馬相如二班情理彪固子建仲宣氣質王楊絺繪王勃楊炯燕許雄渾張說蘇頲韓柳法度森嚴韓愈倡之柳宗元李翱皇甫湜等和之唐書論文章三變李善五臣呂延濟劉良張銧呂向李周翰甘泉河東挍獵長楊揚雄作四賦許都洛都魏劉邵作二賦諷諫平頭上尾蜂腰鶴膝大韻小韻旁紐正紐詩苑類格沈約云詩有八病策書制書詔書誡敕後漢書注漢制章奏表駮議同上漢雜事冊書制書慰勞制書發敕敕旨論事敕書敕牒唐志中書省奏鈔奏彈露布議表狀唐志門下省制敕冊天子令太子教親王公主符省下州州下縣縣下鄉唐志尚書省表狀箋啓辭牒唐志同上關刺移唐志同上宵衣正服罷獻納誨辨邪防微唐李德裕上西銘訂頑東銘砭愚橫渠先生作練時日帝臨青陽朱明西皓玄冥天門惟泰元天地日出入天馬景星齊房后皇華熚熚五神朝隴首象載瑜赤蛟漢志朱鷺思悲翁艾如張上之回擁離戰城南巫山高上陵將進酒君馬黃芳樹有所思雉子聖人出上邪臨高臺遠如期石留宋志晉陽武獸之窮戰武牢涇水黃奔鯨沛苞枿河右平鐵山碎靖本邦吐谷渾高昌東蠻柳宗元作太陽日暑性目元皇太陰月寒情耳會帝少陽星晝形鼻運王少陰辰夜體口世霸少剛石雷木色歲易少柔土露草聲月書太剛火風飛氣日詩太柔水雨走味辰春秋天文歷譜五行蓍龜雜占刑法漢藝文志氏族六書七音天文地理都邑諡器服樂藝文挍讎圖譜金石災祥昆蟲草木禮職官選舉刑法食貨鄭樵漁仲著通志總天下學術名曰略食貨選舉職官禮樂兵刑州郡邊防杜佑撰宋白等續周公春秋廣諡沈約賀琛扈蒙蘇洵編定制詔志策文中子續書天子之義列乎範者四命訓對讚議誡諫大臣之義載乎業者七化政頌歎文中子續詩有四名氣體性名行變解司馬文正公玄以準易易以擬玄立教明倫敬身稽古嘉言以廣之善行以實之朱文公造字四聲傳寫郭忠恕佩觿三卷上卷列三科通釋部敘通論袪妄類聚錯綜疑義系述徐鍇說文繫傳佩觿三科文字之學有三體制謂點畫有衡縱曲直之殊說文之類訓詁謂稱謂有古今雅俗之異爾雅方言之類音韻謂呼吸有清濁高下之不同沈約四聲譜及西域反切之學始一終亥形也始東終法聲也篆八分真行草范度寶章集十篇王方慶上十世從祖羲之十一世祖導十世祖洽九世祖珣八世祖曇首七世祖僧綽六世祖仲寶五世祖騫高祖𩒙曾祖褎九世從祖獻之等凡二十八人書唐武后求羲之書方慶奏詔崔融序其伐閲號寶章集復以賜方慶百家諸子百六十九家言百舉全數也後漢書注三子孟子好詩書荀子好禮揚子好易孟子之文直而顯荀子之文富而麗揚子之文簡而奧司馬文正公注法言序內篇一外篇雜篇各三劉清之子澄集録逍遙遊齊物論養生主人間世德充符大宗師應帝王內篇沈約宋書論在昔中興玄風獨扇為學窮於柱下博物止乎七篇始計作戰謀攻軍形兵勢虛實軍爭九變行軍地形九地火攻用間孫武三家孫子曹公杜牧陳嗥注原始正道本德宗道求人之志遵義安樂黃石公上略中略下略黃石公政體時事俗嫌雜言上下後漢荀悅作申鑒本傳載政體篇治學法象修本虛道貴驗貴言藝紀覆辨智行爵祿考僞譴交曆象別壽夭說藝審大臣謹所從亡國賞罰民數魏徐幹著中論別本有復三年制役二篇威神法五龍養志法靈龜實意法騰蛇分威法伏熊散勢法鷙鳥轉圜法猛獸損允法靈蓍鬼谷子陰符七術母儀賢明仁智貞慎節義辨通孽嬖七篇頌圖劉向卑弱夫婦敬慎婦行專心曲從和叔妹後漢班昭作東周西周秦齊楚趙魏韓燕宋衛中山孔衍春秋後語除二周及宋衛中山所留者七國玉牒仙源積慶圖宗藩慶系録宗枝屬籍李淑藏書二萬八百十一卷十志五十七類八目朝公武讀書志分為四部每讀一書終撮其大旨論之帝系后妃禮分為五樂輿服儀制崇儒運曆瑞異職官選舉道釋食貨刑法兵方域蕃夷帝王閏位僭僞列國君儲宮宗室外戚宰輔將帥臺省邦計憲官諫諍詞臣國史掌禮學校刑法卿監環衛銓選貢舉奉使內臣牧守令長宮臣幕府陪臣總録外臣一千一百四門開元禮通典會要周竇儼言三者經國之大典原道俶真天文地形時則覽冥精神本經主術繆稱齊俗道應汜論詮言兵略說山說林人間修務泰族漢淮南王安孝經道德經東京記崇慶坊司空李昉宅有三經堂百言演道百言演法百言演術陰符經李筌曰上有神仙抱一之道中有富國安民之法下有彊兵戰勝之術黃帝內經十八卷九卷素問第十一卷師氏藏之今唯八卷九卷靈樞針經皇甫謐曰黃帝創制於九經山海經十八篇南西北東中山經為五篇海內海外大荒三經南西北東各一篇海內經一篇總十八篇相傳以為夏禹所記漢志山海經十三篇劉歆所挍凡三十二篇定為十八篇周齊梁陳隋唐令狐德棻建言修五家史歷年圖起共和庚申訖顯德巳未凡一千八百年司馬文正公為五圖每圖為五重每重為六十行每行記一年之事七本紀十六世家三十七列傳蘇子由表歲以首年因年以著統大書以提要分注以備言綱倣春秋而參取群史之長目倣左氏而稽合諸儒之粹朱文公偏記小録逸事瑣言郡書家史別傳雜記地理都邑簿劉知幾史通偏記小說其流有十年表官閥政跡凡例汪藻修元符以來日曆為四類求之警戒擇善閫範論事處事治體呂成公祖謙教人讀史分六事正史編年僞史雜史起居注故事職官雜傳記儀注刑法目録譜牒地理唐藝文志太極三才正性天文地理王伯學術九流學術帝王紹運百官文武黃忠文公裳為翊善作八圖獻易見事易識字易讀誦顏氏家訓沈約曰文章當從三易著述出於書之謨訓易之象繫春秋之筆削比興出於虞夏之詠歌殷周之風雅柳文看讀多持論多著述多楊文莊公言學者當取三多三多之中持論尤難荀卿宋玉枚乘兔園相如上林賈誼鵩鳥子淵洞簫孟堅兩都張衡二京子雲甘泉延壽靈光文心雕龍凡此十家辭賦之英傑天成玄澤維南有山楊之華二月英英有蘭和風嘉木唐玄宗時宰相蕭嵩會百官賦詩八篇繼雅頌之體應璩休璉序云時謂曹爽曰公今聞周公巍巍之稱安知百慮有一失乎百一之名蓋興於此皇祖聖神湯湯莫醜金陵聖文六合雷聲聖武明道石介作百篇松風雪月天花竹鶴雲煙詩酒春池雨山僧道柳泉唐有日試百篇宋太平興國五年趙國昌應百篇科自陳求試上親出五言四句詩凡二十字為五篇率四韻至晚僅成數十首特賜及第賦詩制書批答金鑾密記唐翰林學士入院試文五藝文志杜元穎五題一卷詩評三品鍾嶸詩評自漢以來能詩者一百二十二人分三品為評靈運惠連玄暉唐子西取六十四篇為三謝詩賦頌銘贊文誄針詩行詠吟題怨歎章篇操引謠謳歌曲詞調元稹樂府古題序詩之流為二十四名皆詩人六義之餘李商隱溫庭筠段成式唐書用儷偶相夸號三十六體三人皆行第十六陶淵明柳子厚二集東坡謂之南遷二友玄儒文史宋泰始六年初置總名觀四科科置學士各十人奏論宜雅書論宜理銘誄尚實詩賦欲麗魏文帝典論論文此四科不同故能之者偏詩三變自書傳所記虞夏以來下及漢魏為一等自晉宋間顏謝以後下及唐初為一等自沈宋以後定著律詩下及今日為一等朱文公曰古今之詩凡有三變黃庭堅宗泒之祖陳師道潘大臨謝逸洪朋洪芻饒節祖可徐俯林敏修洪炎汪革李錞韓駒李彭朝沖之江端本楊符謝薖夏倪林敏功潘大觀王直方善權高荷呂本中本中作圖制誥詔表露布檄針銘記贊頌序正名對天地日月同類對花葉草芽連珠對蕭蕭赫赫雙聲對黃槐緑柳疊韻對倣徨放曠雙擬對春樹秋池詩苑類格唐上官儀云的名異類雙聲疊韻聯綿雙擬回文隔句同上敘事頌德紀功贊序緣情明道祖述論理詠物述詠引類指事柝微體物假象旁喻敘體總數雙關變態范文正公賦林衡鑑析二十門以分其體勢五經取通五明經通六唐選舉志楚辭別集總集舊唐志丁部經庫馬懷素史庫沈佺期子庫武平一集庫薛稷景龍文館記經典史傳子書文集天文圖畫景德二年龍圖閣下列六閣六籍瓊華信史瑤英玉海九流集苑金鑾絳闕蘂珠鳳首龍編南唐朱遵度群書麗藻目録傳古今文章著為六例總雜文一萬三千八百首百將傳起周太公至五代劉詞凡百人張預撰吳唐蜀後蜀吳越閩漢楚荊南北漢劉恕十國紀年四十卷百官公卿表自建隆元年至治平四年依司馬遷法記大事於上方司馬光趙彥若修起建隆迄靖康李燾續元稹獨狐郁白居易唐藝文志三卷日重光月重輪星垂輝海重潤古今注漢明帝為太子樂人作歌詩贊太子之德明堂辟雍靈臺寶鼎白雉班固東都賦五篇之詩班固賈逵傅毅楊終侯諷論衡永平中詔上神雀頌百官文皆瓦石唯五頌金玉孝明覽焉荊揚兗豫徐青幽冀并雍益交揚雄十二州針針莫善於虞針作州針蜀都吳都魏都晉左思賦三都張載為注魏都劉逵注吳蜀微斯文學虛儀夫子浮遊先生陳丘子漢王褎既為益州刺史王襄作中和樂職宣布之詩又作傳名曰四子講德帝王好尚選任賢能近名推委臣下范文正公為四論以獻
