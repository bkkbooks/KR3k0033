body:
  text: 小學紺珠類書類提要臣等謹案小學紺珠十卷宋王應麟撰分門𨽻事與諸類書畧同而毎門之中以數為綱以所統之目繫於下則與諸類書迥異葢仿世傳陶潛四八目之例以數目分𨽻故實遂為類事者别剙一格也其間隨筆記錄或有不及編次者如律厯類首序六律六吕以至度量權衡次序四時八政二氣十二月之類葢由律及厯也而其後復序五音六十四聲八十四調其後復序七閏八㑹之類前後殊無條理又如五卜三兆四兆九􅗺之類應麟玉海系之藝術而此書收入律厯亦自亂其例間有採摭未備失之耳目之前者如天文類中既載淮南天文訓之八紘八極而東西南北中之五官子午丑未寅申邜酉辰戌巳亥之六府乃不見錄器用類中既載周官之八尊而賈疏之十有六尊乃不見錄既載春秋傳禘飫宴之三烝而儀禮疏之牲有二十一體乃不見錄如斯之類不一而足閻若璩潜邱劄記僅摘其九經不分唐宋并漏十三經之名尚為未盡也然後來張九成羣書拾唾宫夢仁讀書記數畧雖採掇編輯較為明備而實皆以是書為藍本踵事者易剏始者難篳路襤縷又烏可沒應麟之功歟乾隆四十四年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀小學紺珠原序唐張燕公患多讀少記得紺碧大珠一顆握以自照則平生所讀所記了了不忘故後人摘書小説奇事名紺珠集浚儀王公厚齋先生應麟長囘六歲以進士中宏博科仕與蘇長公端明翰長尚書同而德業文學亦似之守歙嘗造囘家談論彌日其該洽今無復有斯人矣公歿後數載始得見所著小學紺珠謂八歲入學者當讀囘謂如初學記雖囘七十四將十倍初學之年亦盍時時閱之厚齋此書過於張燕公之所照者也豈但始就外傅者宜寶之哉因具始末於其端云大德庚子紫陽晚學方囘序古者蒙養豫教罔不在初六年敎之數與方名八歲學六甲五方書計之事九年敎之數日十年請肄簡諒循循有序繇是有名數之學陶靖節所以錄聖賢羣輔也君子恥一物不知譏五穀不分七穆之對以為洽聞束帛之誤謂之寡學其可不素習乎乃采掇載籍擬錦帶書始於三才終於萬物經以歴代緯以庶事分别部居用訓童幼夫小學者大學之基也見末知本因略致詳誦數以貫之倫類以通之博不雜約不陋可謂善學也已浚儀王應麟伯厚父自序
