body:
  text: 小學紺珠卷十宋王應麟撰器用類五几玉彫彤漆素周禮注三鼎黄帝作寳鼎三象天地人漢郊祀志禮祭天子九鼎諸侯七大夫五元士三公羊傳注四寳周有砥厄史記作砨宋有結綠梁有懸黎史記作黎楚有和璞戰國䇿范雎曰四寳土之所生九劔棠谿墨陽合伯鄧師宛馮龍淵大阿莫耶干將史記索隱晉太康地理志天下寳劔韓為衆桓公之葱太公之闕文王之錄莊周之􅘈闔閭干將莫耶鉅闕辟閭荀子良皆古之劔三代輦余車夏胡奴車殷輜輦周司馬法七輦大鳯大芳小輕仙遊芳亭大玉小玉六工六材土金石木獸草曲禮天子之六工注殷制典制六材三材轂輻牙考工記輪人五材金玉皮木土考工記飭五材注三十工攻木之工七輪輿弓廬匠車梓攻金之工六築冶鳬㮚段桃攻皮之工五函鮑韗韋裘設色之工五畫繢鍾筐㡛刮摩之工五玉楖雕矢磬搏埴之工二陶旊六材取幹以冬取角以秋絲漆以夏筋膠弓人取六材八材珠曰切象曰磋玉曰琢石曰磨木曰刻金曰鏤革曰剥羽曰析周禮大宰注百工飭化八材爾雅骨謂之切三劔含光承影宵練列子衛孔周其祖得殷帝三寳劔龍淵太阿工市楚風胡子之呉見歐冶干將使作三寳劔楚龍淵韓棱蜀漢文郅夀濟南椎成陳寵後漢肅宗賜尚書曹三人寳劔自手署其名飛景流采華鋌典論三魏文帝為劔天子諸侯庶人莊子說劔臣有三劔六寳聖能制議百物以輔相國家玉足以庇廕嘉穀使無水旱之災龜足以憲臧不珠足以禦火災金足以禦兵亂山林藪澤足以備財用楚語王孫圉曰國之寳六而已三鑑以銅為鑑可正衣冠以古為鑑可知興替以人為鑑可明得失唐太宗曰朕常保此三鑑内防已過雜佩珩璜琚瑀衝牙之類詩雜佩以贈之上車以和鸞為節下車以珮玉為度上有雙衡下有雙璜衝牙玭珠以納其間琚瑀以雜之行以采茨趨以肆夏大戴禮天子佩白玉諸侯山𤣥玉大夫水蒼玉世子瑜玉士瓀玫玉藻六玉上圭下璧南方璋西方琥北方璜東方圭覲禮方明上下四方之神設六玉雙印刻書文六十六字曰正月剛卯既決靈殳續漢志三席凡侍坐於大司成者逺近間三席可以問文王世子注容三席得指畫相分别也席之制廣三尺三寸所謂函丈也曲禮席間圅丈注函容也講問宜相對容丈足以指畫五席莞藻次桃枝有次列成文蒲熊周禮注天子之席五重諸侯之席三重大夫再重禮器三代禮器劉敞著先秦古器記歐陽修著集古錄李公麟著古器圖吕大臨著考古圖親得三代之器政和新成禮器制度皆出於此王普云博古圖品之多五十有九數之多五百三十有七六色􅌁領軍衛赤威衛青黒武衛鶩驍衛白左右衛黄唐儀衛志九錫車馬衣服樂器朱户納陛虎賁百人斧鉞弓矢秬鬯禮含文嘉韓詩外傳諸侯有徳天子錫之二路大路金路戎路左傳周襄王賜晉文公庭燎之百庭燎之差天子百公五十侯伯子男皆三十禮記郊特牲注五刄刀劔矛㦸矢齊語隱五刄注唐刀之制有四儀刀鄣刀横刀陌刀五劔純鉤一作鈞湛盧豪曹或曰盤郢魚腸巨闕呉越春秋越歐冶子作五劔六劔白虹紫電辟邪流星青冥百里古今注呉大帝六劔五王帳𤣥宗友愛於殿中設五幄與諸王更處其中五王宋王成器申王成義兄也岐王範薛王業弟也􅃎王守禮從兄也五等帳古帳大帳次帳小次帳小帳五等帳各三是為三部唐六典内郊特牲注禮天子外屏諸侯屏大夫以簾士以帷三翼大翼長十丈中翼九丈六尺小翼九尺文選浮三翼注引越絶書伍子胥水戰兵法筆三品金管書忠孝銀管書徳行斑竹管書文章梁文帝為相東王時筆有三品四侯管成侯毛元銳即墨侯石虛中好畤侯褚知白松滋侯易𤣥光文房四譜文嵩四侯傳三樽象樽周山罍夏著樽殷梁明山賔議祭圖唯有三樽隋志稻米一斗得酒一斗為上尊稷米為中尊粟米為下尊漢書注四器圭璋璧琮考工記玉人注聘禮曰凡四器者唯其所寳以聘可也圭璋特達瑞也璧琮有加往徳也三雅伯雅容七升仲雅六升季雅五升劉表酒爵三典論方言秦晉之郊謂之孟雅也束矢五十矢為束詩束矢其搜注古者一弓百矢周禮大司冦束矢注九和弓材美工巧為之時謂之參均角不勝幹幹不勝筋謂之參均量其力有參均均者三謂之九和考工記六轡六轡在手六轡如濡四馬八轡而言六轡有二轡繫之驂馬内轡納之於􅔵故在手者惟六轡八鸞鸞在鑣四馬則八鸞詩箋鸞鈴也効鸞鳥之聲鑣乃馬銜也武王十七銘席四端機鑑盥盤楹杖帶履屨觴豆户牖劔弓矛大戴禮踐阼篇六器庖羲作琴神農造瑟女媧制簧暴辛為塤倕之和鐘叔之離磬馬融長笛賦六器猶以二皇聖哲黈益六章土之黄其象方天時變火以圜在裳山以章在衣讀為獐水以龍在衣鳥獸蛇在裳華蟲考工記畫繢之事事禮運六章注書繢也雜四時五色之位以章之之古人之象無天地於王氏考工記解之曰火山龍畫於服鳥獸蛇畫之旗四寳隨侯珠劔寳斬蛇劔玉寳璧受命寳和氏璧周康寳鼎汾上所獲漢郊祀志神爵元年立四祠於未央宫中晉之垂棘魯之璵璠宋之結綠楚之和璞魏文帝書四寳八尊五齊五尊三酒三尊周禮酒正祭祀共五齊三酒以實八尊疏云三節二節以走一節以趨玉藻君召以三節雙節節度使賜雙節行則建節樹六纛唐百官志天國史志旌節唐寳中置凡命節度使有司給門旗二旌一節一麾槍二豹尾二扇三等僱團方元豐三年改製扇為三等繡雉古者扇編次雉羽尾為之唐開元改為孔雀大朝㑹陳一百五十六分左右二耜耜廣五寸二耜為耦考工記注古者耜一金兩人人併發之今之耜岐頭兩金后稷始甽田以二耜為耦漢食貨志八珍淳熬淳母讀曰模炮豚炮牂𢷬珍漬熬肝膋周禮膳夫珍用八物則食醫八珍之齊内五齊泛醴盎緹音體沈周禮酒正辨五齊之名酒人為五齊鬱齊獻酌祼醴齊縮酌朝盎齊涗酌饋凡酒修酌諸臣自酌司尊彞直獻讀為莎脩歴反三酒事昔清酒正辨三酒之物白酒人為三酒内則清事昔醙白酒也所九反黍清聘禮皆兩壺注凡酒稻為上黍次之粱次之皆有清白以黍間清白者互相備明三酒六壺也醴酒在室醍酒在堂澄酒在下坊記注三酒尚質不尚味郊特牲注五齊加明水三酒加六酒四飲清醫於已反漿酏以支反酒正辨四飲之物六飲水漿醴涼又作䣼醫又作醫酏又作􅋳漿人共王之六飲之食醫和王六飲醴酏漿水醷濫涼也内則亦謂之六飲五飲水漿酒醴酏玉藻夏明水殷醴周酒明堂位之五齊之上尊實明水山罍上尊實明酒唐禮志四籩朝事饋食加籩羞籩周禮籩人掌四籩之實四豆朝事饋食加豆羞豆醢人掌四豆之實天子豆二十六諸公十六諸侯十二上大夫八下大夫六禮器五齏昌本脾析蜃豚拍音博深蒲醢人共五齊注五齊當為齏楚辭注醢醬所和細切為齏七醢醓吐感反蠃力禾反蠯蒲佳反蜃蚳魚雁同上醢人注四醢鹿羊魚唐志掌醢十二鼎牢鼎九羊牛豕魚腊膚腸胃鮮魚鮮腊陪鼎三膷臐膮周禮膳夫鼎十有二注聘禮飪鼎七無鮮魚鮮腊羞鼎三以實言曰羞以陳言曰陪三俎豕魚腊玉藻三俎祭肺注胃五俎加羊與其腸羊豕魚腊膚少牢禮四代俎虞椀夏嶡殷椇周房俎明堂位四代俎六膳牛宜稌羊宜黍豕宜稷犬宜粱雁宜麥魚宜苽周禮食醫和王之六膳六和春酸木夏苦火秋辛金冬鹹水皆有滑甘土禮運注食醫調以滑甘辛禮運五味六和十二食氣周禮凡藥以酸養骨以養筋以鹹養脈以苦養以滑養竅注以類相養凡食齊眡春時温熬齊眡夏時熱醬齊眡秋時涼飲齊眡冬時寒三臡麋鹿麇醢人注四膏春行羔豚膳膏香牛夏行腒鱐膳膏臊豕一云犬秋行犢麛膳膏腥雞冬行鱻羽膳膏羶羊庖人凡用禽獸張衡東京賦升獻六禽時膳四膏内則注此八物四時肥美為其大盛煎以休廢之膏節其氣也四飯王者平旦食少陽之始晝食太陽之始晡食少隂之始暮食太隂之始凡四飯諸侯三飯卿大夫再飯白虎通天子食時舉樂論語亞飯干三飯繚四飯缺以樂侑食之官魯之樂官葢凡三飯也九獻上公九獻侯伯七獻子男五獻周禮大行人儀禮主人酌以獻賔賔酢主人主人乂酌以酬賔乃成一獻之禮九獻者九為獻酬酌禮始畢左傳正義四鹽散鹽煮海成之盬鹽引池化之形鹽掘地出之飴鹽於戎取之周禮鹽人井後周四鹽引池而化周官所謂盬鹽也煮海煮而成周官所謂散鹽也國史志鹽有二四代黍稷器虞兩敦音對夏四璉殷六瑚周八簋明堂位魯特牲饋食禮設兩敦黍稷四少牢稷饋食禮上佐食取敦黍三代豆夏揭豆殷玉豆周獻豆獻素何反明堂位魯三代爵夏琖殷斚周爵明堂位魯升特牲饋食禮升爵一升觚二觶三升角四散五升三爵獻酬酢詩賔之初筵箋云三爵不識飲禮主人獻賔賔飲而又酢主人主人而又酌以酬賓賓則奠之而不舉正義介爵酢爵僎爵僎音遵少儀皆居右注三爵皆飲爵也五鼎羊豕膚魚腊少牢饋食禮雍人陳鼎五牛羊豕魚麋漢書五鼎食注羊豕腸胃魚腊聘禮衆人行五鼎士祭三鼎大夫祭五鼎孟子注六鉶上大夫八豆八簋六鉶九俎鉶芼牛藿羊苦豕薇公食大夫禮鉶羮器也羊鉶豕鉶少牢饋食禮兩鉶大羮煮肉汁不和盛於登大古之羮鉶羮肉味有菜和盛之鉶羮器詩正義庶羞三十一物牛脩鹿脯田豕脯麋脯麕脯麋鹿田豕麕皆有軒雉免皆有芼爵鷃蜩范芝栭蓤椇棗栗榛柿𤓰桃李梅杏楂棃薑桂内則注三十一物皆人君燕食所加庶羞也周禮天子羞用百有二十品記者不能次錄二羞房中之羞内羞庶羞詩楚茨注豆謂内羞庶羞也之正義有司徹云宰夫羞房中羞司士羞庶羞注云房中之羞其邉糗餌粉餈其豆酏食糁食庶羞羊臐豕膮皆有胾醢房中之羞内羞也彼大夫賔尚有二羞明天子正祭有二羞有司徹注二羞所以盡歡心内羞在右隂也庶羞在左陽也二七挑匕今文作枕疏匕儀禮有司徹注此二七皆有淺升狀如飯槮桃湯堯反或作桃詩注匕所以載鼎實六物秫稻必齊麴蘖必時湛熾必絜湛子亷及水泉必香陶器必良火齊必得月令仲冬乃命大酋兼用六物注大酋酒官之長於周則酒人古者穫稻而漬米麴至春而為酒四膳孟春食麥羊孟夏食菽雞孟秋食麻犬孟冬食黍彘文選七命云四膳異肴注禮記曰三宥朔月月半以樂宥食周禮大司樂王大食三宥皆令奏鍾鼓注宥猶勸也史記索隱禮祭必立侑以勸尸食至三飯而止每飯有侑一人故曰三侑膳夫王日一舉以樂侑食王制民無菜色然後天子食日舉以樂也禘飫宴三禮禘郊之事則有全烝全其牲體而升之王公立飫則有房烝半解其體升之房大俎也謂之房烝親戚宴饗則有殽烝升體通節折于俎謂之折俎私周語晉隨㑹聘周定王饗之殽烝范子於原公曰此何禮也王曰子弗聞乎享有體薦半解其體而薦之所以示共儉宴有折俎體解節折升之於俎物皆可食所以示慈惠公當享卿當宴享設几而不倚爵盈而不飲肴乾而不食宴則相與共食左傳四酎四重釀楚辭大招四酎并熟注舊注以為四器俱熟月令春釀孟夏乃成漢亦以春釀八月乃成九醖三日一釀滿九斛米止南都賦九醖甘醴注魏武上九醖酒奏曰云云廣雅醖投也酒經曰九投四豆膮炙胾醢特牲饋食禮佐食羞庶羞四豆設于左注云兩􅅪與餕同上􅅪下􅅪特牲饋食禮兩􅅪執爵拜四人􅅪上佐食下佐食賔長二人少牢禮二十豆膷臐膮醢牛炙醢牛胾醢牛膾羊炙羊胾醢豕炙醢豕胾芥醬魚膾雉免鶉鷃内則注此上大夫之禮庶羞二十豆公食大夫禮以鷃為鴽六簋簠簋皆一者簋以稷簠以黍用皆二者簋以黍稷簠以稻粱唐禮志外易損二簋可用享粱内方外圓曰簋盛黍稷方内圓曰簠盛稻一斗二升方曰簠圓曰簋三詔納牲詔於庭血毛詔於室羮定詔於堂禮器皆三詔不同位二竹簋方夫人使下大夫勞以二竹簋方器名以竹為之狀如簠而方𤣥被纁裏有葢其實棗蒸栗擇兼執之以進聘禮案考工記十二寸棗㮚十二列侯諸侯純九大夫純五夫人以勞諸注夫人王后也四鬴萬民之食人四鬴上三鬴中二鬴下周禮廩人注謂一月食米也六斗四升曰鬴三釡曽子曰吾及親仕三釡而心樂莊子斗釋文小爾雅云六四升曰釡五秉十六斛曰秉五秉合為八十斛論語冉子與之粟五秉注四簋黍稷稻粱詩權輿每食四簋注禮食之盛祭統以四簋黍八簋天子八簋詩伐木陳饋八簋注實箋云陳其黍稷為食禮祭統八簋之注云天子之祭八簋稯禾秉芻缶米聘禮曰十六斗曰庾十庾曰秉秉一百六十斗也四秉曰筥十筥曰稯稯六百四十斛也魯語仲尼曰收田一井出云云注缶庾也十稯曰秅四百秉為一秅秅宅加反秅五稯為秭貳秭而為出說文五兩五兩十端也周禮媒氏入幣純帛無過五兩注云必言兩者欲得其配合之名十者象五行十日相成也雜記曰幣帛一束束五兩兩五尋然則每端二丈純側其反依字從系才内宰淳制注天子廵守禮云制幣丈八尺純四􅡥純謂幅廣制謂正長四種米詩彼疏斯粺箋云疏謂糲米也米之率糲十粺九鑿八侍御七正義云九章粟米之法云粟率五十糲米三十粺二十七鑿二十四侍御二十一言粟五升為糲米三升以下則米漸細故數益少四種之米皆以三約之萬鍾鍾量名受六斛四斗孟子九種鹽白鹽食鹽黑鹽胡鹽戎鹽赤鹽駮鹽臭鹽馬齒鹽北史李孝伯傳四種非食鹽儆戒類三風十愆恒舞于宫酣歌于室時謂巫風殉于貨色恒于遊畋時謂淫風侮聖言逆忠直逺耆徳比頑童時謂亂風伊訓湯制官刑儆于有位三愆言未及之而言謂之躁言及之而不言謂之隱未見顔色而言謂之瞽論語侍於君子有三愆三樂驕樂佚遊宴樂論語損者三樂三懼處尊位而恐不聞其過得志而恐驕聞至道而恐不能行韓詩外傳明王有三懼四戒酒味色髙臺陂池戰國策魯君言務徳慎言逺佞防姦後魏封軌四戒二事持酒以禮持才以愚魏管輅八徳左右倫義分辯競爭莊子齊物論八疵總佞諂諛讒賊慝險莊子人有八疵三疾狂矜愚論語古者民有三疾三勿惡貴而下賤則衆勿惡富能分貧則窮士弗惡知而教愚則童䝉勿惡通鑑外紀李克謂魏文侯三行老老而壯者歸不窮窮而通者積行乎冥冥施乎無報而賢不肖一荀子人有三行五交勢賄談窮量梁劉峻孝標廣絶交論云利交有五術五知知時知難知命知退知足宋李繹作五知先生傳五慎言動交進名薛儀著五慎文以自儆六悔官行私曲失時悔富不儉用貧時悔藝不少學過時悔見事不學用時悔醉發狂言醒時悔安不將息病時悔寇萊公六悔銘八戒屈己任運觀行守一忘言省已存神量味徐鉉保身八戒六箴心口耳目手足唐皮日休六箴清公勤明和慎余襄公靖從政六箴視聽好學進徳崇儉呉充宗室六箴九弊上有其六好勝人眩聰明恥問過厲威嚴騁辨給恣彊愎下有其三諂諛畏愞望顧唐陸䞇請數對羣臣云九弊不去三戒不妄出入不妄語言不妄憂慮倪文節公思三戒五事孝友讀書謹行勤儉勉齋黄先生幹家訓謹禮法存忠厚親正直勤學問守家業横浦張先生九成戒子三事清慎勤吕居仁童蒙訓當官三事四字勤謹和緩張文孝公觀守官四字莊守精密王介甫守常州吕正獻公告以四言𢎞大平粹朱文公荅吕伯恭書曰四字謹書坐隅三字符不逺復屏山劉先生彦冲四失多寡易止學記學者有四失教者必知方五耻居其位無其言有其言無其行既得之而又失之地有餘而民不足衆寡均而倍焉雜記君子有五恥為禮而不終中不勝貌華而不實不度而施施而不濟國語秦伯曰三不祥幼不肯事長賤不肯事貴不肖不肯事賢荀子人有三不祥有賢而不知知而不用用而不仁說苑晏子曰國有三不祥三遊遊俠遊說遊行荀恱世紀論世有三遊徳之賊也四患偽私放奢荀恱申鑒先屏四患四惡不敎而殺謂之虐不戒視成謂之暴慢令致期謂之賊出納之吝謂之有司論語屏四惡斯可以從政矣四輕言輕則招憂行輕則招辜貌輕則招辱好輕則招淫法言去四輕則可謂之人四慎官怠於宦成病加於少愈禍生於懈惰孝衰於妻子曽子曰察此四者慎終如始三術仁義使我愛身而後名仁義使我殺身以成名仁義使我身名並全列子昔有昆弟三人游齊魯之間同師而學進仁義之道彼三術相反而同出於儒八疾籧篨戚施僬僥侏儒矇嚚瘖聾聵僮昏國語四姦聾昧頑嚚左傳富辰曰六逆賤妨貴少陵長逺間親新間舊小加大淫破義左傳石碏曰五不韙不度徳不量力不親親不徵辭不察有罪左傳息犯五不韙而以伐人五箴游言行好惡知名韓文公五箴五失一自求安逸靡甘澹泊二不知儒術不恱古道三勝已者厭佞已者恱四崇好優游耽嗜麴蘖五急於名宦䁥近權要柳玭誡子弟五過交非其人遊戲怠惰動作無儀臨事不恪用度不節吕氏郷約不修之過治家十事持身以清潔處心以公平勿使婦人預政事擇師教子學未成勿使應科舉處庠序衣服器用皆出中制稱家有無濟䘏孤貧謹慶弔之禮無蓄異物珍寳美妾少僕接賔客以和睦待奴婢以寛恕少儀外傳四知天知神知我知子知漢楊震畏四知五誡持衡彈琴對鏡辭金冰壺文苑英華唐姚元崇五誡士有三品志於道徳志於功名志於富貴靳裁之曰云云動植類四靈麟金鳯火龜水龍木禮運并白虎為五靈尚書緯五靈王者之嘉瑞左傳序五蟲鱗龍蛇屬木三百六十而龍為長羽飛鳥屬火三百六十而鳯為長臝一作倮蛙螾屬土三百六十而人為長毛獸屬金三百六十而麟為長介龜鼈屬水三百六十而龜為長月令家語六畜許又反六擾六牲馬火乾牛土坤羊火兊豕水坎爾雅曰彘犬金艮爾雅曰狗雞木巽周禮庖人注始養之曰畜將用之曰牲爾雅釋畜獸異名畜是畜養戰是百獸孟子注草食曰芻牛羊榖食曰豢犬豕六擾職方氏豫州五擾并州無雞四擾幽州無雞犬六牲膳夫膳用六牲食醫六膳牧人牧六牲陽祀用騂隂祀用黝小宗伯毛六牲牛曰一元大武豕曰剛鬛羊曰柔毛雞曰翰音犬曰羮獻曲禮牛屬司徒土雞屬宗伯木犬屬司冦金羊屬司馬火庖人注司寇主豕司馬主馬及羊小宗伯注五官􅆢六牲五牲牛羊豕犬雞左傳五牲不相為用注麋鹿麏狼免同上六畜五牲注後漢東都賦注麏鹿熊狼野豕服䖍注三牲牛羊豕禮記内則曰國語又漢書注三牲牛為太牢羊豕少牢曰中牢孝經三牲注太牢也廟左傳三犧祭天地宗之儀夏牲尚黒殷白牡周騂剛明堂位夏牲用𤣥殷牲用白周牲用騂檀弓六獸麋鹿熊麕野豕兔周禮庖人鄭司農注康成謂有狼無熊熊虎赤羆天鹿辟邪南山豐大特續漢輿服志皇后歩揺六獸六禽雁鶉鷃雉鳩鴿庖人鄭司農注羔豚犢麛雉雁鄭康成注九穀黍稷秫稻麻大小豆大小麥大宰九穀鄭司農注也康成謂無秫大麥而有粱苽苽彫胡古今注黍稷稻粱三豆二麥八穀黍稷稻粱禾麻菽麥本草注稻黍大麥小麥大豆小豆粟麻大象賦注六穀六粢六食稌黍稷粱麥苽膳夫注豕食醫牛宜稌羊宜黍宜稷犬宜粱雁宜麥魚宜苽六粢小宗伯六齍注黍稷稻粱麥苽六者六食六榖之飯食音嗣食醫􅐪人粢號黍曰薌合粱曰薌萁稷曰明粢稻曰嘉蔬曲禮五穀五種麻金黍火稷土麥木豆水周禮疾醫五穀荀子序五種志漢食貨五種注春麥夏菽季夏稷秋麻冬黍月令五時食榖稻稷麥豆麻楚辭大招五榖注黍稷菽麥稻職方氏豫州宜五種出史記黄帝藝五種月令五種五孟子穀注四種兖州無菽三種幽州無菽麥東方多麥稻西方多麻北方多菽中央多禾莊子計然稷五穀之長一穀不升謂之嗛二穀不升謂之饑三穀不升謂之饉四穀不升謂之康五穀不升謂之大侵穀梁傳六米黍稷稻粱苽大豆周禮舍人注豆六者皆有米麻小小麥三者無米五果桃李杏栗棗素問桃家語孔子曰果屬有六而為下魏鄭渾為魏郡太守益樹五果五菜葵藿薤葱韭素問五穀梁傳注家作一園以種菜疏云五辛之盤大小蒜韭芸薹胡荽嵗時廣記以庾肩吾詩云五辛盤風土記元日造五辛盤辛所發五臟之氣故云耳七菹韭菁茆葵芹箈音迨筍周禮醢人注箈箭萌醢人供七菹百穀粱稻菽各二十種為六十疏果之實助穀各二十物理論黍稷稻粱麻麥荏菽雕胡之屬國語周棄播殖百穀注汾水濁宜麻濟水和宜麥河水調宜菽洛水輕利宜禾江水肥宜稻渭水多力宜黍淮南子四穀秬秠穈芑詩生民誕降嘉種此箋云后稷以天為已下四穀五鳩祝鳩鷦鳩雎鳩王鴡鳲鳩鴶鵴爽鳩鷹鶻鳩鶻雕左傳少皥名官五雉西方鷷東方鶅南方翟北方鵗伊洛之南翬同上九扈春扈鳻鶞夏扈竊𤣥秋扈竊藍冬扈竊黄棘扈竊丹行扈唶唶宵扈嘖嘖桑扈竊脂老扈鷃鷃同上動植五物毛貂狐貒貉屬皁柞栗屬山林鱗魚龍屬膏楊柳屬一云當為櫜􅘟芡川澤羽翟雉屬覈李梅屬邱陵介龜鼈屬莢齊莢王棘屬墳衍臝虎豹貔􅣝屬淺毛者叢萑葦屬原隰周禮大司徒以土㑹之法辨五地之物生動物植物大獸五脂牛羊屬膏豕屬為牲臝虎豹貔􅣝淺毛屬羽鳥屬鱗龍蛇屬為筍簴考工記匠人五石六鷁霣石于宋五記聞聞其磌然視之則石察之則五六鷁退飛過宋都記見也視之則六察之則鷁徐而察之則退飛公羊傳僖十六年榖梁傳君子之於物無所茍而已石鶂且猶盡其辭而況於人乎故五石六鷁之辭不設則王道不亢矣五方神鳥東方發明南方焦明西方鷫鷞北方幽昌中央鳯皇說文皆後漢五行志樂叶圖徵說五鳯五色為瑞者一為孽者四十二月樹正月楊二月杏三月李四月桃五月榆六月梓七月楝八月柘九月槐十月檀十一月棗十二月櫟淮南時則訓夏周禮注鄹子曰春取榆柳之火取棗杏之火季夏取桑柘之火秋取柞楢之火冬取槐檀之火百朋古者貨貝五貝為朋詩錫我百朋箋云云正義曰漢食貨志大貝壯貝么貝小貝不成貝為五小貝以上四種各二貝為一朋而不成者不為朋鄭箋言五種之貝相與為朋非總五貝為一朋也兩漢書注貝為朋十龜神龜靈龜攝龜寳龜文龜筮龜山龜澤龜水龜火龜爾雅易十朋之龜馬鄭多取此解之九龜石龜泉龜蔡龜江龜洛龜海龜河龜淮龜旱龜唐六典太卜卜龜九類八龜北斗南辰五星八風二十八宿日月九州玉龜史記龜䇿傳凡八名龜六龜天龜靈屬俯地龜繹屬仰東龜果屬果讀為臝字前弇南龜獵屬後弇西龜靁屬靁力胃反左倪北龜若屬右倪周禮龜人六龜之屬三龜三王之龜金縢注云云正義龜無三代之别卜法有三史記三王不同龜八駿華騮緑耳赤驥白義渠黄踰輪盜驪山子列子周穆王穆天子傳絶地翻耳奔霄超影踰輝超光騰霧挾翼王子年拾遺記穆王御八龍之駿追風白􅊵躡景犇電飛翮銅爵晨鳬古今注秦始皇名馬七三代馬夏駱馬黒鬛殷白馬黒首周黄馬蕃鬛明堂位夏戎事乘驪殷乘翰周乘騵檀弓六馬種玉路戎戎路齊金路道象路田田路駑給宫中之役周禮挍人辨六馬之屬天子千二閑馬六種天四馬内兩服外兩驂六馬兩驂之外又有兩騑子之車盛則駕六常則駕四閑王度記天子駕六諸侯駕四大夫三士二邦國六馬四種齊道田駑家四閑馬二種田駑九逸浮雲赤電絶羣逸驃紫燕騮綠螭驄龍子麟駒絶塵西京雜記漢文帝良馬蒲梢龍文魚目汗血漢西域傳四駿馬十驥騰霜白皎雪驄凝露驄縣光驄決波騟飛霞驃發電赤流金􅚷翔麟紫奔虹赤唐骨利幹獻馬取其異者號十驥十二屬子鼠丑牛寅虎卯辰龍巳蛇午馬未羊申猴酉雞戌犬亥豕王充論衡物勢論四獸朱鳥𤣥武青龍白虎曲禮注以此四獸為軍陳象天也三葉薺亭歴菥蓂吕氏春秋孟夏之昔殺三葉穫大麥八枳徳枳維大人大人枳維公公枳維卿卿枳維大夫大夫枳維士國枳維都都枳維邑邑枳維家周書小開篇言上下相維遞為藩蔽作後漢馮衍賊曰揵六枳而為籬東觀記八枳鳯六像九苞頭像天圎也目像日明也嘴像月偃也翼像風舒也足像地方也尾像緯五色具也口包命不妄鳴也心合度進退精也耳聽達居髙明也舌詘伸能變聲也彩色光文采呈也冠矩朱南方行也距銳鉤武可稱也音激揚聲逺聞也腹文户不妄納也論語緯雞五徳頭戴冠文足傅距武敵在前敢鬭勇見食相呼仁守夜不失時信新序狐三徳其色中和小前大後死則邱首說文鼯䑕五技能飛不能過屋能縁不能窮木能游不能渡谷能穴不能掩身能走不能先人說文而荀子梧䑕五技窮蔡邕勸學篇鼫鼠五能不能一技術名易釋文鼫鼠五技䑕也本草螻蛄一鼫䑕五禽虎鹿熊猨鳥後漢華佗有五禽之戲當導引五藥草木蟲食穀周禮疾醫注子其治合之齊存乎神農儀之術神農經三品藥三百六十五應周天之數上藥為君養命中藥為臣養性下藥為佐養病本草草木金石穀文選沈休文詩五藥注五芝龍伯芝參成芝燕脂芝夜光芝玉芝後漢馮衍傳注茅君内傳青芝生泰山文選注紫芝一名木芝赤芝生衡山一名丹芝黄芝生嵩山一名金芝白芝生華山一名玉芝黒芝生常山一名𤣥芝本草經青赤黄白黒紫養生經上藥養命以五石鍊形以六芝延年本草注芝有六色三芝石芝靈芝肉芝沈休文詩註參成木渠建實抱朴子雲芝植根玉岩水芝芙渠土芝甘𤓰稽含𤓰賦天子以鬯諸侯以薫大夫以蘭芝士以蕭庶人以艾王度記四瑞景星慶雲為大瑞名物六十有四白狼赤免為上瑞名物三十有八蒼烏朱雁為中瑞名物三十有二嘉禾芝草木連理為下瑞名物十四唐志十瑞芻化為禾鳯皇神龍厯草禽五色白烏神禾箑脯景星甘露述異記瑞堯時十井里之璞大山之器車唐叔異畝之禾子華子周日正薦所以為祥者三五方異氣東方有比目魚鰈南方有比翼鳥鶼鶼西方有比肩獸蟨與卭卭岠虛比北方有比肩民中有枳首蛇爾雅五鳯赤者鳯黄者鵷鶵青者鸞紫者鸑鷟白者鵠後漢蔡衡對象鳯者五馬三物四種千駟戎田駑周禮馬質馬量三物良戎田駑詩駉注諸侯六閑馬四種馬八尺以上為龍七尺以上為騋六尺以上為馬庾人千駟四千匹論語注八坊保樂甘露南普潤北普潤岐陽太平宜祿安定唐馬七十萬六千置八坊岐􅃎涇寧間凡監四十有八五坊鵰鶻鷂鷹狗唐閑廏使押五坊以供時狩六閑飛黄吉良龍媒騊駼駃騠天苑隋左右六閑飛龍祥麟鳯苑鵷鸞吉良六羣唐武后置仗内六閑亦號六廏三駿馬西域貢馬羌温溪心良馬西番駿馬蘇文忠公三馬圖賛三戒臨江之麋黔之驢永某氏之䑕柳子厚三戒五方弧東方弧以梧牲以雞南方弧以柳牲以狗中央弧以桑牲以牛西方弧以棘牲以羊北方弧以棗牲以彘賈誼書太子生懸弧之禮三槐九棘面三槐三公位焉槐之言懐也懐来人於此欲與之謀左九棘孤卿大夫位焉右九棘公侯伯子男位焉取其赤心而外刺周禮朝士外朝之法五柳七松五柳先生晉陶潛七松處士唐鄭薫蓂十五莢堯為天子蓂莢生於庭為帝成厯田俅子始一日生一莢至月半生十五莢十六日落一莢至晦日而盡小月則一莢厭不落文選注朱草十五葉朱草日生一葉至十五日生十五葉十六日一葉落終而復始大戴禮明堂篇梧桐十二葉梧桐生十二葉一邊六葉從下數一葉為一月有閏十三葉遁甲經三桃荆桃今櫻桃冬桃子冬熟榹桃實似桃而小爾雅賦潘岳間居三桃表櫻胡之别三粟耡粟民相助作一井之中所出九夫之稅粟屋粟民有田不耕所罰閒粟閒民無職事者所出周禮旅師注興積謂三者之粟三物豕犬雞詩何人斯出此三物以詛爾斯注六蝨歲食玩好志行商子農商官三官生蝨官者六成俗兵必大敗五客閑客白鷴雪客鷺仙客鶴南客孔雀隴客鸚鵡李文正公昉五禽以客名談苑蟬五徳頭上有緌文也含氣飲露清也黍稷不食廉也處不巢居儉也應候守節信也陸雲寒蟬賦序龜四體春占後左夏占前左秋占前右冬占後右中庸見乎蓍龜動乎四體注謂龜之四足蓍百莖蓍生滿百莖者其下必有神龜守之其上常有雲氣覆之史記上有叢蓍下有伏龜淮南子生千嵗三百莖易以為數天子九尺諸侯七尺大夫五尺士三尺說文蓍百年一本生百莖洪範五行傳七十嵗生一莖七百嵗生十莖神靈之物故生遲論衡釋易文八物乾為馬健坤為牛順震為龍善動巽為雞善伏坎為豕質躁而外汙離為雉質野而外明艮為狗前剛而止物兊為羊内狠而外說易說卦以物擬八卦六龍時乘六龍以御天乾龍者物之能動者也不稱乾馬而稱震龍動也乾之動自震始乾爻謂之六龍而三四獨稱君子九三上不在天下不在田故以君子言之九四上不在天下不在田中不在人故或之爻曰或文言曰君子示兼之也乗馬四馬四乗易釋文凡卦爻稱馬者皆是隂爻屯三隂皆為乘馬賁六四為白馬晉下三爻為錫馬明夷六三渙初六皆為拯馬中孚三與四為正馬無非隂爻大畜九三特舉乾之本象稱為良馬可見它馬皆隂也論語陳文子有馬十乗注四十匹十二粟春分而禾生日夏至晷景可度禾有秒秋分而秒定律數十二秒而當一分十分而寸其以為重十二粟為一分十二分為一銖說文禾三變始於粟生於苖成於穟淮南子夫子見禾之三變五總龜龜千年五聚問無不知唐殷踐猷博學賀知章號為五總龜九射熊當中虎居上鹿在下雕雉猿居右雁魚居左歐陽文忠公九射格其物九為一大侯而寓以八侯三異蟲不犯境化及鳥獸豎子有仁心後漢魯恭中牟令小學紺珠卷十
