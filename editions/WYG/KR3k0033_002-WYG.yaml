body:
  text: 小學紺珠卷二宋王應麟撰地理類五帝三王都少昊都曲阜顓頊都濮陽帝嚳都亳堯都冀舜都蒲夏都安邑湯都亳周都雍洛文中子中國五帝三王所自立也注云四極八極泰遠東邠國西作邠說文份濮鈆南經濮山海作獛祝栗北爾雅四方極遠之國億晉地理志八紘之外名為八極八極之廣東西二三萬一千三百里南北二億三萬一千三百里四荒八荒觚竹北北户南西王母西日下東爾雅四方昬荒之國南八荒八方荒忽極遠之地列子云遠在八荒之外淮子四海之外有八澤八澤之外曰八埏八埏之外曰八荒四表堯典注四外嵎夷東表南交南表昩谷西表幽都北表四方東震西兌南離北坎詩四國四方之國也并中央為五方丹穴南空桐北太平東太蒙西爾雅四維東南巽東北艮西南坤西北乾并四方為八方又曰八荒八㝢八極八區紘淮南子九州外有八紘八紘外有八極賦揚雄傳八注八方之綱維八區注八方也東京威振八㝢注八方區宇四八鄙四方與四角天八靈八方之神相校獵賦八鎭方四隅一鎭在中子居之司馬如傳八方之外六極又曰六合六區六漠上下四方荀子宇中六指謂之極注上下四方秋莊子天有六極注四方上下呂氏春神通乎六合注四方上下幕楚辭遠遊周流六漠注謂六合漢郊祀歌紛云六張衡思𤣥賦六區注六合四班固典引光被六幽注六合幽遠之地今纂要天地方曰六合四方上下謂之宇往古來謂之宙八埏地之八際埏音延泝八埏司馬相如傳下淮南子作八夤五方四方中國爾雅志内則六年敎方名注東西南北漢八歲學五方注辨五方之名中國夷蠻戎狄王制五方之民九州東南神州曰農土正南次州曰沃土西南戎州曰滔土正西弇州曰并土正中冀州曰中土西北台州曰肥土正北濟州曰成土東北薄州曰隱土正東陽州曰申土淮南子九周禮疏曰自神農已上有大州柱州迎州神州之等至黄帝德不及遠惟於神州之内分為九州禹騶衍曰中國名曰赤縣神州赤縣神州内自有九州之序九州是也中國外如赤縣神州者九乃所謂九州也有禆海環之一區中為一州如此者九有大瀛海環其外立春秋命歴序人皇氏分九州神農始地形甄度四海祭法共工氏霸九州五屬十連五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯八州八伯五十六正百六十八帥三百三十六長王制法漢刑志州有牧州漢表注九伯九之牧九州九牧冀堯所都兖濟河青海岱徐海岱及淮揚淮海荆荆及衡陽豫荆河梁華陽黒水雍黒水西河書禹貢禹别九州而左傳九牧九州之牧始冀次兖終於雍言治水之序禹貢有青徐梁而無幽并營爾雅有徐幽營而無青梁并職方有青幽并而無徐梁營三代不同故也朱子曰中古之地但為九州禹治水作貢亦因其舊舜即位分十有二州十二州十二牧冀兖青徐荆揚豫梁雍幽并營舜典肇十有二州咨十有二牧吳氏曰在禹治水之後分冀州為幽州并州分青州為營州王書正義曰禹登位還置九州殷九州又曰九有九圍冀兩河間豫河南雝河西荆漢南揚江南兖濟河徐濟東幽燕營齊爾雅注此蓋殷制式商書九有之師之商頌奄有九有帝命于九圍注九州界梁文王三分天下有其二荆雍豫徐揚惟青兖冀屬紂周九州揚東南荆正南豫河南青正東兖河東雍正西幽東北冀河内并正北周禮職方氏辨九州之國近職方氏始揚次荆而終於并言逺之序豫周冀晉兖衞青齊徐魯揚越荆楚雍秦幽燕呂氏春秋縣後漢贊九注九州也五服虞夏周甸侯綏要荒書益稷禹貢百每服五百里五服二千五里南北東西相距五千里益稷篇言弼成五服至于五千侯甸男采衞書周官六年五服一朝謀康誥曰云云國語祭公父曰先王之制邦内甸服邦外侯服侯衞賓服蠻夷要服戎翟荒服九服周又曰九畿侯甸男采衞蠻夷鎭藩周禮職方氏辨九服之邦國方千里曰王九畿之籍方千里曰國畿其外方五百里内大司馬自商以前并畿為五服周公致太平除畿内更制天下為九服六服周侯甸男采衞并王畿書周官六服羣辟罔不承德禹貢五服通畿内周制五服在王畿外五嶽岱在兖州衡在荆州華在豫州嶽在雍州恒在并州周禮大司樂注泰山東兖州岱乂曰岱宗山華山西華州衡山南衡州即爾雅霍山為南嶽天柱山按霍山在今壽州六安縣天柱山在漢廬江郡灊縣恒山北定州帝又曰常山漢文諱改嵩山中河南府太爾雅嵩髙中嶽注室山東岱南靃西華北恒中泰室說文華爾雅河南河西嶽吳嶽河東岱河北恒江南衡四嶽岱東兖州在華西雍州在衡南荆州在恒北冀州在左傳注四瀆江出岷山茂州河出崑崙西域淮出桐栢唐州濟沇水出王屋東流為濟河南漢志作泲爾雅四瀆者發源注海者也四海東海徐揚芒神勾西海西域収神蓐南海交廣融神祝北海青滄頊神顓太公金匱禮記祭義九夷東八狄北七戎西六蠻南爾雅蕭箋詩蓼北至于幽陵南至于交趾西濟于流沙東至于蟠木大戴禮五帝德高陽乗龍而至四海禹使大章步東極至西垂二億三萬三千五百里七十一步又使豎亥步南極盡北垂二億三萬三千五百里七十五步四海之内東西二萬八千里南北二萬六千里帝王世紀山海經西不盡流沙南不盡衡山東不盡東海北不盡恒山王制凡四海之内斷長補短方三千里九河徒駭太史馬頰覆鬴胡蘇簡絜曾氏以簡絜為一其一則河之經流也鉤盤鬲津爾雅徒孟子禹疏九河駭是河流本道一分為八枝其許商得其三杜佑通典得其六歐陽忞輿地記又得一或新河而載以舊名或一地而互為兩說之鄭氏以為齊桓塞其八流以自廣碣漢王横言九河地為海水所漸酈道元謂九河石苞淪於海九山會稽泰山王屋首山太華岐山太行羊腸孟門淮南子秋呂氏春汧壺口砥柱太行西傾熊耳嶓冡内方汶史記正義道九山崇書說自岍岐至敷淺源國語禹封九山注九州之山會稽衡山華山沂山岱山嶽山醫無閭霍山恒山職方氏九州山鎭九川弱水黑水河漢索隱瀁江沇淮渭洛史記正義道九川北禹貢正義所導九水自為始九州名川書子決九川注三江江漢滎雒淮泗河泲涇汭河泲漳虖池嘔夷職方氏九州川九江烏白江蚌江烏江嘉靡江畎江源江廩江提江箘江禹貢釋文尋陽地記三里江五州江嘉靡江烏土江白蚌江白烏江箘江沙提江廩江張須元緣江圖口始於鄂陵終于江會于桑落洲劉歆以為湖漢九水入彭蠡澤太康地記漢志在廬江郡之尋陽縣水經在長沙下雋西北胡氏以洞庭為九江曾氏謂過九江至于東陵東陵今之巴陵巴陵之上即洞庭也考之前志沅水漸水潕水辰水叙水酉水醴水湘水資水皆合洞庭中東入于江賈誼書曰禹鑿江而導之九路三江吳松江錢塘江浦陽江禹貢釋文韋昭云云越語吳三江環之注云松江東北行七十里得三江口東北入海為婁江東南入海為東江并松江為三吳地記賦庾仲初揚都注北江中江南江顔師古注漢地理志岷江浙江松江郭景純云一江自義興一江自毘陵一江自吳縣王介甫云岷山之江為中江嶓冢之江為北江豫章之江為南江蘇子瞻云北江中江皆禹所導南江乃其故道故經不之志曾氏云江至尋陽南合為一東行至揚州入彭蠡復分為三道入海周禮職方氏揚州其川三江疏云五湖滆湖洮湖射湖貴湖太湖後漢馮衍傳注虞翻云太湖有五湖故謂之五湖之太湖之小支俱連太湖兼得五湖名在今湖州東長塘湖太湖射貴湖上湖滆湖水經注江南東注于具區謂之五湖口國語越伐吳戰于五湖范蠡返至五湖而辭越虞翻曰是湖有五道韋昭曰今太湖也書謂之震澤爾雅以為具區禹貢疏即震澤游莫貢䔖胥史記正義並太湖東岸五灣吳錄五湖太湖别名周五百餘里故曰五湖通渠三江五湖職方氏揚州其浸五湖湖河渠書吳太史公曰上姑蘇望五地理志注五湖在吳有說文通釋一名具區其派五故曰五湖太湖射貴湖上湖洮湖滆湖史記正義或說具區洮滆彭蠡青草洞庭史記索隱郭璞江賦太湖湖州射陽楚州青草岳州丹陽潤州宮亭洪州二南周南召南周國本在岐山之陽岐周今鳳翔府天興縣文王辟國寖廣徙都于豐而分岐周故地為周公旦召公奭之采邑扶風雍縣南有召亭且使周公為政於國中而召公宣布於諸侯於是德化大成于内而南方諸侯之國江沱汝漢之間莫不從化南南方諸侯之國也即今興元府京西湖北諸州周公相成王制作禮樂其得之國中者雜以南國之詩謂之周南言自天子之國而被於諸侯不但國中而已也其得之南國者直謂之召南言自方伯之國被於南方而不敢以繫于天子也朱子詩傳兩周平王東遷之後西周豐鎬也東周東都也威烈王之後西周河南也王城東周洛陽也成周呂氏大事記解題考王封其弟于河南是為桓公以續周公之官職惠公封其少子於鞏以奉王於是有東西二周十藪大野魯大陸晉楊陓秦陽淮南子紆孟諸宋雲夢楚具區吳越海隅齊昭余祁燕圃田鄭焦護周爾雅九藪具區越雲夢楚陽華秦陽淮南子紆大陸晉圃田梁甫說文田孟諸宋海隅齊鉅鹿趙大昭燕昭淮南子余祈呂氏春秋大漢書八藪有野無鉅鹿大昭藪國語禹豐殖九九澤九澤旣陂禹貢注九州之澤國語陂障九澤具區楊雲夢荆圃田豫望諸青大野兖弦蒲雍貕養幽揚紆冀昭余祁并職方氏九州澤藪七澤楚有七澤其一曰雲夢司馬相如子虚賦萬國州十二師州有十二師每一師領百國每州千二百國畿外八州總九千六百國其餘四百國在畿内鄭康成說方漢地理志黄帝制萬里畫埜分州得百里之國萬區今左傳子服景伯曰禹會諸侯於塗山執玉帛者萬國存者無數十戰國䇿顏斶曰大禹之時諸侯萬國及湯之時諸侯三千今乃二十四八家為鄰三鄰為朋三朋為里五里為邑十邑為都十都為師州十有二師晉地理志帝堯叶和萬邦制云云周千八百國八州州二百一十國天子縣内九十三國凡九州千七百七十三國王制周蓋千八百國而太昊黄帝之後唐虞侯伯猶存至春秋時尚有數十國至戰國分而為七漢地理志春秋之初尚有千二百國見經傳者百七十國晉地理志戰國存者十餘列國唯有燕衞秦楚而已齊及三晉簒亂帝王世紀三條四列導岍北條岍隴州吳山縣吳嶽山西傾中條山在洮州臨潭縣嶓冢南條山在興元府西縣三泉縣禹貢馬融王肅三條導岍陰列西傾次陰列嶓冢次陽列岷山正陽列在茂州汶山縣鄭康成四列名川支川名川三百支川三千莊子桑欽水經天下之水百三十七江河在焉江河大川其餘百三十五是為中川酈善長注枝流一千二百五十二為小川唐六典注天下水泉三億三萬三千五百五十有九九州之險四嶽三塗陽城大室大音泰荆山中南左傳司馬侯對晉侯山漢郊祀志自崤以東名山五太室恒山泰山會稽湘自華以西名山七華山薄山嶽山岐山吳山鴻冡瀆山三川涇渭洛國語西周三川皆震河洛伊秦置三川郡華池水黑水洛水唐志鄜州三川縣二渠一出貝丘西南一漯川漢溝洫志禹釃二渠以引河五地五土山林川澤丘陵墳衍原隰周禮大司徒辨五地之物生孝經地之利注分别五土視其高下三壤田上中下冀中中兖中下青上下徐上中揚下下荆下中豫中上梁下上雍上上禹貢咸則三壤州楚辭天問地方九則注九之地有九品三亳北亳䝉亦湯所受命曰景亳南亳穀熟都湯所西亳偃師遷盤庚所書立政三亳阪尹皇甫謐云二在梁國一在河洛四裔幽州史記幽陵窮北裔共工奇崇山南裔在今澧州驩兜渾敦三危西裔在燉煌餮三苗饕羽山東裔在今